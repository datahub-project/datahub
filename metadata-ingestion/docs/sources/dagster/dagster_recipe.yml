source:
  type: dagster
  config:
    # Dagster OSS webserver. For Dagster+, use https://<org>.dagster.cloud
    host: "http://localhost:3000"

    # Dagster+ (Cloud) settings — omit for OSS.
    # is_cloud: true
    # deployment: prod
    # token: "${DAGSTER_CLOUD_TOKEN}"

    # Filtering (optional)
    job_pattern:
      allow: [".*"]
    asset_pattern:
      allow: [".*"]

    # Feature toggles
    include_assets: true # emit Software-Defined Assets as Datasets
    include_asset_lineage: true # table-level asset -> asset lineage
    include_column_lineage: true # fine-grained column lineage (when assets expose it)
    include_ownership: true
    include_tags: true
    include_metadata: true
    # Emit Dagster jobs/ops as DataFlow/DataJob. Off by default so the graph
    # shows only assets; set true if you want the orchestration nodes too.
    include_jobs: false

    stateful_ingestion:
      enabled: true

sink:
  # sink configs
