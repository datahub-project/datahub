source:
  type: mariadb
  config:
    # Coordinates
    host_port: localhost:3306
    database: dbname

    # Credentials
    username: root
    password: example

    # Optionally derive usage stats + query lineage from query history.
    # include_usage_statistics: true
    # usage_source: performance_schema # default; normalized digests, no setup
