source:
  type: mariadb
  config:
    # Coordinates
    host_port: localhost:3306
    database: dbname

    # Credentials
    username: root
    password: example

    # Optionally derive usage stats + query lineage from performance_schema
    # (no general query log required). Requires the statements_digest consumer
    # (on by default in MariaDB 10.11) and SELECT on performance_schema.
    # include_usage_statistics: true

    # If you need to use SSL with MariaDB:
    # options:
    #   connect_args:
    #     ssl_ca: "path_to/server-ca.pem"
    #     ssl_cert: "path_to/client-cert.pem"
    #     ssl_key: "path_to/client-key.pem"


# sink configs
