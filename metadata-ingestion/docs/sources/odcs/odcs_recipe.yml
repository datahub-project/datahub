source:
  type: odcs
  config:
    # Path to a single ODCS YAML file, a directory of contracts, or a glob.
    # May also be a list of any of the above. Each file may describe multiple
    # tables (one `schema[]` entry per table) — every entry fans out to its own
    # Dataset URN + DataContract URN pair.
    path: ./contracts/

    # Map every distinct `servers[].server` value in your contracts to a
    # DataHub data platform. Contracts that resolve to no mapping are skipped
    # with a warning.
    servers_to_platform:
      - server: prod-snowflake
        platform: snowflake
        env: PROD
        platform_instance: prod

    # Optional knobs — uncomment to override defaults.
    #
    # tag_prefix: "odcs."                       # prepend to every emitted tag
    # strict_validation: false                  # default false; set true to reject contracts that fail JSON Schema validation
    # emit_assertions: true                     # emit Assertion entities from `quality[]` rules
    # odcs_versions: ["3.0.0", "3.0.1", "3.0.2", "3.1.0"]
    # dataset_urn_overrides:                    # contract id -> explicit Dataset URN
    #   "orders.v1": "urn:li:dataset:(urn:li:dataPlatform:snowflake,prod.sales.orders,PROD)"
    # follow_symlinks: false                    # follow symlinks when scanning a directory
    # max_input_file_bytes: 5242880             # 5 MB; larger files are skipped with a warning
    # raw_contract_size_limit_bytes: 1000000    # 1 MB; larger contracts omit rawContract aspect
    #
    # Replicate contract-level ownership/description/tags to every fanned-out
    # dataset on each ingest. Set false to emit these aspects only at first sight,
    # which preserves manual UI edits but means contract changes don't propagate.
    # replicate_contract_metadata: true

# Default sink is datahub-rest and doesn't need to be configured.
# See https://docs.datahub.com/docs/metadata-ingestion/sink_docs/datahub for customization.
