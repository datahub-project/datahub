source:
  type: trino
  config:
    # Coordinates
    host_port: localhost:5300
    database: dbname

    # Credentials
    username: foo
    password: password

    # HTTP scheme for connecting to Trino. Default is 'http'.
    # For production Trino clusters with TLS/SSL enabled, set http_scheme to 'https'.
    # If you see 'BadStatusLine' errors, your Trino server likely requires HTTPS.
    # options:
    #   connect_args:
    #     http_scheme: https
    
    # Optional -- A mapping of trino catalog to its connector details like connector database, env and platform instance.
    # This configuration is used to ingest lineage of datasets to connectors. Use catalog name as key.
    # catalog_to_connector_details:
    #   catalog_name:
    #     connector_database: db_name
    #     connector_platform: connector_platform_name
    #     platform_instance: cloud_instance
    #     env: DEV
    #   # Two-tier connectors (e.g. hive, mysql, oracle) build schema.table URNs and need no connector_database:
    #   oracle_catalog:
    #     platform_instance: my_oracle
    #   # Three-tier connectors (e.g. starrocks, postgresql) require connector_database for the top tier.
    #   # StarRocks is reached through Trino's mysql connector (it is MySQL-wire-compatible), so Trino
    #   # reports connector_name="mysql"; set connector_platform to retarget it to the starrocks platform:
    #   starrocks_catalog:
    #     connector_platform: starrocks
    #     connector_database: starrocks_catalog_name
    #     platform_instance: my_starrocks

sink:
  # sink configs
