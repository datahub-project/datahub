source:
  type: tibco-bw
  config:
    # On-prem (ActiveMatrix BusinessWorks) example
    deployment: on_prem
    base_url: "http://bw-host.example.com:8079"
    username: "${TIBCO_BW_USERNAME}"
    password: "${TIBCO_BW_PASSWORD}"

    # Cloud (TIBCO Cloud Integration) example — replace the block above with:
    # deployment: cloud
    # token: "${TIBCO_CLOUD_TOKEN}"

    application_pattern:
      allow:
        - ".*"

    stateful_ingestion:
      enabled: true

sink:
  # sink configs
