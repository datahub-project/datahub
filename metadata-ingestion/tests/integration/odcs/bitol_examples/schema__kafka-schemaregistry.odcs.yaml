apiVersion: v3.0.2
kind: DataContract
id: orders
status: production
name: Orders Event Stream
version: 0.0.1
schema:
- name: Orders
  physicalName: orders
  logicalType: object
  physicalType: topic
  description: Orders Kafka topic
  authoritativeDefinitions:
