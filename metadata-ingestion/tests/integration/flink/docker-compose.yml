services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: test_flink_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  broker:
    image: confluentinc/cp-kafka:7.4.0
    container_name: test_flink_broker
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server broker:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: test_flink_postgres
    environment:
      POSTGRES_USER: flink
      POSTGRES_PASSWORD: flink
      POSTGRES_DB: flink_catalog
      # md5 auth required: Hive 3.1.3 bundles an old Postgres JDBC driver
      # that doesn't support scram-sha-256 (Postgres 16 default).
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flink"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: test_flink_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
      MINIO_DOMAIN: minio
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # mc: MinIO Client — creates the 'warehouse' S3 bucket that iceberg-rest and
  # Flink's S3A plugin use for Iceberg data file storage.
  mc:
    image: minio/mc
    container_name: test_flink_mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set minio http://minio:9000 admin password &&
      /usr/bin/mc mb --ignore-existing minio/warehouse &&
      /usr/bin/mc anonymous set public minio/warehouse &&
      touch /tmp/mc_done &&
      tail -f /dev/null
      "
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/mc_done"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  iceberg-rest:
    image: tabulario/iceberg-rest:0.5.0
    container_name: test_flink_iceberg_rest
    depends_on:
      mc:
        condition: service_healthy
    ports:
      - "8181:8181"
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      CATALOG_WAREHOUSE: s3a://warehouse/wh/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -v grep | grep -q 'iceberg-rest-image-all.jar'"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  hive-metastore:
    image: apache/hive:3.1.3
    hostname: hive-metastore
    container_name: test-flink-hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/hive_metastore
        -Djavax.jdo.option.ConnectionUserName=flink
        -Djavax.jdo.option.ConnectionPassword=flink
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9083' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  jobmanager:
    build: .
    container_name: test_flink_jobmanager
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
    ports:
      - "8082:8081"
    command: jobmanager
    volumes:
      - ./pyflink_kafka_job.py:/opt/flink/pyflink_kafka_job.py:ro
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        rest.port: 8081
        s3.access-key-id: admin
        s3.secret-access-key: password
        s3.endpoint: http://minio:9000
        s3.path.style.access: true

  taskmanager:
    build: .
    container_name: test_flink_taskmanager
    depends_on:
      jobmanager:
        condition: service_started
      hive-metastore:
        condition: service_healthy
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 8
        s3.access-key-id: admin
        s3.secret-access-key: password
        s3.endpoint: http://minio:9000
        s3.path.style.access: true

  sql-gateway:
    build: .
    container_name: test_flink_sql_gateway
    depends_on:
      jobmanager:
        condition: service_started
      postgres:
        condition: service_healthy
      hive-metastore:
        condition: service_healthy
      iceberg-rest:
        condition: service_healthy
    ports:
      - "8084:8083"
    command: >
      bash -c "
        /opt/flink/bin/sql-gateway.sh start -Dsql-gateway.endpoint.rest.address=0.0.0.0 -Dtable.catalog-store.kind=file -Dtable.catalog-store.file.path=/tmp/catalog-store &&
        tail -f /dev/null
      "
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        s3.access-key-id: admin
        s3.secret-access-key: password
        s3.endpoint: http://minio:9000
        s3.path.style.access: true

networks:
  default:
    name: flink-test
