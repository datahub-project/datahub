run_id: mariadb-test

source:
  type: mariadb
  config:
    username: root
    password: password
    host_port: localhost:53300
    database: test_db
    include_stored_procedures: true
    procedure_pattern:
      allow:
        - "test_db.*"
      deny:
        - ".*_temp$"
    profiling:
      enabled: True
      # Deterministic profiling for the golden test: run serially and skip the
      # experimental query combiner so a transient column query can't be silently
      # swallowed (catch_exceptions), which would drop fieldProfiles/rowCount and
      # make the golden comparison flaky.
      max_workers: 1
      query_combiner_enabled: false
      include_field_null_count: true
      include_field_min_value: true
      include_field_max_value: true
      include_field_mean_value: true
      include_field_median_value: true
      include_field_stddev_value: true
      include_field_quantiles: true
      include_field_distinct_value_frequencies: true
      include_field_histogram: true
      include_field_sample_values: true

sink:
  type: file
  config:
    filename: "./mariadb_mces.json"