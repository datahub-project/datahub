source:
  type: dremio
  config:
    # Coordinates
    hostname: localhost
    port: 9047
    tls: false

    # Credentials
    authentication_method: password
    username: admin
    password: "2310Admin1234!@"

    include_query_lineage: false

    # Exercise the A3 PATCH lineage path so the goldens (which were
    # regenerated under this default) match runtime output.
    incremental_lineage: true

    source_mappings:
      - platform: s3
        source_name: samples
        platform_instance: s3_test_samples
      - platform: s3
        source_name: s3
        platform_instance: s3_test_samples

    schema_pattern:
      allow:
        - "Samples"

sink:
  type: file
  config:
    filename: "./dremio_mces.json"
