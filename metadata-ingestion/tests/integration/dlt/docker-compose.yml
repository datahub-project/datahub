version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: dlt_chess_postgres
    environment:
      POSTGRES_USER: dlt
      POSTGRES_PASSWORD: dlt
      POSTGRES_DB: chess
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dlt -d chess"]
      interval: 5s
      timeout: 5s
      retries: 5
