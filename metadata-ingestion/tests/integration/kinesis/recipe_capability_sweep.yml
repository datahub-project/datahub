source:
  type: kinesis
  config:
    aws_config:
      aws_endpoint_url: ${AWS_ENDPOINT_URL:-http://localhost:4566}
      aws_region: us-east-1
      aws_access_key_id: test
      aws_secret_access_key: test
    # platform_instance: omitted (None) — keeps ContainerKey GUID stable.
    include_streams: true
    include_firehose: true
    extract_tags: true
    extract_owners: true
    owner_tag_key: owner
    destination_platform_map: {}
    stream_pattern:
      deny:
        - "^_.*"
sink:
  # File sink: writes emitted MCPs/MCEs to the path the milestone verifier
  # expects. The M4 verifier (check_capabilities_script) reads
  # `<out_dir>/ingestion-output.json` and runs check-capabilities.sh on it.
  # out_dir is .verify/M4-capabilities-complete/ by default.
  type: file
  config:
    filename: .verify/M4-capabilities-complete/ingestion-output.json
