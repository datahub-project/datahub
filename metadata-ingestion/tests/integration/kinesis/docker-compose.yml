version: "3.8"
services:
  localstack:
    image: localstack/localstack:3.0
    # Explicit container_name so wait_for_port can `docker exec` it by name.
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: kinesis,firehose,s3,iam,sts
      DEFAULT_REGION: us-east-1
      DEBUG: "0"
