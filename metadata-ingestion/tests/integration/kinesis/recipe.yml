source:
  type: kinesis
  config:
    aws_config:
      aws_endpoint_url: ${AWS_ENDPOINT_URL:-http://localhost:4566}
      aws_region: us-east-1
      aws_access_key_id: test
      aws_secret_access_key: test
    # platform_instance: set per-environment when needed; do NOT use `${VAR:-}` default
    # because empty string yields a different ContainerKey GUID than absent / None.
    include_streams: true
    include_firehose: true
    extract_tags: true
    extract_owners: true
    owner_tag_key: owner
    destination_platform_map: {}
    stream_pattern:
      deny:
        - "^_.*"
sink:
  type: datahub-rest
  config:
    server: ${DATAHUB_GMS_URL:-http://localhost:8080}
    token: ${DATAHUB_GMS_TOKEN}
