source:
  type: kinesis
  config:
    aws_config:
      aws_endpoint_url: ${AWS_ENDPOINT_URL:-http://localhost:4566}
      aws_region: us-east-1
      aws_access_key_id: test
      aws_secret_access_key: test
    # platform_instance: omitted (None) — keeps ContainerKey GUID stable across runs.
    include_streams: true
    include_firehose: true
    extract_tags: true
    destination_platform_map: {}
    stream_pattern:
      deny:
        - "^_.*"
sink:
  type: file
  config:
    # Relative path: run_datahub_cmd executes in an isolated filesystem rooted at
    # the test's tmp_path, so the output lands there for golden-file comparison.
    filename: kinesis_mces.json
