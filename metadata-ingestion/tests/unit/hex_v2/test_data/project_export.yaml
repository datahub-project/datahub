schemaVersion: 3
meta:
  projectId: 019db1be-8dd0-7001-9326-5588f745dfe8
  title: Assertions
  description: Customer-facing assertions view.
  hexType: PROJECT
  codeLanguage: PYTHON
  status: null
  categories: []

projectAssets:
  dataConnections: []

sharedAssets:
  dataConnections:
    - dataConnectionId: conn-snowflake-us
    - dataConnectionId: conn-snowflake-eu

cells:
  - cellType: SQL
    cellId: cell-001
    cellLabel: Customer list
    config:
      source: |
        SELECT DISTINCT customer_name
        FROM analytics_hub.public_core.dim_customer
        WHERE is_churned = FALSE
      dataConnectionId: conn-snowflake-us
      resultVariableName: customer_list

  - cellType: SQL
    cellId: cell-002
    cellLabel: In-memory transform (no external DB)
    config:
      source: |
        SELECT customer_name, COUNT(*) as total
        FROM customer_list
        GROUP BY customer_name
      dataConnectionId: null
      resultVariableName: customer_summary

  - cellType: COLLAPSIBLE
    cellId: cell-col-001
    cellLabel: Data Prep
    config:
      cells:
        - cellType: SQL
          cellId: cell-003
          cellLabel: EU assertion details
          config:
            source: |
              SELECT DISTINCT customer_name, assertion_type
              FROM public_core.dim_assertions
              WHERE region = 'EU'
            dataConnectionId: conn-snowflake-eu
            resultVariableName: eu_assertions

        - cellType: SQL
          cellId: cell-004
          cellLabel: Combined (no connection)
          config:
            source: |
              SELECT * FROM customer_list
              UNION ALL
              SELECT * FROM eu_assertions
            dataConnectionId: null
            resultVariableName: combined

  - cellType: EXPLORE
    cellId: cell-chart-001
    cellLabel: Customer chart
    config:
      resultVariableName: customer_summary

  - cellType: MARKDOWN
    cellId: cell-md-001
    cellLabel: Notes
    config:
      source: "## Overview\nThis is a test project."
