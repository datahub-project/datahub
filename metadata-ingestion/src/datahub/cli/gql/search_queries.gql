fragment FacetEntityInfo on Entity {
  urn
  type
  ... on Tag {
    name
    properties {
      name
      description
      colorHex
    }
  }
  ... on GlossaryTerm {
    name
    properties {
      name
      description
    }
  }
  ... on Domain {
    properties {
      name
      description
    }
  }
  ... on Container {
    properties {
      name
    }
    platform {
      ...PlatformFields
    }
  }
  ... on CorpUser {
    username
    properties {
      displayName
    }
  }
  ... on CorpGroup {
    name
    properties {
      displayName
    }
  }
  ... on DataPlatform {
    ...PlatformFields
  }
}

query search(
  $types: [EntityType!]
  $query: String!
  $orFilters: [AndFilterInput!]
  $count: Int!
  $start: Int!
  $viewUrn: String
  $sortInput: SearchSortInput
) {
  searchAcrossEntities(
    input: {
      query: $query
      count: $count
      start: $start
      types: $types
      orFilters: $orFilters
      viewUrn: $viewUrn
      sortInput: $sortInput
      searchFlags: { skipHighlighting: true, maxAggValues: 5 }
    }
  ) {
    start
    count
    total
    searchResults {
      entity {
        ...SearchEntityInfo
      }
    }
    facets {
      field
      displayName
      aggregations {
        value
        count
        displayName
        entity {
          ...FacetEntityInfo
        }
      }
    }
  }
}

query semanticSearch(
  $query: String!
  $types: [EntityType!]
  $orFilters: [AndFilterInput!]
  $count: Int
  $start: Int
  $viewUrn: String
  $searchFlags: SearchFlags
) {
  semanticSearchAcrossEntities(
    input: {
      types: $types
      query: $query
      orFilters: $orFilters
      count: $count
      start: $start
      viewUrn: $viewUrn
      searchFlags: $searchFlags
    }
  ) {
    start
    count
    total
    searchResults {
      entity {
        ...SearchEntityInfo
      }
      matchedFields {
        name
        value
      }
    }
    facets {
      field
      displayName
      aggregations {
        value
        count
        entity {
          ...FacetEntityInfo
        }
      }
    }
  }
}
