# Fivetran ingestion via the destination's log database (`log_source: log_database`).
#
# Reads the Fivetran Platform Connector log directly from a Snowflake
# warehouse using SQL queries. Use this mode if your Fivetran log lives
# in a Snowflake / BigQuery / Databricks destination you already query.
#
# Pair with `fivetran_rest_api_to_file.dhub.yaml` to compare outputs
# between the two log-source modes:
#
#   datahub ingest -c examples/recipes/fivetran_log_database_to_file.dhub.yaml
#   datahub ingest -c examples/recipes/fivetran_rest_api_to_file.dhub.yaml
#   diff <(jq -S . /tmp/fivetran_db.json) <(jq -S . /tmp/fivetran_rest.json)

source:
  type: fivetran
  config:
    log_source: log_database # default — explicit here for clarity

    fivetran_log_config:
      destination_platform: snowflake
      snowflake_destination_config:
        account_id: "${SNOWFLAKE_ACCOUNT_ID}"
        warehouse: "${SNOWFLAKE_WAREHOUSE}"
        username: "${SNOWFLAKE_USER}"
        password: "${SNOWFLAKE_PASS}"
        role: "${SNOWFLAKE_ROLE}"
        database: "${SNOWFLAKE_LOG_DB}" # database holding the Fivetran log
        log_schema: "fivetran_log"

    # Filter both recipes to the same connectors so outputs are comparable.
    # Fivetran connector IDs are visible in the UI under Connectors → Setup.
    connector_patterns:
      allow:
        - "${FIVETRAN_CONNECTOR_ID}" # e.g. "calendar_elected"

    # Optional: same on the destination side for multi-destination accounts.
    # destination_patterns:
    #   allow:
    #     - "${FIVETRAN_DESTINATION_ID}"

    # Per-connector caps — keep identical between the two recipes so the
    # number of emitted DataProcessInstance events matches.
    max_jobs_per_connector: 50
    history_sync_lookback_period: 7

sink:
  type: file
  config:
    filename: /tmp/fivetran_db.json
