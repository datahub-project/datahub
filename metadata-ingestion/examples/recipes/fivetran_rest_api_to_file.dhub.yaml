# Fivetran ingestion via the Fivetran REST API (`log_source: rest_api`).
#
# No destination warehouse credentials needed — reads everything via
# the Fivetran API. Use this mode for hybrid setups (data spread across
# multiple destination types), Managed Data Lake destinations
# (Polaris / Iceberg REST / Glue), or when you want a smaller credential
# surface than a warehouse connection.
#
# Pair with `fivetran_log_database_to_file.dhub.yaml` to compare
# outputs between the two log-source modes — see the comparison
# recipe for usage.

source:
  type: fivetran
  config:
    log_source: rest_api

    api_config:
      api_key: "${FIVETRAN_API_KEY}"
      api_secret: "${FIVETRAN_API_SECRET}"
      # base_url: "https://api.fivetran.com"  # default
      # request_timeout_sec: 30                # default

    # Same connector filter as the DB recipe — outputs should describe
    # the same set of connectors so the diff is meaningful.
    #connector_patterns:
    #  allow:
    #    - "luma" # e.g. "calendar_elected"

    # Optional: same on the destination side for multi-destination accounts.
    # destination_patterns:
    #   allow:
    #     - "DataHub_Lake"

    # Match the DB recipe's caps exactly so DPI counts align.
    max_jobs_per_connector: 50
    history_sync_lookback_period: 7

    # REST-only knobs — start with defaults; lower if you hit rate limits.
    rest_api_max_workers: 4
    rest_api_per_connector_timeout_sec: 300

    # If a destination is Managed Data Lake and you want a different URN
    # platform than the default `iceberg`, override per-destination here.
    # destination_to_platform_instance:
    #   "${FIVETRAN_DESTINATION_ID}":
    #     platform: glue
    #     platform_instance: my_glue_instance
    #     env: PROD

sink:
  type: file
  config:
    filename: /tmp/fivetran_rest.json
