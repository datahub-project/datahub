[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "acryl-datahub-executor"
version = "1!0.0.0.dev0"
description = ""
authors = [
  { name="Acryl Data", email="eng@acryl.io" },
]
requires-python = ">=3.9"

dependencies = [
  "acryl-datahub[base,snowflake,bigquery,redshift,s3,unity-catalog]",
  "fastapi==0.95.2",
  "uvicorn[standard]>=0.23.2",
  "loguru==0.7.2",
  "apscheduler @ git+https://github.com/acryldata/apscheduler-fork.git@ak--crontab-fix",
  "pydantic==1.10.19",
  "snowflake-connector-python>2.8.2",
  "pytz==2024.1",
  "croniter==1.3.15",
  "redshift-connector>=2.1.5",
  "types-croniter==1.4.0.1",
  "tenacity==8.5.0",
  "sentry-sdk==1.45.1",
  "oscrypto @ git+https://github.com/wbond/oscrypto.git@1547f535001ba568b239b8797465536759c742a3",
  "celery[redis,sqs]==5.4.0",
  "kombu==5.4.0",              # Note: 5.4.1 silently breaks
  "watchdog==3.0.0",
  "acryl-executor==0.1.10",
  "acryl-datahub-actions==0.1.4",
  "pycurl==7.45.3"
]

[project.optional-dependencies]
dev = [
  "black",
  "ruff",
  "pytest",
  "mypy",
  "pytest-cov",
  "pytest-asyncio",
  "types-setuptools",
  "types-cachetools",
  "types-PyYAML",
  "isort",
  "faker",
  "types-pytz",
]


[tool.black]
extend-exclude = '''
# A regex preceded with ^/ will apply only to files and directories
# in the root of the project.
^/tmp
'''
include = '\.pyi?$'
target-version = ['py310']

[tool.isort]
profile = 'black'

[tool.ruff.lint]
ignore = [
  'E501', # Ignore line length, since black handles that.
  'D203', # Ignore 1 blank line required before class docstring.
]
extend-select = ["INP001"]

[tool.pyright]
extraPaths = ['tests']
