[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "acryl-datahub-executor"
version = "0.0.0.dev0"
description = ""
authors = ["Acryl Data <eng@acryl.io>"]
packages = [{include = "datahub_executor", from = "src"}]

[tool.poetry.dependencies]
python = ">=3.9.0,<3.12"
acryl-datahub = { path = "../metadata-ingestion", develop = true, extras = ["snowflake", "redshift", "s3", "bigquery", "unity-catalog"] }
fastapi = "^0.95.1"
uvicorn = {extras = ["standard"], version = "^0.22.0"}
loguru = "^0.7.0"
slack-bolt = "^1.18.0"
apscheduler = "3.10.1"
pydantic = "^1.10.7"
snowflake-connector-python = ">2.8.2"
cronitor = "^4.6.0"
pytz = "^2023.3"
croniter = "1.3.15"
redshift-connector = "^2.0.910"
types-croniter = "^1.3.2.9"
tenacity = "^8.2.2"
sentry-sdk = "^1.28.1"
oscrypto = { git = "https://github.com/wbond/oscrypto.git", rev = "1547f53" }
celery = {extras = ["redis", "sqs"], version = "^5.3.4"}
kombu = "<5.4.1" # 5.4.1 silently breaks
watchdog = "^3.0.0"
acryl-executor = "^0.1.3"
acryl-datahub-actions = "^0.1.4"
pycurl = "^7.45.2"

[tool.black]
extend-exclude = '''
# A regex preceded with ^/ will apply only to files and directories
# in the root of the project.
^/tmp
'''
include = '\.pyi?$'
target-version = ['py310']

[tool.isort]
profile = 'black'

[tool.ruff]
ignore = [
	'E501', # Ignore line length, since black handles that.
	'D203', # Ignore 1 blank line required before class docstring.
]

[tool.pyright]
extraPaths = ['tests']
