[loggers]
keys=root,datahub_executor,uvicorn,uvicorn_access,kafka,urllib3

[handlers]
keys=consoleHandler

[formatters]
keys=detailedFormatter,accessFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_datahub_executor]
level=INFO
handlers=consoleHandler
qualname=datahub_executor
propagate=0

[logger_uvicorn]
level=INFO
handlers=consoleHandler
qualname=uvicorn
propagate=0

[logger_uvicorn_access]
level=INFO
handlers=consoleHandler
qualname=uvicorn.access
propagate=0

[logger_kafka]
level=WARNING
handlers=
qualname=kafka
propagate=1

[logger_urllib3]
level=WARNING
handlers=
qualname=urllib3
propagate=1

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=detailedFormatter
args=(sys.stdout,)

[formatter_detailedFormatter]
format=[%(asctime)s] %(levelname)-8s {%(name)s:%(lineno)d} - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_accessFormatter]
format=[%(asctime)s] %(levelname)-8s {%(name)s} - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
