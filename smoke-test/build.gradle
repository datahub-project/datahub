plugins {
  id 'java' // required for versioning
}

apply plugin: 'com.github.node-gradle.node'


apply from: "../gradle/versioning/versioning.gradle"
apply from: '../gradle/docker/docker.gradle'

ext {
  python_executable = 'python3'
  venv_name = 'venv'
  python_docker_version = project.getProperties().getOrDefault("pythonDockerVersion", "1!0.0.0+docker.${version}")
  // Saas only
  docker_repo = 'datahub-smoke-test'
}

node {
  // If true, it will download node using above parameters.
  // If false, it will try to use globally installed node.
  if (project.hasProperty('useSystemNode') && project.getProperty('useSystemNode').toBoolean()) {
    download = false
  } else {
    download = true
  }

  // Version of node to use.
  version = '22.12.0'

  // Version of Yarn to use.
  yarnVersion = '1.22.22'

  // Base URL for fetching node distributions (set nodeDistBaseUrl if you have a mirror).
  if (project.hasProperty('nodeDistBaseUrl')) {
    distBaseUrl = project.getProperty('nodeDistBaseUrl')
  } else {
    distBaseUrl = 'https://nodejs.org/dist'
  }

  // Set the work directory for unpacking node
  workDir = file("${project.projectDir}/.gradle/nodejs")

  // Set the work directory for NPM
  yarnWorkDir = file("${project.projectDir}/.gradle/yarn")

  // Set the work directory where node_modules should be located
  nodeProjectDir = file("${project.projectDir}")

}

task yarnInstall(type: YarnTask) {
  println  "Root directory:  ${project.rootDir}";
  environment = ['NODE_OPTIONS': '--openssl-legacy-provider']
  args = ['install', '--network-timeout', '300000', '--cwd', "${project.rootDir}/smoke-test/tests/cypress"]
}

task cypressLint(type: YarnTask, dependsOn: yarnInstall) {
  environment = ['NODE_OPTIONS': '--openssl-legacy-provider']
  // TODO: Run a full lint instead of just format.
  args = ['--cwd', "${project.rootDir}/smoke-test/tests/cypress", 'run', 'format']
}

task cypressLintFix(type: YarnTask, dependsOn: yarnInstall) {
  environment = ['NODE_OPTIONS': '--openssl-legacy-provider']
  // TODO: Run a full lint instead of just format.
  args = ['--cwd', "${project.rootDir}/smoke-test/tests/cypress", 'run', 'format', '--write']
}

task installDev(type: Exec) {
    inputs.file file('pyproject.toml')
    inputs.file file('requirements.txt')
    outputs.file("${venv_name}/.build_install_dev_sentinel")
    commandLine 'bash', '-c',
        "set -x && " +
        "${python_executable} -m venv ${venv_name} && " +
        "${venv_name}/bin/python -m pip install --upgrade uv && " +
        "set +x && source ${venv_name}/bin/activate && set -x && " +
        "uv pip install -r requirements.txt && " +
        "touch ${venv_name}/.build_install_dev_sentinel"
}

task pythonLint(type: Exec, dependsOn: installDev) {
    commandLine 'bash', '-c',
        "source ${venv_name}/bin/activate && set -x && " +
        "ruff check tests/ && " +
        "ruff format --check tests/ && " +
        "mypy tests/"
}

task pythonLintFix(type: Exec, dependsOn: installDev) {
    commandLine 'bash', '-c',
        "source ${venv_name}/bin/activate && set -x && " +
        "ruff check --fix tests/ && " +
        "ruff format tests/ && " +
        "mypy tests/"
}

/**
 * The following tasks assume an already running quickstart.
 * ./gradlew quickstart (or another variation `quickstartDebug`)
 */
//  ./gradlew :smoke-test:pytest -PbatchNumber=2 (default 0)
task pytest(type: Exec, dependsOn: [installDev, ':metadata-ingestion:installDev']) {
    // Get BATCH_NUMBER from command line argument with default value of 0
    def batchNumber = project.hasProperty('batchNumber') ? project.property('batchNumber') : '0'

    environment 'RUN_QUICKSTART', 'false'
    environment 'TEST_STRATEGY', 'pytests'
    environment 'BATCH_COUNT', 3
    environment 'BATCH_NUMBER', batchNumber

    workingDir = project.projectDir
    commandLine 'bash', '-c',
            "source ${venv_name}/bin/activate && set -x && " +
            "./smoke.sh"
}

//  ./gradlew :smoke-test:cypressTest -PbatchNumber=2 (default 0)
task cypressTest(type: Exec) {
    // Get BATCH_NUMBER from command line argument with default value of 0
    def batchNumber = project.hasProperty('batchNumber') ? project.property('batchNumber') : '0'

    environment 'RUN_QUICKSTART', 'false'
    environment 'TEST_STRATEGY', 'cypress'
    environment 'BATCH_COUNT', 5 //Match CI
    environment 'BATCH_NUMBER', batchNumber

    workingDir = project.projectDir
    commandLine 'bash', '-c',
            "source ${venv_name}/bin/activate && set -x && " +
                    "./smoke.sh"
}

/**
 * The following will run Cypress in interactive mode against an already running stack.
 */
task cypressDev(type: Exec, dependsOn: [installDev, ':metadata-ingestion:installDev']) {
    environment 'RUN_QUICKSTART', 'false'

    workingDir = project.projectDir
    commandLine 'bash', '-c',
            "source ${venv_name}/bin/activate && set -x && " +
                    "./cypress-dev.sh"
}

/**
 * The following will install Cypress data in an already running stack.
 */
task cypressData(type: Exec, dependsOn: [installDev, ':metadata-ingestion:installDev']) {
    environment 'RUN_QUICKSTART', 'false'
    environment 'RUN_UI', 'false'

    workingDir = project.projectDir
    commandLine 'bash', '-c',
            "source ${venv_name}/bin/activate && set -x && " +
                    "./cypress-dev.sh"
}

task cypressRemote(type: Exec) {
  environment 'CYPRESS_BASE_URL', project.findProperty('baseUrl') ?: 'http://localhost:4173'
  environment 'CYPRESS_ADMIN_USERNAME', project.findProperty('username') ?: 'admin'
  environment 'CYPRESS_ADMIN_PASSWORD', project.findProperty('password')

  workingDir = "${project.rootDir}/smoke-test/tests/cypress"
  commandLine 'bash', '-c', './cypress-remote-open.sh'
}

task cypressTestRemote(type: Exec) {
  environment 'CYPRESS_BASE_URL', project.findProperty('baseUrl') ?: 'http://localhost:4173'
  environment 'CYPRESS_ADMIN_USERNAME', project.findProperty('username') ?: 'admin'
  environment 'CYPRESS_ADMIN_PASSWORD', project.findProperty('password')
  environment 'CYPRESS_TEST_DIR', project.findProperty('testDir') ?: ''

  workingDir = "${project.rootDir}/smoke-test/tests/cypress"
  commandLine 'bash', '-c', './cypress-remote-run.sh'
}

task cypressSaasSuite1(type: Exec, dependsOn: [installDev, ':metadata-ingestion:installDev']) {
    environment 'RUN_QUICKSTART', 'false'
    environment 'TEST_STRATEGY', 'cypress_saas_suite1'

    workingDir = project.projectDir
    commandLine 'bash', '-c',
            "source ${venv_name}/bin/activate && set -x && " +
                    "./smoke.sh"
}

task cypressSaasSuite2(type: Exec, dependsOn: [installDev, ':metadata-ingestion:installDev']) {
    environment 'RUN_QUICKSTART', 'false'
    environment 'TEST_STRATEGY', 'cypress_saas_suite2'

    workingDir = project.projectDir
    commandLine 'bash', '-c',
            "source ${venv_name}/bin/activate && set -x && " +
                    "./smoke.sh"
}

task cypressSaasSuite3(type: Exec, dependsOn: [installDev, ':metadata-ingestion:installDev']) {
    environment 'RUN_QUICKSTART', 'false'
    environment 'TEST_STRATEGY', 'cypress_saas_suite3'

    workingDir = project.projectDir
    commandLine 'bash', '-c',
            "source ${venv_name}/bin/activate && set -x && " +
                    "./smoke.sh"
}

task runReleaseTest(type: Exec, dependsOn: [':docker:buildImagessmoke-test']) {
  def dockerNetwork = project.findProperty('dockerNetwork') ?: 'acryl_network'
  def gmsUrl = project.findProperty('gmsUrl') ?: 'http://datahub-gms:8080'
  def frontendUrl = project.findProperty('frontendUrl') ?: 'http://datahub-frontend-react:9002'
  def cypressBaseUrl = project.findProperty('cypressBaseUrl') ?: 'http://datahub-frontend-react:9002'
  def cypressAdminPassword = project.findProperty('cypressAdminPassword') ?: 'mypass'
  def cypressAdminUsername = project.findProperty('cypressAdminUsername') ?: 'admin'
  def cypressTestDir = project.findProperty('cypressTestDir') ?: 'cypress/customers/datahub-smoke-test'
  def tag = System.getenv("DATAHUB_VERSION") ?: "v${version}"
  def smokeTestImage = project.findProperty('smokeTestImage') ?: "795586375822.dkr.ecr.us-west-2.amazonaws.com/${docker_repo}:${tag}-release"

  commandLine 'docker', 'run',
    '--network', dockerNetwork,
    '-e', "DATAHUB_GMS_URL=${gmsUrl}",
    '-e', "DATAHUB_FRONTEND_URL=${frontendUrl}",
    '-e', "CYPRESS_BASE_URL=${cypressBaseUrl}",
    '-e', "CYPRESS_ADMIN_PASSWORD=${cypressAdminPassword}",
    '-e', "CYPRESS_ADMIN_USERNAME=${cypressAdminUsername}",
    '-e', "CYPRESS_TEST_DIR=${cypressTestDir}",
    smokeTestImage
}
task lint {
    dependsOn pythonLint, cypressLint
}

task lintFix {
    dependsOn pythonLintFix
}

task cleanPythonCache(type: Exec) {
  commandLine 'bash', '-c',
    "find . -type f -name '*.py[co]' -delete -o -type d -name __pycache__ -delete -o -type d -empty -delete"
}


clean {
  delete venv_name
  delete 'build'
  delete 'dist'
  delete '.ruff_cache'
  delete '.mypy_cache'
  delete '.pytest_cache'
}
clean.dependsOn cleanPythonCache

docker {
    dependsOn(':metadata-ingestion:codegen')
    name "${docker_registry}/${docker_repo}:${versionTag}"
    dockerfile file("${rootProject.projectDir}/docker/smoke-test/Dockerfile")
    files fileTree(rootProject.projectDir) {
        include '.dockerignore'
        include "docker/smoke-test/*"
        include "smoke-test/**"
        include "metadata-ingestion/"
        include "datahub-actions/"
        include "datahub-integrations-service"
    }.exclude {
        i -> (!i.file.name.endsWith(".dockerignore") && i.file.isHidden())
    }
    additionalTag("Debug", "${docker_registry}/${docker_repo}:debug")

    def dockerBuildArgs = [RELEASE_VERSION: python_docker_version, PYTHON_VERSION: "3.11"]

  defaultVariant = project.getProperties().getOrDefault('datahubSmokeTestVariant', 'release')

  variants = [
      "release": [suffix: "-release", args: [:]],
      // TODO: Other variant for running smoke tests
  ]

  // Add build args if they are defined (needed for some CI or enterprise environments)
    if (project.hasProperty('pipMirrorUrl')) {
        dockerBuildArgs.PIP_MIRROR_URL = project.getProperty('pipMirrorUrl')
    }
    if (project.hasProperty('debianAptRepositoryUrl')) {
        dockerBuildArgs.DEBIAN_REPO_URL = project.getProperty('debianAptRepositoryUrl')
    }

    buildArgs(dockerBuildArgs)
}
