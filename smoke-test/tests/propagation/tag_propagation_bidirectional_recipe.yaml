name: Bidirectional Tag Propagation
action:
  type: datahub_integrations.propagation.propagation.generic_propagation_action.GenericPropagationAction
  config:
    propagation_rule:
      entity_types:
        - "dataset"
        - "schemaField"
      target_urn_resolution:
        - type: downstream
        - type: upstream
      metadata_propagated:
          tags:
            enabled: true