name: Tag Propagation
action:
  type: datahub_integrations.propagation.tag.tag_propagation_action.TagPropagationAction
  config:
    enabled: true
    include_downstreams: true
    include_siblings: true
    max_propagation_depth: 5
    max_propagation_fanout: 1000
    max_propagation_time_millis: 60000
    rate_limit_propagated_writes: 100
    rate_limit_propagated_writes_period: 15
    tag_prefixes:
        - urn:li:tag:PII
        - urn:li:tag:Sensitive
