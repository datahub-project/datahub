name: Term Propagation
action:
  type: datahub_integrations.propagation.propagation.generic_propagation_action.GenericPropagationAction
  config:
    propagation_rule:
      entity_types:
        - "dataset"
        - "schemaField"
      target_urn_resolution:
        - lookup_type: relationship
          type: upstream
        - lookup_type: relationship
          type: downstream
        - lookup_type: aspect
          aspect_name: "Siblings"
          field: "siblings"
      metadata_propagated:
        documentation:
          enabled: true
