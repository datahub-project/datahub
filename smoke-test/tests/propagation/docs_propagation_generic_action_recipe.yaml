name: Term Propagation
source:
  type: kafka
  config:
    connection:
      bootstrap: ${KAFKA_BOOTSTRAP_SERVER:-localhost:9092}
      schema_registry_url: ${SCHEMA_REGISTRY_URL:-http://localhost:8080/schema-registry/api/}
datahub:
  server: ${DATAHUB_SERVER_URL:-http://localhost:8080}

action:
  type: datahub_integrations.propagation.propagation.generic_propagation_action.GenericPropagationAction
  config:
    propagation_rule:
      entity_types:
        - "dataset"
        - "schemaField"
      target_urn_resolution:
        - lookup_type: relationship
          type: upstream
        - lookup_type: relationship
          type: downstream
        - lookup_type: aspect
          aspect_name: "Siblings"
          field: "siblings"
      metadata_propagated:
        documentation:
          enabled: true
