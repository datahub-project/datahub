# OAuth smoke-test overlay: adds an OSS OIDC IdP (Keycloak) and configures GMS as
# an external-OAuth resource server that trusts the Keycloak realm. Apply this on
# TOP of the standard DataHub quickstart compose (see README.md), e.g.:
#
#   docker compose -f <quickstart-compose> -f docker-compose.oauth.yml up -d
#
# Bind-mount paths are anchored on ${DATAHUB_OAUTH_HARNESS_DIR:-.} so they resolve
# correctly no matter which compose file is first (Docker resolves relative paths
# against the FIRST -f file's directory). Standalone from this directory the default
# `.` works; when layered under the quickstart compose (CI), set
# DATAHUB_OAUTH_HARNESS_DIR to this directory's absolute path.
#
# The smoke test is run from the `tester` service so that both the token endpoint
# and GMS are reached via internal hostnames — this keeps the token's `iss` claim
# (http://keycloak:8080/realms/datahub) consistent with what GMS trusts and can
# fetch JWKS from. Running the client from the host instead would issue a token
# whose issuer/JWKS host GMS cannot reach.
#
# Uses only public images (Keycloak + python-slim), so it needs no registry creds.
services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command: ["start-dev", "--import-realm", "--hostname=keycloak", "--hostname-strict=false"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - "${DATAHUB_OAUTH_HARNESS_DIR:-.}/keycloak/datahub-realm.json:/opt/keycloak/data/import/datahub-realm.json:ro"
    ports:
      - "8083:8080"

  # Overrides the quickstart GMS service — the service KEY is
  # `datahub-gms-quickstart` (its network hostname is still `datahub-gms`).
  # Using the wrong key here makes compose create a new image-less service
  # and reject the whole project.
  datahub-gms-quickstart:
    environment:
      # Quickstart ships METADATA_SERVICE_AUTH_ENABLED=false, which makes GMS
      # accept ANY request — the OAuth tests would pass/fail vacuously without
      # this. Actions/frontend keep working: they use the image-default system
      # client credentials.
      METADATA_SERVICE_AUTH_ENABLED: "true"
      EXTERNAL_OAUTH_ENABLED: "true"
      EXTERNAL_OAUTH_TRUSTED_ISSUERS: "http://keycloak:8080/realms/datahub"
      EXTERNAL_OAUTH_ALLOWED_AUDIENCES: "datahub-gms"
      EXTERNAL_OAUTH_JWKS_URI: "http://keycloak:8080/realms/datahub/protocol/openid-connect/certs"
      EXTERNAL_OAUTH_USER_ID_CLAIM: "sub"
      EXTERNAL_OAUTH_ALGORITHM: "RS256"
    depends_on:
      - keycloak

  # Runs the pytest smoke test inside the compose network (see header note).
  tester:
    image: python:3.10-slim
    working_dir: /smoke
    volumes:
      - "${DATAHUB_OAUTH_HARNESS_DIR:-.}/../../..:/repo:ro"
      - "${DATAHUB_OAUTH_HARNESS_DIR:-.}:/smoke:ro"
    environment:
      DATAHUB_GMS_URL: "http://datahub-gms:8080"
      KEYCLOAK_TOKEN_ENDPOINT: "http://keycloak:8080/realms/datahub/protocol/openid-connect/token"
    command: ["sleep", "infinity"]
    depends_on:
      - datahub-gms-quickstart
