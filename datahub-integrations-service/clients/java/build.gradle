// Note: this file was initially generated by the OpenAPI codegen, but
// then was tweaked to work for our setup.

apply plugin: 'idea'
apply plugin: 'eclipse'
apply plugin: 'java'

group = 'org.openapitools'
version = '0.1.0'

buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:2.3.+'
    }
}

repositories {
    mavenCentral()
}
sourceSets {
    main.java.srcDirs = ['src/main/java']
}

apply plugin: 'java'
apply plugin: 'maven-publish'

sourceCompatibility = JavaVersion.VERSION_1_8
targetCompatibility = JavaVersion.VERSION_1_8

publishing {
    publications {
        maven(MavenPublication) {
            artifactId = 'openapi-java-client'
            from components.java
        }
    }
}

task execute(type:JavaExec) {
    main = System.getProperty('mainClass')
    classpath = sourceSets.main.runtimeClasspath
}

ext {
    jakarta_annotation_version = "1.3.5"
}

dependencies {
    implementation 'io.swagger:swagger-annotations:1.6.8'
    implementation "com.google.code.findbugs:jsr305:3.0.2"
    implementation 'com.squareup.okhttp3:okhttp:4.10.0'
    implementation 'com.squareup.okhttp3:logging-interceptor:4.10.0'
    implementation 'com.google.code.gson:gson:2.9.1'
    implementation 'io.gsonfire:gson-fire:1.8.5'
    // As per https://stackoverflow.com/questions/45187624/java-lang-nosuchmethoderror-javax-ws-rs-core-application-getpropertiesljava-u
    // we can just not include jsr311-api and things will work fine.
    // Leaving it in would cause version conflicts with javax.ws.rs-api.
    // implementation 'javax.ws.rs:jsr311-api:1.1.1'
    implementation 'javax.ws.rs:javax.ws.rs-api:2.1.1'
    implementation 'org.openapitools:jackson-databind-nullable:0.2.6'
    implementation group: 'org.apache.commons', name: 'commons-lang3', version: '3.12.0'
    implementation "jakarta.annotation:jakarta.annotation-api:$jakarta_annotation_version"
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.9.1'
    testImplementation 'org.mockito:mockito-core:3.12.4'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.9.1'
}

javadoc {
    options.tags = [ "http.response.details:a:Http Response Details" ]
}

test {
    // Enable JUnit 5 (Gradle 4.6+).
    useJUnitPlatform()

    // Always run tests, even when nothing changed.
    dependsOn 'cleanTest'

    // Show test results.
    testLogging {
        events "passed", "skipped", "failed"
    }

}

task generateAndBuildDataHubIntegrationsServiceAPI {
  doLast {
    // Copy generated files from Project B to Project A
        copy {
            from "$rootDir/datahub-integrations-service/build/generated/openapi/java/" // Adjust this to the correct output directory
            into "$rootDir/datahub-integrations-service/clients/java"      // Adjust this to where you want to copy in Project A
            include 'src/**/*.java'
            include 'api/**/*.java'                   // Adjust this based on the generated file type
        }
  }
}

tasks.generateAndBuildDataHubIntegrationsServiceAPI.dependsOn ':datahub-integrations-service:openApiGenerate'

compileJava.dependsOn generateAndBuildDataHubIntegrationsServiceAPI

