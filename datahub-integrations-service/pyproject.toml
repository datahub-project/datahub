[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "acryl-datahub-integrations"
version = "1!0.0.0.dev0"
description = ""
authors = [
	{ name="Acryl Data", email="eng@acryl.io" },
]
requires-python = ">=3.9"

dependencies = [
	"acryl-datahub[base,snowflake,bigquery]",
	"fastapi>=0.103.1",
	"uvicorn[standard]>=0.23.2",
	"loguru",
	"build",
	# Slack.
	"slack-bolt",
	"inflect",
	# Actions.
	"acryl-datahub-actions==0.1.3",
	"httpx",
	# Our usage of anyio currently requires 3.x because of the way it handles exception groups.
	"anyio>=3,<4",
	"asyncify",
	"reactpy",
	"reactpy-router",
	# AI.
	"tenacity",
	"boto3",
	# Email notifications.
	"sendgrid",
	# Reporting.
	"duckdb",
	"pandas",
	"boto3",
	"pyarrow",
	"jinja2",
	"cachetools",
	# dbt sync.
	"pygitops",
	"PyGithub",
	"GitPython",
]

[project.optional-dependencies]
dev = [
	"black",
	"ruff",
	"pytest",
	"mypy",
	"pytest-cov",
	"pytest-asyncio",
	"types-setuptools",
	"types-cachetools",
	"types-PyYAML",
	"mypy-boto3-bedrock-runtime",
	"isort",
	"faker",
	"anyio",
	"freezegun",
	# Iteration
	"papermill",
	"json5",
	"types-requests>=2.28.11.6,<=2.31.0.3"
]

[project.entry-points."datahub_actions.source.plugins"]
replay = "datahub_integrations.actions.replay_source.ReplayEventSource"

[project.entry-points."datahub_actions.action.plugins"]
record = "datahub_integrations.actions.recording_action.RecordingAction"
dbt_sync_back = "datahub_integrations.dbt.dbt_sync_back:DbtSyncBackAction"
ai_term_suggestion = "datahub_integrations.gen_ai.term_suggestion_action:TermSuggestionAction"

[tool.black]
extend-exclude = '''
# A regex preceded with ^/ will apply only to files and directories
# in the root of the project.
^/tmp
'''
include = '\.pyi?$'
target-version = ['py310']

[tool.isort]
profile = 'black'

[tool.ruff.lint]
ignore = [
	'E501', # Ignore line length, since black handles that.
	'D203', # Ignore 1 blank line required before class docstring.
]

[tool.pyright]
extraPaths = ['tests']

[tool.pytest.ini_options]
markers = [
    "asyncio: mark a test as an asyncio coroutine."
]
