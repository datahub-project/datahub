-
  urn: "urn:li:test:__default_cost_top_query_percentile"
  name: Top 10% Most Queried Data Warehouse Tables
  category: Data Cost
  description: Top 10% of Tables on the Data Warehouse with the highest query count in the past 30 days. This is a proxy to compute cost for an asset. This test requires that usage extraction is enabled for your Data Warehouse Ingestion Source.
  status:
    mode: INACTIVE
  definition:
    on:
      types:
        - dataset
      conditions:
        and:
            -
                or:
                    - {property: dataPlatformInstance.platform, operator: equals, values: ['urn:li:dataPlatform:bigquery']}
                    - {property: dataPlatformInstance.platform, operator: equals, values: ['urn:li:dataPlatform:snowflake']}
                    - {property: dataPlatformInstance.platform, operator: equals, values: ['urn:li:dataPlatform:redshift']}
            -
                property: subTypes.typeNames
                operator: equals
                values:
                    - Table
    rules:
      or:
        - property: usageFeatures.queryCountPercentileLast30Days
          operator: greater_than
          values:
            - '90'
    actions:
      passing:
        - type: add_tags
          values:
            - 'urn:li:tag:__default_high_queries'
      failing:
        - type: remove_tags
          values:
            - 'urn:li:tag:__default_high_queries'
