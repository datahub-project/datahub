plugins {
  id 'pegasus'
}

apply from: '../../gradle/coverage/java-coverage.gradle'

// Snapshot files are published into this project by :metadata-service:restli-servlet-impl.
// Spotless must wait for that to complete to avoid Gradle's implicit dependency validation error.
afterEvaluate {
  def servletImpl = project(':metadata-service:restli-servlet-impl')
  servletImpl.tasks.matching { it.name == 'publishRestliSnapshot' }.configureEach { publishTask ->
    tasks.matching { it.name == 'spotlessJava' }.configureEach { spotlessTask ->
      spotlessTask.mustRunAfter(publishTask)
    }
  }
}

dependencies {
  dataModel project(':metadata-models')
  dataModel spec.product.pegasus.restliCommon

  dataTemplateCompile spec.product.pegasus.data

  restClientCompile spec.product.pegasus.d2
  restClientCompile spec.product.pegasus.restliClient

  constraints {
    restClientCompile(externalDependency.zookeeper) {
      because("CVE-2023-44981")
    }
    restClientCompile(externalDependency.grpcProtobuf) {
      because("CVE-2023-1428, CVE-2023-32731")
    }
    restClientCompile(externalDependency.grpcNettyShaded) {
      because("Security vulnerability in grpc-netty-shaded 1.68.3")
    }
  }
}
