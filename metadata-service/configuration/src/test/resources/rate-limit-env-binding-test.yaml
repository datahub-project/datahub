# Test fixture for RateLimitPropertiesEnvBindingTest.
#
# Mirrors the intended production shape: rate-limit settings under datahub.gms.rateLimits with
# ${ENV:default} placeholders for the per-tenant scalar quotas, plus a heavy-resolver map that
# rides in the file (a map can't come from a scalar env var). The test loads this via Spring's
# YamlPropertySourceLoader + Binder and asserts the placeholders resolve against the environment.
datahub:
  gms:
    rateLimits:
      scoped:
        enabled: ${RATE_LIMITS_SCOPED_ENABLED:false}
        actor:
          capacity: ${RATE_LIMITS_SCOPED_ACTOR_CAPACITY:2000}
          refillTokens: ${RATE_LIMITS_SCOPED_ACTOR_CAPACITY:2000}
          refillPeriodSeconds: 60
        sdk:
          capacity: ${RATE_LIMITS_SCOPED_SDK_CAPACITY:500}
          refillTokens: ${RATE_LIMITS_SCOPED_SDK_CAPACITY:500}
          refillPeriodSeconds: 60
        heavyResolvers:
          searchAcrossEntities:
            capacity: 100
            refillTokens: 100
            refillPeriodSeconds: 60
          getEntities:
            capacity: 250
            refillTokens: 50 # independent of capacity
            exemptSystemActor: true
            # refillPeriodSeconds omitted on purpose -> should default to 60
