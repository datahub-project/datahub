# Instructions to add additional entry or update on the target system
# 1. Edit this file
# 2. Increment version in bootstrap_mcps.yaml for the entry referring to this file
- entityType: dataHubIngestionSource
  entityUrn: urn:li:dataHubIngestionSource:datahub-usage-reporting
  aspectName: dataHubIngestionSourceInfo
  changeType: UPSERT
  aspect:
    type: 'datahub-usage-reporting'
    name: '{{ingestion.name}}{{^ingestion.name}}datahub-usage-reporting{{/ingestion.name}}'
    schedule:
      timezone: '{{schedule.timezone}}{{^schedule.timezone}}UTC{{/schedule.timezone}}'
      interval: '{{schedule.interval}}{{^schedule.interval}}0 2 * * *{{/schedule.interval}}'
    config:
      version: '{{&ingestion.version}}{{^ingestion.version}}https://datahub-fork-docs-iuh4hkzkh-acryldata.vercel.app/{{/ingestion.version}}'
      recipe:
        source:
          type: datahub-usage-reporting
          config:
            extract_batch_size: {{batch_size}}{{^batch_size}}5000{{/batch_size}}
            query_timeout: {{query_timeout}}{{^query_timeout}}20{{/query_timeout}}
            use_exp_cdf: {{use_exp_cdf}}{{^use_exp_cdf}}true{{/use_exp_cdf}}
            dataset_usage_enabled: {{dataset_usage_enabled}}{{^dataset_usage_enabled}}true{{/dataset_usage_enabled}}
            dashboard_usage_enabled: {{dashboard_usage_enabled}}{{^dashboard_usage_enabled}}true{{/dashboard_usage_enabled}}
            chart_usage_enabled: {{chart_usage_enabled}}{{^chart_usage_enabled}}true{{/chart_usage_enabled}}
            query_usage_enabled: {{query_usage_enabled}}{{^query_usage_enabled}}true{{/query_usage_enabled}}
            disable_write_usage: {{disable_write_usage}}{{^disable_write_usage}}true{{/disable_write_usage}}
            generate_patch: {{generate_patch}}{{^generate_patch}}true{{/generate_patch}}
            ranking_policy:
              freshness_factors:
                {{#freshness_factors}}
                - age_in_days: {{age_in_days}}
                  value: {{value}}
                {{/freshness_factors}}
                {{^freshness_factors}}
                - age_in_days: [0, 7]
                  value: 3.6
                - age_in_days: [7, 30]
                  value: 1.3
                - age_in_days: [30, 90]
                  value: 0.6
                - age_in_days: [90]
                  value: 0.4
                {{/freshness_factors}}
              usage_percentile_factors:
                {{#usage_percentile_factors}}
                - percentile: {{percentile}}
                  value: {{value}}
                {{/usage_percentile_factors}}
                {{^usage_percentile_factors}}
                - percentile: [0, 10]
                  value: 0.5
                - percentile: [10, 20]
                  value: 0.6
                - percentile: [20, 30]
                  value: 0.7
                - percentile: [30, 40]
                  value: 0.8
                - percentile: [40, 45]
                  value: 0.91
                - percentile: [45, 50]
                  value: 1
                - percentile: [50, 55]
                  value: 1.25
                - percentile: [55, 60]
                  value: 1.5
                - percentile: [60, 65]
                  value: 1.75
                - percentile: [70, 75]
                  value: 2
                - percentile: [75, 80]
                  value: 2.5
                - percentile: [80, 85]
                  value: 2.75
                - percentile: [85, 90]
                  value: 3
                - percentile: [90, 92]
                  value: 3.5
                - percentile: [92, 95]
                  value: 4
                - percentile: [95, 97]
                  value: 5
                - percentile: [97, 100]
                  value: 6
                {{/usage_percentile_factors}}
              regexp_based_factors:
                {{#regexp_based_factors}}
                - regexp: '{{regexp}}'
                  value: {{value}}
                {{/regexp_based_factors}}
                {{^regexp_based_factors}}
                - regexp: '.*STG.*'
                  value: 0.5
                - regexp: '.*DEV.*'
                  value: 0.3
                {{/regexp_based_factors}}
      extraArgs:
        extra_pip_requirements: '{{&ingestion.extra_pip_requirements}}{{^ingestion.extra_pip_requirements}}["acryl-datahub-cloud[datahub-usage-reporting]@https://datahub-fork-docs-80r56el7m-acryldata.vercel.app/artifacts/wheels/acryl_datahub_cloud-0.0.0.dev1-py3-none-any.whl","polars","elasticsearch==7.13.4","numpy<2","scipy","opensearch-py==2.4.2","pyarrow"]{{/ingestion.extra_pip_requirements}}'
      debugMode: false
      executorId: default
    source:
      type: {{source}}{{^source}}SYSTEM{{/source}}
  headers: {}