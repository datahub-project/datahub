bootstrap:
  # Defaults
  #   force: false
  #   blocking: false
  #   async: true
  #   optional: false
  templates:
    # Bootstrap
    - name: root-user
      version: v1
      blocking: true
      async: false
      mcps_location: "bootstrap_mcps/root-user.yaml"

    - name: data-platforms
      version: v1
      blocking: true
      async: false
      mcps_location: "bootstrap_mcps/data-platforms.yaml"

    - name: data-types
      version: v1
      blocking: true
      async: false
      mcps_location: "bootstrap_mcps/data-types.yaml"

    - name: ownership-types
      version: v1
      blocking: true
      async: false
      mcps_location: "bootstrap_mcps/ownership-types.yaml"

    - name: roles
      version: v1
      blocking: true
      async: false
      mcps_location: "bootstrap_mcps/roles.yaml"

    # Ingestion Recipes
    - name: ingestion-datahub-gc
      version: v5
      optional: false
      mcps_location: "bootstrap_mcps/ingestion-datahub-gc.yaml"
      values_env: "DATAHUB_GC_BOOTSTRAP_VALUES"
      revision_env: "DATAHUB_GC_BOOTSTRAP_REVISION"

    - name: ingestion-datahub-usage-reporting
      version: v3
      optional: true
      mcps_location: "bootstrap_mcps/ingestion-datahub-usage-reporting.yaml"
      values_env: "DATAHUB_USAGE_REPORTING_BOOTSTRAP_VALUES"
      revision_env: "DATAHUB_USAGE_REPORTING_REVISION"

    - name: ingestion-datahub-forms-reporting
      version: v2
      optional: true
      mcps_location: "bootstrap_mcps/ingestion-datahub-forms-reporting.yaml"
      values_env: "DATAHUB_FORMS_REPORTING_BOOTSTRAP_VALUES"
      revision_env: "DATAHUB_FORMS_REPORTING_REVISION"

    - name: ingestion-metadata-sharing
      version: v1
      optional: true
      mcps_location: "bootstrap_mcps/ingestion-metadata-sharing.yaml"
      values_env: "DATAHUB_METADATA_SHARING_BOOTSTRAP_VALUES"