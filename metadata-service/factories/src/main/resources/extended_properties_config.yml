entities:
  - entity: dataset # entity name, included underneath are all customized aspect mappings that apply to this entity, for customizations that apply to all entities use "common"
    aspects:
      - aspect: editableSchemaMetadata
        fields:
          - fieldName: editableSchemaFieldInfo.label
            operation: "ADD_STRUCTURED_PROPERTY"
            config:
              structuredProperty: io.acryl.schemaField.label
  - entity: corpuser # entity name, included underneath are all customized aspect mappings that apply to this entity, for customizations that apply to all entities use "common"
    aspects:
      - aspect: corpUserInfo
        fields:
        - fieldName: internalId
          operation: "ADD_STRUCTURED_PROPERTY"
          config:
            structuredProperty: io.acryl.corpuser.internalId
structuredProperties:
  - qualifiedName: io.acryl.schemaField.label
    type: string
    displayName: Schema Field Label
  - qualifiedName: io.acryl.corpuser.internalId
    type: string
    displayName: Internal ID
