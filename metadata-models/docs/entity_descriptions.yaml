# SEO meta descriptions for DataHub metadata model entity reference pages.
# Consumed by metadata-ingestion/scripts/modeldocgen.py and emitted into
# the frontmatter of /docs/generated/metamodel/entities/<entity>.md.
# Each description should be 80-155 characters.

application: "Applications represent software systems that produce or consume data assets, grouping related datasets by the service that owns them."
assertion: "Assertions are data quality rules — schema, freshness, volume, custom SQL — that validate datasets and surface failures as DataHub incidents."
businessAttribute: "Business Attributes define reusable, governed metadata fields that can be attached to dataset columns to standardize meaning across assets."
chart: "Charts represent individual visualizations from BI tools like Looker, Tableau, and Power BI, capturing their inputs, lineage, and ownership."
container: "Containers represent hierarchical groupings of data assets such as databases, schemas, projects, folders, or buckets within a data platform."
corpGroup: "CorpGroups represent teams or departments synced from LDAP, Active Directory, or SSO, used for ownership assignment and access control in DataHub."
corpuser: "CorpUsers represent individual people or service accounts in DataHub, sourced from corporate identity providers and used for ownership and auth."
dashboard: "Dashboards are collections of charts ingested from BI tools like Looker, Tableau, or Power BI, capturing their layout, inputs, and ownership."
dataContract: "Data Contracts are producer-owned agreements built on assertions that declare quality, schema, and SLA guarantees consumers can rely on."
dataFlow: "DataFlows represent data pipelines orchestrated by tools like Airflow, Dagster, or Prefect, acting as the parent container for related DataJobs."
dataHubAccessToken: "Internal DataHub entity that tracks personal access tokens issued for authenticating CLI, SDK, and API calls against the metadata service."
dataHubAction: "Internal DataHub entity that registers automated actions executed by the Actions Framework in response to metadata change events."
dataHubConnection: "Internal DataHub entity that stores credentials and connection details used by ingestion sources to reach upstream data platforms."
dataHubExecutionRequest: "Internal DataHub entity that tracks ingestion run requests, including their input config, dispatch signal, and final execution result."
dataHubFile: "Internal DataHub entity representing a file artifact stored by the platform, such as an uploaded attachment or generated export."
dataHubIngestionSource: "Internal DataHub entity that defines a configured ingestion source — recipe, schedule, and credentials — managed in the UI."
dataHubOpenAPISchema: "Internal DataHub entity that exposes aspects used in OpenAPI requests and responses but not otherwise present in the core data model."
dataHubPageModule: "Internal DataHub entity defining a single module — chart, list, or widget — that can be placed on a customizable home page template."
dataHubPageTemplate: "Internal DataHub entity defining the layout and module composition of a customizable DataHub home page or landing experience."
dataHubPersona: "Internal DataHub entity describing a user persona used to tailor the product experience, navigation, and recommendations to user roles."
dataHubPolicy: "DataHub Policies define access control rules granted to users or groups for metadata operations such as view, edit, manage, and delete."
dataHubRetention: "Internal DataHub entity that configures retention policies controlling how long aspect history is kept for entities in the metadata store."
dataHubRole: "DataHub Roles bundle a set of policies and permissions that can be assigned to users or groups to standardize access across the platform."
dataHubSecret: "Internal DataHub entity that stores encrypted secret values referenced by ingestion recipes and connections, never exposed in plaintext."
dataHubStepState: "Internal DataHub entity that tracks per-user onboarding step completion so the UI can resume guided tours and product education flows."
dataHubUpgrade: "Internal DataHub entity that records the request and result of platform upgrade jobs, used to coordinate schema and data migrations."
dataHubView: "DataHub Views are saved search filters that scope the asset list to a curated subset, shareable across users and teams for focused discovery."
dataJob: "DataJobs represent individual tasks within a pipeline — Airflow tasks, dbt models, Spark jobs — and capture their inputs, outputs, and lineage."
dataPlatform: "Data Platforms represent source systems like Snowflake, BigQuery, Kafka, or Looker that host datasets, dashboards, and other assets in DataHub."
dataPlatformInstance: "Data Platform Instances represent specific deployments of a platform technology, distinguishing assets across regions, accounts, or clusters."
dataProcess: "Deprecated entity for modeling data processing tasks. Use dataFlow and dataJob instead, which provide a richer pipeline-and-task hierarchy."
dataProcessInstance: "DataProcessInstances capture individual runs of a DataJob or DataFlow, recording inputs, outputs, status, and timing for execution history."
dataProduct: "Data Products are curated bundles of datasets, dashboards, and pipelines packaged as a consumable offering owned by a domain team."
dataType: "DataTypes describe the kinds of values that structured properties and other metadata fields can hold, such as string, number, date, or URN."
dataset: "Datasets represent tables, views, streams, or files in platforms like Snowflake, BigQuery, Kafka, and S3 — the core asset type tracked in DataHub."
document: "Documents are first-class metadata entities that store rich text or knowledge-base content alongside the data assets they describe."
domain: "Domains are top-level business categories — like Marketing or Finance — that organize data assets and concentrate ownership and governance."
entityType: "EntityTypes describe the kinds of entities tracked in DataHub's metadata model, enabling structured properties to target specific entity types."
erModelRelationship: "ER Model Relationships capture foreign-key and join relationships between dataset fields, modeling table connections at the column level."
form: "Forms drive structured metadata collection campaigns, prompting asset owners to fill in required fields for compliance and governance initiatives."
globalSettings: "Internal DataHub entity that holds platform-wide configuration settings such as defaults, feature toggles, and integration parameters."
glossaryNode: "GlossaryNodes are folders in the Business Glossary that organize related GlossaryTerms into hierarchical categories and taxonomies."
glossaryTerm: "GlossaryTerms are governed business definitions — like 'Customer Lifetime Value' — that can be attached to datasets, columns, and other assets."
incident: "Incidents track data quality issues and operational problems against datasets, dashboards, and other assets, with status, owners, and notes."
inviteToken: "Internal DataHub entity representing a shareable invite link used to onboard new users into the DataHub instance with predefined roles."
lifecycleStageType: "Lifecycle Stage Types define stages — Proposed, Certified, Archived — that govern asset visibility and allowed transitions in DataHub."
mlFeature: "ML Features represent individual input variables consumed by machine learning models, organized within feature tables for discovery and reuse."
mlFeatureTable: "ML Feature Tables group related machine-learning features sharing a primary key in feature stores like Feast, Tecton, or SageMaker."
mlModel: "ML Models represent trained machine learning artifacts registered in platforms like MLflow, SageMaker, or Vertex AI, with metrics and lineage."
mlModelDeployment: "ML Model Deployments track running instances of ML models serving predictions on platforms like SageMaker, Vertex AI, Seldon, or KServe."
mlModelGroup: "ML Model Groups bundle related ML model versions or variants together, organizing the lifecycle of a model family across experiments."
mlPrimaryKey: "ML Primary Keys define the identifier columns that join features to entities in feature stores like Feast, Tecton, and SageMaker Feature Store."
notebook: "Notebooks represent computational documents from tools like Jupyter, Databricks, Hex, and Mode, capturing cells, queries, and visualizations."
ownershipType: "OwnershipTypes define custom ownership categories — Technical Owner, Steward, Producer — that map governance roles to data assets."
platformResource: "Platform Resources store unmodeled metadata that lives outside the core data model, supporting application-specific extensions in DataHub."
post: "Posts represent announcements and pinned links shown in the DataHub home feed, used by admins to broadcast updates and link to resources."
query: "Query entities capture SQL statements run against datasets, ingested from query logs to power lineage, usage stats, and dataset relationships."
role: "Role entities model external IAM roles from systems like Snowflake or BigQuery, showing which permissions grant access to a given dataset."
schemaField: "SchemaField entities represent individual dataset columns as first-class assets, enabling field-level tags, terms, docs, and structured properties."
structuredProperty: "Structured Properties are typed, governed custom metadata fields that extend the core model and can be attached to any entity in DataHub."
tag: "Tags are lightweight labels — like pii or deprecated — applied to datasets, columns, and other assets for fast classification and filtering."
telemetry: "Internal DataHub entity that stores the anonymous client identifier used for opt-in product usage telemetry reported back to the platform."
test: "Tests define rules that match assets meeting specific criteria, used to flag governance gaps or required metadata across the catalog."
versionSet: "VersionSets group related versions of an entity — typically ML models or datasets — so users can navigate the evolution of a single logical asset."
