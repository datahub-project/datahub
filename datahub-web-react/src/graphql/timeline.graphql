query getEntityDisplayNames($urns: [String!]!) {
    entities(urns: $urns) {
        ...entityDisplayNameFields
    }
}

query getTimeline($input: GetTimelineInput!) {
    getTimeline(input: $input) {
        changeTransactions {
            timestampMillis
            lastSemanticVersion
            versionStamp
            changeType
            actor
            changes {
                urn
                category
                operation
                modifier
                parameters {
                    key
                    value
                }
                auditStamp {
                    actor
                    time
                }
                description
            }
        }
    }
}
