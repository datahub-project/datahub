query getMLModelGroup($urn: String!) {
    mlModelGroup(urn: $urn) {
        urn
        type
        properties {
            name
            description
            created {
                time
                actor
            }
            createdAt
            lastModified {
                time
                actor
            }
            externalUrl
        }
        ...nonRecursiveMLModelGroupFields
        incoming: relationships(
            input: {
                types: ["DownstreamOf", "Consumes", "Produces", "TrainedBy", "MemberOf"]
                direction: INCOMING
                start: 0
                count: 100
            }
        ) {
            ...fullRelationshipResults
        }
        outgoing: relationships(
            input: {
                types: ["DownstreamOf", "Consumes", "Produces", "TrainedBy", "MemberOf"]
                direction: OUTGOING
                start: 0
                count: 100
            }
        ) {
            ...fullRelationshipResults
        }
        share {
            ...shareFields
        }
        privileges {
            ...entityPrivileges
        }
        autoRenderAspects: aspects(input: { autoRenderOnly: true }) {
            ...autoRenderAspectFields
        }
        structuredProperties {
            properties {
                ...structuredPropertiesFields
            }
        }
        forms {
            ...formsFields
        }
        termProposals: proposals(type: TERM_ASSOCIATION) {
            ...proposalsFragment
        }
        tagProposals: proposals(type: TAG_ASSOCIATION) {
            ...proposalsFragment
        }
        ...notes
    }
}
