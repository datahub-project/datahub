query getContainer($urn: String!) {
    container(urn: $urn) {
        urn
        exists
        lastIngested
        platform {
            ...platformFields
        }
        properties {
            name
            description
            customProperties {
                key
                value
            }
        }
        editableProperties {
            description
        }
        ownership {
            ...ownershipFields
        }
        tags {
            ...globalTagsFields
        }
        institutionalMemory {
            ...institutionalMemoryFields
        }
        glossaryTerms {
            ...glossaryTerms
        }
        subTypes {
            typeNames
        }
        entities(input: { start: 0, count: 10000 }) {
            total
            facets {
                ...facetFields
            }
        }
        container {
            ...entityContainer
        }
        parentContainers {
            ...parentContainersFields
        }
        domain {
            ...entityDomain
        }
        ...entityDataProduct
        deprecation {
            ...deprecationFields
        }
        dataPlatformInstance {
            ...dataPlatformInstanceFields
        }
        status {
            removed
        }
        autoRenderAspects: aspects(input: { autoRenderOnly: true }) {
            ...autoRenderAspectFields
        }
        termProposals: proposals(type: TERM_ASSOCIATION) {
            ...proposalsFragment
        }
        tagProposals: proposals(type: TAG_ASSOCIATION) {
            ...proposalsFragment
        }
    }
}

# We should replace this with a cached summary object on the container
query getContainerEntitySummary($urn: String!) {
    aggregateAcrossEntities(
        input: {
            types: []
            query: "*"
            facets: ["_entityType␞typeNames", "_entityType"]
            orFilters: [{ and: [{ field: "container", values: [$urn], value: $urn }] }]
        }
    ) {
        facets {
            ...facetFields
        }
    }
}
