fragment assertionStdParametersDetails on AssertionStdParameters {
    value {
        value
        type
    }
    minValue {
        value
        type
    }
    maxValue {
        value
        type
    }
}

fragment incrementingSegmentSpecDetails on IncrementingSegmentSpec {
    field {
        path
        type
        nativeType
    }
    transformer {
        type
        nativeType
    }
}

fragment assertionInfo on AssertionInfo {
    type
    description
    note
    lastUpdated {
        time
        actor
    }
    datasetAssertion {
        datasetUrn
        scope
        aggregation
        operator
        parameters {
            value {
                value
                type
            }
            minValue {
                value
                type
            }
            maxValue {
                value
                type
            }
        }
        fields {
            urn
            path
        }
        nativeType
        nativeParameters {
            key
            value
        }
        logic
    }
    freshnessAssertion {
        type
        entityUrn
        schedule {
            type
            cron {
                cron
                timezone
            }
            fixedInterval {
                unit
                multiple
            }
        }
        filter {
            type
            sql
        }
    }
    sqlAssertion {
        type
        entityUrn
        statement
        changeType
        operator
        parameters {
            ...assertionStdParametersDetails
        }
    }
    fieldAssertion {
        type
        entityUrn
        filter {
            type
            sql
        }
        fieldValuesAssertion {
            field {
                path
                type
                nativeType
            }
            transform {
                type
            }
            operator
            parameters {
                ...assertionStdParametersDetails
            }
            failThreshold {
                type
                value
            }
            excludeNulls
        }
        fieldMetricAssertion {
            field {
                path
                type
                nativeType
            }
            metric
            operator
            parameters {
                ...assertionStdParametersDetails
            }
        }
    }
    volumeAssertion {
        type
        entityUrn
        filter {
            type
            sql
        }
        rowCountTotal {
            operator
            parameters {
                ...assertionStdParametersDetails
            }
        }
        rowCountChange {
            type
            operator
            parameters {
                ...assertionStdParametersDetails
            }
        }
        incrementingSegmentRowCountTotal {
            operator
            parameters {
                ...assertionStdParametersDetails
            }
            segment {
                ...incrementingSegmentSpecDetails
            }
        }
        incrementingSegmentRowCountChange {
            type
            operator
            parameters {
                ...assertionStdParametersDetails
            }
            segment {
                ...incrementingSegmentSpecDetails
            }
        }
    }
    schemaAssertion {
        entityUrn
        compatibility
        fields {
            path
            type
            nativeType
        }
        schema {
            fields {
                fieldPath
                type
                nativeDataType
            }
        }
    }
    customAssertion {
        type
        entityUrn
        field {
            urn
            path
        }
        logic
    }
    source {
        type
        created {
            time
            actor
        }
    }
    externalUrl
}

fragment assertionEvaluationParameters on AssertionEvaluationParameters {
    type
    datasetFreshnessParameters {
        sourceType
        auditLog {
            operationTypes
            userName
        }
        field {
            type
            nativeType
            path
            kind
        }
    }
    datasetVolumeParameters {
        sourceType
    }
    datasetFieldParameters {
        sourceType
        changedRowsField {
            type
            nativeType
            path
            kind
        }
    }
    datasetSchemaParameters {
        sourceType
    }
}

fragment assertionEvaluationContext on AssertionEvaluationContext {
    inferenceDetails {
        ...assertionInferenceDetails
    }
    embeddedAssertions {
        assertion {
            ...assertionInfo
        }
        evaluationTimeWindow {
            startTimeMillis
            endTimeMillis
        }
    }
}

fragment assertionInferenceDetails on AssertionInferenceDetails {
    generatedAt
}

fragment assertionExclusionWindow on AssertionExclusionWindow {
    type
    displayName
    fixedRange {
        startTimeMillis
        endTimeMillis
    }
    weekly {
        daysOfWeek
        startTime
        endTime
        timezone
    }
    holiday {
        name
        region
        timezone
    }
}

fragment monitorAnomalyEventDetails on MonitorAnomalyEvent {
    state
    timestampMillis
    source {
        type
        sourceUrn
        sourceEventTimestampMillis
        properties {
            assertionMetric {
                timestampMillis
                value
            }
        }
    }
}
