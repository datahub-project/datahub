#import "./fragments.graphql"

query getSamplesSearchResults($input: SearchAcrossEntitiesInput!) {
    searchAcrossEntities(input: $input) {
        searchResults {
            entity {
                urn
                type
                ... on Dataset {
                    name
                    properties {
                        name
                        qualifiedName
                    }
                    subTypes {
                        typeNames
                    }
                    platform {
                        urn
                        type
                        name
                        properties {
                            type
                            displayName
                            datasetNameDelimiter
                            logoUrl
                        }
                    }
                    dataPlatformInstance {
                        urn
                        type
                        instanceId
                        platform {
                            urn
                            name
                            properties {
                                displayName
                            }
                        }
                    }
                    browsePathV2 {
                        ...browsePathV2Fields
                    }
                }
                ... on Dashboard {
                    properties {
                        name
                    }
                    subTypes {
                        typeNames
                    }
                    platform {
                        urn
                        type
                        name
