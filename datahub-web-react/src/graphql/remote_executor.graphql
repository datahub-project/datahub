mutation updateDefaultRemoteExecutorPool($urn: String!) {
    updateDefaultRemoteExecutorPool(urn: $urn)
}

mutation createRemoteExecutorPool($input: CreateRemoteExecutorPoolInput!) {
    createRemoteExecutorPool(input: $input)
}

query listRemoteExecutorPools($start: Int!, $count: Int!) {
    listRemoteExecutorPools(input: { start: $start, count: $count }) {
        start
        count
        total
        remoteExecutorPools {
            urn
            poolName
            createdAt
            isDefault
            # we query for 10k executors since customers usually only have 1 in a pool, rarely scale to even 10
            remoteExecutors(start: 0, count: 10000) {
                total
                count
                remoteExecutors {
                    urn
                    reportedAt
                    executorUptime
                    executorExpired
                    executorStopped
                    executorInternal
                    executorEmbedded
                    executorReleaseVersion
                    executorAddress
                    executorHostname
                    logDeliveryEnabled
                }
            }
        }
    }
}
