mutation updateDefaultRemoteExecutorPool($urn: String!) {
    updateDefaultRemoteExecutorPool(urn: $urn)
}

mutation createRemoteExecutorPool($input: CreateRemoteExecutorPoolInput!) {
    createRemoteExecutorPool(input: $input)
}

query getDefaultRemoteExecutorPool {
    defaultRemoteExecutorPool {
        pool {
            poolName
        }
    }
}

query getRemoteExecutor($urn: String!) {
    getRemoteExecutor(urn: $urn) {
        urn
        poolName
    }
}

query listRemoteExecutorPools($start: Int!, $count: Int!, $query: String) {
    listRemoteExecutorPools(input: { start: $start, count: $count, query: $query }) {
        start
        count
        total
        remoteExecutorPools {
            urn
            poolName
            createdAt
            isDefault
            # we query for 10k executors since customers usually only have 1 in a pool, rarely scale to even 10
            remoteExecutors(start: 0, count: 10000) {
                total
                count
                remoteExecutors {
                    urn
                    reportedAt
                    executorUptime
                    executorExpired
                    executorStopped
                    executorInternal
                    executorEmbedded
                    executorReleaseVersion
                    executorAddress
                    executorHostname
                    logDeliveryEnabled
                }
            }
            # we query for 10k ingestion sources since customers usually only have <100 in a pool
            ingestionSources(start: 0, count: 10000) {
                total
                count
                ingestionSources {
                    urn
                    type
                    name
                }
            }
        }
    }
}
