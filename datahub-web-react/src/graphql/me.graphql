query getMe {
    me {
        corpUser {
            type
            urn
            username
            info {
                active
                displayName
                title
                firstName
                lastName
                fullName
                email
            }
            editableProperties {
                displayName
                title
                pictureLink
                teams
                skills
                persona {
                    urn
                }
                platforms {
                    urn
                }
            }
            groups: relationships(
                input: { types: ["IsMemberOfGroup", "IsMemberOfNativeGroup"], direction: OUTGOING, start: 0, count: 50 }
            ) {
                relationships {
                    entity {
                        ... on CorpGroup {
                            urn
                            name
                            properties {
                                displayName
                            }
                        }
                    }
                }
            }
            settings {
                appearance {
                    showSimplifiedHomepage
                    showThemeV2
                }
                views {
                    defaultView {
                        urn
                    }
                }
                homePage {
                    pageTemplate {
                        ...PageTemplate
                    }
                    dismissedAnnouncementUrns
                }
            }
        }
        platformPrivileges {
            viewAnalytics
            managePolicies
            viewMetadataProposals
            manageIdentities
            generatePersonalAccessTokens
            manageIngestion
            manageSecrets
            manageTokens
            manageDomains
            viewTests
            manageTests
            manageGlossaries
            manageUserCredentials
            manageTags
            viewManageTags
            createDomains
            createTags
            manageGlobalSettings
            manageGlobalViews
            manageOwnershipTypes
            manageGlobalAnnouncements
            createBusinessAttributes
            manageBusinessAttributes
            manageStructuredProperties
            viewStructuredPropertiesPage
            manageApplications
            manageFeatures
            manageHomePageTemplates
            manageDocumentationForms
            viewDocumentationFormsPage
            manageOrganizationDisplayPreferences
            proposeCreateGlossaryTerm
            proposeCreateGlossaryNode
            canViewIngestionPage
            createSupportTickets
        }
    }
}

mutation updateUserSetting($input: UpdateUserSettingInput!) {
    updateUserSetting(input: $input)
}
