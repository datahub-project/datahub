mutation upsertConnection($input: UpsertDataHubConnectionInput!) {
    upsertConnection(input: $input) {
        urn
        details {
            type
            name
            json {
                blob
            }
        }
        platform {
            ...platformFields
        }
    }
}

mutation updateConnection($input: UpdateDataHubConnectionInput!) {
    updateConnection(input: $input) {
        urn
        details {
            type
            name
            json {
                blob
            }
        }
        platform {
            ...platformFields
        }
    }
}

mutation createNotificationConnectionTest($input: NotificationConnectionTestRequestInput!) {
    createNotificationConnectionTest(input: $input)
}

mutation deleteConnection($input: DeleteDataHubConnectionInput!) {
    deleteConnection(input: $input)
}

query connection($urn: String!) {
    connection(urn: $urn) {
        urn
        details {
            type
            name
            json {
                blob
            }
        }
        platform {
            ...platformFields
        }
    }
}

query getNotificationConnectionTestResult($urn: String!) {
    getNotificationConnectionTestResult(urn: $urn) {
        status
        structuredReport {
            type
            serializedValue
            contentType
        }
    }
}
