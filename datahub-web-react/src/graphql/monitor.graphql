#import "./assertion_monitor_shared.graphql"

fragment monitorDetails on Monitor {
    urn
    type
    info {
        type
        assertionMonitor {
            assertions {
                assertion {
                    ...assertionDetails
                }
                schedule {
                    cron
                    timezone
                }
                parameters {
                    ...assertionEvaluationParameters
                }
            }
        }
        status {
            mode
        }
        executorId
    }
}

mutation deleteMonitor($urn: String!) {
    deleteMonitor(urn: $urn)
}

mutation createAssertionMonitor($input: CreateAssertionMonitorInput!) {
    createAssertionMonitor(input: $input) {
        ...monitorDetails
    }
}

mutation updateMonitorStatus($input: UpdateMonitorStatusInput!) {
    updateMonitorStatus(input: $input) {
        ...monitorDetails
    }
}

fragment assertionDetailsWithMonitors on Assertion {
    ...assertionDetailsWithRunEvents
    monitor: relationships(input: { types: ["Evaluates"], direction: INCOMING, start: 0, count: 1 }) {
        relationships {
            entity {
                ... on Monitor {
                    ...monitorDetails
                }
            }
        }
    }
}

fragment assertionsQueryWithMonitors on Dataset {
    assertions(start: 0, count: 1000) {
        start
        count
        total
        assertions {
            ...assertionDetailsWithMonitors
        }
    }
}

query getDatasetAssertionsWithMonitors($urn: String!) {
    dataset(urn: $urn) {
        ...assertionsQueryWithMonitors
        siblings {
            isPrimary
        }
        siblingsSearch(input: { query: "*", count: 5 }) {
            count
            total
            searchResults {
                entity {
                    urn
                    type
                    ...assertionsQueryWithMonitors
                }
            }
        }
        privileges {
            ...entityPrivileges
        }
    }
}

query getAssertionWithMonitors($assertionUrn: String!) {
    assertion(urn: $assertionUrn) {
        urn
        ...assertionDetailsWithMonitors
    }
}
