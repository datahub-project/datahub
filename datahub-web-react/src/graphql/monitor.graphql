#import "./assertion_monitor_shared.graphql"

fragment assertionAdjustmentSettings on AssertionAdjustmentSettings {
    algorithm
    algorithmName
    context {
        key
        value
    }
    exclusionWindows {
        ...assertionExclusionWindow
    }
    trainingDataLookbackWindowDays
    sensitivity {
        level
    }
}

fragment monitorDetails on Monitor {
    urn
    type
    info {
        type
        assertionMonitor {
            assertions {
                assertion {
                    ...assertionDetails
                }
                schedule {
                    cron
                    timezone
                }
                parameters {
                    ...assertionEvaluationParameters
                }
                context {
                    ...assertionEvaluationContext
                }
            }
            settings {
                inferenceSettings {
                    ...assertionAdjustmentSettings
                }
            }
        }
        status {
            mode
        }
        executorId
    }
}

mutation deleteMonitor($urn: String!) {
    deleteMonitor(urn: $urn)
}

mutation createAssertionMonitor($input: CreateAssertionMonitorInput!) {
    createAssertionMonitor(input: $input) {
        ...monitorDetails
    }
}

mutation updateMonitorStatus($input: UpdateMonitorStatusInput!) {
    updateMonitorStatus(input: $input) {
        ...monitorDetails
    }
}

mutation updateAssertionMonitorSettings($input: UpdateAssertionMonitorSettingsInput!) {
    updateAssertionMonitorSettings(input: $input) {
        ...monitorDetails
    }
}

mutation reportAnomalyFeedback($input: ReportAnomalyFeedbackInput!) {
    reportAnomalyFeedback(input: $input) {
        ...monitorAnomalyEventDetails
    }
}

fragment assertionDetailsWithMonitors on Assertion {
    ...assertionDetailsWithRunEvents
    monitor: relationships(input: { types: ["Evaluates"], direction: INCOMING, start: 0, count: 1 }) {
        relationships {
            entity {
                ... on Monitor {
                    ...monitorDetails
                }
            }
        }
    }
}

fragment assertionDetailsForSearch on Assertion {
    ...assertionDetails
    runEvents(
        status: COMPLETE
        limit: $runEventsLimit
        startTimeMillis: $runEventsStart
        endTimeMillis: $runEventsEnd
    ) {
        total
        failed
        succeeded
        errored
        runEvents {
            ...assertionRunEventDetails
        }
    }
    monitor: relationships(input: { types: ["Evaluates"], direction: INCOMING, start: 0, count: 1 }) {
        relationships {
            entity {
                ... on Monitor {
                    ...monitorDetails
                }
            }
        }
    }
    dataset: relationships(input: { types: ["Asserts"], direction: OUTGOING, start: 0, count: 1 }) {
        relationships {
            entity {
                urn
                type
                ... on SchemaFieldEntity {
                    parent {
                        ... on Dataset {
                            ...assertionDatasetFields
                        }
                    }
                }
                ... on Dataset {
                    ...assertionDatasetFields
                }
            }
        }
    }
}

fragment assertionDatasetFields on Dataset {
    urn
    name
    platform {
        ...platformFields
        __typename
    }
    properties {
        name
        description
        qualifiedName
        externalUrl
        __typename
    }
}

fragment assertionsQueryWithMonitors on Dataset {
    assertions(start: 0, count: 1000) {
        start
        count
        total
        assertions {
            ...assertionDetailsWithMonitors
        }
    }
}

query getDatasetAssertionsWithMonitors($urn: String!) {
    dataset(urn: $urn) {
        ...assertionsQueryWithMonitors
        siblings {
            isPrimary
        }
        siblingsSearch(input: { query: "*", count: 5 }) {
            count
            total
            searchResults {
                entity {
                    urn
                    type
                    ...assertionsQueryWithMonitors
                }
            }
        }
        privileges {
            ...entityPrivileges
        }
    }
}

query getAssertionWithMonitors($assertionUrn: String!) {
    assertion(urn: $assertionUrn) {
        urn
        ...assertionDetailsWithMonitors
    }
}

fragment assertionSearchResultFields on Entity {
    urn
    type
    ...assertionDetailsForSearch
}
fragment assertionSearchResults on SearchResults {
    start
    count
    total
    searchResults {
        entity {
            ...assertionSearchResultFields
        }
        matchedFields {
            name
            value
            entity {
                urn
                type
                ...entityDisplayNameFields
            }
        }
        insights {
            text
            icon
        }
        extraProperties {
            name
            value
        }
    }
    facets {
        ...facetFields
    }
    suggestions {
        text
        frequency
        score
    }
}

query searchAssertions(
    $input: SearchAcrossEntitiesInput!
    $runEventsStart: Long!
    $runEventsEnd: Long!
    $runEventsLimit: Int!
) {
    searchAcrossEntities(input: $input) {
        ...assertionSearchResults
    }
}

query listMonitorMetrics($input: ListMonitorMetricsInput!) {
    listMonitorMetrics(input: $input) {
        metrics {
            assertionMetric {
                timestampMillis
                value
            }
            anomalyEvent {
                ...monitorAnomalyEventDetails
            }
        }
    }
}
