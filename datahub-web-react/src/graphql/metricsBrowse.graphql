query getRootMetricsBrowse($input: GetRootEntitiesInput!) {
    getRootMetrics(input: $input) {
        total
        start
        count
        metrics {
            urn
            type
            id
            path
            platform {
                ...platformFields
            }
            info {
                name
                description
                lastModified {
                    time
                }
            }
            semanticModel {
                urn
                type
                info {
                    name
                }
            }
            childMetrics(input: { count: 0, query: "*" }) {
                total
            }
            subTypes {
                typeNames
            }
        }
    }
}

