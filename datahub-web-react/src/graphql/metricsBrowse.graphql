query getSemanticModelMetrics($urn: String!, $input: ScrollAcrossEntitiesInput!) {
    semanticModel(urn: $urn) {
        urn
        metrics(input: $input) {
            nextScrollId
            count
            total
            searchResults {
                entity {
                    urn
                    type
                    ... on Metric {
                        id
                        path
                        platform {
                            ...platformFields
                        }
                        info {
                            name
                            description
                            lastModified {
                                time
                            }
                        }
                        childMetrics(input: { count: 0, query: "*" }) {
                            total
                        }
                        subTypes {
                            typeNames
                        }
                    }
                }
            }
        }
    }
}

# Direct children of a metric (used to lazily expand a metric row in the sidebar tree).
query getMetricChildren($input: SearchAcrossEntitiesInput!) {
    searchAcrossEntities(input: $input) {
        count
        total
        searchResults {
            entity {
                urn
                type
                ... on Metric {
                    id
                    path
                    platform {
                        ...platformFields
                    }
                    info {
                        name
                        description
                        lastModified {
                            time
                        }
                    }
                    childMetrics(input: { count: 0, query: "*" }) {
                        total
                    }
                    subTypes {
                        typeNames
                    }
                }
            }
        }
    }
}
