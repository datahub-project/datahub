# Ref: https://github.com/acryldata/datahub-fork/blob/acryl-main/datahub-graphql-core/src/main/resources/actions_pipeline.graphql#L22

fragment ActionInfo on ActionPipeline {
  urn
  details {
    type
    name
    config {
      recipe
      executorId
      version
      debugMode
    }
  }
}

query listActionPipelines($input: ListActionPipelinesInput!) {
  listActionPipelines(input: $input) {
    start
    count
    total
    actionPipelines {
      ...ActionInfo
    }
  }
}

query getActionPipeline($urn: String!) {
  actionPipeline(urn: $urn) {
    ...ActionInfo
  }
}

mutation createActionPipeline($input: UpdateActionPipelineInput!) {
	createActionPipeline(input: $input)
}

mutation upsertActionPipeline($urn: String!, $input: UpdateActionPipelineInput!) {
	upsertActionPipeline(urn: $urn, input: $input)
}