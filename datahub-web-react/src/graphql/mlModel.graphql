query getMLModel($urn: String!) {
    mlModel(urn: $urn) {
        urn
        type
        ...nonRecursiveMLModel
        features: relationships(input: { types: ["Consumes"], direction: OUTGOING, start: 0, count: 100 }) {
            start
            count
            total
            relationships {
                type
                direction
                entity {
                    ... on MLFeature {
                        ...nonRecursiveMLFeature
                    }
                    ... on MLPrimaryKey {
                        ...nonRecursiveMLPrimaryKey
                    }
                }
            }
        }
        share {
            ...shareFields
        }
        privileges {
            ...entityPrivileges
        }
        autoRenderAspects: aspects(input: { autoRenderOnly: true }) {
            ...autoRenderAspectFields
        }
        structuredProperties {
            properties {
                ...structuredPropertiesFields
            }
        }
        forms {
            ...formsFields
        }
        termProposals: proposals(type: TERM_ASSOCIATION) {
            ...proposalsFragment
        }
        tagProposals: proposals(type: TAG_ASSOCIATION) {
            ...proposalsFragment
        }
        activeIncidents: incidents(start: 0, count: 1, state: ACTIVE) {
            total
        }
        ...notes
        ...entityProfileVersionProperties
    }
}
