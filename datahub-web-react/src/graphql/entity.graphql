query getEntities($urns: [String!]!, $checkForExistence: Boolean) {
    entities(urns: $urns, checkForExistence: $checkForExistence) {
        urn
        type
        ...searchResultFields
    }
}

query getEntity($urn: String!) {
    entity(urn: $urn) {
        urn
        type
        ...searchResultFields
    }
}
