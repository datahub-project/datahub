query getSubscription($input: GetSubscriptionInput!) {
    getSubscription(input: $input) {
        privileges {
            canManageEntity
        }
        subscription {
            ...subscriptionFields
        }
    }
}

query listSubscriptions($input: ListSubscriptionsInput!) {
    listSubscriptions(input: $input) {
        total
        subscriptions {
            ...subscriptionFields
        }
    }
}

query searchSubscriptions($input: SearchAcrossEntitiesInput!) {
    searchAcrossEntities(input: $input) {
        ...subscriptionSearchResults
    }
}

fragment subscriptionSearchResults on SearchResults {
    start
    count
    total
    searchResults {
        entity {
            ...subscriptionSearchResultFields
        }
    }
    facets {
        ...facetFields
    }
    suggestions {
        text
        frequency
        score
    }
}

fragment subscriptionSearchResultFields on Entity {
    urn
    type
    ...subscriptionFields
}

query getEntitySubscriptionSummary($input: GetEntitySubscriptionSummaryInput!) {
    getEntitySubscriptionSummary(input: $input) {
        isUserSubscribed
        userSubscriptionCount
        groupSubscriptionCount
        subscribedGroups {
            urn
            ...entityDisplayNameFields
            properties {
                displayName
            }
        }
        subscribedUsers {
            urn
            ...entityDisplayNameFields
            editableProperties {
                pictureLink
            }
        }
    }
}

mutation createSubscription($input: CreateSubscriptionInput!) {
    createSubscription(input: $input) {
        ...subscriptionFields
    }
}

mutation updateSubscription($input: UpdateSubscriptionInput!) {
    updateSubscription(input: $input) {
        ...subscriptionFields
    }
}

mutation syncSubscription($input: SyncSubscriptionInput!) {
    syncSubscription(input: $input) {
        ...subscriptionFields
    }
}

mutation deleteSubscription($input: DeleteSubscriptionInput!) {
    deleteSubscription(input: $input)
}

fragment subscriptionFields on DataHubSubscription {
    actorUrn
    actor {
        ...resolvedActorFields
    }
    subscriptionUrn
    entity {
        ...entityPreview
        ... on Dataset {
            browsePathV2 {
                ...browsePathV2Fields
            }
        }
    }
    subscriptionTypes
    entityChangeTypes {
        entityChangeType
        filter {
            includeAssertions
        }
    }
    createdOn {
        time
    }
    updatedOn {
        time
    }
    notificationConfig {
        notificationSettings {
            sinkTypes
            slackSettings {
                userHandle
                channels
            }
            emailSettings {
                email
            }
            teamsSettings {
                user {
                    teamsUserId
                    azureUserId
                    email
                    displayName
                    lastUpdated
                }
                channels {
                    id
                    name
                }
            }
        }
    }
}
