query appConfig {
    appConfig {
        appVersion
        policiesConfig {
            enabled
            platformPrivileges {
                type
                displayName
                description
            }
            resourcePrivileges {
                resourceType
                resourceTypeDisplayName
                entityType
                privileges {
                    type
                    displayName
                    description
                }
            }
        }
        analyticsConfig {
            enabled
        }
        authConfig {
            tokenAuthEnabled
        }
        actionRequestsConfig {
            enabled
        }
        identityManagementConfig {
            enabled
        }
        lineageConfig {
            supportsImpactAnalysis
            defaultLastDaysFilter
        }
        managedIngestionConfig {
            enabled
        }
        visualConfig {
            logoUrl
            faviconUrl
            appTitle
            hideGlossary
            showFullTitleInLineage
            queriesTab {
                queriesTabResultSize
            }
            entityProfiles {
                domain {
                    defaultTab
                }
            }
            searchResult {
                enableNameHighlight
            }
            theme {
                themeId
            }
            application {
                showSidebarSectionWhenEmpty
                showApplicationInNavigation
            }
        }
        telemetryConfig {
            enableThirdPartyLogging
            userTrackingEnabled
        }
        testsConfig {
            enabled
            executionLimitConfig {
                elasticSearchExecutor
                defaultExecutor
            }
        }
        viewsConfig {
            enabled
        }
        searchBarConfig {
            apiVariant
        }
        searchCardConfig {
            showDescription
        }
        searchFlagsConfig {
            defaultSkipHighlighting
        }
        homePageConfig {
            firstInPersonalSidebar
        }
        dataHubConfig {
            serverEnv
            isFreeTrialInstance
        }
        classificationConfig {
            enabled
            automations {
                snowflake
                aiTermClassification
            }
        }
        featureFlags {
            readOnlyModeEnabled
            showSearchFiltersV2
            showBrowseV2
            platformBrowseV2
            assertionMonitorsEnabled
            schemaAssertionMonitorsEnabled
            runAssertionsEnabled
            subscriptionsEnabled
            datasetHealthDashboardEnabled
            showAcrylInfo
            erModelRelationshipFeatureEnabled
            showAccessManagement
            nestedDomainsEnabled
            platformBrowseV2
            businessAttributeEntityEnabled
            dataContractsEnabled
            editableDatasetNameEnabled
            aiFeaturesEnabled
            themeV2Enabled
            themeV2Default
            themeV2Toggleable
            lineageGraphV2
            metadataShareEnabled
            documentationFormsEnabled
            emailNotificationsEnabled
            slackBotTokensConfigEnabled
            slackBotTokensObfuscationEnabled
            showSeparateSiblings
            showManageStructuredProperties
            supportTicketsEnabled
            entityVersioningEnabled
            formCreationEnabled
            schemaFieldCLLEnabled
            showSeparateSiblings
            hideDbtSourceInLineage
            showBulkFormByDefault
            schemaFieldLineageIgnoreStatus
            showDatasetFeaturesSearchSortOptions
            showNavBarRedesign
            showAutoCompleteResults
            showHasSiblingsFilter
            showSearchBarAutocompleteRedesign
            showManageTags
            showIntroducePage
            showIngestionPageRedesign
            showLineageExpandMore
            showStatsTabRedesign
            showHomePageRedesign
            showFormAnalytics
            requestMinimalSlackPermissions
            showTaskCenterRedesign
            usePropagationsFramework
            displayExecutorPools
            onlineSmartAssertionsEnabled
            showDefaultExternalLinks
            tagPropagationV2Enabled
            termPropagationV2Enabled
            showCreatedAtFilter
            showProductUpdates
            formsNotificationsEnabled
            lineageGraphV3
            logicalModelsEnabled
            showHomepageUserRole
            assetSummaryPageV1
            viewIngestionSourcePrivilegesEnabled
            actionWorkflowsEnabled
            inviteUsersEnabled
            showAskDataHub
            teamsNotificationsEnabled
            datasetSummaryPageV1
            documentationFileUploadV1
        }
        chromeExtensionConfig {
            enabled
            lineageEnabled
        }
    }
}

query getEntityCounts($input: EntityCountInput) {
    getEntityCounts(input: $input) {
        counts {
            entityType
            count
        }
    }
}

query getGlobalViewsSettings {
    globalViewsSettings {
        defaultView
    }
}

query getDocPropagationSettings {
    docPropagationSettings {
        docColumnPropagation
    }
}

query getHomePageSettings {
    globalHomePageSettings {
        defaultTemplate {
            ...PageTemplate
        }
    }
}

query getPresignedUploadUrl($input: GetPresignedUploadUrlInput!) {
    getPresignedUploadUrl(input: $input) {
        url
        fileId
    }
}

mutation createDataHubFile($input: CreateDataHubFileInput!) {
    createDataHubFile(input: $input) {
        file {
            urn
        }
    }
}

mutation updateGlobalViewsSettings($input: UpdateGlobalViewsSettingsInput!) {
    updateGlobalViewsSettings(input: $input)
}

mutation updateDocPropagationSettings($input: UpdateDocPropagationSettingsInput!) {
    updateDocPropagationSettings(input: $input)
}

mutation updateApplicationsSettings($input: UpdateApplicationsSettingsInput!) {
    updateApplicationsSettings(input: $input)
}

query getLatestProductUpdate {
    latestProductUpdate {
        enabled
        id
        title
        header
        requiredVersion
        description
        image
        primaryCtaText
        primaryCtaLink
        secondaryCtaText
        secondaryCtaLink
        ctaText
        ctaLink
        features {
            title
            description
            icon
            availability
        }
    }
}
