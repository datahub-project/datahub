query appConfig {
    appConfig {
        appVersion
        policiesConfig {
            enabled
            platformPrivileges {
                type
                displayName
                description
            }
            resourcePrivileges {
                resourceType
                resourceTypeDisplayName
                entityType
                privileges {
                    type
                    displayName
                    description
                }
            }
        }
        analyticsConfig {
            enabled
        }
        authConfig {
            tokenAuthEnabled
        }
        actionRequestsConfig {
            enabled
        }
        identityManagementConfig {
            enabled
        }
        lineageConfig {
            supportsImpactAnalysis
            defaultLastDaysFilter
        }
        managedIngestionConfig {
            enabled
        }
        visualConfig {
            logoUrl
            faviconUrl
            appTitle
            hideGlossary
            queriesTab {
                queriesTabResultSize
            }
            entityProfiles {
                domain {
                    defaultTab
                }
            }
            searchResult {
                enableNameHighlight
            }
        }
        telemetryConfig {
            enableThirdPartyLogging
            userTrackingEnabled
        }
        testsConfig {
            enabled
            executionLimitConfig {
                elasticSearchExecutor
                defaultExecutor
            }
        }
        viewsConfig {
            enabled
        }
        classificationConfig {
            enabled
            automations {
                snowflake
                aiTermClassification
            }
        }
        featureFlags {
            readOnlyModeEnabled
            showSearchFiltersV2
            showBrowseV2
            platformBrowseV2
            assertionMonitorsEnabled
            schemaAssertionMonitorsEnabled
            runAssertionsEnabled
            subscriptionsEnabled
            datasetHealthDashboardEnabled
            showAcrylInfo
            erModelRelationshipFeatureEnabled
            showAccessManagement
            nestedDomainsEnabled
            platformBrowseV2
            businessAttributeEntityEnabled
            dataContractsEnabled
            editableDatasetNameEnabled
            documentationAiEnabled
            themeV2Enabled
            themeV2Default
            themeV2Toggleable
            lineageGraphV2
            metadataShareEnabled
            documentationFormsEnabled
            emailNotificationsEnabled
            slackBotTokensConfigEnabled
            slackBotTokensObfuscationEnabled
            showSeparateSiblings
            formCreationEnabled
            schemaFieldCLLEnabled
            showSeparateSiblings
            hideDbtSourceInLineage
            showBulkFormByDefault
            schemaFieldLineageIgnoreStatus
            showDatasetFeaturesSearchSortOptions
            showManageStructuredProperties
            showNavBarRedesign
            showAutoCompleteResults
            showFormAnalytics
            showStatsTabRedesign
        }
        chromeExtensionConfig {
            enabled
            lineageEnabled
        }
    }
}

query getEntityCounts($input: EntityCountInput) {
    getEntityCounts(input: $input) {
        counts {
            entityType
            count
        }
    }
}

query getGlobalViewsSettings {
    globalViewsSettings {
        defaultView
    }
}

query getDocPropagationSettings {
    docPropagationSettings {
        docColumnPropagation
    }
}

mutation updateGlobalViewsSettings($input: UpdateGlobalViewsSettingsInput!) {
    updateGlobalViewsSettings(input: $input)
}

mutation updateDocPropagationSettings($input: UpdateDocPropagationSettingsInput!) {
    updateDocPropagationSettings(input: $input)
}
