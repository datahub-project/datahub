query getUserNotificationSettings {
    getUserNotificationSettings {
        sinkTypes
        slackSettings {
            userHandle
        }
        emailSettings {
            email
        }
        teamsSettings {
            user {
                teamsUserId
                azureUserId
                email
                displayName
                lastUpdated
            }
            channels {
                id
                name
            }
        }
        settings {
            type
            value
            params {
                key
                value
            }
        }
    }
}

fragment notificationSettingsFields on NotificationSettings {
    sinkTypes
    slackSettings {
        channels
    }
    emailSettings {
        email
    }
    teamsSettings {
        channels {
            id
            name
        }
    }
    settings {
        type
        value
        params {
            key
            value
        }
    }
}

query getGroupNotificationSettings($input: GetGroupNotificationSettingsInput!) {
    getGroupNotificationSettings(input: $input) {
        ...notificationSettingsFields
    }
}

mutation updateUserNotificationSettings($input: UpdateUserNotificationSettingsInput!) {
    updateUserNotificationSettings(input: $input) {
        sinkTypes
        slackSettings {
            userHandle
        }
        emailSettings {
            email
        }
        teamsSettings {
            user {
                teamsUserId
                azureUserId
                email
                displayName
                lastUpdated
            }
            channels {
                id
                name
            }
        }
        settings {
            type
            value
            params {
                key
                value
            }
        }
    }
}

mutation updateGroupNotificationSettings($input: UpdateGroupNotificationSettingsInput!) {
    updateGroupNotificationSettings(input: $input) {
        sinkTypes
        slackSettings {
            channels
        }
        emailSettings {
            email
        }
        teamsSettings {
            channels {
                id
                name
            }
        }
        settings {
            type
            value
            params {
                key
                value
            }
        }
    }
}

query getGlobalSettings {
    globalSettings {
        integrationSettings {
            slackSettings {
                defaultChannelName
                botToken
                datahubAtMentionEnabled
            }
            emailSettings {
                defaultEmail
            }
            teamsSettings {
                defaultChannel {
                    id
                    name
                }
            }
        }
        notificationSettings {
            settings {
                type
                value
                params {
                    key
                    value
                }
            }
        }
        visualSettings {
            helpLink {
                isEnabled
                label
                link
            }
            customLogoUrl
            customOrgName
        }
        documentationAi {
            enabled
            instructions {
                id
                type
                state
                instruction
                created {
                    time
                    actor
                }
                lastModified {
                    time
                    actor
                }
            }
        }
        aiAssistant {
            instructions {
                id
                type
                state
                instruction
                created {
                    time
                    actor
                }
                lastModified {
                    time
                    actor
                }
            }
        }
    }
}

query getIntegrationSettings {
    globalSettings {
        integrationSettings {
            slackSettings {
                defaultChannelName
                botToken
            }
            emailSettings {
                defaultEmail
            }
            teamsSettings {
                defaultChannel {
                    id
                    name
                }
            }
        }
    }
}

query getNotificationSettings {
    globalSettings {
        notificationSettings {
            settings {
                type
                value
                params {
                    key
                    value
                }
            }
        }
    }
}

query getSsoSettings {
    globalSettings {
        ssoSettings {
            oidcSettings {
                enabled
                clientId
                clientSecret
                discoveryUri
                userNameClaim
                userNameClaimRegex
                preferredJwsAlgorithm
                scope
                clientAuthenticationMethod
                jitProvisioningEnabled
                preProvisioningRequired
                extractGroupsEnabled
                groupsClaim
                responseType
                responseMode
                useNonce
                readTimeout
                extractJwtAccessTokenClaims
            }
        }
    }
}

mutation updateGlobalIntegrationSettings($input: UpdateGlobalIntegrationSettingsInput!) {
    updateGlobalSettings(input: { integrationSettings: $input })
}

mutation updateGlobalNotificationSettings($input: UpdateGlobalNotificationSettingsInput!) {
    updateGlobalSettings(input: { notificationSettings: $input })
}

mutation updateSsoSettings($input: UpdateSsoSettingsInput!) {
    updateGlobalSettings(input: { ssoSettings: $input })
}

mutation updateGlobalDocsAiSettings($input: UpdateDocumentationAiSettingsInput!) {
    updateGlobalSettings(input: { documentationAi: $input })
}

mutation updateGlobalAiAssistantSettings($input: UpdateAiAssistantSettingsInput!) {
    updateGlobalSettings(input: { aiAssistant: $input })
}

mutation updateHelpLink($input: UpdateHelpLinkInput!) {
    updateHelpLink(input: $input)
}

mutation updateOrganizationDisplayPreferences($input: UpdateOrganizationDisplayPreferencesInput!) {
    updateOrganizationDisplayPreferences(input: $input)
}

mutation updateCorpUserAiAssistantSettings($input: UpdateCorpUserAiAssistantSettingsInput!) {
    updateCorpUserAiAssistantSettings(input: $input)
}

fragment AssetSettingsFields on AssetSettings {
    assetSummary {
        templates {
            template {
                ...PageTemplate
            }
        }
    }
}

mutation updateAssetSettings($input: UpdateAssetSettingsInput!) {
    updateAssetSettings(input: $input) {
        ...AssetSettingsFields
    }
}
