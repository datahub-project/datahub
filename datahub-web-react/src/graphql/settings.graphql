query getUserNotificationSettings {
    getUserNotificationSettings {
        sinkTypes
        slackSettings {
            userHandle
        }
        emailSettings {
            email
        }
        teamsSettings {
            user {
                teamsUserId
                azureUserId
                email
                displayName
                lastUpdated
            }
            channels {
                id
                name
            }
        }
        settings {
            type
            value
            params {
                key
                value
            }
        }
    }
}

