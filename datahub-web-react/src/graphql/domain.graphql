query getDomain($urn: String!) {
    domain(urn: $urn) {
        urn
        id
        type
        properties {
            name
            description
            createdOn {
                time
            }
        }
        parentDomains {
            ...parentDomainsFields
        }
        ownership {
            ...ownershipFields
        }
        privileges {
            ...entityPrivileges
        }
        institutionalMemory {
            ...institutionalMemoryFields
        }
        autoRenderAspects: aspects(input: { autoRenderOnly: true }) {
            ...autoRenderAspectFields
        }
        structuredProperties {
            properties {
                ...structuredPropertiesFields
            }
        }
        displayProperties {
            ...displayPropertiesFields
        }
        ...domainEntitiesFields
        ...notes
        settings {
            ...AssetSettingsFields
        }
    }
}

fragment ListDomain on Domain {
    urn
    id
    type
    properties {
        name
        description
    }
    parentDomains {
        ...parentDomainsFields
    }
    ownership {
        ...ownershipFields
    }
    displayProperties {
        ...displayPropertiesFields
    }
    ...domainEntitiesFields
    institutionalMemory {
        ...institutionalMemoryFields
    }
}

query listDomains($input: ListDomainsInput!) {
    listDomains(input: $input) {
        start
        count
        total
        domains {
            ...ListDomain
        }
    }
}

query scrollAcrossDomains($input: ScrollAcrossEntitiesInput!) {
    scrollAcrossEntities(input: $input) {
        nextScrollId
        count
        total
        searchResults {
            entity {
                ... on Domain {
                    ...ListDomain
                }
            }
        }
    }
}

query getDomainChildrenCount($urn: String!) {
    domain(urn: $urn) {
        urn
        type
        children: relationships(input: { types: ["IsPartOf"], direction: INCOMING, start: 0, count: 0 }) {
            total
        }
    }
}

mutation createDomain($input: CreateDomainInput!) {
    createDomain(input: $input)
}

mutation moveDomain($input: MoveDomainInput!) {
    moveDomain(input: $input)
}

mutation deleteDomain($urn: String!) {
    deleteDomain(urn: $urn)
}

query getDomainEntitiesForLineage($urn: String!, $start: Int!, $count: Int!) {
    domain(urn: $urn) {
        urn
        type
        entities(input: { start: $start, count: $count, query: "*" }) {
            total
            searchResults {
                entity {
                    urn
                    type
                }
            }
        }
    }
}

query getDomainLineage($urn: String!, $input: DomainLineageInput!) {
    domain(urn: $urn) {
        urn
        type
        domainLineage(input: $input) {
            ...domainLineageResultFields
        }
    }
}

fragment domainLineageResultFields on DomainLineageResult {
    start
    count
    total
    isPartial
    memberScanCount
    memberTotal
    relationships {
        direction
        memberMatchCount
        neighbourEntityCount
        degreeMin
        degreeMax
        entity {
            urn
            type
            ... on Domain {
                id
                properties {
                    name
                    description
                }
                displayProperties {
                    ...displayPropertiesFields
                }
            }
            ... on DataProduct {
                properties {
                    name
                    description
                }
                domain {
                    ...entityDomain
                }
            }
        }
    }
    innerEdges {
        memberMatchCount
        degreeMin
        degreeMax
        upstream {
            urn
            type
            ... on DataProduct {
                properties {
                    name
                }
            }
        }
        downstream {
            urn
            type
            ... on DataProduct {
                properties {
                    name
                }
            }
        }
    }
}

# We should replace this with a cached summary object on the domain
query getDomainEntitySummary($urn: String!) {
    aggregateAcrossEntities(
        input: {
            types: []
            query: "*"
            facets: ["_entityType␞typeNames", "_entityType"]
            orFilters: [
                {
                    and: [
                        { field: "_entityType", values: ["DATA_PRODUCT"], negated: true }
                        { field: "domains", values: [$urn] }
                    ]
                }
            ]
            searchFlags: { skipCache: true }
        }
    ) {
        facets {
            ...facetFields
        }
    }
}
