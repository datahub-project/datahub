fragment contractAssertionParameters on AssertionStdParameters {
    value {
        value
        type
    }
    minValue {
        value
        type
    }
    maxValue {
        value
        type
    }
}

fragment dataContractDetails on DataContract {
    urn
    type
    properties {
        freshness {
            assertion {
                ...assertionDetailsWithRunEvents
            }
        }
        schema {
            assertion {
                ...assertionDetailsWithRunEvents
            }
        }
        dataQuality {
            assertion {
                ...assertionDetailsWithRunEvents
            }
        }
    }
    status {
        state
    }
    structuredProperties {
        properties {
            ...structuredPropertiesFields
        }
    }
}

query getDatasetContract($urn: String!) {
    dataset(urn: $urn) {
        contract {
            ...dataContractDetails
        }
    }
}

query getContractProposals($urn: String!) {
    listActionRequests(input: { resourceUrn: $urn, type: DATA_CONTRACT }) {
        total
        actionRequests {
            urn
            params {
                dataContractProposal {
                    freshness {
                        assertion {
                            ...assertionDetailsWithMonitors
                        }
                    }
                    schema {
                        assertion {
                            ...assertionDetailsWithMonitors
                        }
                    }
                    dataQuality {
                        assertion {
                            ...assertionDetailsWithMonitors
                        }
                    }
                }
            }
            status
        }
    }
}

mutation upsertDataContract($input: UpsertDataContractInput!) {
    upsertDataContract(input: $input) {
        ...dataContractDetails
    }
}

mutation proposeDataContract($input: ProposeDataContractInput!) {
    proposeDataContract(input: $input)
}
