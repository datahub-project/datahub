query getForm($urn: String!) {
    form(urn: $urn) {
        ...formFields
    }
}

query getFormAssignmentStatus($urn: String!) {
    form(urn: $urn) {
        urn
        type
        formAssignmentStatus {
            status
            timestamp
        }
    }
}

mutation submitFormPrompt($urn: String!, $input: SubmitFormPromptInput!) {
    submitFormPrompt(urn: $urn, input: $input)
}

mutation batchSubmitFormPrompt($input: BatchSubmitFormPromptInput!) {
    batchSubmitFormPrompt(input: $input)
}

mutation asyncBatchSubmitFormPrompt($input: AsyncBatchSubmitFormPromptInput!) {
    asyncBatchSubmitFormPrompt(input: $input) {
        taskUrn
    }
}

mutation verifyForm($input: VerifyFormInput!) {
    verifyForm(input: $input)
}

mutation batchVerifyForm($input: BatchVerifyFormInput!) {
    batchVerifyForm(input: $input)
}

mutation asyncBatchVerifyForm($input: AsyncBatchVerifyFormInput!) {
    asyncBatchVerifyForm(input: $input) {
        taskUrn
    }
}

query searchForEntityUrnsByForm($input: SearchAcrossEntitiesInput!) {
    searchAcrossEntities(input: $input) {
        start
        count
        total
        searchResults {
            entity {
                urn
                type
            }
        }
    }
}

query searchForEntitiesByForm(
    $input: SearchAcrossEntitiesInput!
    $skipSiblingsSearch: Boolean = false
    $skipLineage: Boolean = false
) {
    searchAcrossEntities(input: $input) {
        ...searchResults
    }
}

query searchForEntitiesByFormCount($input: SearchAcrossEntitiesInput!) {
    searchAcrossEntities(input: $input) {
        start
        count
        total
    }
}

query getFormsForActor($input: GetFormsForActorInput) {
    getFormsForActor(input: $input) {
        formsForActor {
            form {
                urn
                type
                exists
                info {
                    name
                    description
                    type
                    status {
                        state
                    }
                }
                ownership {
                    ...ownershipFields
                }
            }
            numEntitiesToComplete
        }
    }
}

mutation createForm($input: CreateFormInput!) {
    createForm(input: $input) {
        ...formFields
    }
}

mutation updateForm($input: UpdateFormInput!) {
    updateForm(input: $input) {
        ...formFields
    }
}

mutation deleteForm($input: DeleteFormInput!) {
    deleteForm(input: $input)
}

query getFormsForEntity($urn: String!) {
    entity(urn: $urn) {
        ... on Dataset {
            forms {
                ...formsFields
            }
        }
        ... on Dashboard {
            forms {
                ...formsFields
            }
        }
        ... on Chart {
            forms {
                ...formsFields
            }
        }
        ... on DataFlow {
            forms {
                ...formsFields
            }
        }
        ... on DataJob {
            forms {
                ...formsFields
            }
        }
        ... on Container {
            forms {
                ...formsFields
            }
        }
        ... on GlossaryTerm {
            forms {
                ...formsFields
            }
        }
        ... on GlossaryNode {
            forms {
                ...formsFields
            }
        }
        ... on Domain {
            forms {
                ...formsFields
            }
        }
        ... on DataProduct {
            forms {
                ...formsFields
            }
        }
        ... on CorpUser {
            forms {
                ...formsFields
            }
        }
        ... on CorpGroup {
            forms {
                ...formsFields
            }
        }
        ... on Application {
            forms {
                ...formsFields
            }
        }
        ... on MLFeature {
            forms {
                ...formsFields
            }
        }
        ... on MLFeatureTable {
            forms {
                ...formsFields
            }
        }
        ... on MLModel {
            forms {
                ...formsFields
            }
        }
        ... on MLModelGroup {
            forms {
                ...formsFields
            }
        }
        ... on MLPrimaryKey {
            forms {
                ...formsFields
            }
        }
    }
}
