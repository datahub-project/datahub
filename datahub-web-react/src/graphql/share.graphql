mutation shareEntity($input: ShareEntityInput!) {
    shareEntity(input: $input) {
		succeeded
        share {
            lastShareResults {
                created {
                    time
                }
                shareConfig {
                    enableUpstreamLineage
                    enableDownstreamLineage
                }
            }
        }
    }
}

mutation unshareEntity($input: UnshareEntityInput!) {
    unshareEntity(input: $input) {
        succeeded
        share {
            lastShareResults {
                created {
                    time
                }
                shareConfig {
                    enableUpstreamLineage
                    enableDownstreamLineage
                }
            }
        }
    }
}
