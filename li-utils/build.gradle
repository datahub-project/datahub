
plugins {
    id 'java-library'
    id 'pegasus'
}

apply from: "../gradle/coverage/java-coverage.gradle"
// Apply shared Pegasus model index generation
apply from: '../gradle/schema/pegasus-models-index.gradle'

// Pin Java 17 bytecode: bundled into the acryl-spark-lineage agent shadow jar, which must run on
// managed Spark whose default JVM is Java 17 (Amazon EMR 7.x, Databricks Runtime 16-17).
ext.javaClassVersionOverride = 17

dependencies {
    api spec.product.pegasus.data
    implementation(externalDependency.reflections) {
        exclude group: 'com.google.guava', module: 'guava'
    }
    implementation externalDependency.guava

    implementation externalDependency.slf4jApi
    implementation platform(externalDependency.jacksonBom)
    api externalDependency.jacksonDataBind
    compileOnly externalDependency.lombok
    annotationProcessor externalDependency.lombok

    testImplementation externalDependency.assertJ
    testImplementation externalDependency.commonsIo
    testImplementation project(':test-models')
    testImplementation project(path: ':test-models', configuration: 'testDataTemplate')
    testImplementation externalDependency.testng
}

idea {
    module {
        sourceDirs += file('src/main/javaPegasus')
    }
}

// Need to compile backing java parameterDefinitions with the data template.
sourceSets.mainGeneratedDataTemplate.java.srcDirs('src/main/javaPegasus/')
