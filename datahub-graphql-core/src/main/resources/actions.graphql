extend type Query {
  """
  Fetch all action requests for the authenticated user
  """
  listActionRequests(input: ListActionRequestsInput!): ListActionRequestsResult

  """
  Fetch all rejected action requests
  """
  listRejectedActionRequests(
    input: ListRejectedActionRequestsInput!
  ): ListRejectedActionRequestsResult

  """
  Get the correct assignees of proposals. Returns the list of URN of correct assignees of proposals.
  """
  getActionRequestAssignee(input: GetActionRequestAssigneeInput!): [String!]
}

type ActionRequestsConfig {
  """
  Whether the action requests feature is enabled.
  """
  enabled: Boolean!
}

enum ActionRequestType {
  """
  Requests to associate a tag with an entity or sub resource
  """
  TAG_ASSOCIATION
  """
  Requests to associate a term with an entity or sub resource
  """
  TERM_ASSOCIATION
  """
  Requests to create a glossary term
  """
  CREATE_GLOSSARY_TERM
  """
  Requests to create a glossary node
  """
  CREATE_GLOSSARY_NODE
  """
  Requests to update a description
  """
  UPDATE_DESCRIPTION
  """
  Data Contract Proposal
  """
  DATA_CONTRACT
  """
  Requests to add a structured property to an entity
  """
  STRUCTURED_PROPERTY_ASSOCIATION
  """
  Requests to associate an entity with a domain
  """
  DOMAIN_ASSOCIATION
  """
  Requests to associate an entity with an owner
  """
  OWNER_ASSOCIATION
}
enum ActionRequestStatus {
  """
  The action request is pending action
  """
  PENDING
  """
  An action request has been completed
  """
  COMPLETED
}
enum ActionRequestResult {
  """
  The action request is accepted
  """
  ACCEPTED
  """
  An action request has been rejected
  """
  REJECTED
}

input GetActionRequestAssigneeInput {
  """
  Action request type
  """
  actionRequestType: String!

  """
  Resource Urn for which to get assignees
  """
  resourceUrn: String!

  """
  An optional subresource filter
  """
  subResource: String

  """
  An optional type filter
  """
  subResourceType: String
}

input ListActionRequestsInput {
  """
  Start offset of the result set
  """
  start: Int
  """
  Number of results to return in the result set
  """
  count: Int
  """
  An optional type filter
  """
  type: ActionRequestType
  """
  An optional Status filter
  """
  status: ActionRequestStatus
  """
  An optional resource urn associated with the proposal. This represents
  the entity being proposed against.
  """
  resourceUrn: String
  """
  An optional action request assignee to filter by. If not provided, all
  action requests that the authenticated user is assigned to will be returned.
  No filtering done if allActionRequests is passed
  """
  assignee: ActionRequestAssignee
  """
  An optional starting time to filter on
  """
  startTimestampMillis: Long
  """
  An optional ending time to filter on
  """
  endTimestampMillis: Long
  """
  A list of disjunctive criterion for the filter. (or operation to combine filters)
  """
  orFilters: [AndFilterInput!]
  """
  If this is sent then default filtering for current assignee is not done
  """
  allActionRequests: Boolean
  """
  List of facets we want aggregations for
  """
  facets: [String!]
}

input ActionRequestAssignee {
  """
  The type of the assignee, either user or group
  """
  type: AssigneeType!
  """
  The urn of the assignee
  """
  urn: String!
}

type ListActionRequestsResult {
  """
  Start offset of the result set
  """
  start: Int
  """
  Number of results to return in the result set
  """
  count: Int
  """
  The total number of action requests
  """
  total: Int
  """
  A list of groupings of action requests for a user
  """
  actionRequests: [ActionRequest!]!
  """
  Facet aggregations used for filtering
  """
  facets: [FacetMetadata!]
}

input ListRejectedActionRequestsInput {
  """
  Start offset of the result set
  """
  start: Int
  """
  Number of results to return in the result set
  """
  count: Int
  """
  An optional type filter
  """
  type: ActionRequestType
  """
  An optional starting time to filter on
  """
  startTimestampMillis: Long
  """
  An optional ending time to filter on
  """
  endTimestampMillis: Long
}

type ListRejectedActionRequestsResult {
  """
  Start offset of the result set
  """
  start: Int
  """
  Number of results to return in the result set
  """
  count: Int
  """
  The total number of rejected action requests
  """
  total: Int
  """
  A list of rejected action requests
  """
  rejectedActionRequests: [ActionRequest!]!
}

"""
A request for a user or group to perform a particular action, for example
reviewing and approving tag or glossary term associations
"""
type ActionRequest {
  """
  The urn associated with the action request
  """
  urn: String!

  """
  The type of the action request
  """
  type: ActionRequestType!

  """
  An optional description providing context for the action request
  """
  description: String

  """
  The status of the action request
  """
  status: ActionRequestStatus!

  """
  The status of the action request
  """
  result: ActionRequestResult

  """
  A note associated with the result of the action request
  """
  resultNote: String

  """
  The users assigned to the action request
  """
  assignedUsers: [String!]

  """
  The groups assigned to the action request
  """
  assignedGroups: [String!]

  """
  The roles assigned to the action request
  """
  assignedRoles: [String!]

  """
  The Users and Groups assigned to the action request
  """
  assignees: [OwnerType!]

  """
  An optional target entity associated with the action request
  """
  entity: Entity

  """
  The sub-resource type associated with the action request, for example datasetField.
  """
  subResourceType: String

  """
  The sub-resource identifier associated with the action request, for example a fieldName.
  """
  subResource: String

  """
  Optional set of action request arguments specific to the action request type
  """
  params: ActionRequestParams

  """
  The origin of the action request
  """
  origin: ActionRequestOrigin

  """
  Optional inference Metadata Associated with the action request. Only present if origin is INFERRED.
  """
  inferenceMetadata: InferenceMetadata

  """
  The time by which the action is required
  """
  dueDate: Long

  """
  The time and actor which initiated the action request
  """
  created: ResolvedAuditStamp!

  """
  The time and actor which last modified the action request
  """
  lastModified: ResolvedAuditStamp

  """
  Resource level properties for the action request
  """
  resourceProperties: ActionRequestResourceProperties

  """
  Sub-resource level properties for the action request
  """
  subResourceProperties: ActionRequestSubResourceProperties
}

input InferenceMetadataInput {
  """
  The version of the inference system used
  """
  version: Int!

  """
  Optional - The last time the inference was made in milliseconds since epoch. If not provided, the current time will be used.
  """
  lastInferredAt: Long

  """
  Optional - The confidence level of the inference
      0: Low Confidence
      1: Medium Confidence
      2: High Confidence
  """
  confidenceLevel: Int
}

type InferenceMetadata {
  """
  The version of the inference system used
  """
  version: Int!

  """
  The last time the inference was made in milliseconds since epoch
  """
  lastInferredAt: Long!

  """
  The confidence level of the inference
     0: Low Confidence
     1: Medium Confidence
     2: High Confidence
  """
  confidenceLevel: Int
}

enum ActionRequestOrigin {
  """
  The proposal was manually raised via UI or API by a user of DataHub.
  This is the inferred default value if not set.
  """
  MANUAL

  """
  The proposal was inferred by DataHub's inference system.
  """
  INFERRED
}

type ActionRequestParams {
  """
  Glossary Term specific arguments
  """
  glossaryTermProposal: GlossaryTermProposalParams

  """
  Tag-proposal specific arguments
  """
  tagProposal: TagProposalParams

  """
  Domain specific arguments
  """
  domainProposal: DomainProposalParams

  """
  Owner specific arguments
  """
  ownerProposal: OwnerProposalParams

  """
  Structured Property specific arguments
  """
  structuredPropertyProposal: StructuredPropertyProposalParams

  """
  Creating a Glossary Term specific arguments
  """
  createGlossaryTermProposal: CreateGlossaryTermProposalParams

  """
  Creating a Glossary Node specific arguments
  """
  createGlossaryNodeProposal: CreateGlossaryNodeProposalParams

  """
  Updating a Description specific arguments
  """
  updateDescriptionProposal: UpdateDescriptionProposalParams

  """
  Data contract proposal
  """
  dataContractProposal: DataContractProposalParams
}

enum AssigneeType {
  USER
  GROUP
  ROLE
}

