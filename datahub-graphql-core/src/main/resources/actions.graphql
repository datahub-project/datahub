"""
Represents a reusable workflow that can be triggered by users to initiate an action request.

Workflows consist of inputs (fields), entry points (how users can discover them),
and metadata like name, category, and audit history.
"""
type ActionWorkflow implements Entity {
  """
  The unique identifier for the workflow.
  """
  urn: String!

  """
  The standard entity type (ACTION_WORKFLOW)
  """
  type: EntityType!

  """
  The display name of the workflow.
  """
  name: String!

  """
  The category of workflow
  """
  category: ActionWorkflowCategory

  """
  A custom category string, used if the `category` is CUSTOM.
  Useful for grouping related workflows outside of the standard set.
  """
  customCategory: String

  """
  A description of what this workflow does.
  """
  description: String

  """
  The action or event that triggers the workflow.
  """
  trigger: ActionWorkflowTrigger!

  """
  Definition of the sequence of steps that need to be completed to review the workflow request.
  """
  steps: [ActionWorkflowStep!]!

  """
  Metadata about who created this workflow and when.
  """
  created: ResolvedAuditStamp!

  """
  Metadata about who last modified this workflow and when.
  """
