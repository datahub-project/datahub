extend type Mutation {
  """
  Accepts a set of proposals. Returns true if all proposals have been successfully accepted,
  false otherwise.
  """
  acceptProposals(urns: [String!]!, note: String): Boolean

  """
  Rejects a set of proposals. Returns true if all proposals have been successfully rejected,
  false otherwise.
  """
  rejectProposals(urns: [String!]!, note: String): Boolean

  """
  Adds a tag proposal for a given entity or subresource. Returns the URN of the proposal request.
  """
  proposeTags(input: ProposeTagsInput!): String!

  """
  Adds a glossary term proposal for a given entity or subresource. Returns the URN of the proposal request.
  """
  proposeTerms(input: ProposeTermsInput!): String!

  """
  Do not use. Not yet supported! Adds a domain proposal for a given entity. Returns the URN of the proposal request.
  """
  proposeDomain(input: ProposeDomainInput!): String!

  """
  Do not use. Not yet supported! Adds an owner proposal for a given entity. Returns the URN of the proposal request.
  """
  proposeOwners(input: ProposeOwnersInput!): String!

  """
  Adds a structured property proposal for a given entity. Returns the URN of the proposal request.
  """
  proposeStructuredProperties(input: ProposeStructuredPropertiesInput!): String!

  """
  Adds a proposal to create a new Glossary Term
  """
  proposeCreateGlossaryTerm(input: CreateGlossaryEntityInput!): Boolean

  """
  Adds a proposal to create a new Glossary Node
  """
  proposeCreateGlossaryNode(input: CreateGlossaryEntityInput!): Boolean

  """
  Adds a proposal to update a Description
  """
  proposeUpdateDescription(input: DescriptionUpdateInput!): Boolean

  """
  Propose creation or addition of data contract
  """
  proposeDataContract(input: ProposeDataContractInput!): Boolean

  """
  Accepts a proposal for a given entity or subresource
  """
  acceptProposal(urn: String!, note: String): Boolean
    @deprecated(reason: "Use acceptProposals instead")

  """
  Rejects a proposal for a given entity or subresource
  """
  rejectProposal(urn: String!, note: String): Boolean
    @deprecated(reason: "Use rejectProposals instead")

  """
  Adds a term proposal for a given entity or subresource
  """
  proposeTerm(input: ProposeTermAssociationInput!): Boolean
    @deprecated(reason: "Use proposeTerms instead")

  """
  Adds a term proposal for a given entity or subresource
  """
  proposeTag(input: TagAssociationInput!): Boolean
    @deprecated(reason: "Use proposeTags instead")
}

