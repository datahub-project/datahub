enum DataContractProposalOperationType {
  """
  Add the contracts to existing contract
  """
  ADD
  """
  Overwrite the contracts to existing contract
  """
  OVERWRITE
}

type DataContractProposalParams {
  """
  The operation type to use when applying the proposal
  """
  operationType: DataContractProposalOperationType

  """
  The Freshness (SLA) portion of the contract. If not provided, this will be set to none.
  For Dataset Contracts, it is expected that there will not be more than 1 FRESHNESS contract. If there are, only the first will be displayed.
  """
  freshness: [FreshnessContract!]

  """
  The schema / structural portion of the contract. If not provided, this will be set to none.
  For Dataset Contracts, it is expected that there will not be more than 1 Schema contract. If there are, only the first will be displayed.
  """
  schema: [SchemaContract!]

  """
  The data quality portion of the contract. If not provided, this will be set to none.
  """
  dataQuality: [DataQualityContract!]
}

"""
Resource level properties for an action request.
"""
type ActionRequestResourceProperties {
  """
  Glossary terms that are applied to the resource
  """
  glossaryTerms: GlossaryTerms

  """
  Tags that are applied to the resource
  """
  tags: GlobalTags
}

"""
Sub-resource level properties for an action request.
"""
type ActionRequestSubResourceProperties {
  """
  Glossary terms that are applied to the sub-resource.
  """
  glossaryTerms: GlossaryTerms

  """
  Tags that are applied to the sub-resource.
  """
  tags: GlobalTags
}

"""
Input required to propose the addition of assertions to a data contract.
If the proposal is approved, and a contract does not exist, one will be created.
"""
input ProposeDataContractInput {
  """
  The urn of the entity (e.g. dataset) associated with the contract.
  Dataset is the only entity currently supported.
  """
  entityUrn: String!

  """
  The proposal type - either add contracts to the existing contract, or overwrite with a new contract.
  """
  operationType: DataContractProposalOperationType!

  """
  The Freshness / SLA portion of the contract. If not provided, this will be set to none.
  For Dataset Contracts, it is expected that there will not be more than 1 Freshness contract. If there are, only the first will be displayed.
  """
  freshness: [FreshnessContractInput!]

  """
  The schema / structural portion of the contract. If not provided, this will be set to none.
  For Dataset Contracts, it is expected that there will not be more than 1 Schema contract. If there are, only the first will be displayed.
  """
  schema: [SchemaContractInput!]

  """
  The data quality portion of the contract. If not provided, this will be set to none.
  """
  dataQuality: [DataQualityContractInput!]

  """
  Optional description providing context for the proposal
  Also called proposalNote for some other proposal types
  """
  description: String
}

"""
Input provided when proposing an update to the association between a Metadata Entity and a Glossary Term
"""
input ProposeTermAssociationInput {
  """
  The primary key of the Glossary Term to add or remove
  """
  termUrn: String!

  """
  The target Metadata Entity to add or remove the Glossary Term from
  """
  resourceUrn: String!

  """
  An optional type of a sub resource to attach the Glossary Term to
  """
  subResourceType: SubResourceType

  """
  An optional sub resource identifier to attach the Glossary Term to
  """
  subResource: String

  """
  Optional - the origin of the proposal. If not provided, this will be set to manual.
  """
  origin: ActionRequestOrigin

  """
  Optional - the origin of the proposal. If not provided, this will be set to manual.
  """
  inferenceMetadata: InferenceMetadataInput
}

