"""
A metadata entity representing a DataHub Test
"""
type Test implements Entity {
  """
  The primary key of the Test itself
  """
  urn: String!

  """
  The standard Entity Type
  """
  type: EntityType!

  """
  The name of the Test
  """
  name: String!

  """
  The category of the Test (user defined)
  """
  category: String!

  """
  Description of the test
  """
  description: String

  """
  Definition for the test
  """
  definition: TestDefinition!

  """
  Summary of the results for the test
  """
  results: TestResultsSummary!

  """
  Unused for tests
  """
  relationships(input: RelationshipsInput!): EntityRelationshipsResult

  """
  Batch run events for this test, e.g. when the batch implementation of the test last ran.
  """
  batchRunEvents(
    startTimeMillis: Long
    endTimeMillis: Long
    limit: Int
  ): BatchTestRunEventsResult
}

"""
Definition of the test
"""
type TestDefinition {
  """
  JSON-based def for the test
  Deprecated! JSON representation is no longer supported.
  """
  json: String
}

"""
The result type of a test that has been run
"""
enum TestResultType {
  """
  The test succeeded.
  """
  SUCCESS

  """
  The test failed.
  """
  FAILURE
}

"""
A set of test results
"""
type TestResults {
  """
  The tests passing
  """
  passing: [TestResult!]!

  """
  The tests failing
  """
  failing: [TestResult!]!
}

"""
The result of running a test
"""
type TestResult {
  """
  The test itself, or null if the test has been deleted
  """
  test: Test

  """
  The final result, e.g. either SUCCESS or FAILURE.
  """
  type: TestResultType!
}

extend type Dataset {
  """
  The results of evaluating tests
  """
  testResults(includeSoftDeleted: Boolean): TestResults
}

extend type Query {
  """
  Fetch a Test by primary key (urn)
  """
  test(urn: String!): Test

  """
  List all DataHub Tests
  """
  listTests(input: ListTestsInput!): ListTestsResult

  """
  Validate test definition
  """
  validateTest(input: TestDefinitionInput!): TestValidationResult
}

"""
Input required when listing DataHub Tests
"""
input ListTestsInput {
  """
  The starting offset of the result set returned
  """
  start: Int

  """
  The maximum number of Domains to be returned in the result set
  """
  count: Int

  """
  Optional query string to match on
  """
  query: String

  """
  An optional list of disjunctive criterion for the filter. (or operation to combine filters)
  """
  orFilters: [AndFilterInput!]
}

"""
The result obtained when listing DataHub Tests
"""
type ListTestsResult {
  """
  The starting offset of the result set returned
  """
  start: Int!

  """
  The number of Tests in the returned result set
  """
  count: Int!

  """
  The total number of Tests in the result set
  """
  total: Int!

  """
  The Tests themselves
  """
  tests: [Test!]!
}

input CreateTestInput {
  """
  Advanced: a custom id for the test.
  """
  id: String

  """
  The name of the Test
  """
  name: String!

  """
  The category of the Test (user defined)
  """
  category: String!

  """
  Description of the test
  """
  description: String

  """
  The test definition
  """
  definition: TestDefinitionInput!
}

input UpdateTestInput {
  """
  The name of the Test
  """
  name: String!

  """
  The category of the Test (user defined)
  """
  category: String!

  """
  Description of the test
  """
  description: String

  """
  The test definition
  """
  definition: TestDefinitionInput!
}

input TestDefinitionInput {
  """
  The string representation of the Test
  Deprecated! JSON representation is no longer supported.
  """
  json: String
}

type TestValidationResult {
  """
  Whether or not the test definition is valid
  """
  isValid: Boolean

  """
  Additional messages to indicate the reasons why definition is invalid
  """
  messages: [String!]
}

enum RunTestDefinitionStatus {
  """
  The test passed
  """
  PASS

  """
  The test failed
  """
  FAIL

  """
  The test was not run (did not match)
  """
  NONE
}

type RunTestDefinitionResult {
  """
  Whether or not the test passed
  """
  status: RunTestDefinitionStatus!
}

enum TestEvaluationMode {
  """
  Evaluate the test only. Do not save results or apply actions.
  """
  EVALUATE_ONLY

  """
  Default mode. Evaluate, store results, and apply actions.
  """
  DEFAULT
}

extend type Mutation {
  """
  Create a new test
  """
  createTest(input: CreateTestInput!): String

  """
  Update an existing test
  """
  updateTest(urn: String!, input: UpdateTestInput!): String

  """
  Delete an existing test - note that this will NOT delete dangling pointers until the next execution of the test.
  """
  deleteTest(urn: String!): Boolean

  """
  Execute a test definition against a specific urn
  """
  runTestDefinition(
    urn: String!
    test: TestDefinitionInput!
    mode: TestEvaluationMode
  ): RunTestDefinitionResult!

  """
  Run tests for the given entity urn
  """
  runTests(urn: String!): Boolean
}

"""
A summary of the latest passing and failing entities for a given test.
"""
type TestResultsSummary {
  """
  The number of assets passing the test
  """
  passingCount: Long!

  """
  The number of assets failing the test
  """
  failingCount: Long!

  """
  The definition of the test that was used to generate these results
  """
  testDefinitionMd5: String

  """
  The timestamp of the last batch run of the test.
  Note: This is a lower bound on how fresh the results are.
  """
  lastRunTimestampMillis: Long
}

"""
Result returned when fetching batch run events for a Metadata Test
"""
type BatchTestRunEventsResult {
  """
  The run events themselves
  """
  batchRunEvents: [BatchTestRunEvent!]!
}

"""
An event representing the current status of evaluating a batch metadata test (run offline)
"""
type BatchTestRunEvent implements TimeSeriesAspect {
  """
  The event timestamp field as epoch at UTC in milli seconds.
  """
  timestampMillis: Long!

  """
  The status of the Test run as per this timeseries event.
  """
  status: BatchTestRunStatus!

  """
  Results of test, present if the status is COMPLETE
  """
  result: BatchTestRunResult
}

"""
The status of the batch test run
"""
enum BatchTestRunStatus {
  """
  The Test Run has completed
  """
  COMPLETE
}

"""
The result of running a batch metadata test
"""
type BatchTestRunResult {
  """
  Number of assets that were passing the test.
  """
  passingCount: Long!

  """
  Number of assets that were failing the test.
  """
  failingCount: Long!
}
