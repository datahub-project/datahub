"""
Enum representing the type of exclusion window.
"""
enum AssertionExclusionWindowType {
  """
  One-off time range to exclude.
  """
  FIXED_RANGE

  """
  Recurring weekly time range to exclude.
  """
  WEEKLY

  """
  Specific holiday to exclude.
  """
  HOLIDAY
}

"""
Represents a recurring time window that repeats weekly.
"""
type WeeklyWindow {
  """
   Days of the week included in the exclusion window.
  If not specified, all days are included.
  """
  daysOfWeek: [DayOfWeek!]

  """
   Start time of the exclusion window on each specified day.
  Format: "HH:MM" in 24-hour format (e.g., "09:00" for 9 AM).
  If not specified, defaults to the start of the day ("00:00").
  """
  startTime: String

  """
   End time of the exclusion window on each specified day.
  Format: "HH:MM" in 24-hour format (e.g., "17:00" for 5 PM).
  If not specified, defaults to the end of the day ("23:59").
  """
  endTime: String

  """
   Time zone used to interpret start and end times.
  Uses standard time zone identifiers (e.g., "America/Los_Angeles", "UTC").
  Defaults to UTC if not specified.
  """
  timezone: String
}

input WeeklyWindowInput {
  """
   Days of the week included in the exclusion window.
  If not specified, all days are included.
  """
  daysOfWeek: [DayOfWeek!]

