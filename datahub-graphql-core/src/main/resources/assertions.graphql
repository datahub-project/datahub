extend type Query {
  """
  Fetch a list of assertions across the platform that match requested criteria.
  """
  listAssertions(input: ListAssertionsInput!): ListAssertionsResult
}

extend type Mutation {
  """
  Create an existing Dataset Assertion
  """
  createDatasetAssertion(input: CreateDatasetAssertionInput!): Assertion!

  """
  Create an new Freshness Assertion
  """
  createFreshnessAssertion(input: CreateFreshnessAssertionInput!): Assertion!

  """
  Create an new Volume Assertion
  """
  createVolumeAssertion(input: CreateVolumeAssertionInput!): Assertion!

  """
  Create a new Sql Assertion
  """
  createSqlAssertion(input: CreateSqlAssertionInput!): Assertion!

  """
  Create a new Field Assertion
  """
  createFieldAssertion(input: CreateFieldAssertionInput!): Assertion!

  """
  Upsert a Custom Assertion
  """
  upsertCustomAssertion(
    """
    Urn of custom assertion. If not provided, one will be generated.
    """
    urn: String

    """
    Input for upserting a custom assertion.
    """
    input: UpsertCustomAssertionInput!
  ): Assertion!

  """
  Report result for an assertion
  """
  reportAssertionResult(
    """
    Urn of custom assertion.
    """
    urn: String!

    """
    Input for reporting result of the assertion
    """
    result: AssertionResultInput!
  ): Boolean!

  """
  Tests a given assertion and returns the result.
  """
  testAssertion(input: TestAssertionInput!): AssertionResult!

  """
  Runs a native assertion and returns the result.
  If the provided URN does not exist, or is not a native assertion, an error will be returned.

  The timeout for this API is 30 seconds. If you have long-running assertions,
  please use the async option, and poll for the result by fetching the assertion results by URN.
  If async is True (false by default), then the result will be null.
  """
  runAssertion(
    """
    The URN of the assertion to run.
    """
    urn: String!
    """
    Whether to save the result of the assertion run for viewing through the UI.
    """
    saveResult: Boolean
    """
    An optional set of custom runtime parameters to inject into any SQL fragment in the assertion.
    """
    parameters: [StringMapEntryInput!]
    """
    Whether to run assertion asynchronously. False by default. If true, the response will be immediate, but the results will be available later accessible by fetching the assertion run events directly.
    """
    async: Boolean
  ): AssertionResult

  """
  Runs a native assertion and returns the result.
  If the provided URN does not exist, or is not a native assertion, an error will be returned.

  The maximum number of assertions allowed to run at once is 20.
  If more than 20 URNs are provided, an error will be returned.

  The timeout for this API is 30 seconds. If you have long-running assertions,
  please use the async option, and poll for the result by fetching the assertion results by URN.
  If async is True (false by default), then the result will be null.
  """
  runAssertions(
    """
    The urns of the assertion to run.
    """
    urns: [String!]!
    """
    Whether to save the results of the assertion run for viewing through the UI.
    """
    saveResults: Boolean
    """
    An optional set of custom runtime parameters to inject into any SQL fragment in the assertion.
    """
    parameters: [StringMapEntryInput!]
    """
    Whether to run assertions asynchronously. False by default. If true, the response will be immediate, but the results will be available later accessible by fetching the assertion run events directly.
    """
    async: Boolean
  ): RunAssertionsResult

  """
  Runs the assertions associated with a specific asset. Any NON-NATIVE assertions associated with the asset
  will simply be omitted in the result.

  The maximum number of assertions allowed to run at once is 20.
  If more than 20 URNs are provided, an error will be returned.

  The timeout for this API is 30 seconds. If you have long-running assertions,
  please use the async option, and poll for the result by fetching the assertion results by URN.
  If async is True (false by default), then the result will be null.
  """
  runAssertionsForAsset(
    """
    The urn of the asset whose assertions should be run
    """
    urn: String!
    """
    An optional set of tags URNs used to filter the assertions that are run
    """
    tagUrns: [String!]
    """
    An optional set of custom runtime parameters to inject into any SQL fragment in any assertions for the asset
    """
    parameters: [StringMapEntryInput!]
    """
    Whether to run assertions asynchronously. False by default. If true, the response will be immediate, but the results will be available later accessible by fetching the assertion run events directly.
    """
    async: Boolean
  ): RunAssertionsResult

  """
  Update an existing Dataset Assertion
  """
  updateDatasetAssertion(
    urn: String!
    input: UpdateDatasetAssertionInput!
  ): Assertion!

  """
  Update basic metadata for a given assertion, including description and actions.
  """
  updateAssertionMetadata(
    urn: String!
    input: UpdateAssertionMetadataInput!
  ): Assertion!

  """
  Create or Update a Freshness Assertion
  """
  upsertDatasetFreshnessAssertionMonitor(
    """
    The urn of assertion
    Provide only if updating an existing Freshness Assertion
    """
    assertionUrn: String

    """
    Input for creating or updating a Freshness assertion.
    """
    input: UpsertDatasetFreshnessAssertionMonitorInput!
  ): Assertion!

  """
  Create or Update a Freshness Assertion
  """
  upsertDatasetVolumeAssertionMonitor(
    """
    The urn of assertion
    Provide only if updating an existing Volume Assertion
    """
    assertionUrn: String

    """
    Input for creating or updating a Volume assertion.
    """
    input: UpsertDatasetVolumeAssertionMonitorInput!
  ): Assertion!

  """
  Create or Update a new SQL Assertion
  """
  upsertDatasetSqlAssertionMonitor(
    """
    The urn of assertion
    Provide only if updating an existing SQL Assertion
    """
    assertionUrn: String

    """
    Input for creating or updating an SQL assertion.
    """
    input: UpsertDatasetSqlAssertionMonitorInput!
  ): Assertion!

  """
  Create or Update a new Field Assertion
  """
  upsertDatasetFieldAssertionMonitor(
    """
    The urn of assertion
    Provide only if updating an existing Field Assertion
    """
    assertionUrn: String

    """
    Input for creating or updating an Field assertion.
    """
    input: UpsertDatasetFieldAssertionMonitorInput!
  ): Assertion!

  """
  Create or Update a new Schema Assertion
  """
  upsertDatasetSchemaAssertionMonitor(
    """
    The urn of assertion
    Provide only if updating an existing Schema Assertion
    """
    assertionUrn: String

    """
    Input for creating or updating an Schema assertion.
    """
    input: UpsertDatasetSchemaAssertionMonitorInput!
  ): Assertion!
}

