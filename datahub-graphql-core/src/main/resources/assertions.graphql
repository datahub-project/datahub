"""
Input to upsert a Freshness Assertion
"""
input UpsertDatasetFreshnessAssertionMonitorInput {
  """
  The urn of the dataset that the assertion is related to
  Required if creating new Freshness Assertion
  """
  entityUrn: String

  """
  Description, which is used in displaying the assertion
  """
  description: String

  """
  If enabled, this will be created as a smart assertion that is actively inferred by an AI model.
  You can pass in any value for the 'schedule' parameter, but we recommend setting it as at least daily.
  """
  inferWithAI: Boolean

  """
  Settings for the AI assertion monitor.
  """
  inferenceSettings: AssertionAdjustmentSettingsInput

  """
  The Freshness assertion's schedule
  Set to null if inferWithAI is enabled, else required.
  """
  schedule: FreshnessAssertionScheduleInput

  """
  A cron schedule dictating when the assertion is evaluated.
  Should match the cron in the 'schedule' field above.
  For inferWithAI, this is still required even if the schedule is not set.
  """
  evaluationSchedule: CronScheduleInput!

  """
  Optional filter clause
  If not provided, there is no filter, and the full table is under consideration.
  """
  filter: DatasetFilterInput

  """
  Optional actions to apply on success or failure of the assertion
  If not provided for update operation, no change is made to existing actions.
  """
  actions: AssertionActionsInput

  """
  The parameters required to evaluate a dataset freshness assertion.
  """
  evaluationParameters: DatasetFreshnessAssertionParametersInput!

  """
  Information about the current status of a Monitor.
  """
  mode: MonitorMode!

  """
  Advanced: The executor pool id of the remote monitor service, if any.
  """
  executorId: String
}

"""
Input to upsert a Volume Assertion
"""
input UpsertDatasetVolumeAssertionMonitorInput {
  """
  The urn of the dataset that the assertion is related to
  Required if creating new Volume Assertion
  """
  entityUrn: String

  """
  Description, which is used in displaying the assertion
  """
  description: String

  """
  The type of the volume assertion being monitored.
  """
  type: VolumeAssertionType!

  """
  If enabled, this will be created as a smart assertion that is actively inferred by an AI model.
  The row count predictions will be inferred from the dataset metrics.
  To start, you can pass in any value for the rowCountTotal or rowCountChange.
  """
  inferWithAI: Boolean

  """
  Settings for the AI assertion monitor.
  """
  inferenceSettings: AssertionAdjustmentSettingsInput

  """
  Parameters for a FAILURE Assertion Result if the asset's row count does not meet
  specific requirements. Required if type is 'ROW_COUNT_TOTAL'
  """
  rowCountTotal: RowCountTotalInput

  """
  Parameters for a FAILURE Assertion Result if the asset's row count delta does not meet
  specific requirements. Required if type is 'ROW_COUNT_CHANGE'
  """
  rowCountChange: RowCountChangeInput

  """
  Parameters for a FAILURE Assertion Result if the asset's latest incrementing segment row count total
  does not meet specific requirements. Required if type is 'INCREMENTING_SEGMENT_ROW_COUNT_TOTAL'
  """
  incrementingSegmentRowCountTotal: IncrementingSegmentRowCountTotalInput

  """
  Parameters for a FAILURE Assertion Result if the asset's incrementing segment row count delta
  does not meet specific requirements. Required if type is 'INCREMENTING_SEGMENT_ROW_COUNT_CHANGE'
  """
  incrementingSegmentRowCountChange: IncrementingSegmentRowCountChangeInput

  """
  A definition of the specific filters that should be applied, when performing monitoring.
  If not provided, there is no filter, and the full table is under consideration.
  """
  filter: DatasetFilterInput

  """
  Optional actions to apply on success or failure of the assertion
  If not provided for update operation, no change is made to existing actions.
  """
  actions: AssertionActionsInput

  """
  A cron schedule dictating when the assertion is evaluated.
  """
  evaluationSchedule: CronScheduleInput!

  """
  The parameters required to evaluate a dataset volume assertion.
  """
  evaluationParameters: DatasetVolumeAssertionParametersInput!

  """
  Information about the current status of a Monitor.
  """
  mode: MonitorMode!

  """
  Advanced: The executor pool id of the remote monitor service, if any.
  """
  executorId: String
}

