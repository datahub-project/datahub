extend type Query {
  """
  List signal requests available for a list of urns
  """
  listSignalRequests(input: ListSignalRequestsInput!): ListSignalRequestsResult

  """
  List configurations related to the remote executor
  """
  listExecutorConfigs(
    input: ListExecutorConfigsInput
  ): ListExecutorConfigsResult

  cloudLoggingConfigsResolver: CloudLoggingConfigsResolverResult

  """
  Get a pre-signed URL for downloading execution request artifacts
  """
  getExecutionRequestDownloadUrl(
    input: GetExecutionRequestDownloadUrlInput!
  ): GetExecutionRequestDownloadUrlResult!
}

extend type Mutation {
  """
  Store an upload location for an execution request
  """
  storeExecutionRequestUploadLocation(
    input: StoreExecutionRequestUploadLocationInput!
  ): StoreExecutionRequestUploadLocationResult!
}

"""
Input arguments for listing Signal Requests
"""
input ListSignalRequestsInput {
  """
  Optional Facet filters to apply to the result set
  """
  urns: [String!]
}

"""
Results returned when listing Signal Requests
"""
type ListSignalRequestsResult {
  """
  The total number of results in the result set
  """
  total: Int!

  """
  The Signal Requests themselves
  """
  signalRequests: [SignalRequest!]
}

"""
A Signal Request
"""
type SignalRequest {
  """
  The execId of the execution request this signal is associated with
  """
  execId: String!

  """
  The executor pool id associated with this execution request
  """
  executorId: String!

  """
  The signal sent
  """
  signal: String!
}

"""
ListExecutorConfigs optionally accepts a list of executor ids to return
"""
input ListExecutorConfigsInput {
  executorIds: [String!]
}

"""
Results returned when listing SQS Credentials
"""
type ListExecutorConfigsResult {
  """
  The total number of results in the result set
  """
  total: Int!

  """
  The configs for each executor
  """
  executorConfigs: [ExecutorConfigs!]!
}

"""
Results for ingestion cloud logging config
"""
type CloudLoggingConfigsResolverResult {
  """
  S3 bucket name
  """
  s3_bucket: String!

  """
  S3 prefix
  """
  s3_prefix: String!

  """
  Whether remote executor logging is enabled or not
  """
  remote_executor_logging_enabled: Boolean!
}

"""
Executor configurations
"""
type ExecutorConfigs {
  """
  The executor pool id that this queue is configured for
  """
  executorId: String!

  """
  The AWS Region
  """
  region: String!

  """
  The queue URL
  """
  queueUrl: String!

  """
  The AWS Access Key
  """
  accessKeyId: String!

  """
  The AWS Secret Key
  """
  secretKeyId: String!

  """
  The AWS Secret Key
  """
  sessionToken: String!

  """
  The expiration for this set of credentials
  """
  expiration: String!
}

"""
Input arguments for storing execution request upload location
"""
input StoreExecutionRequestUploadLocationInput {
  """
  The URN of the execution request
  """
  executionRequestUrn: String!

  """
  The upload location where artifacts have been uploaded
  """
  location: String!
}

"""
Result of storing execution request upload location
"""
type StoreExecutionRequestUploadLocationResult {
  """
  Whether the operation was successful
  """
  success: Boolean!
}

"""
Input arguments for getting execution request download URL
"""
input GetExecutionRequestDownloadUrlInput {
  """
  The URN of the execution request
  """
  executionRequestUrn: String!

  """
  Optional expiration time in seconds (default: 3600 seconds / 1 hour)
  """
  expirationSeconds: Int
}

"""
Result of getting execution request download URL
"""
type GetExecutionRequestDownloadUrlResult {
  """
  The pre-signed URL for downloading the artifacts
  """
  downloadUrl: String!

  """
  The expiration time of the URL in seconds from now
  """
  expiresIn: Int!
}
