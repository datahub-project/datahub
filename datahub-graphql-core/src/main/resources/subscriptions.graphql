extend type Query {
    """
    Get a subscription for an entity pair.
    """
    getSubscription(input: GetSubscriptionInput!): DataHubSubscription

    """
    List an actor's subscriptions.
    """
    listSubscriptions(input: ListSubscriptionsInput!): ListSubscriptionsResult!

    """
    Get summary statistics of all subscriptions tied to an entity.
    """
    getEntitySubscriptionSummary(input: GetEntitySubscriptionSummaryInput!): EntitySubscriptionSummary!
}

extend type Mutation {
    """
    Create a subscription.
    """
    createSubscription(input: CreateSubscriptionInput!): DataHubSubscription!

    """
    Update a subscription.
    """
    updateSubscription(input: UpdateSubscriptionInput!): DataHubSubscription!

    """
    Delete a subscription.
    """
    deleteSubscription(input: DeleteSubscriptionInput!): Boolean!
}

input GetSubscriptionInput {
    """
    The urn of the entity that the subscription is for.
    """
    entityUrn: String!

    """
    (Optional) The group's Urn.
    """
    groupUrn: String
}

input ListSubscriptionsInput {
    """
    (Optional) The group's Urn.
    """
    groupUrn: String

    """
    (Optional) The starting offset of the result set returned. Defaults to 0.
    """
    start: Int

    """
    (Optional) The maximum number of results to be returned. Defaults to 10.
    """
    count: Int
}

input GetEntitySubscriptionSummaryInput {
    """
    The urn of the entity that the subscription is for.
    """
    entityUrn: String!

    """
    The maximum number of subscriptions to return. This will be computed separately for users and groups.
    Defaults to 100.
    """
    numMaxSubscriptions: Int

    """
    The number of top groups to display in the summary. Defaults to 5.
    """
    numTopGroups: Int
}

type ListSubscriptionsResult {
    """
    The list of subscriptions.
    """
    subscriptions: [DataHubSubscription!]!

    """
    The total number of subscriptions given the input
    """
    total: Int!
}

input CreateSubscriptionInput {
    """
    The urn of the entity that the subscription is for.
    """
    entityUrn: String!

    """
    The subscription's types
    """
    subscriptionTypes: [SubscriptionType!]!

    """
    Change types that trigger a notification for the subscription.
    """
    entityChangeTypes: [EntityChangeType!]!

    """
    Notification configuration.
    """
    notificationConfig: SubscriptionNotificationConfigInput!

    """
    (Optional) Group urn. Only used for group subscriptions.
    """
    groupUrn: String
}

input UpdateSubscriptionInput {
    """
    The subscription urn.
    """
    subscriptionUrn: String!

    """
    (Optional) The subscription's types. Will replace existing types.
    """
    subscriptionTypes: [SubscriptionType]

    """
    (Optional) Change types that trigger a notification for the subscription. Will replace existing change types.
    """
    entityChangeTypes: [EntityChangeType]

    """
    (Optional) Notification configuration. Will replace existing notification configuration.
    """
    notificationConfig: SubscriptionNotificationConfigInput
}

input SubscriptionNotificationConfigInput {
    """
    (Optional) The subscription's Notification Settings.
    """
    notificationSettings: NotificationSettingsInput
}

input DeleteSubscriptionInput {
    """
    The subscription urn.
    """
    subscriptionUrn: String!
}


type DataHubSubscription {
    """
    The urn of the actor that owns the subscription.
    """
    actorUrn: String!

    """
    The subscription's Urn.
    """
    subscriptionUrn: String!

    """
    The entity that the subscription is for.
    """
    entity: Entity!

    """
    The subscription's types
    """
    subscriptionTypes: [SubscriptionType!]!

    """
    Change types that trigger a notification for the subscription.
    """
    entityChangeTypes: [EntityChangeType!]!

    """
    Created on Audit Stamp.
    """
    createdOn: AuditStamp!

    """
    Updated on Audit Stamp.
    """
    updatedOn: AuditStamp!

    """
    Notification configuration.
    """
    notificationConfig: SubscriptionNotificationConfig
}

enum SubscriptionType {
    """
    Triggered via direct changes on an entity.
    """
    ENTITY_CHANGE

    """
    Triggered via changes on an entity's upstream dependencies.
    """
    UPSTREAM_ENTITY_CHANGE
}

enum EntityChangeType {
    """.
    Schema changes
    """
    OPERATION_COLUMN_ADDED
    OPERATION_COLUMN_REMOVED
    OPERATION_COLUMN_MODIFIED

    """
    Operational metadata changes.
    """
    OPERATION_ROWS_INSERTED
    OPERATION_ROWS_UPDATED
    OPERATION_ROWS_REMOVED

    """
    Assertion status changes.
    """
    ASSERTION_PASSED
    ASSERTION_FAILED

    """
    Incident status changes.
    """
    INCIDENT_RAISED
    INCIDENT_RESOLVED

    """
    Test status changes.
    """
    TEST_PASSED
    TEST_FAILED

    """
    Deprecation status changes.
    """
    DEPRECATED
    UNDEPRECATED

    """
    Ingestion status changes.
    """
    INGESTION_SUCCEEDED
    INGESTION_FAILED

    """
    Documentation changes. Added, removed, or proposed.
    """
    DOCUMENTATION_CHANGE

    """
    Ownership changes. Added or removed.
    """
    OWNER_ADDED
    OWNER_REMOVED

    """
    Glossary term changes. Added, removed, or proposed.
    """
    GLOSSARY_TERM_ADDED
    GLOSSARY_TERM_REMOVED
    GLOSSARY_TERM_PROPOSED

    """
    Tag changes. Added, removed, or proposed.
    """
    TAG_ADDED
    TAG_REMOVED
    TAG_PROPOSED
}

type SubscriptionNotificationConfig {
    """
    (Optional) The subscription's Notification Settings.
    """
    notificationSettings: NotificationSettings
}

type EntitySubscriptionSummary {
    """
    Whether the user is subscribed to the entity.
    """
    isUserSubscribed: Boolean!

    """
    Whether the user belongs to a group that is subscribed to the entity.
    """
    isUserSubscribedViaGroup: Boolean!

    """
    The number of user subscriptions for the entity.
    """
    numUserSubscriptions: Int!

    """
    The number of group subscriptions for the entity.
    """
    numGroupSubscriptions: Int!

    """
    The top groups that have subscriptions for the entity.
    """
    topGroups: [CorpGroup!]!
}
