plugins {
    id 'base'
}

apply from: "../../gradle/coverage/python-coverage.gradle"

ext {
  python_executable = 'python3'
  venv_name = 'venv'
}

task checkPythonVersion(type: Exec) {
  commandLine python_executable, '-c', 'import sys; assert sys.version_info >= (3, 10)'
}

task environmentSetup(type: Exec, dependsOn: checkPythonVersion) {
  def sentinel_file = "${venv_name}/.venv_environment_sentinel"
  inputs.file file('setup.py')
  outputs.file(sentinel_file)
  commandLine 'bash', '-c',
      "${python_executable} -m venv ${venv_name} && " +
      "${venv_name}/bin/python -m pip install --upgrade uv && " +
      // Install minimal dependencies required by codegen script
      "source ${venv_name}/bin/activate && ${venv_name}/bin/uv pip install 'avro>=1.11.3,<1.13' 'click>=7.1.2,!=8.2.0' 'pydantic>=2' PyYAML avro-gen3==0.7.16 && " +
      "touch ${sentinel_file}"
}

task codegen(type: Exec, dependsOn: [environmentSetup, ':metadata-events:mxe-schemas:build']) {
  inputs.files(
    project.fileTree(dir: "../../metadata-events/mxe-schemas/src/", include: "**/*.avsc"),
    project.fileTree(dir: "scripts"),
  )
  outputs.dir('src/acryl_datahub_cloud/metadata')
  commandLine 'bash', '-c',
    "source ${venv_name}/bin/activate && set -x && " +
    "./scripts/codegen.sh"
}

task installPackage(type: Exec, dependsOn: [environmentSetup, codegen]) {
  def sentinel_file = "${venv_name}/.build_install_package_sentinel"
  inputs.file file('setup.py')
  inputs.file file('src/acryl_datahub_cloud/_codegen_config.json')
  outputs.file(sentinel_file)
  commandLine 'bash', '-c',
    "source ${venv_name}/bin/activate && set -x && " +
    "${venv_name}/bin/uv pip install -e . && " +
    "touch ${sentinel_file}"
}

task install(dependsOn: [installPackage])

task installPackageDev(type: Exec, dependsOn: [install]) {
  def sentinel_file = "${venv_name}/.build_install_cloud_package_sentinel"
  inputs.file file('setup.py')
  inputs.file file('src/acryl_datahub_cloud/_codegen_config.json')
  outputs.file(sentinel_file)

  commandLine 'bash', '-c',
    "source ${venv_name}/bin/activate && set -x &&" +
    "${venv_name}/bin/uv pip install -e .[dev] && " +
    "touch ${sentinel_file}"
}

task installDev(dependsOn: [installPackageDev])

task lint(type: Exec, dependsOn: installDev) {
  commandLine 'bash', '-c',
    "source ${venv_name}/bin/activate && set -x && " +
    "ruff check --diff src/ tests/ && " +
    "ruff format --check --diff src/ tests/ && " +
    "mypy --config-file=mypy.ini --show-traceback --show-error-codes src/ tests/"
}
task lintFix(type: Exec, dependsOn: installDev) {
  commandLine 'bash', '-c',
    "source ${venv_name}/bin/activate && set -x && " +
    "ruff check --fix src/ tests/ && " +
    "ruff format src/ tests/ && " +
    "mypy --config-file=mypy.ini --show-traceback --show-error-codes src/ tests/"
}

task test(type: Exec, dependsOn: installDev) {
  inputs.files(project.fileTree(dir: "src/", include: "**/*.py"))
  inputs.files(project.fileTree(dir: "tests/"))
  commandLine 'bash', '-c',
    "source ${venv_name}/bin/activate && set -x && " +
    "pytest ${get_coverage_args()} -vv --continue-on-collection-errors --junit-xml=junit.quick.xml"
}

task cleanPythonCache(type: Exec) {
  commandLine 'bash', '-c',
    "find src -type f -name '*.py[co]' -delete -o -type d -name __pycache__ -delete -o -type d -empty -delete"
}
task buildWheel(type: Exec, dependsOn: [install, cleanPythonCache]) {
  commandLine 'bash', '-c',
    "source ${venv_name}/bin/activate && set -x && " +
    'uv pip install build && RELEASE_VERSION="\${RELEASE_VERSION:-0.0.0.dev1}" RELEASE_SKIP_INSTALL=1 RELEASE_SKIP_UPLOAD=1 ./scripts/release.sh'
}

build.dependsOn install
check.dependsOn lint
check.dependsOn test

clean {
  delete venv_name
  delete 'build'
  delete 'dist'
  delete '.ruff_cache'
  delete '.mypy_cache'
  delete '.pytest_cache'
}
clean.dependsOn cleanPythonCache
