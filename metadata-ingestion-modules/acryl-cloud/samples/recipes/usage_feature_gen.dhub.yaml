source:
  type: datahub-usage-reporting
  config:
    search_index:
      # host: my-elasticsearch-host
      # port: 443
      # username: myuser
      # password: mypassword
      #index_prefix: my-index-prefix
      opensearch_dialect: true # Set to false if using local Elasticsearch
      #use_ssl: true

      ## For local use only
      #opensearch_dialect: false
      #use_ssl: false
    extract_batch_size: 5000
    query_timeout: 20
    #use_exp_cdf: false # Set to false if you want to generate percentiles instead of CDF

    ranking_policy:
      freshness_factors:
        - age_in_days: [0, 7]
          value: 3.6
        - age_in_days: [7, 30]
          value: 1.3
        - age_in_days: [30, 90]
          value: 0.6
        - age_in_days: [90]
          value: 0.4
      usage_percentile_factors:
        - percentile: [0, 10]
          value: 0.5
        - percentile: [10, 20]
          value: 0.6
        - percentile: [20, 30]
          value: 0.7
        - percentile: [30, 40]
          value: 0.8
        - percentile: [40, 45]
          value: 0.91
        - percentile: [45, 50]
          value: 1.0
        - percentile: [50, 55]
          value: 1.25
        - percentile: [55, 60]
          value: 1.5
        - percentile: [60, 65]
          value: 1.75
        - percentile: [70, 75]
          value: 2.0
        - percentile: [75, 80]
          value: 2.5
        - percentile: [80, 85]
          value: 2.75
        - percentile: [85, 90]
          value: 3.0
        - percentile: [90, 92]
          value: 3.5
        - percentile: [92, 95]
          value: 4.0
        - percentile: [95, 97]
          value: 5.0
        - percentile: [97, 100]
          value: 6.0
      regexp_based_factors:
        - regexp: ".*STG.*"
          value: 0.5
        - regexp: ".*DEV.*"
          value: 0.3

sink:
  type: file
  config:
    filename: /tmp/usage_report_autotrader_percentiles.json