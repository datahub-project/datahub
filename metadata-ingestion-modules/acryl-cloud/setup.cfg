[flake8]
max-complexity = 15
ignore =
    # Ignore: line length issues, since black's formatter will take care of them.
    E501,
    # Ignore: 1 blank line required before class docstring.
    D203,
    # See https://stackoverflow.com/a/57074416.
    W503,
    # See https://github.com/psf/black/issues/315.
    E203
exclude =
    .git,
    src/acryl_datahub_cloud/metadata,
    venv,
    .tox,
    __pycache__
per-file-ignores =
    # imported but unused
    __init__.py: F401
ban-relative-imports = true

[mypy]
exclude = ^(venv|build|dist)/
ignore_missing_imports = yes
strict_optional = yes
check_untyped_defs = yes
disallow_incomplete_defs = yes
disallow_untyped_decorators = yes
warn_unused_configs = yes
disallow_untyped_defs = yes

# try to be a bit more strict in certain areas of the codebase
[mypy-datahub.*]
ignore_missing_imports = no
[mypy-tests.*]
ignore_missing_imports = no
[mypy-acryl_datahub_cloud.datahub_reporting.*]
disallow_untyped_defs = no

[isort]
profile=black
combine_as_imports = true
skip_glob=src/acryl_datahub_cloud/metadata
known_local_folder=datahub,acryl_datahub_cloud

[tool:pytest]
addopts = --cov=src --cov-report='' --cov-config setup.cfg --strict-markers -s -v

[coverage:report]
show_missing = true
exclude_lines =
    pragma: no cover
    @abstract
    if TYPE_CHECKING:
