# tox (https://tox.readthedocs.io/) is a tool for running tests
# in multiple virtualenvs. This configuration file will run the
# test suite on all supported python versions. To use it, "pip install tox"
# and then run "tox" from this directory.

[tox]
envlist = py311-airflow30, py311-airflow31, py311-airflow32, py312-airflow31

[testenv]
allowlist_externals = uv
package = wheel
install_command = uv pip install -v {opts} {packages}
use_develop = true
passenv =
    UV_CACHE_DIR
setenv =
    UV_CACHE_DIR = {env:UV_CACHE_DIR:/tmp/.uv-cache}

deps =
    # Keep in sync with the Github Actions matrix.
    -e ../../metadata-ingestion/[sql-parser]
    mypy==1.17.1
    # Airflow version pins are Python-agnostic; the constraints file is
    # Python-version-specific, so it is keyed on the full pyXXX-airflowYY factor.
    airflow30: apache-airflow~=3.0.0
    airflow31: apache-airflow~=3.1.0
    airflow32: apache-airflow~=3.2.0
    py311-airflow30: -c https://raw.githubusercontent.com/apache/airflow/constraints-3.0.6/constraints-3.11.txt
    py311-airflow31: -c https://raw.githubusercontent.com/apache/airflow/constraints-3.1.0/constraints-3.11.txt
    py311-airflow32: -c https://raw.githubusercontent.com/apache/airflow/constraints-3.2.0/constraints-3.11.txt
    py312-airflow31: -c https://raw.githubusercontent.com/apache/airflow/constraints-3.1.0/constraints-3.12.txt
    apache-airflow-providers-google
    apache-airflow-providers-amazon
    apache-airflow-providers-snowflake
    apache-airflow-providers-teradata
    apache-airflow-providers-openlineage>=2.1.0
    pytest
    pytest-cov
    -e .[integration-tests]

commands =
    python -c "import airflow; print(f'Airflow version: {airflow.__version__}')"
    python -c "import sys; sys.path.insert(0, '.'); exec('try:\n    from airflow.providers.openlineage import __version__\n    print(f\"OpenLineage provider version: {__version__}\")\nexcept (ImportError, ModuleNotFoundError):\n    print(\"OpenLineage provider not installed\")')"
    python -m pytest --cov-append {posargs}
