# CI-only override: back ephemeral storage volumes with tmpfs (RAM) instead of
# disk. Smoke-test data is small and thrown away after each run, so trading the
# disk for RAM removes fsync latency during container boot, schema creation, and
# search-index building — the slowest part of `docker compose up --wait`.
#
# NEVER include this in a real/prod quickstart: tmpfs volumes are wiped on every
# container restart. It is opt-in via CI_TMPFS=true in run-quickstart.sh.
#
# Size caps are safety limits, not preallocations — tmpfs only consumes RAM for
# bytes actually written. Caps keep a runaway index build from exhausting the
# runner's memory.
volumes:
  mysqldata:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g"
  osdata:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4g"
  broker:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g"
