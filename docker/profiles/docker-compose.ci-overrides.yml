# CI-only overrides to speed up `docker compose up --wait` for smoke/E2E tests.
# Loaded via -f only when CI_FAST_BOOT=true (see smoke-test/run-quickstart.sh).
#
# NEVER use for a real/prod quickstart: tmpfs volumes are wiped on every restart.
#
# 1. tmpfs storage — smoke-test data is small and discarded after each run, so
#    backing the storage volumes with RAM removes fsync latency during the
#    slowest part of boot (container init, schema creation, search-index build).
#    Size caps are safety limits, not preallocations: tmpfs only consumes RAM for
#    bytes actually written, and the cap keeps a runaway index build from
#    exhausting the runner's memory.
#
# 2. Tighter healthcheck polling — `up --wait` only notices a service is healthy
#    on its next poll, so a smaller interval trims detection lag along the boot
#    dependency chain. Only interval is touched: start_period is left alone (it
#    gates when failures start counting, not success) and timeout/retries stay so
#    a genuinely slow check is not marked unhealthy under load.
services:
  mysql:
    healthcheck:
      interval: 1s
  opensearch:
    healthcheck:
      interval: 1s
volumes:
  mysqldata:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g"
  osdata:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4g"
  broker:
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=2g"
