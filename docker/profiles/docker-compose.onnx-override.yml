---
# Override file for ONNX-based semantic search in debug quickstart.
# Mounts the host-side model directory into the GMS debug container so that
# OnnxEmbeddingProvider can load the model at startup.
#
# Used automatically by the quickstartDebugBuiltinEmbedding Gradle target.
# Not meant to be activated manually — use:
#   ./gradlew quickstartDebugBuiltinEmbedding

services:
  datahub-gms-debug:
    volumes:
      - ../datahub-gms-onnx/models:/datahub/models:ro
