auto_offset_reset: latest # earliest / latest are supported values
topic_routes:
  mae: MetadataAuditEvent_v4
  mcl: MetadataChangeLog_Versioned_v1
connection:
  bootstrap: broker:29092
  schema_registry_url: http://datahub-gms:8080/schema-registry/api/
  consumer_config:
    group.id: datahub-executor-consumer-job-client
    auto.offset.reset: latest
    
    # ============================================================================
    # KAFKA CONFIGURATION PRECEDENCE
    # ============================================================================
    # Configuration priority (lowest to highest):
    # 1. KAFKA_PROPERTIES_* environment variables (provide defaults)
    # 2. Properties defined in this YAML file (override env vars)
    #
    # This means:
    # - Set KAFKA_PROPERTIES_* env vars to configure Kafka authentication globally
    # - Add properties in this YAML file to override env vars for the executor
    #
    # ============================================================================
    # DYNAMIC ENVIRONMENT VARIABLE CONFIGURATION
    # ============================================================================
    # Any KAFKA_PROPERTIES_* environment variable is automatically mapped to
    # Kafka consumer properties:
    #   KAFKA_PROPERTIES_{PROPERTY_NAME} -> {property.name}
    #
    # Examples:
    #   KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_SSL -> security.protocol=SASL_SSL
    #   KAFKA_PROPERTIES_SASL_USERNAME=myuser -> sasl.username=myuser
    #   KAFKA_PROPERTIES_SSL_CA_LOCATION=/certs/ca.pem -> ssl.ca.location=/certs/ca.pem
    #
    # This allows configuring ANY Kafka property without rebuilding the container.
    #
    # ============================================================================
    # Basic SASL/SSL Configuration
    # ============================================================================
    # Uncomment to override environment variables:
    #security.protocol: PLAINTEXT
    
    # ============================================================================
    # SUPPORTED AUTHENTICATION MECHANISMS
    # ============================================================================
    # The following authentication mechanisms are supported via KAFKA_PROPERTIES_*
    # environment variables. You can also override them in this YAML file.
    #
    # ============================================================================
    # 1. SASL/PLAIN Authentication (username/password)
    # ============================================================================
    # For Confluent Cloud, Azure Event Hubs, or any SASL/PLAIN broker:
    #
    # Environment variables:
    #   KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_SSL
    #   KAFKA_PROPERTIES_SASL_MECHANISM=PLAIN
    #   KAFKA_PROPERTIES_SASL_USERNAME=<your-username>
    #   KAFKA_PROPERTIES_SASL_PASSWORD=<your-password>
    #
    # Or in this YAML file:
    #security.protocol: SASL_SSL
    #sasl.mechanism: PLAIN
    #sasl.username: "your-username"
    #sasl.password: "your-password"
    
    # ============================================================================
    # 2. SASL/SCRAM Authentication (SCRAM-SHA-256 or SCRAM-SHA-512)
    # ============================================================================
    # Environment variables:
    #   KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_SSL
    #   KAFKA_PROPERTIES_SASL_MECHANISM=SCRAM-SHA-256
    #   KAFKA_PROPERTIES_SASL_USERNAME=<your-username>
    #   KAFKA_PROPERTIES_SASL_PASSWORD=<your-password>
    
    # ============================================================================
    # 3. AWS MSK IAM Authentication (OAUTHBEARER)
    # ============================================================================
    # For AWS MSK with IAM authentication:
    #
    # Environment variables:
    #   KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_SSL
    #   KAFKA_PROPERTIES_SASL_MECHANISM=OAUTHBEARER
    #   KAFKA_PROPERTIES_SASL_OAUTHBEARER_METHOD=default
    #   KAFKA_PROPERTIES_OAUTH_CB=datahub_executor.common.kafka_msk_iam:oauth_cb
    #   AWS_REGION=<your-aws-region>
    #
    # IAM credentials are picked up from:
    # - IAM role (if running in EKS with IRSA)
    # - Environment variables (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY)
    # - AWS credentials file
    # - Instance profile (if running on EC2)
    
    # ============================================================================
    # 4. Azure Event Hubs OAuth Authentication (OAUTHBEARER)
    # ============================================================================
    # For Azure Event Hubs with Azure AD OAuth:
    #
    # Environment variables:
    #   KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_SSL
    #   KAFKA_PROPERTIES_SASL_MECHANISM=OAUTHBEARER
    #   KAFKA_PROPERTIES_SASL_OAUTHBEARER_METHOD=default
    #   KAFKA_PROPERTIES_OAUTH_CB=datahub_executor.common.kafka_eventhubs_auth:oauth_cb
    #   AZURE_EVENT_HUBS_NAMESPACE=<namespace>.servicebus.windows.net
    #
    # Azure credentials are picked up from:
    # - Environment variables (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_CLIENT_SECRET)
    # - Managed Identity (if running in AKS)
    # - Azure CLI credentials
    
    # ============================================================================
    # 5. SSL/TLS with Client Certificates
    # ============================================================================
    # For mutual TLS authentication:
    #
    # Environment variables:
    #   KAFKA_PROPERTIES_SECURITY_PROTOCOL=SSL
    #   KAFKA_PROPERTIES_SSL_CA_LOCATION=/mnt/certs/ca-cert.pem
    #   KAFKA_PROPERTIES_SSL_CERTIFICATE_LOCATION=/mnt/certs/client-cert.pem
    #   KAFKA_PROPERTIES_SSL_KEY_LOCATION=/mnt/certs/client-key.pem
    #   KAFKA_PROPERTIES_SSL_KEY_PASSWORD=<key-password>
    #
    # Or in this YAML file:
    #security.protocol: SSL
    #ssl.ca.location: /mnt/certs/ca-cert.pem
    #ssl.certificate.location: /mnt/certs/client-cert.pem
    #ssl.key.location: /mnt/certs/client-key.pem
    #ssl.key.password: key-password
    
    # ============================================================================
    # 6. Kerberos (GSSAPI)
    # ============================================================================
    # For Kerberos authentication:
    #
    # Environment variables:
    #   KAFKA_PROPERTIES_SECURITY_PROTOCOL=SASL_PLAINTEXT
    #   KAFKA_PROPERTIES_SASL_MECHANISM=GSSAPI
    #   KAFKA_PROPERTIES_SASL_KERBEROS_SERVICE_NAME=kafka
    #
    # Note: Kerberos requires additional configuration files (krb5.conf, keytab)