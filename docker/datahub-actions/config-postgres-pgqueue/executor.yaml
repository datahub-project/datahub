# Postgres profile: consume MCP→MCL-related pipeline via pgQueue (see docker-compose.actions.yml).
name: ${DATAHUB_ACTIONS_INGESTION_EXECUTOR_CONSUMER_GROUP_ID:-ingestion_executor}
source:
  type: "pg_queue"
  config:
    queue:
      host_port: ${PGQUEUE_HOST_PORT:-postgres:5432}
      database: ${PGQUEUE_DATABASE:-datahub}
      username: ${PGQUEUE_USERNAME:-datahub}
      password: ${PGQUEUE_PASSWORD:-datahub}
      queue_schema: ${DATAHUB_PGQUEUE_SCHEMA:-queue}
      table_prefix: ${DATAHUB_PGQUEUE_TABLE_PREFIX:-metadata_queue}
    schema_registry_url: ${SCHEMA_REGISTRY_URL:-http://datahub-gms:8080/schema-registry/api/}
    topic_routes:
      mcl: ${METADATA_CHANGE_LOG_VERSIONED_TOPIC_NAME:-MetadataChangeLog_Versioned_v1}
      pe: ${PLATFORM_EVENT_TOPIC_NAME:-PlatformEvent_v1}
    payload_kind_by_route_key:
      mcl: mcl
      pe: pe
filter:
  event_type: "MetadataChangeLogEvent_v1"
  event:
    entityType: "dataHubExecutionRequest"
    changeType: "UPSERT"
    aspectName:
      - "dataHubExecutionRequestInput"
      - "dataHubExecutionRequestSignal"
    aspect:
      value:
        executorId: "${EXECUTOR_ID:-default}"
action:
  type: "executor"
  config:
    executor_id: "${EXECUTOR_ID:-default}"
datahub:
  server: "${DATAHUB_GMS_PROTOCOL:-http}://${DATAHUB_GMS_HOST:-localhost}:${DATAHUB_GMS_PORT:-8080}"
  extra_headers:
    Authorization: "Basic ${DATAHUB_SYSTEM_CLIENT_ID:-__datahub_system}:${DATAHUB_SYSTEM_CLIENT_SECRET:-JohnSnowKnowsNothing}"
