# Dockerfiles specific to Acryl
version: "3.8"
services:
  datahub-integrations-service:
    build:
      context: ../
      dockerfile: docker/datahub-integrations-service/Dockerfile
      args:
        APP_ENV: dev
    image: 795586375822.dkr.ecr.us-west-2.amazonaws.com/datahub-integrations-service:debug
    env_file:
      - ../datahub-integrations-service/.env
    environment:
      PYTHONPATH: "/metadata-ingestion/src:/datahub-integrations-service/src:$${PYTHONPATH}"
    volumes:
      - ./datahub-integrations-service/start.sh:/start_datahub_integrations_service.sh
      - ../metadata-ingestion/src:/metadata-ingestion/src
      - ../datahub-integrations-service:/datahub-integrations-service
      # - ../datahub-actions:/datahub-actions
  datahub-monitors-service:
    container_name: datahub-monitors-service
    build:
      context: ../
      dockerfile: docker/datahub-monitors-service/Dockerfile
      args:
        APP_ENV: dev
    image: 795586375822.dkr.ecr.us-west-2.amazonaws.com/datahub-monitors-service:debug
    environment:
      PYTHONPATH: "/metadata-ingestion/src:/datahub-monitors-service/src/datahub_monitors:$${PYTHONPATH}"
    volumes:
      - ./datahub-monitors-service/start.sh:/start_datahub_monitors_service.sh
      - ../metadata-ingestion/src:/metadata-ingestion/src
      - ../datahub-monitors-service:/datahub-monitors-service
  datahub-executor-coordinator:
    container_name: datahub-executor-coordinator
    image: 795586375822.dkr.ecr.us-west-2.amazonaws.com/datahub-executor:debug
    build:
      context: ../
      dockerfile: datahub-monitors-service/Dockerfile
      args:
        APP_ENV: dev
    volumes:
      - ./datahub-monitors-service-remote/start.sh:/start_datahub_monitors_service.sh
      - ../metadata-ingestion/src:/metadata-ingestion/src
      - ../datahub-monitors-service:/datahub-monitors-service
    env_file:
      - ./datahub-monitors-service/env/docker.env
