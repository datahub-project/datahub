scrape_configs:
  - job_name: 'jmx'
    scrape_interval: 10s
    static_configs:
      - targets:
        - 'host.docker.internal:4318'
        - 'datahub-gms:4318'
        - 'datahub-mae-consumer:4318'
        - 'datahub-mce-consumer:4318'
        - 'datahub-frontend-react:4318'
  - job_name: 'micrometer'
    scrape_interval: 10s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
        - 'datahub-gms:4319'
        - 'datahub-mae-consumer:4319'
        - 'datahub-mce-consumer:4319'
        - 'datahub-frontend-react:4319'