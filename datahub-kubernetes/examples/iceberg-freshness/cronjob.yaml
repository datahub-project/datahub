apiVersion: v1
kind: ConfigMap
metadata:
  name: iceberg-freshness-script
data:
  check_freshness.py: |
    #!/usr/bin/env python3
    import json
    import os
    import re
    import sys
    import time
    import urllib.error
    import urllib.parse
    import urllib.request
    from datetime import datetime, timezone


    def _env(name, default=None, required=False):
        value = os.getenv(name, default)
        if required and not value:
            print(f"Missing required env var: {name}", file=sys.stderr)
            sys.exit(2)
        return value


    def _env_bool(name, default="false"):
        value = str(_env(name, default)).strip().lower()
        return value in {"1", "true", "yes", "y"}


    def _env_int(name, default, min_value=None):
        raw = _env(name, default)
        try:
            value = int(raw)
        except (TypeError, ValueError):
            value = int(default)
        if min_value is not None and value < min_value:
            value = min_value
        return value


    def _slug(value):
        slug = re.sub(r"[^a-zA-Z0-9_\\-]+", "_", value)
        slug = re.sub(r"_+", "_", slug).strip("_")
        return slug or "unknown"


    def _format_age(seconds):
        if seconds is None:
            return None
        try:
            total = int(seconds)
        except (TypeError, ValueError):
            return None
        if total < 0:
            return None
        days, rem = divmod(total, 86400)
        hours, rem = divmod(rem, 3600)
        minutes, secs = divmod(rem, 60)
        parts = []
        if days:
            parts.append(f"{days}d")
        if hours:
            parts.append(f"{hours}h")
        if minutes and len(parts) < 2:
            parts.append(f"{minutes}m")
        if not parts:
            parts.append(f"{secs}s")
        return " ".join(parts)


    def _http_json(url, payload, headers=None):
        data = json.dumps(payload).encode("utf-8")
        req = urllib.request.Request(url, data=data, headers=headers or {}, method="POST")
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                return json.loads(resp.read().decode("utf-8"))
        except urllib.error.HTTPError as exc:
            body = exc.read().decode("utf-8", errors="ignore")
            raise RuntimeError(f"HTTP {exc.code} from {url}: {body}") from exc


    def _trino_query(trino_url, sql, user, catalog=None, schema=None):
        headers = {
            "X-Trino-User": user,
            "Content-Type": "text/plain",
        }
        if catalog:
            headers["X-Trino-Catalog"] = catalog
        if schema:
            headers["X-Trino-Schema"] = schema
        req = urllib.request.Request(
            f"{trino_url.rstrip('/')}/v1/statement",
            data=sql.encode("utf-8"),
            headers=headers,
            method="POST",
        )
        with urllib.request.urlopen(req, timeout=30) as resp:
            payload = json.loads(resp.read().decode("utf-8"))
        if payload.get("error"):
            raise RuntimeError(f"Trino error: {payload['error'].get('message')}")
        next_uri = payload.get("nextUri")
        data = payload.get("data")
        while data is None and next_uri:
            with urllib.request.urlopen(next_uri, timeout=30) as resp:
                payload = json.loads(resp.read().decode("utf-8"))
            if payload.get("error"):
                raise RuntimeError(f"Trino error: {payload['error'].get('message')}")
            data = payload.get("data")
            next_uri = payload.get("nextUri")
        if data is None:
            raise RuntimeError("Trino returned no data for query")
        return data


    def _parse_trino_timestamp(value):
        if value is None:
            return None
        if isinstance(value, (int, float)):
            return int(value)
        text = str(value).strip()
        if text.isdigit():
            num = int(text)
            return num if num > 10**12 else num * 1000
        if text.endswith(" UTC"):
            text = text[:-4]
            for fmt in ("%Y-%m-%d %H:%M:%S.%f", "%Y-%m-%d %H:%M:%S"):
                try:
                    dt = datetime.strptime(text, fmt).replace(tzinfo=timezone.utc)
                    return int(dt.timestamp() * 1000)
                except ValueError:
                    continue
        if text.endswith("Z"):
            try:
                dt = datetime.fromisoformat(text.replace("Z", "+00:00"))
                return int(dt.timestamp() * 1000)
            except ValueError:
                pass
        for fmt in (
            "%Y-%m-%d %H:%M:%S.%f %Z",
            "%Y-%m-%d %H:%M:%S %Z",
            "%Y-%m-%d %H:%M:%S.%f",
            "%Y-%m-%d %H:%M:%S",
        ):
            try:
                dt = datetime.strptime(text, fmt)
                if dt.tzinfo is None:
                    dt = dt.replace(tzinfo=timezone.utc)
                return int(dt.timestamp() * 1000)
            except ValueError:
                continue
        raise ValueError(f"Unrecognized timestamp format: {value}")


    def _graphql(gms_url, query, variables):
        url = f"{gms_url.rstrip('/')}/api/graphql"
        response = _http_json(
            url,
            {"query": query, "variables": variables},
            headers={"Content-Type": "application/json"},
        )
        errors = response.get("errors")
        if errors:
            raise RuntimeError(f"GraphQL error(s): {errors}")
        return response


    def _needs_quoting(identifier):
        return not re.match(r"^[A-Za-z_][A-Za-z0-9_]*$", identifier)


    def _quote_identifier(identifier):
        if _needs_quoting(identifier):
            return '"{}"'.format(identifier.replace('"', '""'))
        return identifier


    def _build_snapshot_sql(catalog, schema, table):
        catalog_ident = _quote_identifier(catalog)
        schema_ident = _quote_identifier(schema)
        table_ident = _quote_identifier(f"{table}$snapshots")
        return f"SELECT max(committed_at) AS last_commit FROM {catalog_ident}.{schema_ident}.{table_ident}"


    def _parse_dataset_name_from_urn(urn):
        if not urn or not urn.startswith("urn:li:dataset:(") or not urn.endswith(")"):
            return None
        inner = urn[len("urn:li:dataset:(") : -1]
        parts = inner.split(",")
        if len(parts) < 2:
            return None
        return parts[1] or None


    def _parse_catalog_schema_table(qualified_name, dataset_name, default_catalog):
        if dataset_name:
            decoded_name = urllib.parse.unquote(dataset_name)
            if "urn:li:dataPlatformInstance:" in decoded_name:
                if ")." in decoded_name:
                    decoded_name = decoded_name.split(").", 1)[1]
                else:
                    decoded_name = ""
            name_parts = decoded_name.split(".") if decoded_name else []
            if len(name_parts) >= 3:
                catalog = name_parts[0]
                table = name_parts[-1]
                schema = ".".join(name_parts[1:-1])
                return catalog, schema, table
            if len(name_parts) == 2 and default_catalog:
                return default_catalog, name_parts[0], name_parts[1]
        if qualified_name and "." in qualified_name:
            parts = qualified_name.split(".")
            schema = ".".join(parts[:-1])
            table = parts[-1]
            if default_catalog:
                return default_catalog, schema, table
        return None


    def _canonical_table_key(trino_catalog, trino_schema, trino_table):
        return f"{trino_catalog}.{trino_schema}.{trino_table}"


    def _iter_iceberg_datasets(gms_url, search_query, page_size, max_datasets):
        query = """
        query Search($start: Int!, $count: Int!, $query: String!) {
          search(input: { type: DATASET, query: $query, start: $start, count: $count }) {
            searchResults {
              entity {
                ... on Dataset {
                  urn
                  platform { name }
                  properties { qualifiedName }
                }
              }
            }
          }
        }
        """
        start = 0
        emitted = 0
        while True:
            result = _graphql(
                gms_url,
                query,
                {"start": start, "count": page_size, "query": search_query},
            )
            search_results = (
                result.get("data", {}).get("search", {}).get("searchResults", [])
            )
            if not search_results:
                break
            for entry in search_results:
                entity = (entry or {}).get("entity") or {}
                platform = (entity.get("platform") or {}).get("name")
                if platform != "iceberg":
                    continue
                yield entity
                emitted += 1
                if max_datasets and emitted >= max_datasets:
                    return
            start += len(search_results)


    def _evaluate_and_report(
        gms_url,
        trino_url,
        trino_user,
        trino_catalog,
        trino_schema,
        trino_table,
        freshness_seconds,
        dataset_urn,
        assertion_urn,
        assertion_type,
    ):
        sql = _build_snapshot_sql(trino_catalog, trino_schema, trino_table)
        now_ms = int(time.time() * 1000)
        last_commit_value = None
        result_type = "ERROR"
        error = None
        freshness_age_seconds = None
        last_commit_ms = None

        try:
            data = _trino_query(
                trino_url,
                sql,
                user=trino_user,
                catalog=trino_catalog,
                schema=trino_schema,
            )
            last_commit_value = data[0][0] if data and data[0] else None
            last_commit_ms = _parse_trino_timestamp(last_commit_value)
            if last_commit_ms is None:
                raise ValueError("No snapshot commit timestamp found")
            freshness_age_seconds = int((now_ms - last_commit_ms) / 1000)
            result_type = (
                "SUCCESS"
                if freshness_age_seconds <= freshness_seconds
                else "FAILURE"
            )
        except Exception as exc:
            error = {
                "type": "SOURCE_QUERY_FAILED",
                "message": str(exc),
            }

        if last_commit_ms is not None:
            last_commit_text = datetime.fromtimestamp(
                last_commit_ms / 1000, tz=timezone.utc
            ).strftime("%Y-%m-%d %H:%M UTC")
            last_commit_summary = f"Last snapshot {last_commit_text}"
            age_text = _format_age(freshness_age_seconds)
            if age_text:
                last_commit_summary = f"{last_commit_summary} ({age_text} ago)"
        else:
            last_commit_summary = "Last snapshot unavailable"
            if error:
                last_commit_summary = f"{last_commit_summary}: {error.get('message')}"

        upsert_query = """
        mutation upsertCustomAssertion($urn: String, $input: UpsertCustomAssertionInput!) {
          upsertCustomAssertion(urn: $urn, input: $input) {
            urn
          }
        }
        """
        try:
            _graphql(
                gms_url,
                upsert_query,
                {
                    "urn": assertion_urn,
                    "input": {
                        "entityUrn": dataset_urn,
                        "type": assertion_type,
                        "description": last_commit_summary,
                        "platform": {"name": "trino"},
                    },
                },
            )
        except Exception as exc:
            payload = {
                "assertion_urn": assertion_urn,
                "dataset_urn": dataset_urn,
                "result": "ERROR",
                "error": {"type": "INVALID_PARAMETERS", "message": str(exc)},
            }
            print(json.dumps(payload))
            return

        properties = [
            {"key": "trino_query", "value": sql},
            {"key": "freshness_threshold_seconds", "value": str(freshness_seconds)},
        ]
        if last_commit_ms is not None:
            properties.append({"key": "last_commit_epoch_ms", "value": str(last_commit_ms)})
            last_commit_iso = (
                datetime.fromtimestamp(last_commit_ms / 1000, tz=timezone.utc)
                .isoformat()
                .replace("+00:00", "Z")
            )
            properties.append({"key": "last_commit_time_utc", "value": last_commit_iso})
        if last_commit_value is not None:
            properties.append({"key": "last_commit_raw", "value": str(last_commit_value)})
        if freshness_age_seconds is not None:
            properties.append(
                {"key": "freshness_age_seconds", "value": str(freshness_age_seconds)}
            )

        report_query = """
        mutation reportAssertionResult($urn: String!, $result: AssertionResultInput!) {
          reportAssertionResult(urn: $urn, result: $result)
        }
        """
        try:
            _graphql(
                gms_url,
                report_query,
                {
                    "urn": assertion_urn,
                    "result": {
                        "timestampMillis": now_ms,
                        "type": result_type,
                        "properties": properties,
                        "error": error,
                    },
                },
            )
        except Exception as exc:
            payload = {
                "assertion_urn": assertion_urn,
                "dataset_urn": dataset_urn,
                "result": "ERROR",
                "error": {"type": "UNKNOWN_ERROR", "message": str(exc)},
            }
            print(json.dumps(payload))
            return

        payload = {
            "assertion_urn": assertion_urn,
            "dataset_urn": dataset_urn,
            "result": result_type,
            "last_commit": last_commit_value,
            "freshness_age_seconds": freshness_age_seconds,
        }
        if error:
            payload["error"] = error
        print(json.dumps(payload))


    def main():
        trino_url = _env("TRINO_URL", required=True)
        trino_user = _env("TRINO_USER", "iceberg-freshness")
        trino_catalog_default = _env("TRINO_CATALOG", "iceberg")
        freshness_seconds = _env_int("FRESHNESS_SECONDS", 3600, min_value=1)

        gms_url = _env(
            "DATAHUB_GMS_URL", "http://datahub-datahub-gms.datapipeline:8080"
        )
        assertion_type = _env("ASSERTION_TYPE", "Iceberg Freshness")
        assertion_urn_prefix = _env(
            "ASSERTION_URN_PREFIX", "urn:li:assertion:iceberg_freshness_"
        )

        all_iceberg = _env_bool("ALL_ICEBERG", "true")
        dataset_urn = _env("DATASET_URN")

        if all_iceberg:
            search_query = _env("DATAHUB_SEARCH_QUERY", "*")
            page_size = int(_env("DATAHUB_SEARCH_PAGE_SIZE", "200"))
            max_datasets = int(_env("DATAHUB_MAX_DATASETS", "0"))
            seen_tables = set()
            for entity in _iter_iceberg_datasets(
                gms_url, search_query, page_size, max_datasets
            ):
                qualified_name = (entity.get("properties") or {}).get("qualifiedName")
                dataset_urn = entity.get("urn")
                dataset_name = _parse_dataset_name_from_urn(dataset_urn)
                catalog_schema_table = _parse_catalog_schema_table(
                    qualified_name,
                    dataset_name,
                    trino_catalog_default,
                )
                if not catalog_schema_table:
                    print(
                        json.dumps(
                            {
                                "dataset_urn": dataset_urn,
                                "result": "SKIPPED",
                                "reason": "missing_or_invalid_catalog_schema_table",
                                "qualified_name": qualified_name,
                                "dataset_name": dataset_name,
                            }
                        )
                    )
                    continue
                trino_catalog, trino_schema, trino_table = catalog_schema_table
                canonical_key = _canonical_table_key(
                    trino_catalog, trino_schema, trino_table
                )
                if canonical_key in seen_tables:
                    print(
                        json.dumps(
                            {
                                "dataset_urn": dataset_urn,
                                "result": "SKIPPED",
                                "reason": "duplicate_canonical_table",
                                "canonical_table": canonical_key,
                            }
                        )
                    )
                    continue
                seen_tables.add(canonical_key)
                assertion_urn = f"{assertion_urn_prefix}{_slug(canonical_key)}"
                try:
                    _evaluate_and_report(
                        gms_url=gms_url,
                        trino_url=trino_url,
                        trino_user=trino_user,
                        trino_catalog=trino_catalog,
                        trino_schema=trino_schema,
                        trino_table=trino_table,
                        freshness_seconds=freshness_seconds,
                        dataset_urn=dataset_urn,
                        assertion_urn=assertion_urn,
                        assertion_type=assertion_type,
                    )
                except Exception as exc:
                    print(
                        json.dumps(
                            {
                                "dataset_urn": dataset_urn,
                                "result": "ERROR",
                                "error": {
                                    "type": "UNKNOWN_ERROR",
                                    "message": str(exc),
                                },
                            }
                        )
                    )
            return

        if not dataset_urn:
            print("Missing required env var: DATASET_URN", file=sys.stderr)
            sys.exit(2)

        trino_schema = _env("TRINO_SCHEMA", required=True)
        trino_table = _env("TRINO_TABLE", required=True)
        assertion_urn = _env(
            "ASSERTION_URN",
            f"{assertion_urn_prefix}{_slug(f'{trino_schema}.{trino_table}')}",
        )
        _evaluate_and_report(
            gms_url=gms_url,
            trino_url=trino_url,
            trino_user=trino_user,
            trino_catalog=trino_catalog_default,
            trino_schema=trino_schema,
            trino_table=trino_table,
            freshness_seconds=freshness_seconds,
            dataset_urn=dataset_urn,
            assertion_urn=assertion_urn,
            assertion_type=assertion_type,
        )


    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: iceberg-freshness
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: iceberg-freshness
              image: python:3.11-slim
              command: ["python3", "/scripts/check_freshness.py"]
              env:
                - name: TRINO_URL
                  value: "http://trino-coordinator-prod-trino.service.capi-prod-dp.kube.atla.twitter.biz"
                - name: TRINO_USER
                  value: "iceberg-freshness"
                - name: TRINO_CATALOG
                  value: "iceberg"
                - name: DATAHUB_GMS_URL
                  value: "http://datahub-datahub-gms:8080"
                - name: FRESHNESS_SECONDS
                  value: "3600"
                - name: ALL_ICEBERG
                  value: "true"
                - name: DATAHUB_MAX_DATASETS
                  value: "0"
              volumeMounts:
                - name: script
                  mountPath: /scripts
          volumes:
            - name: script
              configMap:
                name: iceberg-freshness-script
                defaultMode: 0755
apiVersion: v1
kind: ConfigMap
metadata:
  name: datahub-iceberg-freshness-script
  namespace: datapipeline
data:
  check_freshness.py: |
    #!/usr/bin/env python3
    import json
    import os
    import re
    import sys
    import time
    import urllib.error
    import urllib.request
    import urllib.parse
    from datetime import datetime, timezone
    
    
    def _env(name, default=None, required=False):
        value = os.getenv(name, default)
        if required and not value:
            print(f"Missing required env var: {name}", file=sys.stderr)
            sys.exit(2)
        return value
    
    
    def _env_bool(name, default="false"):
        value = str(_env(name, default)).strip().lower()
        return value in {"1", "true", "yes", "y"}
    
    
    def _env_int(name, default, min_value=None):
        raw = _env(name, default)
        try:
            value = int(raw)
        except (TypeError, ValueError):
            value = int(default)
        if min_value is not None and value < min_value:
            value = min_value
        return value
    
    
    def _slug(value):
        slug = re.sub(r"[^a-zA-Z0-9_\\-]+", "_", value)
        slug = re.sub(r"_+", "_", slug).strip("_")
        return slug or "unknown"
    
    
    def _format_age(seconds):
        if seconds is None:
            return None
        try:
            total = int(seconds)
        except (TypeError, ValueError):
            return None
        if total < 0:
            return None
        days, rem = divmod(total, 86400)
        hours, rem = divmod(rem, 3600)
        minutes, secs = divmod(rem, 60)
        parts = []
        if days:
            parts.append(f"{days}d")
        if hours:
            parts.append(f"{hours}h")
        if minutes and len(parts) < 2:
            parts.append(f"{minutes}m")
        if not parts:
            parts.append(f"{secs}s")
        return " ".join(parts)


    def _http_json(url, payload, headers=None):
        data = json.dumps(payload).encode("utf-8")
        req = urllib.request.Request(url, data=data, headers=headers or {}, method="POST")
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                return json.loads(resp.read().decode("utf-8"))
        except urllib.error.HTTPError as exc:
            body = exc.read().decode("utf-8", errors="ignore")
            raise RuntimeError(f"HTTP {exc.code} from {url}: {body}") from exc
    
    
    def _trino_query(trino_url, sql, user, catalog=None, schema=None):
        headers = {
            "X-Trino-User": user,
            "Content-Type": "text/plain",
        }
        if catalog:
            headers["X-Trino-Catalog"] = catalog
        if schema:
            headers["X-Trino-Schema"] = schema
        req = urllib.request.Request(
            f"{trino_url.rstrip('/')}/v1/statement",
            data=sql.encode("utf-8"),
            headers=headers,
            method="POST",
        )
        with urllib.request.urlopen(req, timeout=30) as resp:
            payload = json.loads(resp.read().decode("utf-8"))
        if payload.get("error"):
            raise RuntimeError(f"Trino error: {payload['error'].get('message')}")
        next_uri = payload.get("nextUri")
        data = payload.get("data")
        while data is None and next_uri:
            with urllib.request.urlopen(next_uri, timeout=30) as resp:
                payload = json.loads(resp.read().decode("utf-8"))
            if payload.get("error"):
                raise RuntimeError(f"Trino error: {payload['error'].get('message')}")
            data = payload.get("data")
            next_uri = payload.get("nextUri")
        if data is None:
            raise RuntimeError("Trino returned no data for query")
        return data
    
    
    def _parse_trino_timestamp(value):
        if value is None:
            return None
        if isinstance(value, (int, float)):
            return int(value)
        text = str(value)
        if text.isdigit():
            num = int(text)
            return num if num > 10**12 else num * 1000
        if text.endswith(" UTC"):
            text = text[:-4]
            for fmt in ("%Y-%m-%d %H:%M:%S.%f", "%Y-%m-%d %H:%M:%S"):
                try:
                    dt = datetime.strptime(text, fmt).replace(tzinfo=timezone.utc)
                    return int(dt.timestamp() * 1000)
                except ValueError:
                    continue
        if text.endswith("Z"):
            try:
                dt = datetime.fromisoformat(text.replace("Z", "+00:00"))
                return int(dt.timestamp() * 1000)
            except ValueError:
                pass
        for fmt in (
            "%Y-%m-%d %H:%M:%S.%f %Z",
            "%Y-%m-%d %H:%M:%S %Z",
            "%Y-%m-%d %H:%M:%S.%f",
            "%Y-%m-%d %H:%M:%S",
        ):
            try:
                dt = datetime.strptime(text, fmt)
                if dt.tzinfo is None:
                    dt = dt.replace(tzinfo=timezone.utc)
                return int(dt.timestamp() * 1000)
            except ValueError:
                continue
        raise ValueError(f"Unrecognized timestamp format: {value}")
    
    
    def _graphql(gms_url, query, variables):
        url = f"{gms_url.rstrip('/')}/api/graphql"
        response = _http_json(url, {"query": query, "variables": variables}, headers={"Content-Type": "application/json"})
        errors = response.get("errors")
        if errors:
            raise RuntimeError(f"GraphQL error(s): {errors}")
        return response
    
    
    def _needs_quoting(identifier):
        return not re.match(r"^[A-Za-z_][A-Za-z0-9_]*$", identifier)
    
    
    def _quote_identifier(identifier):
        if _needs_quoting(identifier):
            escaped = identifier.replace('"', '""')
            return '"{}"'.format(escaped)
        return identifier
    
    
    def _build_snapshot_sql(catalog, schema, table):
        catalog_ident = _quote_identifier(catalog)
        schema_ident = _quote_identifier(schema)
        table_ident = _quote_identifier(f"{table}$snapshots")
        return f"SELECT max(committed_at) AS last_commit FROM {catalog_ident}.{schema_ident}.{table_ident}"
    
    
    def _parse_dataset_name_from_urn(urn):
        if not urn or not urn.startswith("urn:li:dataset:(") or not urn.endswith(")"):
            return None
        inner = urn[len("urn:li:dataset:(") : -1]
        parts = inner.split(",")
        if len(parts) < 2:
            return None
        return parts[1] or None
    
    
    def _parse_catalog_schema_table(qualified_name, dataset_name, default_catalog):
        if dataset_name:
            decoded_name = urllib.parse.unquote(dataset_name)
            if "urn:li:dataPlatformInstance:" in decoded_name:
                if ")." in decoded_name:
                    decoded_name = decoded_name.split(").", 1)[1]
                else:
                    decoded_name = ""
            name_parts = decoded_name.split(".") if decoded_name else []
            if len(name_parts) >= 3:
                catalog = name_parts[0]
                table = name_parts[-1]
                schema = ".".join(name_parts[1:-1])
                return catalog, schema, table
            if len(name_parts) == 2 and default_catalog:
                return default_catalog, name_parts[0], name_parts[1]
        if qualified_name and "." in qualified_name:
            parts = qualified_name.split(".")
            schema = ".".join(parts[:-1])
            table = parts[-1]
            if default_catalog:
                return default_catalog, schema, table
        return None
    
    
    def _canonical_table_key(trino_catalog, trino_schema, trino_table):
        return f"{trino_catalog}.{trino_schema}.{trino_table}"
    
    
    def _iter_iceberg_datasets(gms_url, search_query, page_size, max_datasets):
        query = """
        query Search($start: Int!, $count: Int!, $query: String!) {
          search(input: { type: DATASET, query: $query, start: $start, count: $count }) {
            searchResults {
              entity {
                ... on Dataset {
                  urn
                  platform { name }
                  properties { qualifiedName }
                }
              }
            }
          }
        }
        """
        start = 0
        emitted = 0
        while True:
            result = _graphql(
                gms_url,
                query,
                {"start": start, "count": page_size, "query": search_query},
            )
            search_results = (
                result.get("data", {})
                .get("search", {})
                .get("searchResults", [])
            )
            if not search_results:
                break
            for entry in search_results:
                entity = (entry or {}).get("entity") or {}
                platform = (entity.get("platform") or {}).get("name")
                if platform != "iceberg":
                    continue
                yield entity
                emitted += 1
                if max_datasets and emitted >= max_datasets:
                    return
            start += len(search_results)
    
    
    def _evaluate_and_report(
        gms_url,
        trino_url,
        trino_user,
        trino_catalog,
        trino_schema,
        trino_table,
        freshness_seconds,
        dataset_urn,
        assertion_urn,
        assertion_type,
        assertion_description,
    ):
        sql = _build_snapshot_sql(trino_catalog, trino_schema, trino_table)
        now_ms = int(time.time() * 1000)
        last_commit_value = None
        result_type = "ERROR"
        error = None
        freshness_age_seconds = None
        last_commit_ms = None
    
        try:
            data = _trino_query(trino_url, sql, user=trino_user, catalog=trino_catalog, schema=trino_schema)
            last_commit_value = data[0][0] if data and data[0] else None
            last_commit_ms = _parse_trino_timestamp(last_commit_value)
            if last_commit_ms is None:
                raise ValueError("No snapshot commit timestamp found")
            freshness_age_seconds = int((now_ms - last_commit_ms) / 1000)
            result_type = "SUCCESS" if freshness_age_seconds <= freshness_seconds else "FAILURE"
        except Exception as exc:
            error = {
                "type": "SOURCE_QUERY_FAILED",
                "message": str(exc),
            }
    
        if last_commit_ms is not None:
            last_commit_text = datetime.fromtimestamp(
                last_commit_ms / 1000, tz=timezone.utc
            ).strftime("%Y-%m-%d %H:%M UTC")
            last_commit_summary = f"Last snapshot {last_commit_text}"
            age_text = _format_age(freshness_age_seconds)
            if age_text:
                last_commit_summary = f"{last_commit_summary} ({age_text} ago)"
        else:
            last_commit_summary = "Last snapshot unavailable"
            if error:
                last_commit_summary = f"{last_commit_summary}: {error.get('message')}"

        assertion_description_runtime = last_commit_summary
        assertion_type_runtime = last_commit_summary

        upsert_query = """
        mutation upsertCustomAssertion($urn: String, $input: UpsertCustomAssertionInput!) {
          upsertCustomAssertion(urn: $urn, input: $input) {
            urn
          }
        }
        """
        try:
            _graphql(
                gms_url,
                upsert_query,
                {
                    "urn": assertion_urn,
                    "input": {
                        "entityUrn": dataset_urn,
                        "type": assertion_type_runtime,
                        "description": assertion_description_runtime,
                        "platform": {"name": "trino"},
                    },
                },
            )
        except Exception as exc:
            payload = {
                "assertion_urn": assertion_urn,
                "dataset_urn": dataset_urn,
                "result": "ERROR",
                "error": {"type": "INVALID_PARAMETERS", "message": str(exc)},
            }
            print(json.dumps(payload))
            return
    
        properties = [
            {"key": "trino_query", "value": sql},
            {"key": "freshness_threshold_seconds", "value": str(freshness_seconds)},
        ]
        if last_commit_ms is not None:
            properties.append({"key": "last_commit_epoch_ms", "value": str(last_commit_ms)})
            last_commit_iso = (
                datetime.fromtimestamp(last_commit_ms / 1000, tz=timezone.utc)
                .isoformat()
                .replace("+00:00", "Z")
            )
            properties.append({"key": "last_commit_time_utc", "value": last_commit_iso})
        if last_commit_value is not None:
            properties.append({"key": "last_commit_raw", "value": str(last_commit_value)})
        if freshness_age_seconds is not None:
            properties.append({"key": "freshness_age_seconds", "value": str(freshness_age_seconds)})
    
        report_query = """
        mutation reportAssertionResult($urn: String!, $result: AssertionResultInput!) {
          reportAssertionResult(urn: $urn, result: $result)
        }
        """
        try:
            _graphql(
                gms_url,
                report_query,
                {
                    "urn": assertion_urn,
                    "result": {
                        "timestampMillis": now_ms,
                        "type": result_type,
                        "properties": properties,
                        "error": error,
                    },
                },
            )
        except Exception as exc:
            payload = {
                "assertion_urn": assertion_urn,
                "dataset_urn": dataset_urn,
                "result": "ERROR",
                "error": {"type": "UNKNOWN_ERROR", "message": str(exc)},
            }
            print(json.dumps(payload))
            return
    
        payload = {
            "assertion_urn": assertion_urn,
            "dataset_urn": dataset_urn,
            "result": result_type,
            "last_commit": last_commit_value,
            "freshness_age_seconds": freshness_age_seconds,
        }
        if error:
            payload["error"] = error
        print(json.dumps(payload))
    
    
    def main():
        trino_url = _env("TRINO_URL", required=True)
        trino_user = _env("TRINO_USER", "iceberg-freshness")
        trino_catalog_default = _env("TRINO_CATALOG", "iceberg")
        freshness_seconds = _env_int("FRESHNESS_SECONDS", 3600, min_value=1)
    
        gms_url = _env("DATAHUB_GMS_URL", "http://datahub-datahub-gms.datapipeline:8080")
        assertion_type = _env("ASSERTION_TYPE", "Iceberg Freshness")
        assertion_description = _env("ASSERTION_DESCRIPTION", "Iceberg freshness check")
        assertion_urn_prefix = _env("ASSERTION_URN_PREFIX", "urn:li:assertion:iceberg_freshness_")
    
        all_iceberg = _env_bool("ALL_ICEBERG", "true")
        dataset_urn = _env("DATASET_URN")
    
        if all_iceberg:
            search_query = _env("DATAHUB_SEARCH_QUERY", "*")
            page_size = int(_env("DATAHUB_SEARCH_PAGE_SIZE", "200"))
            max_datasets = int(_env("DATAHUB_MAX_DATASETS", "0"))
            seen_tables = set()
            for entity in _iter_iceberg_datasets(gms_url, search_query, page_size, max_datasets):
                qualified_name = (entity.get("properties") or {}).get("qualifiedName")
                dataset_urn = entity.get("urn")
                dataset_name = _parse_dataset_name_from_urn(dataset_urn)
                catalog_schema_table = _parse_catalog_schema_table(
                    qualified_name,
                    dataset_name,
                    trino_catalog_default,
                )
                if not catalog_schema_table:
                    print(
                        json.dumps(
                            {
                                "dataset_urn": dataset_urn,
                                "result": "SKIPPED",
                                "reason": "missing_or_invalid_catalog_schema_table",
                                "qualified_name": qualified_name,
                                "dataset_name": dataset_name,
                            }
                        )
                    )
                    continue
                trino_catalog, trino_schema, trino_table = catalog_schema_table
                canonical_key = _canonical_table_key(trino_catalog, trino_schema, trino_table)
                if canonical_key in seen_tables:
                    print(
                        json.dumps(
                            {
                                "dataset_urn": dataset_urn,
                                "result": "SKIPPED",
                                "reason": "duplicate_canonical_table",
                                "canonical_table": canonical_key,
                            }
                        )
                    )
                    continue
                seen_tables.add(canonical_key)
                assertion_urn = f"{assertion_urn_prefix}{_slug(canonical_key)}"
                try:
                    _evaluate_and_report(
                        gms_url=gms_url,
                        trino_url=trino_url,
                        trino_user=trino_user,
                        trino_catalog=trino_catalog,
                        trino_schema=trino_schema,
                        trino_table=trino_table,
                        freshness_seconds=freshness_seconds,
                        dataset_urn=dataset_urn,
                        assertion_urn=assertion_urn,
                        assertion_type=assertion_type,
                        assertion_description=assertion_description,
                    )
                except Exception as exc:
                    print(
                        json.dumps(
                            {
                                "dataset_urn": dataset_urn,
                                "result": "ERROR",
                                "error": {"type": "UNKNOWN_ERROR", "message": str(exc)},
                            }
                        )
                    )
            return
    
        if not dataset_urn:
            print("Missing required env var: DATASET_URN", file=sys.stderr)
            sys.exit(2)
    
        trino_schema = _env("TRINO_SCHEMA", required=True)
        trino_table = _env("TRINO_TABLE", required=True)
        assertion_urn = _env(
            "ASSERTION_URN",
            f"{assertion_urn_prefix}{_slug(f'{trino_schema}.{trino_table}')}",
        )
        assertion_description = _env(
            "ASSERTION_DESCRIPTION",
            f"Freshness check for {trino_catalog_default}.{trino_schema}.{trino_table}",
        )
        _evaluate_and_report(
            gms_url=gms_url,
            trino_url=trino_url,
            trino_user=trino_user,
            trino_catalog=trino_catalog_default,
            trino_schema=trino_schema,
            trino_table=trino_table,
            freshness_seconds=freshness_seconds,
            dataset_urn=dataset_urn,
            assertion_urn=assertion_urn,
            assertion_type=assertion_type,
            assertion_description=assertion_description,
        )
    
    
    if __name__ == "__main__":
        main()
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: datahub-iceberg-freshness
  namespace: datapipeline
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: iceberg-freshness
              image: python:3.11-slim
              command: ["python", "/app/check_freshness.py"]
              volumeMounts:
                - name: script
                  mountPath: /app/check_freshness.py
                  subPath: check_freshness.py
              env:
                - name: TRINO_URL
                  value: http://trino-coordinator-prod-trino.service.capi-prod-dp.kube.atla.twitter.biz
                - name: TRINO_USER
                  value: iceberg-freshness
                - name: TRINO_CATALOG
                  value: iceberg
                - name: FRESHNESS_SECONDS
                  value: "3600"
                - name: DATAHUB_GMS_URL
                  value: http://datahub-datahub-gms.datapipeline:8080
                - name: ALL_ICEBERG
                  value: "true"
                - name: DATAHUB_SEARCH_QUERY
                  value: "*"
                - name: DATAHUB_SEARCH_PAGE_SIZE
                  value: "200"
                - name: DATAHUB_MAX_DATASETS
                  value: "0"
          volumes:
            - name: script
              configMap:
                name: datahub-iceberg-freshness-script
