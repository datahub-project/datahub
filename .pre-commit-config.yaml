        files: ^\.github/workflows/
        entry: docker.io/rhysd/actionlint:1.7.11
        stages:
          - pre-commit

      - id: docusaurus-markdown-lint
        name: Lint Docusaurus Markdown
        description: Catches Docusaurus-specific Markdown issues that Prettier cannot
          validate
        language: system
        files: ^.*\.mdx?$
        entry: python3 .github/scripts/check_docusaurus_markdown.py
        stages:
          - pre-commit

      - id: playwright-e2e-lint-and-format
        name: Playwright E2E ESLint Fix + Prettier Format
        entry: ./gradlew :e2e-test:ui:playwright:lintFix :e2e-test:ui:playwright:prettierWrite
          -x generateGitPropertiesGlobal
        language: system
        files: ^e2e-test/ui/playwright/.*\.ts$
        pass_filenames: false
        stages:
          - pre-push

      - id: bump-schema-versions
        name: Bump PDL schema versions
        entry: python .github/scripts/bump_schema_versions.py
        language: python
        pass_filenames: false
        stages:
          - pre-commit

      - id: betterleaks
        name: Detect hardcoded secrets
        description: Detect hardcoded secrets using Betterleaks (system-installed
          binary)
        entry: betterleaks git --staged --redact --verbose --config .betterleaks.toml
        language: system
        pass_filenames: false
        stages:
          - pre-commit
