repos:
  - repo: local
    hooks:
      - id: guard-push-file-count
        name: Guard against massive pushes (>500 files)
        entry: bash .github/scripts/guard_push_file_count.sh
        language: system
        pass_filenames: false
        always_run: true
        # Accident guard against accidental massive pushes. Runs at pre-push so
        # it fires before `git push` completes; see PFP-5002.
        # NOTE: generate_pre_commit.py emits generated hooks (spotless/prettier/
        # ruff-format) BEFORE override hooks, so at pre-push those formatters run
        # once before this guard. A >500-file push is still rejected, but only
        # after the formatters have run on the diff. Making the guard fast-fail
        # first would require changing the generator's merge order (prepend
        # override hooks) — deferred as not worth it for now.
        stages: [pre-push]
      - id: smoke-test-cypress-lint-fix
        name: smoke-test cypress Lint Fix
        entry: ./gradlew :smoke-test:cypressLintFix -x generateGitPropertiesGlobal
        language: system
        files: ^smoke-test/tests/cypress/.*\.tsx$
        pass_filenames: false
        # cypressLintFix is a self-correcting formatter (slow, module-wide Gradle
        # invocation). Run it at pre-push instead of pre-commit; see PFP-5002.
        stages: [pre-push]
      - id: update-lineage-file
        name: update-lineage-file
        entry: ./gradlew :metadata-ingestion:lineageGen -x generateGitPropertiesGlobal
        language: system
        files: ^(metadata-ingestion-modules/.*|metadata-models/.*)$
        pass_filenames: false
        # Codegen that regenerates a committed artifact, not a formatter.
        stages: [pre-commit]
      - id: check-gradle-lockfiles
        name: Check gradle lockfiles are updated
        entry: python .github/scripts/check_gradle_lockfiles.py
        language: system
        files: ^.*build\.gradle(\.kts)?$
        pass_filenames: false
        stages: [pre-commit]
      - id: check-quickstart-compose
        name: Check quickstart docker-compose config is up-to-date
        entry: bash .github/scripts/check_quickstart_compose.sh
        language: system
        files: ^docker/.*$
        pass_filenames: false
        stages: [pre-commit]
      - id: validate-post-workflow-list
        name: Validate post-workflow-actions.yml workflow list
        entry: python .github/scripts/validate_post_workflow_list.py
        language: python
        additional_dependencies: [pyyaml]
        files: ^\.github/workflows/.*\.yml$
        pass_filenames: false
        stages: [pre-commit]
      - id: actionlint-docker
        name: Lint GitHub Actions workflow files
        description: Runs actionlint Docker image to lint GitHub Actions workflow files
        language: docker_image
        types: ["yaml"]
        files: ^\.github/workflows/
        entry: docker.io/rhysd/actionlint:1.7.11
        stages: [pre-commit]
      - id: docusaurus-markdown-lint
        name: Lint Docusaurus Markdown
        description: Catches Docusaurus-specific Markdown issues that Prettier cannot validate
        language: system
        files: ^.*\.mdx?$
        entry: python3 .github/scripts/check_docusaurus_markdown.py
        stages: [pre-commit]
      - id: playwright-e2e-lint-and-format
        name: Playwright E2E ESLint Fix + Prettier Format
        entry: ./gradlew :e2e-test:ui:playwright:lintFix :e2e-test:ui:playwright:prettierWrite -x generateGitPropertiesGlobal
        language: system
        files: ^e2e-test/ui/playwright/.*\.ts$
        pass_filenames: false
        # lintFix + prettierWrite are self-correcting formatters (slow, module-wide
        # Gradle invocation). Run them at pre-push instead of pre-commit; see PFP-5002.
        stages: [pre-push]
      - id: bump-schema-versions
        name: Bump PDL schema versions
        entry: python .github/scripts/bump_schema_versions.py
        language: python
        pass_filenames: false
        # Changes schema version numbers (semantic), not a formatter.
        stages: [pre-commit]
      - id: betterleaks
        name: Detect hardcoded secrets
        description: Detect hardcoded secrets using Betterleaks (system-installed binary)
        entry: betterleaks git --staged --redact --verbose --config .betterleaks.toml
        language: system
        pass_filenames: false
        # Scans only the staged diff. A native (non-docker) binary resolves git worktrees
        # correctly — a docker_image hook cannot (it only mounts $PWD, not the external gitdir).
        # Keep pass_filenames: false: betterleaks reads the staged diff itself; passing files
        # would switch it to `dir` semantics (whole-file, and broken/slow on multiple file args).
        stages: [pre-commit]
