repos:
  - repo: local
    hooks:
      - id: smoke-test-cypress-lint-fix
        name: smoke-test cypress Lint Fix
        entry: .github/scripts/pre-commit-wrapper.sh ./gradlew :smoke-test:cypressLintFix
        language: system
        files: ^smoke-test/tests/cypress/.*\.tsx$
        pass_filenames: false
      - id: update-lineage-file
        name: update-lineage-file
        entry: .github/scripts/pre-commit-wrapper.sh ./gradlew :metadata-ingestion:lineageGen
        language: system
        files: ^(metadata-ingestion-modules/.*|metadata-models/.*)$
        pass_filenames: false
      - id: web-react-lint-fix
        name: web-react lint fix
        entry: .github/scripts/web_react_lint.sh
        language: system
        pass_filenames: false
        files: datahub-web-react/.*\.(js|jsx|ts|tsx)
