name: Docker Build, Scan, Test
on:
  workflow_dispatch:
    inputs:
      profileName:
        description: "Profile name for the smoke-test. Defaults to quickstart-consumers if not specified"
        required: false
        default: "quickstart-consumers"
        type: string
      customPypiIndex:
        description: "Custom PyPI index URL (e.g., https://5b353e42.acryl-wheels.pages.dev/simple) - leave empty to use default"
        required: false
        default: ""
        type: string
  workflow_run:
    workflows: ["Python Build"]
    types: [completed]
    # Allow workflow_run on all branches to support custom PyPI index from python-build-pages
  push:
    branches:
      - acryl-main
      - releases/**
      - hotfixes/**
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - "**"
  release:
    types: [published]

concurrency:
  # Using `github.run_id` (unique val) instead of `github.ref` here
  # because we don't want to cancel this workflow on master only for PRs
  #   as that makes reproducing issues easier
  # Adding github.event.action == labeled as a means to differentiate the trigger due to adding a label -- most labels are
  # no-ops except for `depot`
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}-${{ github.event.action == 'labeled' }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: "795586375822.dkr.ecr.us-west-2.amazonaws.com"
  ACRYLIO_DOCKER_REGISTRY: "acrylio"
  CLOUDSMITH_REGISTRY: "docker.cloudsmith.io/datahub/enterprise"
  PROFILE_NAME: "${{ github.event.inputs.profileName || 'quickstart-consumers' }}"

  DATAHUB_INGESTION_BASE_IMAGE: "795586375822.dkr.ecr.us-west-2.amazonaws.com/datahub-ingestion-base"

  DOCKER_CACHE: "DEPOT"
  DEPOT_PROJECT_ID: "${{ vars.DEPOT_PROJECT_ID }}"
  HAS_DEPOT_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'depot') }}
  # Include Wolfi variants for releases, or when PR has 'build-wolfi-variant' label
  # Wolfi uses glibc and supports full dependencies including prophet/spacy
  INCLUDE_WOLFI_VARIANTS: ${{ github.event_name == 'release' || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-wolfi-variant')) }}
  # Alpine variants are WIP - disabled until Remote Executor dependency refactor is complete
  # Alpine uses musl which doesn't support prophet (CmdStan) or spacy/blis dependencies
  INCLUDE_ALPINE_VARIANTS: "false"
  IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
  DEPOT_TOKEN: "${{ secrets.DEPOT_TOKEN }}"

  CI_BUILD_ID: ${{ github.run_id }}

permissions:
  contents: read
  id-token: write
  actions: read # Required for downloading artifacts in retry logic

jobs:
  get-pypi-config:
    runs-on: ubuntu-latest
    # Only run when triggered by python-build-pages workflow
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    outputs:
      pypi_index_url: ${{ steps.get-url.outputs.pypi_index_url }}
    steps:
      - name: Download PyPI config artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-config
          path: /tmp/pypi-config
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PyPI index URL
        id: get-url
        run: |
          PYPI_URL=$(cat /tmp/pypi-config/pypi-index-url.txt)
          echo "pypi_index_url=$PYPI_URL" >> "$GITHUB_OUTPUT"
          echo "Using custom PyPI index: $PYPI_URL"

  # Wait for python-build-pages workflow when use-build-pages-pip label is present on PR
  wait-for-python-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'use-build-pages-pip')
    outputs:
      pypi_index_url: ${{ steps.set-url.outputs.pypi_index_url }}
    steps:
      - name: Wait for Python Build workflow
        id: wait-workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Waiting for Python Build workflow to complete for SHA: $HEAD_SHA"

          # Wait up to 30 minutes for the workflow to complete
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=30

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i/$MAX_ATTEMPTS: Checking workflow status..."

            # Find the workflow run for python-build-pages on this commit
            RUN_INFO=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/workflows/python-build-pages.yml/runs?head_sha=$HEAD_SHA&per_page=1" \
              --jq '.workflow_runs[0] | {id: .id, status: .status, conclusion: .conclusion}' 2>/dev/null || echo '{}')

            RUN_ID=$(echo "$RUN_INFO" | jq -r '.id // empty')
            STATUS=$(echo "$RUN_INFO" | jq -r '.status // empty')
            CONCLUSION=$(echo "$RUN_INFO" | jq -r '.conclusion // empty')

            if [ -z "$RUN_ID" ]; then
              echo "No workflow run found yet, waiting..."
              sleep $SLEEP_SECONDS
              continue
            fi

            echo "Found run $RUN_ID with status=$STATUS, conclusion=$CONCLUSION"

            if [ "$STATUS" == "completed" ]; then
              if [ "$CONCLUSION" == "success" ]; then
                echo "Workflow completed successfully!"
                echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "::error::Python Build workflow failed with conclusion: $CONCLUSION"
                exit 1
              fi
            fi

            echo "Workflow still running, waiting ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
          done

          echo "::error::Timed out waiting for Python Build workflow"
          exit 1

      - name: Download PyPI config artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-config
          path: /tmp/pypi-config
          run-id: ${{ steps.wait-workflow.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read PyPI index URL
        id: set-url
        run: |
          PYPI_URL=$(cat /tmp/pypi-config/pypi-index-url.txt)
          echo "pypi_index_url=$PYPI_URL" >> "$GITHUB_OUTPUT"
          echo "Using PyPI index URL from python-build-pages: $PYPI_URL"

  setup:
    runs-on: depot-ubuntu-24.04-small
    needs: [get-pypi-config, wait-for-python-build]
    if: |
      always() &&
      (needs.get-pypi-config.result == 'success' || needs.get-pypi-config.result == 'skipped') &&
      (needs.wait-for-python-build.result == 'success' || needs.wait-for-python-build.result == 'skipped')
    outputs:
      # TODO: Many of the vars below should not be required anymore.
      tag: ${{ steps.tag.outputs.tag }}
      slim_tag: ${{ steps.tag.outputs.slim_tag }}
      full_tag: ${{ steps.tag.outputs.full_tag }}
      short_sha: ${{ steps.tag.outputs.short_sha }} # needed for auto-deploy
      unique_tag: ${{ steps.tag.outputs.unique_tag }}
      unique_slim_tag: ${{ steps.tag.outputs.unique_slim_tag }}
      unique_full_tag: ${{ steps.tag.outputs.unique_full_tag }}
      docker-login: ${{ steps.docker-login.outputs.docker-login }}
      cloudsmith-login: ${{ steps.cloudsmith-login.outputs.cloudsmith-login }}
      publish: ${{ steps.publish.outputs.publish }}
      acrylio_publish: ${{ steps.acrylio-publish.outputs.acrylio-publish }} # publish to private dockerhub
      cloudsmith_publish: ${{ steps.cloudsmith-publish.outputs.cloudsmith-publish }} # publish to cloudsmith
      pr-publish: ${{ steps.pr-publish.outputs.publish }}
      python_release_version: ${{ steps.tag.outputs.python_release_version }}
      branch_name: ${{ steps.tag.outputs.branch_name }}
      repository_name: ${{ steps.tag.outputs.repository_name }}
      frontend_change: ${{ steps.ci-optimize.outputs.frontend-change == 'true' || github.event_name != 'pull_request' }}
      actions_change: ${{ steps.ci-optimize.outputs.actions-change == 'true' || github.event_name != 'pull_request'}}
      ingestion_change: ${{ steps.ci-optimize.outputs.ingestion-change == 'true' || github.event_name != 'pull_request' }}
      ingestion_base_change: ${{ steps.ci-optimize.outputs.ingestion-base-change == 'true' }}
      backend_change: ${{ steps.ci-optimize.outputs.backend-change == 'true' || github.event_name != 'pull_request' }}
      frontend_only: ${{ steps.ci-optimize.outputs.frontend-only == 'true' }}
      ingestion_only: ${{ steps.ci-optimize.outputs.ingestion-only == 'true' }}
      backend_only: ${{ steps.ci-optimize.outputs.backend-only == 'true' }}
      kafka_setup_change: ${{ steps.ci-optimize.outputs.kafka-setup-change == 'true' }}
      mysql_setup_change: ${{ steps.ci-optimize.outputs.mysql-setup-change == 'true' }}
      postgres_setup_change: ${{ steps.ci-optimize.outputs.postgres-setup-change == 'true' }}
      elasticsearch_setup_change: ${{ steps.ci-optimize.outputs.elasticsearch-setup-change == 'true' }}
      smoke_test_change: ${{ steps.ci-optimize.outputs.smoke-test-change == 'true' }}
      java_client_change: ${{ steps.ci-optimize.outputs.java-client-change == 'true' || github.event_name != 'pull_request' }}
      integrations_service_change: ${{ steps.ci-optimize.outputs.integrations-service-change == 'true' }}
      datahub_executor_change: ${{ steps.ci-optimize.outputs.datahub-executor-change == 'true' }}
      datahub_cloud_router_change: ${{ steps.ci-optimize.outputs.datahub-cloud-router-change == 'true' }}

      build_runner_type: ${{ steps.set-runner.outputs.build_runner_type }}
      test_runner_type: ${{ steps.set-runner.outputs.test_runner_type }}
      test_runner_type_small: ${{ steps.set-runner.outputs.test_runner_type_small }}
      use_depot_cache: ${{ steps.set-runner.outputs.use_depot_cache }}
      uv_cache_key: ${{ steps.uv-cache-key.outputs.uv_cache_key }}
      uv_cache_key_prefix: ${{ steps.uv-cache-key.outputs.uv_cache_key_prefix }}
      yarn_cache_key: ${{ steps.yarn-cache-key.outputs.yarn_cache_key }}
      yarn_cache_key_prefix: ${{ steps.yarn-cache-key.outputs.yarn_cache_key_prefix }}

      pypi_index_url: ${{ steps.set-pypi-index.outputs.pypi_index_url }}
      use_custom_pypi_index: ${{ steps.check-label.outputs.use_custom_index }}

    steps:
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@v4

      - name: Check for use-build-pages-pip label
        id: check-label
        env:
          USE_CUSTOM_INDEX: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'use-build-pages-pip') }}
        run: |
          if [ "$USE_CUSTOM_INDEX" == "true" ]; then
            echo "✓ Label 'use-build-pages-pip' detected - will use custom PyPI index"
          else
            echo "✗ Label 'use-build-pages-pip' not found - will use default PyPI index"
          fi
          echo "use_custom_index=$USE_CUSTOM_INDEX" >> "$GITHUB_OUTPUT"

      - name: Set PyPI index URL
        id: set-pypi-index
        env:
          # Use output from whichever job ran (get-pypi-config for workflow_run, wait-for-python-build for PR with label)
          PYPI_FROM_WORKFLOW_RUN: ${{ needs.get-pypi-config.outputs.pypi_index_url }}
          PYPI_FROM_PR_WAIT: ${{ needs.wait-for-python-build.outputs.pypi_index_url }}
        run: |
          # Priority order:
          # 1. Manual workflow_dispatch input (for testing)
          # 2. Custom PyPI index from python-build-pages (workflow_run trigger)
          # 3. Custom PyPI index from waiting for python-build-pages (PR with label)
          # 4. Default from gradle.properties

          if [ -n "${{ inputs.customPypiIndex }}" ]; then
            PYPI_INDEX="${{ inputs.customPypiIndex }}"
            echo "✓ Using custom PyPI index from workflow_dispatch input: $PYPI_INDEX"
          elif [ -n "$PYPI_FROM_WORKFLOW_RUN" ]; then
            PYPI_INDEX="$PYPI_FROM_WORKFLOW_RUN"
            echo "✓ Using custom PyPI index from workflow_run trigger: $PYPI_INDEX"
          elif [ -n "$PYPI_FROM_PR_WAIT" ]; then
            PYPI_INDEX="$PYPI_FROM_PR_WAIT"
            echo "✓ Using custom PyPI index from PR (waited for Python Build): $PYPI_INDEX"
          else
            PYPI_INDEX=""
            echo "✓ Using default PyPI index from gradle.properties"
          fi
          echo "pypi_index_url=$PYPI_INDEX" >> "$GITHUB_OUTPUT"

      - name: Show PyPI Configuration
        run: |
          echo "════════════════════════════════════════════════════════════════"
          echo "PyPI Index Configuration"
          echo "════════════════════════════════════════════════════════════════"
          echo "Use custom index: ${{ steps.check-label.outputs.use_custom_index }}"
          if [ "${{ steps.check-label.outputs.use_custom_index }}" == "true" ]; then
            echo "Custom PyPI index: ${{ steps.set-pypi-index.outputs.pypi_index_url }}"
            echo ""
            echo "Docker images will use DataHub CLI wheels from Cloudflare Pages"
          else
            echo "Using default PyPI index (pypi.org)"
            echo ""
            echo "To use custom wheels, add the 'use-build-pages-pip' label to this PR"
          fi
          echo "════════════════════════════════════════════════════════════════"

      - name: Compute Tag
        id: tag
        env:
          GITHUB_REF_FALLBACK: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref}}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          source .github/scripts/docker_helpers.sh
          {
            echo "short_sha=${SHORT_SHA}"
            echo "tag=$(get_tag)"
            echo "slim_tag=$(get_tag_slim)"
            echo "full_tag=$(get_tag_full)"
            echo "unique_tag=$(get_unique_tag)"
            echo "unique_slim_tag=$(get_unique_tag_slim)"
            echo "unique_full_tag=$(get_unique_tag_full)"
            echo "python_release_version=$(get_python_docker_release_v)"
            echo "branch_name=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
            echo "repository_name=${GITHUB_REPOSITORY#*/}"
          } >> "$GITHUB_OUTPUT"
      - name: Check whether Docker login is possible
        id: docker-login
        env:
          ENABLE_DOCKER_LOGIN: ${{ secrets.ACRYL_DOCKER_PASSWORD != '' || secrets.AWS_ECR_SECRET_ACCESS_KEY != '' }}
        run: |
          echo "Enable Docker Login: ${{ env.ENABLE_DOCKER_LOGIN }}"
          echo "docker-login=${{ env.ENABLE_DOCKER_LOGIN }}" >> "$GITHUB_OUTPUT"
      - name: Check whether acrylio DockerHub enabled
        id: acrylio-publish
        env:
          ENABLE_ACRYLIO_PUBLISH: >-
            ${{
               github.event_name == 'release'
               && !github.event.release.prerelease
               && ( secrets.ACRYLIO_DOCKER_USERNAME != '' && secrets.ACRYLIO_DOCKER_PASSWORD != '' )
            }}
        run: |
          echo "Enable acrylio publish: ${{ env.ENABLE_ACRYLIO_PUBLISH }}"
          echo "acrylio-publish=${{ env.ENABLE_ACRYLIO_PUBLISH }}" >> "$GITHUB_OUTPUT"
      - name: Check whether Cloudsmith login is possible
        id: cloudsmith-login
        env:
          ENABLE_CLOUDSMITH_LOGIN: ${{ secrets.CLOUDSMITH_PASSWORD != '' || secrets.AWS_ECR_SECRET_ACCESS_KEY != '' }}
        run: |
          echo "Enable Cloudsmith Login: ${{ env.ENABLE_CLOUDSMITH_LOGIN }}"
          echo "cloudsmith-login=${{ env.ENABLE_CLOUDSMITH_LOGIN }}" >> "$GITHUB_OUTPUT"
      - name: Check whether Cloudsmith enabled
        id: cloudsmith-publish
        env:
          ENABLE_CLOUDSMITH_PUBLISH: >-
            ${{
               github.event_name == 'release'
               && !github.event.release.prerelease
               && ( secrets.CLOUDSMITH_USERNAME != '' && secrets.CLOUDSMITH_PASSWORD != '' )
            }}
        run: |
          echo "Enable Cloudsmith publish: ${{ env.ENABLE_CLOUDSMITH_PUBLISH }}"
          echo "cloudsmith-publish=${{ env.ENABLE_CLOUDSMITH_PUBLISH }}" >> "$GITHUB_OUTPUT"
      - name: Check whether publishing enabled
        id: publish
        env:
          ENABLE_PUBLISH: >-
            ${{
            (github.event_name == 'release' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push')  && github.ref == 'refs/heads/acryl-main'))
               && (( secrets.DOCKER_PASSWORD != '' && secrets.ACRYL_DOCKER_PASSWORD != '' ) || secrets.AWS_ECR_SECRET_ACCESS_KEY != '')
            }}
        run: |
          echo "Enable publish: ${{ env.ENABLE_PUBLISH }}"
          echo "publish=${{ env.ENABLE_PUBLISH }}" >> "$GITHUB_OUTPUT"
      - name: Check whether PR publishing enabled
        id: pr-publish
        env:
          ENABLE_PUBLISH: >-
            ${{
               (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'publish') || contains(github.event.pull_request.labels.*.name, 'publish-docker')))
               && (( secrets.DOCKER_PASSWORD != '' && secrets.ACRYL_DOCKER_PASSWORD != '' ) || secrets.AWS_ECR_SECRET_ACCESS_KEY != '')
            }}
        run: |
          echo "Enable PR publish: ${{ env.ENABLE_PUBLISH }}"
          echo "publish=${{ env.ENABLE_PUBLISH }}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/ci-optimization
        id: ci-optimize

      - name: Determine runner type
        id: set-runner
        # This differs from oss. For fork, we always use depot runner. Retain as is during oss merges.
        #    So, Its easier to just use the regular github actions cache and build all images for each parallel job running smoke test.
        # 2. Running on a PR from a branch in the datahub-project org and push/schedule events on master.
        #    Depot is used here for remote container builds in base_build and also for all runners. Depot runners support unlimited concurrency
        #    and hence short queue times and higher parallelism of smoke tests
        run: |
          {
            echo "build_runner_type=depot-ubuntu-24.04-4"
            echo "test_runner_type=depot-ubuntu-24.04-4"
            echo "test_runner_type_small=depot-ubuntu-24.04-small"
            echo "use_depot_cache=true"
          } >> "$GITHUB_OUTPUT"

      - name: Compute UV Cache Key
        id: uv-cache-key
        # Fork and OSS will have a different implementation of this key. Do not merge.
        run: |
          echo "uv_cache_key=docker-unified-${{ runner.os }}-uv-${{ hashFiles(
            './datahub-actions/pyproject.toml',
            './datahub-actions/setup.py',
            './smoke-test/requirements.txt',
            './smoke-test/pyproject.toml',
            './metadata-integration/java/spark-lineage-legacy/spark-smoke-test/requirements.txt',
            './datahub-integrations-service/requirements.txt',
            './datahub-integrations-service/pyproject.toml',
            './metadata-ingestion/pyproject.toml',
            './metadata-ingestion/setup.py',
            './datahub-executor/requirements.txt',
            './datahub-executor/pyproject.toml') }}" >> "$GITHUB_OUTPUT"
          echo "uv_cache_key_prefix=docker-unified-${{ runner.os }}-uv-" >> "$GITHUB_OUTPUT"

      - name: Compute Yarn Cache Key
        id: yarn-cache-key
        run: |
          echo "yarn_cache_key=docker-unified-${{ runner.os }}-yarn-${{ hashFiles('./smoke-test/tests/cypress/yarn.lock', './datahub-web-react/yarn.lock') }}" >> "$GITHUB_OUTPUT"
          echo "yarn_cache_key_prefix=docker-unified-${{ runner.os }}-yarn-" >> "$GITHUB_OUTPUT"

  smoke_test_lint:
    name: Lint on smoke tests
    runs-on: depot-ubuntu-24.04
    needs: [get-pypi-config, wait-for-python-build, setup]
    if: ${{ always() && needs.setup.result == 'success' && needs.setup.outputs.smoke_test_change == 'true' }}
    steps:
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}
          restore-keys: |
            ${{ needs.setup.outputs.uv_cache_key_prefix }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}
          restore-keys: |
            ${{ needs.setup.outputs.yarn_cache_key_prefix }}

      - name: Run lint on smoke test
        env:
          # Combine multiple pypi index urls if present.
          # We always need the Cloudsmith Index URL for observe-models in datahub-executor
          # Some invocations of this workflow also provide a custom pypi_index_url to use for builds
          # which when present gets added 'space separated' to the Cloudsmith Index URL
          UV_EXTRA_INDEX_URL: >-
            ${{ secrets.CLOUDSMITH_PASSWORD && format('https://{0}:{1}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_USERNAME, secrets.CLOUDSMITH_PASSWORD) || (secrets.CLOUDSMITH_API_KEY && format('https://token:{0}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_API_KEY) || '') }}
            ${{ needs.setup.outputs.pypi_index_url || '' }}

        run: |
          python ./.github/scripts/check_python_package.py
          ./gradlew :smoke-test:pythonLint
          ./gradlew :smoke-test:cypressLint

  base_build:
    name: Build all images
    runs-on: ${{ needs.setup.outputs.build_runner_type }}
    needs: [get-pypi-config, wait-for-python-build, setup]
    if: ${{ always() && needs.setup.result == 'success' && needs.setup.outputs.use_depot_cache == 'true' }} # On oss fork, smoke test job does the build since depot cache is not available
    outputs:
      build_id: ${{ steps.capture-build-id.outputs.build_id }}
      matrix: ${{ steps.capture-build-id.outputs.matrix }}
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}
          restore-keys: |
            ${{ needs.setup.outputs.uv_cache_key_prefix }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}
          restore-keys: |
            ${{ needs.setup.outputs.yarn_cache_key_prefix }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
          key: gradle-plugins-cache
          restore-keys: |
            gradle-plugins-cache

      - name: Set up Depot CLI
        if: ${{ env.DOCKER_CACHE == 'DEPOT' }}
        uses: depot/setup-action@v1

      - name: Check out the repo
        uses: acryldata/sane-checkout-action@v4
        with:
          checkout-head-only: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build all Images (For Smoke tests)
        if: ${{ needs.setup.outputs.publish != 'true' && needs.setup.outputs.pr-publish != 'true' && needs.setup.outputs.acrylio_publish != 'true' && needs.setup.outputs.cloudsmith_publish != 'true'}}
        # If not publishing, just a subset of images required for smoke tests is sufficient.
        # Use buildImagesAll for workflow_dispatch, otherwise buildImagesQuickStartDebugConsumers
        env:
          UV_EXTRA_INDEX_URL: >-
            ${{ secrets.CLOUDSMITH_PASSWORD && format('https://{0}:{1}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_USERNAME, secrets.CLOUDSMITH_PASSWORD) || (secrets.CLOUDSMITH_API_KEY && format('https://token:{0}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_API_KEY) || '') }}
            ${{ needs.setup.outputs.pypi_index_url || '' }}

        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # if triggered via workflow_dispatch, this can run other quickstart variants, so lets build all images to allow that.
            # we still dont need matrixed builds since this is for smoke test only.
            BUILD_TASK=":docker:buildImagesAll"
          else
            BUILD_TASK=":docker:buildImagesQuickstart"
          fi

          # Build gradle args with optional custom PyPI index
          GRADLE_ARGS="-Ptag=${{ needs.setup.outputs.tag }} -PpythonDockerVersion=${{ needs.setup.outputs.python_release_version }} -PdockerRegistry=${{ env.DOCKER_REGISTRY }} -PincludeWolfiVariants=${{ env.INCLUDE_WOLFI_VARIANTS }} -PincludeAlpineVariants=${{ env.INCLUDE_ALPINE_VARIANTS }}"

          # shellcheck disable=SC2086
          ./gradlew $BUILD_TASK $GRADLE_ARGS

      - name: Login to AWS ECR
        uses: docker/login-action@v3
        if: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
        with:
          registry: 795586375822.dkr.ecr.us-west-2.amazonaws.com
          username: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}

      - name: Build Saas Images (Publish - ECR)
        if: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
        # since this is for publishing, we will build all images, not just those for smoke tests. But will publish only if tests pass for publish (head images, releases).
        # for pr-publish, publish images without waiting for tests to pass.
        env:
          UV_EXTRA_INDEX_URL: >-
            ${{ secrets.CLOUDSMITH_PASSWORD && format('https://{0}:{1}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_USERNAME, secrets.CLOUDSMITH_PASSWORD) || (secrets.CLOUDSMITH_API_KEY && format('https://token:{0}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_API_KEY) || '') }}
            ${{ needs.setup.outputs.pypi_index_url || '' }}

        run: |
          GRADLE_ARGS="-PmatrixBuild=true -Ptag=${{ needs.setup.outputs.tag }} -PshaTag=${{ needs.setup.outputs.short_sha }} -PpythonDockerVersion=${{ needs.setup.outputs.python_release_version }} -PdockerRegistry=${{ env.DOCKER_REGISTRY }} -PdockerPush=${{ needs.setup.outputs.pr-publish }} -PincludeWolfiVariants=${{ env.INCLUDE_WOLFI_VARIANTS }} -PincludeAlpineVariants=${{ env.INCLUDE_ALPINE_VARIANTS }}"
          # shellcheck disable=SC2086
          ./gradlew :docker:buildImagessaasImages $GRADLE_ARGS

      - name: Capture build Id
        id: capture-build-id
        run: |
          pip install jq
          DEPOT_BUILD_ID=$(jq -r '.["depot.build"]?.buildID' "${{ github.workspace }}/build/build-metadata.json")

          echo "build_id=${DEPOT_BUILD_ID}" >> "$GITHUB_OUTPUT"
          echo "matrix=$(jq -c '{"target":.["depot.build"].targets}' "${{ github.workspace }}/build/build-metadata.json")" >> "$GITHUB_OUTPUT"

      - name: Save build Metadata
        if: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata-${{ needs.setup.outputs.tag }}
          path: |
            ${{ github.workspace }}/build/build-metadata.json
            ${{ github.workspace }}/build/bake-spec-saasImages.json

      - name: Login to ACRYLIO DockerHub
        uses: docker/login-action@v3
        if: ${{ needs.setup.outputs.docker-login == 'true' }}
        with:
          username: ${{ secrets.ACRYLIO_DOCKER_USERNAME }}
          password: ${{ secrets.ACRYLIO_DOCKER_PASSWORD }}

      - name: Login to Cloudsmith
        uses: docker/login-action@v3
        if: ${{ needs.setup.outputs.cloudsmith-login == 'true' }}
        with:
          registry: "docker.cloudsmith.io"
          username: ${{ secrets.CLOUDSMITH_USERNAME }}
          password: ${{ secrets.CLOUDSMITH_PASSWORD }}

      - name: Build Saas Images (Publish - ACRYLIO)
        if: ${{ needs.setup.outputs.acrylio_publish == 'true' }}
        env:
          UV_EXTRA_INDEX_URL: >-
            ${{ secrets.CLOUDSMITH_PASSWORD && format('https://{0}:{1}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_USERNAME, secrets.CLOUDSMITH_PASSWORD) || (secrets.CLOUDSMITH_API_KEY && format('https://token:{0}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_API_KEY) || '') }}
            ${{ needs.setup.outputs.pypi_index_url || '' }}

        run: |
          GRADLE_ARGS="-PmatrixBuild=true -Ptag=${{ needs.setup.outputs.tag }} -PshaTag=${{ needs.setup.outputs.short_sha }} -PpythonDockerVersion=${{ needs.setup.outputs.python_release_version }} -PdockerRegistry=${{ env.ACRYLIO_DOCKER_REGISTRY }} -PdockerPush=true"
          # shellcheck disable=SC2086
          ./gradlew :docker:buildImagesminSaasImages $GRADLE_ARGS

      - name: Build Saas Images (Publish - Cloudsmith)
        if: ${{ needs.setup.outputs.cloudsmith_publish == 'true' }}
        env:
          UV_EXTRA_INDEX_URL: >-
            ${{ secrets.CLOUDSMITH_PASSWORD && format('https://{0}:{1}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_USERNAME, secrets.CLOUDSMITH_PASSWORD) || (secrets.CLOUDSMITH_API_KEY && format('https://token:{0}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_API_KEY) || '') }}
            ${{ needs.setup.outputs.pypi_index_url || '' }}

        run: |
          GRADLE_ARGS="-PmatrixBuild=true -Ptag=${{ needs.setup.outputs.tag }} -PshaTag=${{ needs.setup.outputs.short_sha }} -PpythonDockerVersion=${{ needs.setup.outputs.python_release_version }} -PdockerRegistry=${{ env.CLOUDSMITH_REGISTRY }} -PdockerPush=true"
          # shellcheck disable=SC2086
          ./gradlew :docker:buildImagesminSaasImages $GRADLE_ARGS

      - uses: actions/cache/save@v4
        if: ${{ github.ref == 'refs/heads/acryl-main' }}
        with:
          path: |
            ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}

      - uses: actions/cache/save@v4
        if: ${{ github.ref == 'refs/heads/acryl-main' }}
        with:
          path: |
            ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}
      - uses: actions/cache/save@v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
          key: gradle-plugins-cache

  copy_re_to_cloudsmith:
    name: Copy Remote Executor images to Cloudsmith RE
    runs-on: depot-ubuntu-24.04-small
    needs: [setup, base_build]
    if: ${{ needs.setup.outputs.cloudsmith_publish == 'true' }}
    env:
      SRC_REGISTRY: "docker.cloudsmith.io/datahub/enterprise"
      DST_REGISTRY: "docker.cloudsmith.io/datahub/re"
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Copy executor images to RE repo
        env:
          TAG: ${{ needs.setup.outputs.tag }}
          CLOUDSMITH_USERNAME: ${{ secrets.CLOUDSMITH_USERNAME }}
          CLOUDSMITH_PASSWORD: ${{ secrets.CLOUDSMITH_PASSWORD }}
        run: |
          # All variants to copy to RE repo (customer-facing Remote Executor images)
          # Base (Ubuntu): full, slim, locked, unbundled, slim-unbundled
          # Wolfi: wolfi, locked-wolfi
          VARIANTS=("" "-slim" "-locked" "-unbundled" "-slim-unbundled" "-wolfi" "-locked-wolfi")

          # skopeo credentials for both source and destination (same Cloudsmith account)
          CREDS="${CLOUDSMITH_USERNAME}:${CLOUDSMITH_PASSWORD}"

          echo "Copying datahub-executor images from enterprise → re repo"
          echo "Tag: ${TAG}"

          for SUFFIX in "${VARIANTS[@]}"; do
            SRC="docker://${SRC_REGISTRY}/datahub-executor:${TAG}${SUFFIX}"
            DST="docker://${DST_REGISTRY}/datahub-executor:${TAG}${SUFFIX}"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Copying: datahub-executor:${TAG}${SUFFIX}"
            echo "  Source: ${SRC_REGISTRY}"
            echo "  Dest:   ${DST_REGISTRY}"

            if skopeo copy --all \
              --src-creds "${CREDS}" \
              --dest-creds "${CREDS}" \
              "${SRC}" "${DST}"; then
              echo "  ✓ Success"
            else
              echo "  ✗ Failed to copy datahub-executor:${TAG}${SUFFIX}"
              exit 1
            fi
          done

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ All executor images copied to RE repo"

  scan_images:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: Scan images for vulnerabilities
    runs-on: depot-ubuntu-24.04
    needs: [setup, base_build]
    if: ${{ needs.setup.outputs.publish == 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.base_build.outputs.matrix) }}
    steps:
      - name: Checkout # adding checkout step just to make trivy upload happy
        uses: acryldata/sane-checkout-action@v4
      - id: download_image
        name: Download images from depot
        if: ${{ needs.setup.outputs.use_depot_cache == 'true' }}
        run: |
          depot pull --project "${{ env.DEPOT_PROJECT_ID }}" "${{ needs.base_build.outputs.build_id }}" --target "${{ matrix.target}}"
          docker images
          echo "docker_image=$(docker images --format '{{.Repository}}:{{.Tag}}'  | grep "${{ needs.setup.outputs.tag }}" )" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        env:
          TRIVY_OFFLINE_SCAN: true
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1,ghcr.io/aquasecurity/trivy-java-db:1
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-west-2
        with:
          image-ref: ${{ steps.download_image.outputs.docker_image }}
          format: "template"
          template: "@/contrib/sarif.tpl"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          vuln-type: "os,library"
          trivy-config: "./trivy.yaml"
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ false }} # Saas only - we can't upload results
        with:
          sarif_file: "trivy-results.sarif"

  smoke_test_matrix:
    runs-on: ${{ needs.setup.outputs.test_runner_type_small }}
    needs: [get-pypi-config, wait-for-python-build, setup]
    if: ${{ always() && needs.setup.result == 'success' }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      cypress_batch_count: ${{ steps.set-batch-count.outputs.cypress_batch_count }}
      python_batch_count: ${{ steps.set-batch-count.outputs.python_batch_count }}
    steps:
      - id: set-batch-count
        # Tests are split simply to ensure the configured number of batches for parallelization. This may need some
        # increase as a new tests added increase the duration where an additional parallel batch helps.
        # python_batch_count is used to split pytests in the smoke-test (batches of actual test functions)
        # cypress_batch_count is used to split the collection of cypress test specs into batches.
        run: |
          if [[ "${{ env.IS_FORK }}" == "true" ]]; then
            echo "cypress_batch_count=5" >> "$GITHUB_OUTPUT"
            echo "python_batch_count=3" >> "$GITHUB_OUTPUT"
          else
            echo "cypress_batch_count=13" >> "$GITHUB_OUTPUT"
            echo "python_batch_count=16" >> "$GITHUB_OUTPUT"
          fi

      - id: set-matrix
        # For m batches for python and n batches for cypress, we need a test matrix of python x m + cypress x n.
        # while the github action matrix generation can handle these two parts individually, there isnt a way to use the
        # two generated matrices for the same job. So, produce that matrix with scripting and use the include directive
        # to add it to the test matrix.
        run: |
          python_batch_count=${{ steps.set-batch-count.outputs.python_batch_count }}
          python_matrix='{"test_strategy":"pytests","batch":"0","batch_count":"'"$python_batch_count"'"}'
          for ((i=1;i<python_batch_count;i++)); do
            python_matrix="$python_matrix"',{"test_strategy":"pytests","batch_count":"'"$python_batch_count"'","batch":"'"$i"'"}'
          done

          cypress_batch_count=${{ steps.set-batch-count.outputs.cypress_batch_count }}
          cypress_matrix='{"test_strategy":"cypress","batch":"0","batch_count":"'"$cypress_batch_count"'"}'
          for ((i=1;i<cypress_batch_count;i++)); do
            cypress_matrix="$cypress_matrix"',{"test_strategy":"cypress","batch_count":"'"$cypress_batch_count"'","batch":"'"$i"'"}'
          done

          includes=''
          if [[ "${{ needs.setup.outputs.backend_change }}" == 'true' || "${{ needs.setup.outputs.smoke_test_change }}" == 'true' || "${{ needs.setup.outputs.publish }}" == 'true' ]]; then
            includes="$python_matrix,$cypress_matrix"
          elif [[  "${{ needs.setup.outputs.frontend_only }}" == 'true' ]]; then
            includes="$cypress_matrix"
          elif [[ "${{ needs.setup.outputs.ingestion_only }}" == 'true' ]]; then
            includes="$python_matrix"
          fi
          echo "matrix={\"include\":[$includes] }" >> "$GITHUB_OUTPUT"

  load_secrets:
    name: Load secrets from 1Password
    runs-on: depot-ubuntu-24.04-small
    needs: setup
    outputs:
      bigquery_project_id: ${{ steps.load-secrets-retry.outputs.bigquery_project_id || steps.load-secrets.outputs.bigquery_project_id }}
      bigquery_client_email: ${{ steps.load-secrets-retry.outputs.bigquery_client_email || steps.load-secrets.outputs.bigquery_client_email }}
      bigquery_private_key: ${{ steps.load-secrets-retry.outputs.bigquery_private_key || steps.load-secrets.outputs.bigquery_private_key }}
      bigquery_private_key_id: ${{ steps.load-secrets-retry.outputs.bigquery_private_key_id || steps.load-secrets.outputs.bigquery_private_key_id }}
      bigquery_client_id: ${{ steps.load-secrets-retry.outputs.bigquery_client_id || steps.load-secrets.outputs.bigquery_client_id }}
    steps:
      - name: Load secrets from 1Password
        id: load-secrets
        uses: 1password/load-secrets-action@v2
        continue-on-error: true
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          BIGQUERY_PROJECT_ID: op://Engineering/SmokeTest - Bigquery/project_id
          BIGQUERY_CLIENT_EMAIL: op://Engineering/SmokeTest - Bigquery/client_email
          BIGQUERY_PRIVATE_KEY: op://Engineering/SmokeTest - Bigquery/private_key
          BIGQUERY_PRIVATE_KEY_ID: op://Engineering/SmokeTest - Bigquery/private_key_id
          BIGQUERY_CLIENT_ID: op://Engineering/SmokeTest - Bigquery/client_id

      - name: Wait before retry if rate limited
        if: steps.load-secrets.outcome == 'failure'
        run: |
          RETRY_DELAY=$((RANDOM % 30 + 20))
          echo "First attempt failed, waiting ${RETRY_DELAY} seconds before retry..."
          sleep $RETRY_DELAY

      - name: Load secrets from 1Password (retry)
        id: load-secrets-retry
        if: steps.load-secrets.outcome == 'failure'
        uses: 1password/load-secrets-action@v2
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          BIGQUERY_PROJECT_ID: op://Engineering/SmokeTest - Bigquery/project_id
          BIGQUERY_CLIENT_EMAIL: op://Engineering/SmokeTest - Bigquery/client_email
          BIGQUERY_PRIVATE_KEY: op://Engineering/SmokeTest - Bigquery/private_key
          BIGQUERY_PRIVATE_KEY_ID: op://Engineering/SmokeTest - Bigquery/private_key_id
          BIGQUERY_CLIENT_ID: op://Engineering/SmokeTest - Bigquery/client_id

  smoke_test:
    name: Run Smoke Tests (${{ matrix.test_strategy }}, Batch ${{ matrix.batch }}/${{ matrix.batch_count }})
    runs-on: ${{ needs.setup.outputs.test_runner_type }}
    needs: [setup, smoke_test_matrix, base_build, load_secrets]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.smoke_test_matrix.outputs.matrix || '{"include":[]}') }}
    if: ${{ always() && !failure() && !cancelled() && needs.smoke_test_matrix.outputs.matrix != '' && needs.smoke_test_matrix.outputs.matrix != '{"include":[]}' }}
    env:
      # TODO Chakru: Review if required
      MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
      MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
    steps:
      - name: Free up disk space
        if: ${{ env.DEPOT_PROJECT_ID == '' }}
        # We have enough space on depot, this takes over a minute. Needed only on github runners
        run: |
          sudo apt-get remove 'dotnet-*' azure-cli || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/julia* || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /usr/share/miniconda || true
          sudo rm -rf /usr/local/lib/android/ || true
          sudo docker system prune -a -f || true
          df -h

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}
          restore-keys: |
            ${{ needs.setup.outputs.uv_cache_key_prefix }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}
          restore-keys: |
            ${{ needs.setup.outputs.yarn_cache_key_prefix }}
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@v4
        with:
          checkout-head-only: false

      - name: Set up Depot CLI
        if: ${{ needs.setup.outputs.use_depot_cache == 'true' }}
        uses: depot/setup-action@v1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Detect workflow retry
        id: retry-detection
        run: |
          RUN_ATTEMPT="${{ github.run_attempt }}"
          if [[ "$RUN_ATTEMPT" -gt 1 ]]; then
            echo "This is retry attempt $RUN_ATTEMPT"
            echo "is_retry=true" >> "$GITHUB_OUTPUT"
            PREVIOUS_ATTEMPT=$((RUN_ATTEMPT - 1))
            echo "previous_attempt=${PREVIOUS_ATTEMPT}" >> "$GITHUB_OUTPUT"
          else
            echo "This is the first attempt"
            echo "is_retry=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download previous test results
        if: steps.retry-detection.outputs.is_retry == 'true'
        id: download-artifacts
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e

          echo "Downloading artifacts from run ${{ github.run_id }}, attempt ${{ steps.retry-detection.outputs.previous_attempt }}"

          # Create directory for previous results
          mkdir -p "${{ github.workspace }}/previous-test-results"

          # Get artifact ID for this batch's test results
          ARTIFACT_NAME="Test Results (smoke tests) ${{ matrix.test_strategy }} ${{ matrix.batch }}"
          echo "Looking for artifact: ${ARTIFACT_NAME}"

          # Query artifacts for this workflow run
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq ".artifacts[] | select(.name == \"${ARTIFACT_NAME}\") | .id" | head -1)

          if [[ -z "$ARTIFACT_ID" ]]; then
            echo "No artifact found for batch ${{ matrix.batch }}"
            echo "download_success=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found artifact ID: ${ARTIFACT_ID}"

          # Download and extract artifact
          cd "${{ github.workspace }}/previous-test-results"
          gh api "repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip" > artifact.zip
          unzip -q artifact.zip

          # Verify we got XML files
          if [[ "${{ matrix.test_strategy }}" == "cypress" ]]; then
            # Cypress XMLs are in smoke-test/tests/cypress/build/smoke-test-results/
            if find . -path "*/smoke-test-results/cypress-test-*.xml" -print -quit | grep -q .; then
              echo "Successfully downloaded cypress test results"
              echo "download_success=true" >> "$GITHUB_OUTPUT"
            else
              echo "No cypress test XML files found in artifact"
              echo "download_success=false" >> "$GITHUB_OUTPUT"
            fi
          else
            # Pytest XMLs are in smoke-test/junit.*.xml
            if find . -path "*/junit*.xml" -print -quit | grep -q .; then
              echo "Successfully downloaded pytest test results"
              echo "download_success=true" >> "$GITHUB_OUTPUT"
            else
              echo "No pytest XML files found in artifact"
              echo "download_success=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Parse failed Cypress tests
        if: |
          steps.retry-detection.outputs.is_retry == 'true' &&
          matrix.test_strategy == 'cypress' &&
          steps.download-artifacts.outputs.download_success == 'true'
        id: parse-cypress-failures
        run: |
          set +e

          OUTPUT_FILE="${{ github.workspace }}/failed-tests-batch-${{ matrix.batch }}.txt"

          python3 .github/scripts/parse_failed_cypress_tests.py \
            --input-dir "${{ github.workspace }}/previous-test-results" \
            --output "${OUTPUT_FILE}"

          EXIT_CODE=$?

          case $EXIT_CODE in
            0)
              echo "parse_result=has_failures" >> "$GITHUB_OUTPUT"
              echo "filtered_tests_file=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
              echo "Will retry $(wc -l < ${OUTPUT_FILE}) failed test(s)"
              ;;
            2)
              echo "parse_result=all_passed" >> "$GITHUB_OUTPUT"
              echo "All tests passed in previous attempt - will skip batch"
              ;;
            3)
              echo "parse_result=no_artifacts" >> "$GITHUB_OUTPUT"
              echo "No test results found - will run all tests"
              ;;
            *)
              echo "parse_result=error" >> "$GITHUB_OUTPUT"
              echo "Error parsing test results - will run all tests"
              ;;
          esac

      - name: Parse failed pytest modules
        if: |
          steps.retry-detection.outputs.is_retry == 'true' &&
          matrix.test_strategy == 'pytests' &&
          steps.download-artifacts.outputs.download_success == 'true'
        id: parse-pytest-failures
        run: |
          set +e

          OUTPUT_FILE="${{ github.workspace }}/failed-modules-batch-${{ matrix.batch }}.txt"

          python3 .github/scripts/parse_failed_pytest_tests.py \
            --input-dir "${{ github.workspace }}/previous-test-results" \
            --output "${OUTPUT_FILE}"

          EXIT_CODE=$?

          case $EXIT_CODE in
            0)
              echo "parse_result=has_failures" >> "$GITHUB_OUTPUT"
              echo "filtered_tests_file=${OUTPUT_FILE}" >> "$GITHUB_OUTPUT"
              echo "Will retry $(wc -l < ${OUTPUT_FILE}) failed module(s)"
              ;;
            2)
              echo "parse_result=all_passed" >> "$GITHUB_OUTPUT"
              echo "All tests passed in previous attempt - will skip batch"
              ;;
            3)
              echo "parse_result=no_artifacts" >> "$GITHUB_OUTPUT"
              echo "No test results found - will run all tests"
              ;;
            *)
              echo "parse_result=error" >> "$GITHUB_OUTPUT"
              echo "Error parsing test results - will run all tests"
              ;;
          esac

      - name: Clean up downloaded artifacts
        if: steps.retry-detection.outputs.is_retry == 'true'
        run: |
          # Cleaning up downloaded test results to prevent contamination of current run
          rm -rf "${{ github.workspace }}/previous-test-results"

      - name: Skip batch if all tests passed
        if: |
          steps.parse-cypress-failures.outputs.parse_result == 'all_passed' ||
          steps.parse-pytest-failures.outputs.parse_result == 'all_passed'
        run: |
          echo "✓ All tests passed in previous attempt for ${{ matrix.test_strategy }} batch ${{ matrix.batch }}"
          echo "Skipping this batch to optimize CI time (Docker images, quickstart, and tests)"
          exit 0

      - uses: gradle/actions/setup-gradle@v4
        if: ${{ env.DEPOT_PROJECT_ID == '' }}

      - name: Disk Space Analysis
        run: |
          echo "=== Disk Usage Overview ==="
          df -h

          echo -e "\n=== Docker Disk Usage ==="
          docker system df -v

      - name: build images
        if: ${{ env.DEPOT_PROJECT_ID == '' }}
        run: |
          GRADLE_ARGS="-Ptag=${{ needs.setup.outputs.tag }} -PpythonDockerVersion=${{ needs.setup.outputs.python_release_version }} -PdockerRegistry=${{ env.DOCKER_REGISTRY }} -PincludeWolfiVariants=${{ env.INCLUDE_WOLFI_VARIANTS }} -PincludeAlpineVariants=${{ env.INCLUDE_ALPINE_VARIANTS }}"
          # shellcheck disable=SC2086
          ./gradlew :docker:buildImagesQuickstartDebugConsumers $GRADLE_ARGS
          docker images
        env:
          DOCKER_CACHE: GITHUB
          UV_EXTRA_INDEX_URL: >-
            ${{ secrets.CLOUDSMITH_PASSWORD && format('https://{0}:{1}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_USERNAME, secrets.CLOUDSMITH_PASSWORD) || (secrets.CLOUDSMITH_API_KEY && format('https://token:{0}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_API_KEY) || '') }}
            ${{ needs.setup.outputs.pypi_index_url || '' }}

      - name: pull images from depot
        if: |
          needs.setup.outputs.use_depot_cache == 'true' &&
          steps.parse-cypress-failures.outputs.parse_result != 'all_passed' &&
          steps.parse-pytest-failures.outputs.parse_result != 'all_passed'

        run: |
          depot pull --project "${{ env.DEPOT_PROJECT_ID }}" "${{ needs.base_build.outputs.build_id }}"
          docker images

      - name: run quickstart
        if: |
          steps.parse-cypress-failures.outputs.parse_result != 'all_passed' &&
          steps.parse-pytest-failures.outputs.parse_result != 'all_passed'
        env:
          DATAHUB_TELEMETRY_ENABLED: false
          DATAHUB_REPO: ${{ env.DOCKER_REGISTRY }}
          DATAHUB_VERSION: ${{ needs.setup.outputs.tag }}
          DATAHUB_EXECUTOR_VERSION: ${{ needs.setup.outputs.tag }}
          DATAHUB_CLOUD_ROUTER_VERSION: ${{ needs.setup.outputs.tag }}
          DATAHUB_REMOTE_EXECUTOR_VERSION: ${{ needs.setup.outputs.tag }}
          ACTIONS_EXTRA_PACKAGES: "acryl-datahub-actions[executor] acryl-datahub-actions"
          ACTIONS_CONFIG: "https://raw.githubusercontent.com/acryldata/datahub-actions/main/docker/config/executor.yaml"
          DATAHUB_INTEGRATIONS_VERSION: ${{ needs.setup.outputs.tag }}
          DATAHUB_SMOKETEST_EXECUTOR_ID: "${{ needs.setup.outputs.short_sha }}-${{ matrix.test_strategy }}-${{ matrix.batch }}"
          AWS_SECRET_ACCESS_KEY: ${{ secrets.REMOTE_EXECUTOR_AWS_ACCESS_KEY_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.REMOTE_EXECUTOR_AWS_ACCESS_KEY_ID }}
          AWS_REGION: us-west-2
          UV_EXTRA_INDEX_URL: >-
            ${{ secrets.CLOUDSMITH_PASSWORD && format('https://{0}:{1}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_USERNAME, secrets.CLOUDSMITH_PASSWORD) || (secrets.CLOUDSMITH_API_KEY && format('https://token:{0}@dl.cloudsmith.io/basic/datahub/datahub-cloud/python/simple/', secrets.CLOUDSMITH_API_KEY) || '') }}
            ${{ needs.setup.outputs.pypi_index_url || '' }}

        run: |
          # Quickstart uses PROFILE_NAME env if defined to start the profile specified. Defaults to quickstart-consumers
          ./smoke-test/run-quickstart.sh

      - name: Disk Check
        run: df -h . && docker images

      - name: Disable ES Disk Threshold
        run: |
          curl -XPUT "http://localhost:9200/_cluster/settings" \
          -H 'Content-Type: application/json' -d'{
            "persistent": {
              "cluster": {
                "routing": {
                  "allocation.disk.threshold_enabled": false
                }
              }
            }
          }'

      - name: Install dependencies
        run: ./metadata-ingestion/scripts/install_deps.sh

      - name: Build datahub cli
        run: |
          ./gradlew :metadata-ingestion:install

      - name: Set secrets from load_secrets job
        run: |
          {
            echo "BIGQUERY_PROJECT_ID=${{ needs.load_secrets.outputs.bigquery_project_id }}"
            echo "BIGQUERY_CLIENT_EMAIL=${{ needs.load_secrets.outputs.bigquery_client_email }}"
            echo "BIGQUERY_PRIVATE_KEY=${{ needs.load_secrets.outputs.bigquery_private_key }}"
            echo "BIGQUERY_PRIVATE_KEY_ID=${{ needs.load_secrets.outputs.bigquery_private_key_id }}"
            echo "BIGQUERY_CLIENT_ID=${{ needs.load_secrets.outputs.bigquery_client_id }}"
          } >> "$GITHUB_ENV"

      - name: Smoke test
        if: |
          steps.parse-cypress-failures.outputs.parse_result != 'all_passed' &&
          steps.parse-pytest-failures.outputs.parse_result != 'all_passed'
        env:
          RUN_QUICKSTART: false
          DATAHUB_VERSION: ${{ needs.setup.outputs.tag }}
          CYPRESS_RECORD_KEY: ${{ secrets.ACRYL_CYPRESS_RECORD_KEY }}
          CLEANUP_DATA: "false"
          TEST_STRATEGY: ${{ matrix.test_strategy }}
          BATCH_COUNT: ${{ matrix.batch_count }}
          BATCH_NUMBER: ${{ matrix.batch }}
          FILTERED_TESTS: ${{ steps.parse-cypress-failures.outputs.filtered_tests_file || steps.parse-pytest-failures.outputs.filtered_tests_file || '' }}
          DATAHUB_SMOKETEST_EXECUTOR_ID: "${{ needs.setup.outputs.short_sha }}-${{ matrix.test_strategy }}-${{ matrix.batch }}"
        run: |
          if [[ -n "$FILTERED_TESTS" && -f "$FILTERED_TESTS" ]]; then
            echo "=========================================="
            if [[ "${{ matrix.test_strategy }}" == "cypress" ]]; then
              echo "RETRY MODE: Running only failed Cypress tests"
            else
              echo "RETRY MODE: Running only failed pytest modules"
            fi
            echo "=========================================="
            echo "Failed items to retry:"
            cat "$FILTERED_TESTS"
            echo "=========================================="
          elif [[ "${{ steps.retry-detection.outputs.is_retry }}" == "true" ]]; then
            echo "RETRY MODE: Running all tests (fallback)"
          fi

          echo "$DATAHUB_VERSION"
          ./gradlew --stop
          ./smoke-test/smoke.sh

      - name: Java SDK V2 Integration Tests
        if: ${{ (needs.setup.outputs.backend_change == 'true' || needs.setup.outputs.java_client_change == 'true') && matrix.batch == '0' }}
        env:
          DATAHUB_SERVER: http://localhost:8080
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: mypass
        run: |
          echo "Running Java SDK V2 integration tests against running DataHub instance..."
          ./gradlew :metadata-integration:java:datahub-client:test --tests "*Integration*"

      - name: Upload Java SDK V2 coverage to Codecov
        if: ${{ always() && (needs.setup.outputs.backend_change == 'true' || needs.setup.outputs.java_client_change == 'true') && matrix.batch == '0' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./build/coverage-reports/metadata-integration/java/datahub-client/
          flags: metadata-integration
          name: java-sdk-v2-integration
          fail_ci_if_error: false
          verbose: true
          override_branch: ${{ github.head_ref || github.ref_name }}

      - name: store logs
        if: failure()
        run: |
          docker ps -a
          TEST_STRATEGY="-${{ matrix.test_strategy }}-${{ matrix.batch }}"
          source .github/scripts/docker_logs.sh
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs-${{ matrix.test_strategy }}-${{ matrix.batch }}
          path: "docker_logs/*.log"
          retention-days: 5
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-snapshots-${{ matrix.test_strategy }}-${{ matrix.batch }}
          path: smoke-test/tests/cypress/cypress/screenshots/
          retention-days: 5
      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: smoke-test/tests/cypress/cypress/videos/
          retention-days: 5
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results (smoke tests) ${{ matrix.test_strategy }} ${{ matrix.batch }}
          path: |
            **/build/reports/tests/test/**
            **/build/test-results/test/**
            **/smoke-test-results/cypress-test-*.xml
            **/junit.*.xml
            !**/binary/**
          retention-days: 5
      - name: Send failed test metrics to PostHog
        if: failure()
        continue-on-error: true
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          if [ -z "$POSTHOG_API_KEY" ]; then
            echo "⚠️ POSTHOG_API_KEY not configured, skipping test failure metrics"
            exit 0
          fi

          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/test-results"
          find . -name "*.xml" -path "*/build/test-results/*" -exec cp {} "$TEMP_DIR/test-results/" \; 2>/dev/null || true
          find . -name "cypress-test-*.xml" -exec cp {} "$TEMP_DIR/test-results/" \; 2>/dev/null || true
          find . -name "junit.*.xml" -exec cp {} "$TEMP_DIR/test-results/" \; 2>/dev/null || true

          python3 .github/scripts/send_failed_tests_to_posthog.py \
            --input-dir "$TEMP_DIR/test-results" \
            --posthog-api-key "$POSTHOG_API_KEY" \
            --posthog-host "${POSTHOG_HOST:-https://app.posthog.com}" \
            --repository "${{ github.repository }}" \
            --workflow-name "${{ github.workflow }}" \
            --branch "${{ github.head_ref || github.ref_name }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --batch "${{ matrix.batch }}" \
            --batch-count "${{ strategy.job-total }}" \
            --test-strategy "${{ matrix.test_strategy }}"

          rm -rf "$TEMP_DIR"
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          override_branch: ${{ github.head_ref || github.ref_name }}

      - uses: actions/cache/save@v4
        if: ${{ github.ref == 'refs/heads/acryl-main'  && matrix.batch == '0' }}
        # The cache does not need to be saved by all the parallel workers. The cache contents is not dependent on tests.
        with:
          path: |
            ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}

      - uses: actions/cache/save@v4
        if: ${{ github.ref == 'refs/heads/acryl-main' && matrix.batch == '0'  && matrix.batch == '0' }}
        with:
          path: |
            ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}

  # Acryl Saas Only
  smoke_test_cleanup:
    name: Smoke Tests Cleanup Items
    runs-on: ${{ needs.setup.outputs.test_runner_type_small }}
    needs: [setup, base_build]
    if: ${{ always() }}
    steps:
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@v3
      - name: Cleanup old SQS queues
        env:
          AWS_SECRET_ACCESS_KEY: ${{ secrets.REMOTE_EXECUTOR_AWS_ACCESS_KEY_SECRET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.REMOTE_EXECUTOR_AWS_ACCESS_KEY_ID }}
          AWS_REGION: us-west-2
        run: |
          pip install awscli
          ./datahub-executor/scripts/smoke-test-cleanup.sh

  publish_images:
    name: Push images after tests pass
    runs-on: ${{ needs.setup.outputs.test_runner_type_small || 'ubuntu-latest' }}
    needs: [setup, smoke_test, base_build]
    if: ${{ always() && !failure() && !cancelled() && needs.setup.result != 'skipped' }}
    steps:
      - name: Check if tests have passed
        id: tests_passed
        run: |
          # Check the overall result of the matrix job
          # Matrix jobs can have mixed results, so we check for any failures
          if [[ "${{ needs.smoke_test.result }}" == "failure" ]]; then
            echo "Smoke tests failed, skipping image pushing"
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          elif [[ "${{ needs.smoke_test.result }}" == "cancelled" ]]; then
            echo "Smoke tests were cancelled, skipping image pushing"
            echo "tests_passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "Smoke tests completed successfully, proceeding with image pushing"
            echo "tests_passed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Depot CLI
        if: ${{ steps.tests_passed.outputs.tests_passed == 'true' && needs.setup.outputs.use_depot_cache == 'true' }}
        uses: depot/setup-action@v1

      - name: Login to AWS ECR
        uses: docker/login-action@v3
        if: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
        with:
          registry: 795586375822.dkr.ecr.us-west-2.amazonaws.com
          username: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}

      - name: Download build Metadata
        if: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
        uses: actions/download-artifact@v6
        with:
          name: build-metadata-${{ needs.setup.outputs.tag }}
          path: ${{ github.workspace }}/build

      - name: Push images from depot builder
        if: ${{ steps.tests_passed.outputs.tests_passed == 'true' && needs.setup.outputs.use_depot_cache == 'true' && needs.setup.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          depot bake -f "${{ github.workspace }}/build/bake-spec-saasImages.json" --print | jq -c '.target | to_entries | map({target: .key, tags: .value.tags[]})'| jq -c '.[]' | while IFS= read -r line; do
            TARGET=$(echo "$line" | jq -r '.target')
            TAG=$(echo "$line" | jq -r '.tags')

            depot push --project "${{ env.DEPOT_PROJECT_ID }}" "${{ needs.base_build.outputs.build_id }}" --target "$TARGET" --tag "$TAG"
          done

