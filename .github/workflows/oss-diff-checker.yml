name: oss-diff-checker

# This workflow validates OSS vs SaaS differences to prevent uncontrolled drift.
#
# Two-tier approach:
# 1. General OSS diff check (non-blocking) - warns about violations but allows PR to pass
# 2. Blocking checks for critical directories - FAILS the workflow if violations are found
#
# Blocking directories (prevent SaaS-specific additions):
# - metadata-ingestion: Core ingestion framework should stay aligned with OSS
# - datahub-actions: Action framework should stay aligned with OSS
#
# Implementation note: Blocking checks run in the same job (not a separate matrix job)
# because auto-loosened exceptions from the main check need to be shared with blocking
# checks. GitHub job isolation would require artifact passing, adding unnecessary complexity.
#
# To extend blocking checks: Add directories to the BLOCKING_DIRS array in the workflow

on:
  pull_request:
    branches:
      - acryl-main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DEPOT_PROJECT_ID: "${{ vars.DEPOT_PROJECT_ID }}"

jobs:
  build:
    runs-on: depot-ubuntu-24.04-small
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Detect changes in contrib/oss-diff
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: |
            contrib/oss-diff/**
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Checkout base branch (acryl-main) for loosening
        if: ${{ steps.changed-files.outputs.any_changed == 'false' }}
        uses: actions/checkout@v4
        with:
          ref: acryl-main
          fetch-depth: 0
      - name: Add OSS as a remote
        if: ${{ steps.changed-files.outputs.any_changed == 'false' }}
        run: |
          git remote add oss https://github.com/datahub-project/datahub.git
          git fetch oss
      - name: Loosen exceptions when no oss-diff changes
        if: ${{ steps.changed-files.outputs.any_changed == 'false' }}
        run: uv run ./contrib/oss-diff/oss-diff.py check --loosen
        env:
          OSS_BRANCH: oss/master
      - name: Stash updated exceptions file
        if: ${{ steps.changed-files.outputs.any_changed == 'false' }}
        run: |
          mkdir -p "$RUNNER_TEMP/oss-diff"
          cp contrib/oss-diff/oss-diff-exceptions.json "$RUNNER_TEMP/oss-diff/oss-diff-exceptions.json"
      - name: Checkout PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Add OSS as a remote
        run: |
          git remote add oss https://github.com/datahub-project/datahub.git || true
          git fetch oss
      - name: Restore updated exceptions file
        if: ${{ steps.changed-files.outputs.any_changed == 'false' }}
        run: |
          cp "$RUNNER_TEMP/oss-diff/oss-diff-exceptions.json" contrib/oss-diff/oss-diff-exceptions.json
      - name: Run oss-diff check
        shell: bash
        run: |
          set +e  # Don't exit on error
          echo "::group::OSS Diff Check"
          uv run ./contrib/oss-diff/oss-diff.py check
          exit_code=$?
          echo "::endgroup::"

          if [ $exit_code -eq 0 ]; then
            echo "::notice title=OSS Diff Check::✅ Success: no new diff violations"
            exit 0
          else
            echo "::warning title=OSS Diff Check::🚨 Found diff violations - see details above"
            echo "::notice title=Resolution::To resolve: Send these changes to OSS and have them come into SaaS via an OSS merge"
            exit 0  # Don't fail the CI check, just show as warning
          fi
        env:
          OSS_BRANCH: oss/master
      - name: Check blocking directories for violations
        shell: bash
        run: |
          # Directories that should NOT have SaaS-specific additions
          # Violations in these directories will cause the workflow to fail
          BLOCKING_DIRS=("metadata-ingestion" "datahub-actions")

          overall_exit_code=0

          for dir in "${BLOCKING_DIRS[@]}"; do
            echo "::group::${dir} OSS Diff Check (BLOCKING)"
            uv run ./contrib/oss-diff/oss-diff.py check "${dir}"
            exit_code=$?
            echo "::endgroup::"

            if [ $exit_code -eq 0 ]; then
              echo "::notice title=${dir} OSS Diff::✅ Success: no ${dir} diff violations"
            else
              echo "::error title=${dir} OSS Diff::🚨 Found ${dir} diff violations - this is blocking!"
              echo "::error title=Resolution::You must either: 1) Send these changes to OSS first, or 2) Run 'OSS_BRANCH=oss/master uv run ./contrib/oss-diff/oss-diff.py check ${dir} --loosen' and commit the updated exceptions"
              overall_exit_code=1
            fi
          done

          if [ $overall_exit_code -ne 0 ]; then
            echo "::error title=Blocking Directories Check::One or more blocking directories have OSS diff violations. See details above."
            exit 1
          fi
        env:
          OSS_BRANCH: oss/master
