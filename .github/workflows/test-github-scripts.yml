name: Python Tests for github scripts

on:
  push:
    paths:
      - ".github/scripts/**"
  pull_request:
    paths:
      - ".github/scripts/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Deps pulled in by the scripts under test: requests/posthog match
          # post-workflow-actions.yml; defusedxml is used by the XML parsers.
          pip install pytest requests==2.32.5 posthog==7.9.4 defusedxml

      - name: Run tests
        run: |
          pytest .github/scripts/test
