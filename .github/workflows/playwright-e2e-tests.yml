name: Playwright E2E Tests

on:
  workflow_dispatch:
    inputs:
      profileName:
        description: "Profile name for quickstart. Defaults to quickstart-consumers if not specified"
        required: false
        default: "quickstart-consumers"
        type: string
      shard_count:
        description: "Number of parallel shards for Playwright"
        required: false
        default: "4"
        type: string
  push:
    branches:
      - e2e/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  PROFILE_NAME: "${{ github.event.inputs.profileName || 'quickstart-consumers' }}"
  DOCKER_CACHE: "DEPOT"
  DEPOT_PROJECT_ID: ${{ vars.DEPOT_PROJECT_ID }}
  HAS_DEPOT_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'depot') }}
  IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
  DEPOT_TOKEN: "${{ secrets.DEPOT_TOKEN }}"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-slim
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      slim_tag: ${{ steps.tag.outputs.slim_tag }}
      full_tag: ${{ steps.tag.outputs.full_tag }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
      unique_tag: ${{ steps.tag.outputs.unique_tag }}
      unique_slim_tag: ${{ steps.tag.outputs.unique_slim_tag }}
      unique_full_tag: ${{ steps.tag.outputs.unique_full_tag }}
      python_release_version: ${{ steps.tag.outputs.python_release_version }}
      branch_name: ${{ steps.tag.outputs.branch_name }}
      repository_name: ${{ steps.tag.outputs.repository_name }}
      frontend_change: ${{ steps.ci-optimize.outputs.frontend-change == 'true' || github.event_name != 'pull_request' }}
      backend_change: ${{ steps.ci-optimize.outputs.backend-change == 'true' || github.event_name != 'pull_request' }}
      playwright_change: ${{ steps.ci-optimize.outputs.smoke-test-change == 'true' || steps.ci-optimize.outputs.frontend-change == 'true' || github.event_name != 'pull_request' }}
      build_runner_type: ${{ steps.set-runner.outputs.build_runner_type }}
      test_runner_type: ${{ steps.set-runner.outputs.test_runner_type }}
      use_depot_cache: ${{ steps.set-runner.outputs.use_depot_cache }}
      uv_cache_key: ${{ steps.uv-cache-key.outputs.uv_cache_key }}
      uv_cache_key_prefix: ${{ steps.uv-cache-key.outputs.uv_cache_key_prefix }}
      yarn_cache_key: ${{ steps.yarn-cache-key.outputs.yarn_cache_key }}
      yarn_cache_key_prefix: ${{ steps.yarn-cache-key.outputs.yarn_cache_key_prefix }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      shard_count: ${{ steps.set-shard-count.outputs.shard_count }}
    steps:
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7
        with:
          checkout-head-only: true

      - name: Compute Tag
        id: tag
        env:
          GITHUB_REF_FALLBACK: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          source .github/scripts/docker_helpers.sh
          {
            echo "short_sha=${SHORT_SHA}"
            echo "tag=$(get_tag)"
            echo "slim_tag=$(get_tag_slim)"
            echo "full_tag=$(get_tag_full)"
            echo "unique_tag=$(get_unique_tag)"
            echo "unique_slim_tag=$(get_unique_tag_slim)"
            echo "unique_full_tag=$(get_unique_tag_full)"
            echo "python_release_version=$(get_python_docker_release_v)"
            echo "branch_name=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
            echo "repository_name=${GITHUB_REPOSITORY#*/}"
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/ci-optimization
        id: ci-optimize

      - uses: ./.github/actions/determine-runners
        id: determine-runners
        with:
          is-community-pr: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          has-depot-label: ${{ contains(github.event.pull_request.labels.*.name, 'depot') }}

      - name: Select runners
        id: set-runner
        run: |
          {
            echo "build_runner_type=${{ steps.determine-runners.outputs.default-runner }}"
            echo "test_runner_type=${{ steps.determine-runners.outputs.default-runner }}"
            echo "use_depot_cache=true"
          } >> "$GITHUB_OUTPUT"
          if [[ -z "${{ vars.DEPOT_PROJECT_ID }}" ]]; then
            echo "use_depot_cache=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ env.IS_FORK }}" == "true" ]]; then
            echo "use_depot_cache=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ env.HAS_DEPOT_LABEL }}" == "true" ]]; then
            {
              echo "test_runner_type=${{ steps.determine-runners.outputs.depot-runner-large }}"
              echo "use_depot_cache=false"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Set shard count
        id: set-shard-count
        run: |
          if [[ -n "${{ github.event.inputs.shard_count }}" ]]; then
            echo "shard_count=${{ github.event.inputs.shard_count }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ env.IS_FORK }}" == "true" ]]; then
            echo "shard_count=2" >> "$GITHUB_OUTPUT"
          else
            echo "shard_count=4" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Playwright sharding matrix
        id: set-matrix
        run: |
          shard_count=${{ steps.set-shard-count.outputs.shard_count }}

          should_run=false
          if [[ "${{ steps.ci-optimize.outputs.frontend-change }}" == 'true' || \
                "${{ steps.ci-optimize.outputs.backend-change }}" == 'true' || \
                "${{ steps.ci-optimize.outputs.smoke-test-change }}" == 'true' || \
                "${{ github.event_name }}" != 'pull_request' ]]; then
            should_run=true
          fi

          if [[ "$should_run" == 'false' ]]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            {
              echo "## Playwright Test Matrix"
              echo ""
              echo "Skipped — no relevant changes detected."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          matrix=''
          for ((i=1;i<=shard_count;i++)); do
            if [[ -n "$matrix" ]]; then
              matrix="$matrix,"
            fi
            matrix="${matrix}{\"shard\":\"$i\",\"shard_count\":\"$shard_count\"}"
          done

          echo "matrix={\"include\":[$matrix]}" >> "$GITHUB_OUTPUT"
          {
            echo "## Playwright Test Matrix"
            echo ""
            echo "| Strategy | Total Shards |"
            echo "|----------|--------------|"
            echo "| playwright | $shard_count |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute UV Cache Key
        id: uv-cache-key
        run: |
          echo "uv_cache_key=playwright-e2e-${{ runner.os }}-uv-${{ hashFiles('./smoke-test/requirements.txt', './smoke-test/pyproject.toml', './metadata-ingestion/pyproject.toml', './metadata-ingestion/setup.py') }}" >> "$GITHUB_OUTPUT"
          echo "uv_cache_key_prefix=playwright-e2e-${{ runner.os }}-uv-" >> "$GITHUB_OUTPUT"

      - name: Compute Yarn Cache Key
        id: yarn-cache-key
        run: |
          echo "yarn_cache_key=playwright-e2e-${{ runner.os }}-yarn-${{ hashFiles('./e2e-test/ui/playwright/package.json') }}" >> "$GITHUB_OUTPUT"
          echo "yarn_cache_key_prefix=playwright-e2e-${{ runner.os }}-yarn-" >> "$GITHUB_OUTPUT"

  build_quickstart_images:
    name: Build Quickstart images for Playwright
    runs-on: ${{ needs.setup.outputs.build_runner_type }}
    needs: setup
    if: ${{ needs.setup.outputs.use_depot_cache == 'true' }}
    outputs:
      built_images: ${{ steps.collect-images.outputs.built_images }}
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "zulu"
          java-version: 17

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}
          restore-keys: ${{ needs.setup.outputs.uv_cache_key_prefix }}

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}
          restore-keys: ${{ needs.setup.outputs.yarn_cache_key_prefix }}

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
          key: gradle-plugins-cache
          restore-keys: gradle-plugins-cache

      - name: Set up Depot CLI
        if: ${{ env.DOCKER_CACHE == 'DEPOT' }}
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - name: Check out the repo
        uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Login to Github Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Quickstart Images
        env:
          DOCKER_CACHE: ${{ needs.setup.outputs.use_depot_cache == 'true' && 'DEPOT' || 'GITHUB' }}
        run: |
          ./gradlew :docker:buildImagesquickstart \
            -Ptag=${{ needs.setup.outputs.tag }} \
            -PpythonDockerVersion=${{ needs.setup.outputs.python_release_version }} \
            -PdockerRegistry=${{ env.DOCKER_REGISTRY }} \
            -PdockerPush=true

      - name: Save build metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-metadata-${{ needs.setup.outputs.tag }}
          path: |
            ${{ github.workspace }}/build/build-metadata.json
            ${{ github.workspace }}/build/bake-spec-quickstart.json

      - name: Collect image references from bake spec
        id: collect-images
        shell: bash
        env:
          BAKE_SPEC: ${{ github.workspace }}/build/bake-spec-quickstart.json
        run: |
          images="$(docker buildx bake -f "$BAKE_SPEC" --print | jq -r '.target | to_entries[].value.tags[]')"
          {
            echo "## Built Images"
            echo ""
            echo "$images" | while IFS= read -r image; do
              echo "- \`$image\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"
          echo "built_images=$(echo "$images" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          path: ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
          key: gradle-plugins-cache

  playwright_test:
    name: Playwright E2E (Shard ${{ matrix.shard }}/${{ matrix.shard_count }})
    runs-on: ${{ needs.setup.outputs.test_runner_type }}
    needs: [setup, build_quickstart_images]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix || '{"include":[]}') }}
    if: ${{ always() && !failure() && !cancelled() && needs.setup.outputs.matrix != '' && needs.setup.outputs.matrix != '{"include":[]}' }}
    env:
      BUILT_IMAGES: ${{ needs.build_quickstart_images.outputs.built_images }}
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ needs.setup.outputs.uv_cache_key }}
          restore-keys: ${{ needs.setup.outputs.uv_cache_key_prefix }}

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}
          restore-keys: ${{ needs.setup.outputs.yarn_cache_key_prefix }}

      - name: Check out the repo
        uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7

      - name: Free up disk space
        uses: ./.github/actions/free-disk-space

      - name: Set up Depot CLI
        if: ${{ needs.setup.outputs.use_depot_cache == 'true' }}
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Login to Github Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Disk Space Analysis
        run: |
          echo "=== Disk Usage Overview ==="
          df -h
          echo -e "\n=== Docker Disk Usage ==="
          docker system df -v

      - name: Pull images from GHCR
        run: |
          set +x
          failed_pulls=0
          read -ra images <<< "$BUILT_IMAGES"
          for image in "${images[@]}"; do
            if [[ -n "$image" ]]; then
              echo "Pulling $image"
              if ! docker pull "$image"; then
                echo "Failed to pull $image"
                failed_pulls=$((failed_pulls + 1))
              else
                acryl_image="acryldata/${image#${{ env.DOCKER_REGISTRY }}/}"
                docker tag "$image" "$acryl_image"
              fi
            fi
          done

          if [[ $failed_pulls -gt 0 ]]; then
            echo "Warning: $failed_pulls image(s) failed to pull"
            exit 1
          fi

          docker images

      - name: Disk Space Analysis
        run: |
          echo "=== Disk Usage Overview ==="
          df -h
          echo -e "\n=== Docker Disk Usage ==="
          docker system df -v

      - name: Run quickstart
        env:
          DATAHUB_TELEMETRY_ENABLED: false
          DATAHUB_VERSION: ${{ needs.setup.outputs.tag }}
          ACTIONS_EXTRA_PACKAGES: "acryl-datahub-actions[executor] acryl-datahub-actions"
          ACTIONS_CONFIG: "https://raw.githubusercontent.com/acryldata/datahub-actions/main/docker/config/executor.yaml"
        run: ./smoke-test/run-quickstart.sh

      - name: Disk Check
        run: df -h . && docker images

      - name: Disable ES Disk Threshold
        run: |
          curl -XPUT "http://localhost:9200/_cluster/settings" \
            -H 'Content-Type: application/json' -d'{
              "persistent": {
                "cluster": {
                  "routing": {
                    "allocation.disk.threshold_enabled": false
                  }
                }
              }
            }'

      - name: Install Playwright dependencies
        working-directory: e2e-test/ui/playwright
        run: |
          yarn install --frozen-lockfile
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e-test/ui/playwright
        env:
          BASE_URL: "http://localhost:9002"
          # Tells playwright.config.ts to reuse the DataHub instance started by
          # run-quickstart.sh rather than launching via quickstartDebug.
          PLAYWRIGHT_REUSE_SERVER: "1"
        run: |
          npx playwright test \
            --shard=${{ matrix.shard }}/${{ matrix.shard_count }}

      - name: Upload Playwright blob report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-blob-report-${{ matrix.shard }}
          path: e2e-test/ui/playwright/blob-report/
          retention-days: 1

      - name: Upload Playwright JUnit results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-junit-${{ matrix.shard }}
          path: e2e-test/ui/playwright/test-results/junit.xml
          retention-days: 5

      - name: Store logs on failure
        if: failure()
        run: |
          docker ps -a
          TEST_STRATEGY="-playwright-${{ matrix.shard }}"
          source .github/scripts/docker_logs.sh

      - name: Upload Docker logs on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: docker-logs-playwright-${{ matrix.shard }}
          path: "docker_logs/*.log"
          retention-days: 5

      - name: Upload Playwright traces and screenshots on failure
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: playwright-traces-${{ matrix.shard }}
          path: e2e-test/ui/playwright/test-results/
          retention-days: 5

      - name: Report test results
        if: "!cancelled()"
        uses: ./.github/actions/report-test-results
        with:
          artifact-name: "Test Results (playwright) shard-${{ matrix.shard }}"
          test-results-paths: |
            **/e2e-test/ui/playwright/test-results/junit.xml
          junit-file-globs: |
            **/e2e-test/ui/playwright/test-results/junit.xml

      - name: Upload test results to Codecov
        if: "!cancelled()"
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          override_branch: ${{ github.head_ref || github.ref_name }}

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' && matrix.shard == '1' }}
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup.outputs.yarn_cache_key }}

  playwright_report:
    name: Merge Playwright HTML report
    runs-on: ubuntu-latest
    needs: [playwright_test]
    if: ${{ !cancelled() && needs.playwright_test.result != 'skipped' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all Playwright blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: playwright-blob-report-*
          path: playwright-blob-reports

      - name: Install Playwright
        run: npm install -g @playwright/test

      - name: Merge blob reports into unified HTML report
        run: |
          if compgen -G "playwright-blob-reports/playwright-blob-report-*" > /dev/null 2>&1; then
            npx playwright merge-reports --reporter html ./playwright-blob-reports
          else
            echo "No blob reports found — all shards may have been skipped or crashed"
          fi

      - name: Upload merged Playwright HTML report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 5
