name: lint
on:
  # Only run on PRs. Assuming all commits come in via PRs, there is no need for lint post commit
  pull_request:
    # Run only on below branches
    branches:
      - master
      - releases/**
      - hotfix/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Initial Job Setup ${{ github.workflow }}
    runs-on: ubuntu-slim
    outputs:
      markdown: ${{ steps.filter.outputs.markdown }}
      github-actions: ${{ steps.filter.outputs.github-actions }}
      workflow-files: ${{ steps.filter.outputs.workflow-files }}
      workflow-validation: ${{ steps.filter.outputs.workflow-validation }}
      code-check-sources: ${{ steps.filter.outputs.code-check-sources }}
      default-gh-runner: ${{ steps.runners.outputs.default-gh-runner }}
      smoke-test-python: ${{ steps.filter.outputs.smoke-test-python }}
      smoke-test-cypress: ${{ steps.filter.outputs.smoke-test-cypress }}
      small-runner: ${{ steps.runners.outputs.small-runner }}
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: "" # Empty token forces raw git commands
          filters: |
            markdown:
              - "**/*.md"
            github-actions:
              - ".github/**/*.yml"
              - ".github/**/*.yaml"
            workflow-files:
              - ".github/workflows/**"
            workflow-validation:
              - ".github/workflows/**"
              - ".github/scripts/validate_post_workflow_list.py"
            code-check-sources:
              - "metadata-io/**"
              - "datahub-web-react/**"
              - "metadata-service/war/src/main/resources/boot/policies.json"
              - "**/build.gradle"
              - "**/build.gradle.kts"
              - "**/gradle.lockfile"
              - ".github/scripts/check_*.py"
            smoke-test-python:
              - smoke-test/**/*.py
              - smoke-test/pyproject.toml
              - smoke-test/requirements.txt
              - smoke-test/build.gradle
            smoke-test-cypress:
              - smoke-test/tests/cypress/**
      - uses: ./.github/actions/determine-runners
        id: runners
        with:
          is-community-pr: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          has-depot-label: ${{ contains(github.event.pull_request.labels.*.name, 'depot') }}

  markdown-format:
    name: markdown_format_check
    runs-on: ${{ needs.setup.outputs.default-gh-runner }}
    needs: setup
    if: needs.setup.outputs.markdown == 'true'
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: run prettier --check
        run: ./gradlew :datahub-web-react:mdPrettierCheck

  github-actions-format:
    name: github_actions_format_check
    runs-on: ${{ needs.setup.outputs.default-gh-runner }}
    needs: setup
    if: needs.setup.outputs.github-actions == 'true'
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: run prettier --check
        run: ./gradlew :datahub-web-react:githubActionsPrettierCheck

  validate-post-workflow-list:
    name: validate_post_workflow_list
    runs-on: ${{ needs.setup.outputs.default-gh-runner }}
    needs: setup
    if: needs.setup.outputs.workflow-validation == 'true'
    steps:
      - uses: acryldata/sane-checkout-action@v4
        with:
          checkout-head-only: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install pyyaml
        run: uv pip install pyyaml --system
      - name: Validate post-workflow-actions.yml workflow list
        run: python .github/scripts/validate_post_workflow_list.py
      - name: Write step summary
        if: always()
        run: cat post-workflow-validation-summary.md >> "$GITHUB_STEP_SUMMARY"

  actionlint:
    name: actionlint
    runs-on: ${{ needs.setup.outputs.default-gh-runner }}
    needs: setup
    if: needs.setup.outputs.workflow-files == 'true'
    permissions:
      contents: read
      checks: write
      pull-requests: write
      issues: write
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-review

  check-event-types:
    name: check-event-types
    runs-on: ${{ needs.setup.outputs.default-gh-runner }}
    needs: setup
    if: needs.setup.outputs.code-check-sources == 'true'
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: run check
        run: python .github/scripts/check_event_type.py

  check-policies:
    name: check-policies
    runs-on: ${{ needs.setup.outputs.default-gh-runner }}
    needs: setup
    if: needs.setup.outputs.code-check-sources == 'true'
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: run check
        run: python .github/scripts/check_policies.py

  check-gradle-lockfiles:
    name: check-gradle-lockfiles
    runs-on: ${{ needs.setup.outputs.default-gh-runner }}
    needs: setup
    if: needs.setup.outputs.code-check-sources == 'true'
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: run check
        run: python .github/scripts/check_gradle_lockfiles.py

  smoke_test_lint:
    name: Lint on smoke tests
    runs-on: ${{ needs.setup.outputs.small-runner }}
    needs: setup
    if: ${{ needs.setup.outputs.smoke-test-python == 'true' || needs.setup.outputs.smoke-test-cypress == 'true' }}
    env:
      UV_CACHE_DIR: /tmp/.uv-cache/
      YARN_CACHE_FOLDER: /tmp/.yarn-cache/
    steps:
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/cache/restore@v5
        if: ${{ needs.setup.outputs.smoke-test-python == 'true' }}
        with:
          path: |
            ${{ env.UV_CACHE_DIR }}
          key: "uv-${{github.base_ref}}-${{ hashFiles('./smoke-test/requirements.txt', './smoke-test/pyproject.toml') }}"

      - uses: actions/cache/restore@v5
        if: ${{ needs.setup.outputs.smoke-test-cypress == 'true' }}
        with:
          path: |
            ${{ env.YARN_CACHE_FOLDER }}
          key: "yarn-${{ github.base_ref }}-${{ hashFiles('./smoke-test/tests/cypress/yarn.lock') }}"

      - name: Run Python lint
        if: ${{ needs.setup.outputs.smoke-test-python == 'true' }}
        run: |
          python ./.github/scripts/check_python_package.py
          ./gradlew :smoke-test:pythonLint

      - name: Run Cypress Lint
        if: ${{ needs.setup.outputs.smoke-test-cypress == 'true' }}
        run: |
          ./gradlew :smoke-test:cypressLint

      - uses: actions/cache/save@v5
        if: ${{ needs.setup.outputs.smoke-test-python == 'true' }}
        with:
          path: |
            ${{ env.UV_CACHE_DIR }}
          key: "uv-${{github.base_ref}}-${{ hashFiles('./smoke-test/requirements.txt', './smoke-test/pyproject.toml') }}"

      - uses: actions/cache/save@v5
        if: ${{ needs.setup.outputs.smoke-test-cypress == 'true' }}
        with:
          path: |
            ${{ env.YARN_CACHE_FOLDER }}
          key: "yarn-${{ github.base_ref }}-${{ hashFiles('./smoke-test/tests/cypress/yarn.lock') }}"
