name: Build and Publish Bundled VENV DataHub Executor

on:
  workflow_dispatch:
    inputs:
      build_wolfi:
        description: "Build Wolfi variant (locked-wolfi)"
        type: boolean
        default: true
      build_ubuntu:
        description: "Build Ubuntu variant (slim)"
        type: boolean
        default: true
      build_alpine:
        description: "Build Alpine variant - NOT IMPLEMENTED (bundled venvs stage missing)"
        type: boolean
        default: false
      plugins:
        description: "Bundled plugins (comma-separated)"
        type: string
        default: "s3,demo-data"
      tag_override:
        description: "Override image tag (leave empty to derive from branch/release)"
        type: string
        required: false
        default: ""
      push_ecr:
        description: "Push to ECR"
        type: boolean
        default: false
      push_cloudsmith:
        description: "Push to Cloudsmith"
        type: boolean
        default: false

env:
  IMAGE_NAME: datahub-executor
  DOCKER_REGISTRY: "795586375822.dkr.ecr.us-west-2.amazonaws.com"
  DEPOT_PROJECT_ID: "${{ vars.DEPOT_PROJECT_ID }}"
  # Cloudsmith config
  CLOUDSMITH_ORG: "datahub"
  CLOUDSMITH_REPO: "re"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute-tag.outputs.tag }}
      python_release_version: ${{ steps.compute-tag.outputs.python_release_version }}
      cli_version: ${{ steps.resolve-cli-version.outputs.cli_version }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag from branch/release
        id: compute-tag
        env:
          TAG_OVERRIDE: ${{ inputs.tag_override }}
        run: |
          source .github/scripts/docker_helpers.sh

          if [ -n "$TAG_OVERRIDE" ]; then
            TAG="$TAG_OVERRIDE"
            # For overrides, use a simple python version
            PYTHON_VERSION="1!0.0.0+docker.${TAG}"
          else
            # Use get_unique_tag() to get commit-hash based tags for acryl-main
            # instead of get_tag() which returns "head" for the main branch
            TAG=$(get_unique_tag)
            PYTHON_VERSION=$(get_python_docker_release_v)
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "python_release_version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed tag: $TAG"
          echo "Python release version: $PYTHON_VERSION"

      - name: Resolve CLI version
        id: resolve-cli-version
        run: |
          CLI_VERSION=$(sed -n 's/.*cliVersion *= *"\([^"]*\)".*/\1/p' gradle/versioning/cliVersion.gradle)
          echo "cli_version=$CLI_VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI version: $CLI_VERSION"

      - name: Set build matrix
        id: set-matrix
        env:
          BUILD_WOLFI: ${{ inputs.build_wolfi }}
          BUILD_UBUNTU: ${{ inputs.build_ubuntu }}
          BUILD_ALPINE: ${{ inputs.build_alpine }}
        run: |
          VARIANTS="[]"

          if [ "$BUILD_WOLFI" = "true" ]; then
            VARIANTS=$(echo "$VARIANTS" | jq -c '. + [{"name": "wolfi", "variant": "locked-wolfi", "suffix": "-locked-wolfi"}]')
          fi

          if [ "$BUILD_UBUNTU" = "true" ]; then
            VARIANTS=$(echo "$VARIANTS" | jq -c '. + [{"name": "ubuntu", "variant": "slim", "suffix": "-slim"}]')
          fi

          if [ "$BUILD_ALPINE" = "true" ]; then
            VARIANTS=$(echo "$VARIANTS" | jq -c '. + [{"name": "alpine", "variant": "slim-alpine", "suffix": "-slim-alpine"}]')
          fi

          echo "matrix={\"include\":$VARIANTS}" >> "$GITHUB_OUTPUT"
          echo "Building variants: $VARIANTS"

  build:
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '{"include":[]}' }}
    runs-on: depot-ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      TAG: ${{ needs.setup.outputs.tag }}
      PYTHON_RELEASE_VERSION: ${{ needs.setup.outputs.python_release_version }}
      CLI_VERSION: ${{ needs.setup.outputs.cli_version }}
      PLUGINS: ${{ inputs.plugins }}
      VARIANT: ${{ matrix.variant }}
      VARIANT_NAME: ${{ matrix.name }}
      TAG_SUFFIX: ${{ matrix.suffix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Depot
        uses: depot/setup-action@v1

      # --- Registry Logins (before build for push) ---
      - name: Login to ECR
        if: ${{ inputs.push_ecr }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Cloudsmith
        if: ${{ inputs.push_cloudsmith }}
        uses: docker/login-action@v3
        with:
          registry: docker.cloudsmith.io
          username: ${{ secrets.CLOUDSMITH_USERNAME }}
          password: ${{ secrets.CLOUDSMITH_PASSWORD }}

      - name: Build with Depot
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          PUSH_ECR: ${{ inputs.push_ecr }}
          PUSH_CLOUDSMITH: ${{ inputs.push_cloudsmith }}
        run: |
          echo "Building $VARIANT_NAME variant (multi-platform)"
          # shellcheck disable=SC2153 # TAG is set via job-level env
          echo "  Tag: $TAG"
          echo "  Python Release Version: $PYTHON_RELEASE_VERSION"
          echo "  CLI Version: $CLI_VERSION"
          echo "  Plugins: $PLUGINS"
          echo "  Variant: $VARIANT"

          # Build tag arguments
          TAGS="--tag $DOCKER_REGISTRY/$IMAGE_NAME:$TAG$TAG_SUFFIX"
          if [ "$PUSH_ECR" = "true" ] && [ -n "$ECR_REGISTRY" ]; then
            TAGS="$TAGS --tag $ECR_REGISTRY/$IMAGE_NAME:$TAG$TAG_SUFFIX"
          fi
          if [ "$PUSH_CLOUDSMITH" = "true" ]; then
            TAGS="$TAGS --tag docker.cloudsmith.io/$CLOUDSMITH_ORG/$CLOUDSMITH_REPO/$IMAGE_NAME:$TAG$TAG_SUFFIX"
          fi

          # Determine output mode
          OUTPUT_MODE="--load"
          if [ "$PUSH_ECR" = "true" ] || [ "$PUSH_CLOUDSMITH" = "true" ]; then
            OUTPUT_MODE="--push"
          fi

          # shellcheck disable=SC2086
          depot build \
            --platform linux/amd64,linux/arm64 \
            --file docker/datahub-executor/Dockerfile \
            --build-arg BASE_IMAGE="$VARIANT" \
            --build-arg RELEASE_VERSION="$PYTHON_RELEASE_VERSION" \
            --build-arg BUNDLED_CLI_VERSION="$CLI_VERSION" \
            --build-arg BUNDLED_VENV_PLUGINS="$PLUGINS" \
            --build-arg GITHUB_RUN_ID="${{ github.run_id }}" \
            $TAGS \
            $OUTPUT_MODE \
            .

          echo "Built multi-platform image: $DOCKER_REGISTRY/$IMAGE_NAME:$TAG$TAG_SUFFIX"

      - name: Summary
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          PUSH_ECR: ${{ inputs.push_ecr }}
          PUSH_CLOUDSMITH: ${{ inputs.push_cloudsmith }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ### Build Info ($VARIANT_NAME)
          | Property | Value |
          |----------|-------|
          | **Run ID** | \`${{ github.run_id }}\` |
          | **Variant** | \`$VARIANT_NAME\` |
          | **Tag** | \`$TAG$TAG_SUFFIX\` |
          | **CLI Version** | \`$CLI_VERSION\` |
          | **Plugins** | \`$PLUGINS\` |
          | **Platforms** | \`linux/amd64, linux/arm64\` |

          ### Registry Pushes
          EOF

          if [ "$PUSH_ECR" = "true" ]; then
            echo "- ECR: \`${ECR_REGISTRY}/$IMAGE_NAME:$TAG$TAG_SUFFIX\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$PUSH_CLOUDSMITH" = "true" ]; then
            echo "- Cloudsmith: \`docker.cloudsmith.io/$CLOUDSMITH_ORG/$CLOUDSMITH_REPO/$IMAGE_NAME:$TAG$TAG_SUFFIX\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$PUSH_ECR" != "true" ] && [ "$PUSH_CLOUDSMITH" != "true" ]; then
            echo "_No registries selected for push_" >> "$GITHUB_STEP_SUMMARY"
          fi
