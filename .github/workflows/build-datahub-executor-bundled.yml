name: Build and Publish Bundled VENV DataHub Executor

on:
  workflow_dispatch:
    inputs:
      build_wolfi:
        description: "Build Wolfi variant (locked-wolfi)"
        type: boolean
        default: true
      build_ubuntu:
        description: "Build Ubuntu variant (slim)"
        type: boolean
        default: true
      build_alpine:
        description: "Build Alpine variant - NOT IMPLEMENTED (bundled venvs stage missing)"
        type: boolean
        default: false
      plugins:
        description: "Bundled plugins (comma-separated)"
        type: string
        default: "s3,demo-data"
      tag_override:
        description: "Override image tag (leave empty to derive from branch/release)"
        type: string
        required: false
        default: ""
      push_ecr:
        description: "Push to ECR"
        type: boolean
        default: false
      push_cloudsmith:
        description: "Push to Cloudsmith"
        type: boolean
        default: false
      cli_version_override:
        description: "Override CLI version (leave empty to use gradle/versioning/cliVersion.gradle)"
        type: string
        required: false
        default: ""
      pip_index_url:
        description: "PyPI index URL (for custom registries or pre-release packages)"
        type: string
        required: false
        default: "https://pypi.python.org/simple"
      pip_extra_index_url:
        description: "Extra PyPI index URL (for additional package sources)"
        type: string
        required: false
        default: ""

env:
  IMAGE_NAME: datahub-executor
  DOCKER_REGISTRY: "795586375822.dkr.ecr.us-west-2.amazonaws.com"
  DEPOT_PROJECT_ID: "${{ vars.DEPOT_PROJECT_ID }}"
  DEPOT_TOKEN: "${{ secrets.DEPOT_TOKEN }}"
  # Cloudsmith config
  CLOUDSMITH_ORG: "datahub"
  CLOUDSMITH_REPO: "re"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute-tag.outputs.tag }}
      python_release_version: ${{ steps.compute-tag.outputs.python_release_version }}
      cli_version: ${{ steps.resolve-cli-version.outputs.cli_version }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tag from branch/release
        id: compute-tag
        env:
          TAG_OVERRIDE: ${{ inputs.tag_override }}
        run: |
          source .github/scripts/docker_helpers.sh

          if [ -n "$TAG_OVERRIDE" ]; then
            TAG="$TAG_OVERRIDE"
            # For overrides, use a simple python version
            PYTHON_VERSION="1!0.0.0+docker.${TAG}"
          else
            # Use get_unique_tag() to get commit-hash based tags for acryl-main
            # instead of get_tag() which returns "head" for the main branch
            TAG=$(get_unique_tag)
            PYTHON_VERSION=$(get_python_docker_release_v)
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "python_release_version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed tag: $TAG"
          echo "Python release version: $PYTHON_VERSION"

      - name: Resolve CLI version
        id: resolve-cli-version
        env:
          CLI_VERSION_OVERRIDE: ${{ inputs.cli_version_override }}
        run: |
          if [ -n "$CLI_VERSION_OVERRIDE" ]; then
            CLI_VERSION="$CLI_VERSION_OVERRIDE"
            echo "Using CLI version override: $CLI_VERSION"
          else
            CLI_VERSION=$(sed -n 's/.*cliVersion *= *"\([^"]*\)".*/\1/p' gradle/versioning/cliVersion.gradle)
            echo "Using CLI version from gradle: $CLI_VERSION"
          fi
          echo "cli_version=$CLI_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set build matrix
        id: set-matrix
        env:
          BUILD_WOLFI: ${{ inputs.build_wolfi }}
          BUILD_UBUNTU: ${{ inputs.build_ubuntu }}
          BUILD_ALPINE: ${{ inputs.build_alpine }}
        run: |
          VARIANTS="[]"

          if [ "$BUILD_WOLFI" = "true" ]; then
            VARIANTS=$(echo "$VARIANTS" | jq -c '. + [{"name": "wolfi", "variant": "locked-wolfi", "suffix": "-locked-wolfi"}]')
          fi

          if [ "$BUILD_UBUNTU" = "true" ]; then
            VARIANTS=$(echo "$VARIANTS" | jq -c '. + [{"name": "ubuntu", "variant": "slim", "suffix": "-slim"}]')
          fi

          if [ "$BUILD_ALPINE" = "true" ]; then
            VARIANTS=$(echo "$VARIANTS" | jq -c '. + [{"name": "alpine", "variant": "slim-alpine", "suffix": "-slim-alpine"}]')
          fi

          echo "matrix={\"include\":$VARIANTS}" >> "$GITHUB_OUTPUT"
          echo "Building variants: $VARIANTS"

  build:
    needs: setup
    if: ${{ needs.setup.outputs.matrix != '{"include":[]}' }}
    runs-on: depot-ubuntu-24.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      TAG: ${{ needs.setup.outputs.tag }}
      PYTHON_RELEASE_VERSION: ${{ needs.setup.outputs.python_release_version }}
      CLI_VERSION: ${{ needs.setup.outputs.cli_version }}
      PLUGINS: ${{ inputs.plugins }}
      VARIANT: ${{ matrix.variant }}
      VARIANT_NAME: ${{ matrix.name }}
      TAG_SUFFIX: ${{ matrix.suffix }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Generate codegen files
        run: ./gradlew :metadata-ingestion-modules:acryl-cloud:codegen --no-daemon

      - name: Set up Depot
        uses: depot/setup-action@v1

      # --- Registry Logins (before build for push) ---
      - name: Configure AWS Credentials
        if: ${{ inputs.push_ecr }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to ECR
        if: ${{ inputs.push_ecr }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}

      - name: Login to Cloudsmith
        if: ${{ inputs.push_cloudsmith }}
        uses: docker/login-action@v3
        with:
          registry: docker.cloudsmith.io
          username: ${{ secrets.CLOUDSMITH_USERNAME }}
          password: ${{ secrets.CLOUDSMITH_PASSWORD }}

      - name: Build with Depot
        env:
          PUSH_ECR: ${{ inputs.push_ecr }}
          PUSH_CLOUDSMITH: ${{ inputs.push_cloudsmith }}
          PIP_MIRROR_URL: ${{ inputs.pip_index_url }}
          PIP_EXTRA_INDEX_URL: ${{ inputs.pip_extra_index_url }}
        run: |
          echo "Building $VARIANT_NAME variant (multi-platform)"
          # shellcheck disable=SC2153 # TAG is set via job-level env
          echo "  Tag: $TAG"
          echo "  Python Release Version: $PYTHON_RELEASE_VERSION"
          echo "  CLI Version: $CLI_VERSION"
          echo "  Plugins: $PLUGINS"
          echo "  Variant: $VARIANT"
          echo "  PIP Index: $PIP_MIRROR_URL"
          [ -n "$PIP_EXTRA_INDEX_URL" ] && echo "  PIP Extra Index: $PIP_EXTRA_INDEX_URL"

          # Build tag arguments - DOCKER_REGISTRY is the ECR registry
          TAGS=""
          if [ "$PUSH_ECR" = "true" ]; then
            TAGS="--tag ${DOCKER_REGISTRY}/${IMAGE_NAME}:${TAG}${TAG_SUFFIX}"
          fi
          if [ "$PUSH_CLOUDSMITH" = "true" ]; then
            TAGS="${TAGS} --tag docker.cloudsmith.io/${CLOUDSMITH_ORG}/${CLOUDSMITH_REPO}/${IMAGE_NAME}:${TAG}${TAG_SUFFIX}"
          fi

          # Determine output mode
          OUTPUT_MODE="--load"
          if [ "$PUSH_ECR" = "true" ] || [ "$PUSH_CLOUDSMITH" = "true" ]; then
            OUTPUT_MODE="--push"
          fi

          # Build PIP index args
          PIP_ARGS="--build-arg PIP_MIRROR_URL=$PIP_MIRROR_URL"
          if [ -n "$PIP_EXTRA_INDEX_URL" ]; then
            PIP_ARGS="$PIP_ARGS --build-arg PIP_EXTRA_INDEX_URL=$PIP_EXTRA_INDEX_URL"
          fi

          # shellcheck disable=SC2086
          depot build \
            --project "$DEPOT_PROJECT_ID" \
            --platform linux/amd64,linux/arm64 \
            --file docker/datahub-executor/Dockerfile \
            --build-arg BASE_IMAGE="$VARIANT" \
            --build-arg RELEASE_VERSION="$PYTHON_RELEASE_VERSION" \
            --build-arg BUNDLED_CLI_VERSION="$CLI_VERSION" \
            --build-arg BUNDLED_VENV_PLUGINS="$PLUGINS" \
            --build-arg GITHUB_RUN_ID="${{ github.run_id }}" \
            $PIP_ARGS \
            $TAGS \
            $OUTPUT_MODE \
            .

          echo "Built multi-platform image"

      # --- Security Scanning ---
      - name: Pull image for scanning
        if: ${{ inputs.push_ecr || inputs.push_cloudsmith }}
        env:
          PUSH_ECR: ${{ inputs.push_ecr }}
          PUSH_CLOUDSMITH: ${{ inputs.push_cloudsmith }}
        run: |
          # Determine which registry to pull from for scanning (prefer Cloudsmith, fallback to ECR)
          if [ "$PUSH_CLOUDSMITH" = "true" ]; then
            SCAN_IMAGE="docker.cloudsmith.io/${CLOUDSMITH_ORG}/${CLOUDSMITH_REPO}/${IMAGE_NAME}:${TAG}${TAG_SUFFIX}"
          elif [ "$PUSH_ECR" = "true" ]; then
            SCAN_IMAGE="${DOCKER_REGISTRY}/${IMAGE_NAME}:${TAG}${TAG_SUFFIX}"
          fi
          echo "SCAN_IMAGE=$SCAN_IMAGE" >> "$GITHUB_ENV"
          echo "Pulling image for scanning: $SCAN_IMAGE"
          docker pull "$SCAN_IMAGE"

      - name: Run Grype vulnerability scanner
        if: ${{ inputs.push_ecr || inputs.push_cloudsmith }}
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.SCAN_IMAGE }}
          fail-build: false
          output-format: json
          output-file: grype-results-${{ matrix.name }}.json
          severity-cutoff: high

      - name: Generate vulnerability summary
        if: ${{ inputs.push_ecr || inputs.push_cloudsmith }}
        run: |
          GRYPE_FILE="grype-results-${{ matrix.name }}.json"

          # Count vulnerabilities by severity
          echo "### Vulnerability Summary ($VARIANT_NAME)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"

          for sev in Critical High Medium Low Negligible Unknown; do
            COUNT=$(jq -r "[.matches[] | select(.vulnerability.severity == \"$sev\")] | length" "$GRYPE_FILE")
            if [ "$COUNT" -gt 0 ]; then
              echo "| **$sev** | $COUNT |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          TOTAL=$(jq -r '.matches | length' "$GRYPE_FILE")
          echo "| **Total** | $TOTAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # List all CVEs and GHSAs
          echo "<details>" >> "$GITHUB_STEP_SUMMARY"
          echo "<summary>📋 All Vulnerabilities (CVEs/GHSAs)</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| ID | Severity | Package | Fixed In |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|----------|---------|----------|" >> "$GITHUB_STEP_SUMMARY"

          jq -r '.matches[] | "| \(.vulnerability.id) | \(.vulnerability.severity) | \(.artifact.name)@\(.artifact.version) | \(.vulnerability.fix.versions[0] // "N/A") |"' "$GRYPE_FILE" \
            | sort -t'|' -k3,3 \
            >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Generate SBOM with Syft (CycloneDX)
        if: ${{ inputs.push_ecr || inputs.push_cloudsmith }}
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.SCAN_IMAGE }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.name }}.cdx.json

      - name: Upload SBOM artifact
        if: ${{ inputs.push_ecr || inputs.push_cloudsmith }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.cdx.json
          retention-days: 90

      - name: Summary
        env:
          PUSH_ECR: ${{ inputs.push_ecr }}
          PUSH_CLOUDSMITH: ${{ inputs.push_cloudsmith }}
          PIP_MIRROR_URL: ${{ inputs.pip_index_url }}
          PIP_EXTRA_INDEX_URL: ${{ inputs.pip_extra_index_url }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ### Build Info ($VARIANT_NAME)
          | Property | Value |
          |----------|-------|
          | **Run ID** | \`${{ github.run_id }}\` |
          | **Variant** | \`$VARIANT_NAME\` |
          | **Tag** | \`$TAG$TAG_SUFFIX\` |
          | **CLI Version** | \`$CLI_VERSION\` |
          | **Plugins** | \`$PLUGINS\` |
          | **Platforms** | \`linux/amd64, linux/arm64\` |
          | **PIP Index** | \`$PIP_MIRROR_URL\` |
          EOF

          if [ -n "$PIP_EXTRA_INDEX_URL" ]; then
            echo "| **PIP Extra Index** | \`$PIP_EXTRA_INDEX_URL\` |" >> "$GITHUB_STEP_SUMMARY"
          fi

          cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ### Registry Pushes
          EOF

          if [ "$PUSH_ECR" = "true" ]; then
            echo "- ECR: \`${DOCKER_REGISTRY}/${IMAGE_NAME}:${TAG}${TAG_SUFFIX}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$PUSH_CLOUDSMITH" = "true" ]; then
            echo "- Cloudsmith: \`docker.cloudsmith.io/${CLOUDSMITH_ORG}/${CLOUDSMITH_REPO}/${IMAGE_NAME}:${TAG}${TAG_SUFFIX}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$PUSH_ECR" != "true" ] && [ "$PUSH_CLOUDSMITH" != "true" ]; then
            echo "_No registries selected for push_" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Add SBOM download links
          if [ "$PUSH_ECR" = "true" ] || [ "$PUSH_CLOUDSMITH" = "true" ]; then
            ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            cat >> "$GITHUB_STEP_SUMMARY" << EOF

          ### Artifacts ($VARIANT_NAME)

          📦 **[Download SBOM: sbom-$VARIANT_NAME.cdx.json]($ARTIFACT_URL#artifacts)**
          EOF

            if [ "$PUSH_CLOUDSMITH" = "true" ]; then
              CLOUDSMITH_PKG_URL="https://cloudsmith.io/~${CLOUDSMITH_ORG}/repos/${CLOUDSMITH_REPO}/packages/detail/docker/${IMAGE_NAME}/${TAG}${TAG_SUFFIX}"
              cat >> "$GITHUB_STEP_SUMMARY" << EOF

          🔗 **Cloudsmith:** [Package Security](${CLOUDSMITH_PKG_URL}/#tab-security) | [Vulnerabilities](${CLOUDSMITH_PKG_URL}/#tab-vulnerabilities)
          EOF
            fi
          fi
