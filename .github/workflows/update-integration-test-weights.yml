name: Update Integration Test Weights

on:
  schedule:
    # Run every Sunday at 3am UTC
    - cron: "0 3 * * 0"

  workflow_dispatch:
    inputs:
      run_count:
        description: "Number of recent CI runs to analyze (default: 3)"
        required: false
        default: "3"
        type: string

permissions:
  contents: write # To create branches and commits
  actions: read # To fetch workflow runs and artifacts
  pull-requests: write # To create pull requests

jobs:
  update-weights:
    if: github.repository == 'datahub-project/datahub'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATAHUB_TELEMETRY_ENABLED: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - name: Download test artifacts from recent CI runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading test artifacts from recent successful CI runs..."
          bash .github/scripts/download_test_artifacts.sh \
            --output-dir ./test-artifacts \
            --run-count ${{ github.event.inputs.run_count || '3' }} \
            --workflow metadata-ingestion.yml \
            --repository ${{ github.repository }} \
            --artifact-prefix "metadata-ingestion-test-results"

      - name: Backup existing weights
        run: |
          mkdir -p ./weights-backup
          cp metadata-ingestion/tests/integration_test_weights.json \
            ./weights-backup/integration_test_weights.json || echo "No existing weights"

      - name: Regenerate weights
        run: |
          python .github/scripts/generate_test_weights.py \
            --input-dir ./test-artifacts \
            --pytest-output metadata-ingestion/tests/integration_test_weights.json

      - name: Compare weights and generate PR body
        id: compare
        run: |
          echo "Comparing old and new integration weights..."
          python .github/scripts/compare_test_weights.py \
            --old-pytest ./weights-backup/integration_test_weights.json \
            --new-pytest metadata-ingestion/tests/integration_test_weights.json \
            --output ./pr-body.md \
            --threshold 5.0

          # Non-empty PR body means changes exceed the 5% threshold.
          if [ -s ./pr-body.md ]; then
            echo "create_pr=true" >> "$GITHUB_OUTPUT"
            echo "Changes exceed 5% threshold. Will create PR."
          else
            echo "create_pr=false" >> "$GITHUB_OUTPUT"
            echo "Changes below 5% threshold. No PR needed."
          fi

      - name: Create branch and commit changes
        if: steps.compare.outputs.create_pr == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="auto/update-integration-test-weights-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH_NAME"
          git add metadata-ingestion/tests/integration_test_weights.json
          git commit -m "chore(test): update ingestion integration test weights

          Automated update of integration test weights from harvested CI artifacts.
          This improves batch balancing and reduces overall CI wall-clock time.

          Generated by: ${{ github.workflow }} workflow
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          git push origin "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Create pull request
        if: steps.compare.outputs.create_pr == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_BODY=$(cat ./pr-body.md)
          gh pr create \
            --title "chore(test): Update ingestion integration test weights ($(date +%Y-%m-%d))" \
            --body "$PR_BODY" \
            --head "$BRANCH_NAME" \
            --base master

      - name: Summary
        if: always()
        run: |
          {
            echo "### Integration Test Weight Update Summary"
            echo ""
            if [ "${{ steps.compare.outputs.create_pr }}" == "true" ]; then
              echo "✅ **PR Created**: changes exceeded 5% threshold"
              echo ""
              echo "Branch: \`$BRANCH_NAME\`"
            else
              echo "ℹ️ **No PR Created**: changes below 5% threshold"
              echo ""
              echo "Weights were regenerated but the delta was too small to warrant a PR."
            fi
            echo ""
            echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
