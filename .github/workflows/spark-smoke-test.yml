name: spark smoke test
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - master
      - releases/**
    paths:
      # Run only when the Spark plugin or what it builds on changes.
      - "metadata-integration/java/acryl-spark-lineage/**" # the Spark listener/plugin
      - "metadata-integration/java/openlineage-converter/**" # OpenLineage -> DataHub conversion
      - "metadata-integration/java/datahub-client/**" # the DataHub emitter client it uses
      - ".github/workflows/spark-smoke-test.yml"
  pull_request:
    branches:
      - "**"
    paths:
      # Run only when the Spark plugin or what it builds on changes.
      - "metadata-integration/java/acryl-spark-lineage/**" # the Spark listener/plugin
      - "metadata-integration/java/openlineage-converter/**" # OpenLineage -> DataHub conversion
      - "metadata-integration/java/datahub-client/**" # the DataHub emitter client it uses
      - ".github/workflows/spark-smoke-test.yml"
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spark-smoke-test:
    runs-on: ubuntu-latest
    # Fail fast instead of hanging toward the 6h default: the docker-based smoke test (quickstart +
    # Spark image build + spark-submit) has stalled for >1h on flaky network fetches during image
    # builds. A bounded timeout turns such stalls into a quick, actionable red.
    timeout-minutes: 60
    steps:
      - uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "zulu"
          java-version: 21
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: ./metadata-ingestion/scripts/install_deps.sh
      - name: Disk Check
        run: df -h . && docker images
      - name: Free up disk space
        uses: ./.github/actions/free-disk-space
      - name: Disk Check
        run: df -h . && docker images
      - name: Spark listener unit + real-Spark smoke tests
        run: |
          ./gradlew :metadata-integration:java:acryl-spark-lineage:test \
                    :metadata-integration:java:acryl-spark-lineage:sparkRealSmokeTest \
                    :metadata-integration:java:acryl-spark-lineage:jacocoTestReport
      - name: Upload spark-lineage coverage to Codecov
        if: ${{ !cancelled() && github.event_name != 'release' }}
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/coverage-reports/metadata-integration/java/acryl-spark-lineage/jacoco-acryl-spark-lineage.xml
          disable_search: true
          fail_ci_if_error: false
          flags: backend
          name: spark-smoke-test
          verbose: true
      - name: Smoke test
        run: |
          ./gradlew :metadata-integration:java:acryl-spark-lineage:integrationTest \
             -x :datahub-web-react:yarnTest \
             -x :datahub-web-react:yarnLint \
             -x :datahub-web-react:yarnGenerate \
             -x :datahub-web-react:yarnInstall \
             -x :datahub-web-react:yarnBuild \
             -x :datahub-web-react:distZip \
             -x :datahub-web-react:jar
      - name: store logs
        if: failure()
        run: |
          docker ps -a
          docker logs datahub-gms >& gms-${{ matrix.test_strategy }}.log || true
          docker logs datahub-actions >& actions-${{ matrix.test_strategy }}.log || true
          docker logs broker >& broker-${{ matrix.test_strategy }}.log || true
          docker logs mysql >& mysql-${{ matrix.test_strategy }}.log || true
          docker logs elasticsearch >& elasticsearch-${{ matrix.test_strategy }}.log || true
          docker logs datahub-frontend-react >& frontend-${{ matrix.test_strategy }}.log || true
      - name: Upload logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: docker logs
          path: |
            "**/build/container-logs/*.log"
            "*.log"
      - name: Report test results
        if: (!cancelled())
        uses: ./.github/actions/report-test-results
        with:
          artifact-name: Test Results (smoke tests)
          test-results-paths: |
            **/build/reports/tests/test/**
            **/build/reports/tests/sparkRealSmokeTest/**
            **/build/test-results/test/**
            **/build/test-results/sparkRealSmokeTest/**
            !**/binary/**
          junit-file-globs: |
            **/build/test-results/test/**/*.xml
            **/build/test-results/sparkRealSmokeTest/**/*.xml
