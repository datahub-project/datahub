name: spark smoke test
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
      - master
      - releases/**
      - hotfixes/**
    paths:
      - "metadata_models/**"
      - "metadata-integration/java/datahub-client/**"
      - "metadata-integration/java/spark-lineage"
      - "metadata-integration/java/spark-lineage-legacy" # spark smoke tests are here
      - ".github/workflows/spark-smoke-test.yml"
  pull_request:
    branches:
      - "**"
    paths:
      - "metadata_models/**"
      - "metadata-integration/java/datahub-client/**"
      - "metadata-integration/java/spark-lineage"
      - "metadata-integration/java/spark-lineage-legacy" # spark smoke tests are here
      # - ".github/workflows/spark-smoke-test.yml" # Uncomment once test issues are fixed.
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spark-smoke-test:
    if: false # Disabled: legacy spark plugin is no longer actively used
    runs-on: depot-ubuntu-22.04
    steps:
      - uses: acryldata/sane-checkout-action@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: ./metadata-ingestion/scripts/install_deps.sh
      - name: Disk Check
        run: df -h . && docker images
      - name: Free up disk space
        run: |
          sudo apt-get remove 'dotnet-*' azure-cli || true
          sudo rm -rf /usr/local/lib/android/ || true
          sudo docker image prune -a -f || true
      - name: Smoke test
        run: |
          ./gradlew :metadata-integration:java:spark-lineage:integrationTest \
             -x :datahub-web-react:yarnTest \
             -x :datahub-web-react:yarnLint \
             -x :datahub-web-react:yarnGenerate \
             -x :datahub-web-react:yarnInstall \
             -x :datahub-web-react:yarnBuild \
             -x :datahub-web-react:distZip \
             -x :datahub-web-react:jar
      - name: store logs
        if: failure()
        run: |
          docker ps -a
          docker logs datahub-gms >& gms.log || true
          docker logs datahub-actions >& actions.log || true
          docker logs broker >& broker.log || true
          docker logs mysql >& mysql.log || true
          docker logs elasticsearch >& elasticsearch.log || true
          docker logs datahub-frontend-react >& frontend.log || true
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker logs
          path: |
            "**/build/container-logs/*.log"
            "*.log"
      - name: Report test results
        if: (!cancelled())
        uses: ./.github/actions/report-test-results
        with:
          artifact-name: Test Results (smoke tests)
          test-results-paths: |
            **/build/reports/tests/test/**
            **/build/test-results/test/**
            !**/binary/**
          junit-file-globs: |
            **/build/test-results/test/**/*.xml
