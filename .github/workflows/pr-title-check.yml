name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  pull-requests: write

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@6a236be893b218d75a4be39bf1e15e1d8ccb3f59 # v6.1.1
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            test
            perf
            style
            build
            ci
            chore
          requireScope: false
      - if: always() && steps.lint_pr_title.outputs.error_message != null
        uses: marocchino/sticky-pull-request-comment@773744cb6d8a39de674f1a88af00ba0e67a16e91 # v3.0.2
        with:
          header: pr-title-check
          message: |
            ## PR Title Check Failed

            Your PR title must follow the format: `<type>[optional scope]: <description>`

            **Examples:**
            - `feat(ingestion): add Snowflake v2 source`
            - `fix: resolve crash on empty dashboard`

            See the [Contributing Guide](https://github.com/datahub-project/datahub/blob/master/docs/CONTRIBUTING.md#pr-title-format) for allowed types and format details.
      - if: always() && steps.lint_pr_title.outputs.error_message == null
        uses: marocchino/sticky-pull-request-comment@773744cb6d8a39de674f1a88af00ba0e67a16e91 # v3.0.2
        with:
          header: pr-title-check
          delete: true
