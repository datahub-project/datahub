name: PR Title Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            test
            perf
            style
            build
            ci
          requireScope: true
      - if: always() && steps.lint_pr_title.outcome == 'failure'
        run: |
          cat <<'MSG' >> "$GITHUB_STEP_SUMMARY"
          ## PR Title Check Failed

          Your PR title must follow the format: `<type>(<scope>): <description>`

          **Example:** `feat(ingestion): add Snowflake v2 source`

          See the [Contributing Guide](https://github.com/datahub-project/datahub/blob/master/docs/CONTRIBUTING.md#pr-title-format) for details.
          MSG
