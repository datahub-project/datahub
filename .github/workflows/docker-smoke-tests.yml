  #     - id: download_image
  #       name: Download images from depot
  #       if: ${{ needs.setup-smoke-test.outputs.use_depot_cache == 'true' }}
  #       run: |
  #         depot pull --project "${{ env.DEPOT_PROJECT_ID }}" "${{ needs.build_quickstart_images.outputs.build_id }}" --target "${{ matrix.target }}"
  #         docker images
  #         echo "docker_image=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep "${{ needs.setup-smoke-test.outputs.tag }}")" >> "$GITHUB_OUTPUT"
  #     - name: Run Trivy vulnerability scanner
  #       uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
  #       env:
  #         TRIVY_OFFLINE_SCAN: true
  #         TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
  #         TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1,ghcr.io/aquasecurity/trivy-java-db:1
  #       with:
  #         image-ref: ${{ steps.download_image.outputs.docker_image }}
  #         format: "template"
  #         template: "@/contrib/sarif.tpl"
  #         output: "trivy-results.sarif"
  #         severity: "CRITICAL,HIGH"
  #         ignore-unfixed: true
  #         vuln-type: "os,library"
  #         trivy-config: "./trivy.yaml"
  #     - name: Upload Trivy scan results to GitHub Security tab
  #       uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
  #       with:
  #         sarif_file: "trivy-results.sarif"

  smoke_test:
    name: Run Smoke Tests (${{ matrix.test_strategy }}, Batch ${{ matrix.batch }}/${{ matrix.batch_count }})
    runs-on: ${{ needs.setup-smoke-test.outputs.test_runner_type }}
    needs: [setup-smoke-test, build_quickstart_images]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup-smoke-test.outputs.matrix || '{"include":[]}') }}
    if: ${{ always() && !failure() && !cancelled() && needs.setup-smoke-test.outputs.matrix != '' && needs.setup-smoke-test.outputs.matrix != '{"include":[]}' }}
    env:
      MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
      MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
      BUILT_IMAGES: ${{ needs.build_quickstart_images.outputs.built_images }}
    steps:
      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ needs.setup-smoke-test.outputs.uv_cache_key }}
          restore-keys: ${{ needs.setup-smoke-test.outputs.uv_cache_key_prefix }}

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup-smoke-test.outputs.yarn_cache_key }}
          restore-keys: ${{ needs.setup-smoke-test.outputs.yarn_cache_key_prefix }}

      - name: Check out the repo
        uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7
      - name: Free up disk space
        uses: ./.github/actions/free-disk-space
      - name: Set up Depot CLI
        if: ${{ needs.setup-smoke-test.outputs.use_depot_cache == 'true' }}
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up retry
        id: retry-setup
        uses: ./.github/actions/smoke-test-retry-setup
        # Run if it's a retry of the same job
        if: ${{ github.run_attempt > 1 }}
        with:
          test-strategy: ${{ matrix.test_strategy }}
          artifact-name: "Test Results (smoke tests) ${{ matrix.test_strategy }} ${{ matrix.batch }}"

      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
        if: ${{ needs.setup-smoke-test.outputs.use_depot_cache != 'true' }}

      - name: Login to Github Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Disk Space Analysis
        run: |
          echo "=== Disk Usage Overview ==="
          df -h
          echo -e "\n=== Docker Disk Usage ==="
          docker system df -v

      - name: Pull images from GHCR
        run: |
          failed_pulls=0
          read -ra images <<< "$BUILT_IMAGES"
          for image in "${images[@]}"; do
            if [[ -n "$image" ]]; then
              echo "Pulling $image"
              if ! docker pull "$image"; then
                echo "Failed to pull $image"
                failed_pulls=$((failed_pulls + 1))
              else
                # Retag from ghcr.io/datahub-project/ to docker.io/acryldata/ so smoke tests
                # can reference images by the canonical acryldata name.
                acryl_image="${image/${{ env.DOCKER_REGISTRY }}\//acryldata/}"
                docker tag "$image" "$acryl_image"
              fi
              

            fi
          done

          if [[ $failed_pulls -gt 0 ]]; then
            echo "Warning: $failed_pulls image(s) failed to pull"
            exit 1;
          fi

          docker images

      - name: Disk Space Analysis
        run: |
          echo "=== Disk Usage Overview ==="
          df -h
          echo -e "\n=== Docker Disk Usage ==="
          docker system df -v

      - name: Run quickstart
        env:
          DATAHUB_TELEMETRY_ENABLED: false
          DATAHUB_VERSION: ${{ needs.setup-smoke-test.outputs.tag }}
          DATAHUB_ACTIONS_IMAGE: ${{ env.DATAHUB_ACTIONS_IMAGE }}
          ACTIONS_EXTRA_PACKAGES: "acryl-datahub-actions[executor] acryl-datahub-actions"
          ACTIONS_CONFIG: "https://raw.githubusercontent.com/acryldata/datahub-actions/main/docker/config/executor.yaml"
        run: ./smoke-test/run-quickstart.sh

      - name: Disk Check
        run: df -h . && docker images

      - name: Disable ES Disk Threshold
        run: |
          curl -XPUT "http://localhost:9200/_cluster/settings" \
          -H 'Content-Type: application/json' -d'{
            "persistent": {
              "cluster": {
                "routing": {
                  "allocation.disk.threshold_enabled": false
                }
              }
            }
          }'

      - name: Run smoke tests
        if: steps.retry-setup.outputs.should-skip != 'true'
        uses: ./.github/actions/run-smoke-tests
        with:
          test-strategy: ${{ matrix.test_strategy }}
          batch-number: ${{ matrix.batch }}
          batch-count: ${{ matrix.batch_count }}
          datahub-version: ${{ needs.setup-smoke-test.outputs.tag }}
          filtered-tests: ${{ steps.retry-setup.outputs.filtered-tests }}
          cypress-record-key: ${{ secrets.CYPRESS_RECORD_KEY }}

      # - name: Java SDK V2 Integration Tests
      #   if: ${{ (needs.setup-smoke-test.outputs.backend_change == 'true' || needs.setup-smoke-test.outputs.java_client_change == 'true') && matrix.batch == '0' }}
      #   env:
      #     DATAHUB_SERVER: http://localhost:8080
      #     ADMIN_USERNAME: datahub
      #     ADMIN_PASSWORD: datahub
      #   run: |
      #     echo "Running Java SDK V2 integration tests against running DataHub instance..."
      #     ./gradlew :metadata-integration:java:datahub-client:test --tests "*Integration*"

      # - name: Upload Java SDK V2 coverage to Codecov
      #   if: ${{ always() && (needs.setup-smoke-test.outputs.backend_change == 'true' || needs.setup-smoke-test.outputs.java_client_change == 'true') && matrix.batch == '0' }}
      #   uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     directory: ./build/coverage-reports/metadata-integration/java/datahub-client/
      #     flags: metadata-integration
      #     name: java-sdk-v2-integration
      #     fail_ci_if_error: false
      #     verbose: true
      #     override_branch: ${{ github.head_ref || github.ref_name }}

      - name: Disk Check
        run: df -h . && docker images

      - name: Store logs
        if: failure()
        run: |
          docker ps -a
          TEST_STRATEGY="-${{ matrix.test_strategy }}-${{ matrix.batch }}"
          source .github/scripts/docker_logs.sh
      - name: Upload logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: docker-logs-${{ matrix.test_strategy }}-${{ matrix.batch }}
          path: "docker_logs/*.log"
          retention-days: 5
      - name: Stage Cypress screenshots for artifact upload
        if: always() && matrix.test_strategy == 'cypress'
        run: |
          if [ -d smoke-test/tests/cypress/cypress/screenshots ]; then
            cp -r smoke-test/tests/cypress/cypress/screenshots \
              smoke-test/tests/cypress/build/mochawesome-report/screenshots
          fi
      - name: Upload Cypress mochawesome JSON results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always() && matrix.test_strategy == 'cypress'
        with:
          name: cypress-mochawesome-json-${{ matrix.batch }}
          path: smoke-test/tests/cypress/build/mochawesome-report/
          include-hidden-files: true
          retention-days: 1
      - name: Upload screenshots
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: failure()
        with:
          name: cypress-snapshots-${{ matrix.test_strategy }}-${{ matrix.batch }}
          path: smoke-test/tests/cypress/cypress/screenshots/
      - name: Report test results
        if: (!cancelled())
        uses: ./.github/actions/report-test-results
        with:
          artifact-name: Test Results (smoke tests) ${{ matrix.test_strategy }} ${{ matrix.batch }}
          test-results-paths: |
            **/smoke-test-results/cypress-test-*.xml
            **/junit.*.xml
            !**/binary/**
          junit-file-globs: |
            **/smoke-test-results/cypress-test-*.xml
            **/junit.*.xml
      - name: Send failed test metrics to PostHog
        if: failure()
        continue-on-error: true
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          GH_HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "$POSTHOG_API_KEY" ]; then
            echo "⚠️ POSTHOG_API_KEY not configured, skipping test failure metrics"
            exit 0
          fi

          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/test-results"
          find . -name "*.xml" -path "*/build/test-results/*" -exec cp {} "$TEMP_DIR/test-results/" \; 2>/dev/null || true
          find . -name "cypress-test-*.xml" -exec cp {} "$TEMP_DIR/test-results/" \; 2>/dev/null || true
          find . -name "junit.*.xml" -exec cp {} "$TEMP_DIR/test-results/" \; 2>/dev/null || true

          python3 .github/scripts/send_failed_tests_to_posthog.py \
            --input-dir "$TEMP_DIR/test-results" \
            --posthog-api-key "$POSTHOG_API_KEY" \
            --posthog-host "${POSTHOG_HOST:-https://app.posthog.com}" \
            --repository "${{ github.repository }}" \
            --workflow-name "${{ github.workflow }}" \
            --branch "${GH_HEAD_REF}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --batch "${{ matrix.batch }}" \
            --batch-count "${{ strategy.job-total }}" \
            --test-strategy "${{ matrix.test_strategy }}"

          rm -rf "$TEMP_DIR"
      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          override_branch: ${{ github.head_ref || github.ref_name }}

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' && matrix.batch == '0' }}
        with:
          path: ~/.cache/uv
          key: ${{ needs.setup-smoke-test.outputs.uv_cache_key }}

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' && matrix.batch == '0' }}
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup-smoke-test.outputs.yarn_cache_key }}

  cypress_html_report:
    name: Generate unified Cypress HTML report
    runs-on: ubuntu-latest
    needs: [smoke_test]
    if: ${{ !cancelled() && needs.smoke_test.result != 'skipped' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download all Cypress mochawesome JSON artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: cypress-mochawesome-json-*
          path: mochawesome-results
      - name: Generate HTML report
        run: |
          mapfile -t JSON_FILES < <(find mochawesome-results -path "*/.jsons/*.json" 2>/dev/null)
          if [[ ${#JSON_FILES[@]} -gt 0 ]]; then
            mkdir -p combined-screenshots
            find mochawesome-results -mindepth 1 -maxdepth 1 -type d | while read -r batch_dir; do
              if [ -d "$batch_dir/screenshots" ]; then
                cp -rn "$batch_dir/screenshots/." combined-screenshots/
              fi
            done
            printf '%s\n' "${JSON_FILES[@]}" > json-file-list.txt
            npm install --no-save \
              mochawesome-merge \
              mochawesome-report-generator \
              cypress-mochawesome-reporter \
              fs-extra
            node .github/scripts/generate-cypress-report.js
          else
            echo "No mochawesome JSON files found — all Cypress batches may have been skipped or crashed"
          fi
      - name: Upload unified Cypress HTML report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cypress-html-report
          path: cypress-html-report/
          retention-days: 5

