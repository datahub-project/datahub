name: Docker Smoke Tests
# Refactored equivalent of docker-unified.yml, using composable actions to reduce duplication.
# docker-unified.yml is left untouched; this workflow runs the same logic with cleaner structure.
on:
  workflow_dispatch:
    inputs:
      profileName:
        description: "Profile name for the smoke-test. Defaults to quickstart-consumers if not specified"
        required: false
        default: "quickstart-consumers"
        type: string
  push:
    branches:
      - dc/docker-unified-refactor
      - master
      - releases/**
      - hotfixes/**
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - releases/**
      - hotfixes/**
    paths-ignore:
      - ".github/**"
      - "!.github/workflows/docker-smoke-tests.yml"
      - "!.github/scripts/send_failed_tests_to_posthog.py"
      - "!.github/scripts/docker_helpers.sh"
      - "!.github/actions/ci-optimization"
      - "!.github/actions/smoke-test-retry-setup"
      - "!.github/actions/run-smoke-tests"
      - "!.github/scripts/check_python_package.py"
      - "!.github/scripts/parse_failed_cypress_tests.py"
      - "!.github/scripts/parse_failed_pytest_tests.py"
      - "!.github/scripts/docker_logs.sh"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  DOCKER_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  PROFILE_NAME: "${{ github.event.inputs.profileName || 'quickstart-consumers' }}"
  DOCKER_CACHE: "DEPOT"
  DEPOT_PROJECT_ID: ${{ vars.DEPOT_PROJECT_ID }}
  HAS_DEPOT_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'depot') }}
  IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
  DEPOT_TOKEN: "${{ secrets.DEPOT_TOKEN }}"

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  setup-smoke-test:
    runs-on: ubuntu-slim
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      slim_tag: ${{ steps.tag.outputs.slim_tag }}
      full_tag: ${{ steps.tag.outputs.full_tag }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
      unique_tag: ${{ steps.tag.outputs.unique_tag }}
      unique_slim_tag: ${{ steps.tag.outputs.unique_slim_tag }}
      unique_full_tag: ${{ steps.tag.outputs.unique_full_tag }}
      # docker-login: ${{ steps.docker-login.outputs.docker-login }}
      # publish: ${{ steps.publish.outputs.publish }}
      # pr-publish: ${{ steps.publish.outputs.pr-publish }}
      python_release_version: ${{ steps.tag.outputs.python_release_version }}
      branch_name: ${{ steps.tag.outputs.branch_name }}
      repository_name: ${{ steps.tag.outputs.repository_name }}
      frontend_change: ${{ steps.ci-optimize.outputs.frontend-change == 'true' || github.event_name != 'pull_request' }}
      actions_change: ${{ steps.ci-optimize.outputs.actions-change == 'true' || github.event_name != 'pull_request' }}
      ingestion_change: ${{ steps.ci-optimize.outputs.ingestion-change == 'true' || github.event_name != 'pull_request' }}
      ingestion_base_change: ${{ steps.ci-optimize.outputs.ingestion-base-change == 'true' }}
      backend_change: ${{ steps.ci-optimize.outputs.backend-change == 'true' || github.event_name != 'pull_request' }}
      frontend_only: ${{ steps.ci-optimize.outputs.frontend-only == 'true' }}
      ingestion_only: ${{ steps.ci-optimize.outputs.ingestion-only == 'true' }}
      connector_source_only: ${{ steps.ci-optimize.outputs.connector-source-only == 'true' }}
      backend_only: ${{ steps.ci-optimize.outputs.backend-only == 'true' }}
      kafka_setup_change: ${{ steps.ci-optimize.outputs.kafka-setup-change == 'true' }}
      smoke_test_change: ${{ steps.ci-optimize.outputs.smoke-test-change == 'true' }}
      java_client_change: ${{ steps.ci-optimize.outputs.java-client-change == 'true' || github.event_name != 'pull_request' }}
      integrations_service_change: "false"
      datahub_executor_change: "false"
      build_runner_type: ${{ steps.set-runner.outputs.build_runner_type }}
      test_runner_type: ${{ steps.set-runner.outputs.test_runner_type }}
      test_runner_type_small: ${{ steps.set-runner.outputs.test_runner_type_small }}
      use_depot_cache: ${{ steps.set-runner.outputs.use_depot_cache }}
      uv_cache_key: ${{ steps.uv-cache-key.outputs.uv_cache_key }}
      uv_cache_key_prefix: ${{ steps.uv-cache-key.outputs.uv_cache_key_prefix }}
      yarn_cache_key: ${{ steps.yarn-cache-key.outputs.yarn_cache_key }}
      yarn_cache_key_prefix: ${{ steps.yarn-cache-key.outputs.yarn_cache_key_prefix }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      cypress_batch_count: ${{ steps.set-test-batch-count.outputs.cypress_batch_count }}
      python_batch_count: ${{ steps.set-test-batch-count.outputs.python_batch_count }}
    steps:
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7
        with:
          # Needed for correct tag computation
          checkout-head-only: true
      - name: Compute Tag
        id: tag
        env:
          GITHUB_REF_FALLBACK: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          source .github/scripts/docker_helpers.sh
          {
            echo "short_sha=${SHORT_SHA}"
            echo "tag=$(get_tag)"
            echo "slim_tag=$(get_tag_slim)"
            echo "full_tag=$(get_tag_full)"
            echo "unique_tag=$(get_unique_tag)"
            echo "unique_slim_tag=$(get_unique_tag_slim)"
            echo "unique_full_tag=$(get_unique_tag_full)"
            echo "python_release_version=$(get_python_docker_release_v)"
            echo "branch_name=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
            echo "repository_name=${GITHUB_REPOSITORY#*/}"
          } >> "$GITHUB_OUTPUT"
      # - name: Check whether docker login is possible
      #   id: docker-login
      #   env:
      #     ENABLE_DOCKER_LOGIN: ${{ secrets.ACRYL_DOCKER_PASSWORD != '' }}
      #   run: |
      #     echo "Enable Docker Login: ${{ env.ENABLE_DOCKER_LOGIN }}"
      #     echo "docker-login=${{ env.ENABLE_DOCKER_LOGIN }}" >> "$GITHUB_OUTPUT"
      # - name: Check whether publishing should be enabled
      #   id: publish
      #   env:
      #     ENABLE_PUBLISH: >-
      #       ${{
      #          (github.event_name == 'release' || ((github.event_name == 'workflow_dispatch' || github.event_name == 'push') && github.ref == 'refs/heads/master'))
      #          && steps.docker-login.outputs.docker-login == 'true'
      #       }}
      #     ENABLE_PR_PUBLISH: >-
      #       ${{
      #          (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'publish') || contains(github.event.pull_request.labels.*.name, 'publish-docker')))
      #          && steps.docker-login.outputs.docker-login == 'true'
      #       }}
      #   run: |
      #     echo "Enable publish: ${{ env.ENABLE_PUBLISH }}"
      #     echo "Enable PR publish: ${{ env.ENABLE_PR_PUBLISH }}"
      #     echo "publish=${{ env.ENABLE_PUBLISH }}" >> "$GITHUB_OUTPUT"
      #     echo "pr-publish=${{ env.ENABLE_PR_PUBLISH }}" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/ci-optimization
        id: ci-optimize
      - uses: ./.github/actions/determine-runners
        id: determine-runners
        with:
          is-community-pr: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
          has-depot-label: ${{ contains(github.event.pull_request.labels.*.name, 'depot') }}

      - name: Select runners
        id: set-runner
        # Runner selection follows determine-runners action semantics:
        # Non-fork + depot available → large depot runners + depot cache
        # Fork + depot label → large depot runner for tests only (no depot cache)
        # Fork → GitHub-hosted runners
        # Note: Publishing of images is only supported on depot runners (hence not supported on Community PRs)
        run: |
          {
            echo "build_runner_type=${{ steps.determine-runners.outputs.default-runner-large }}"
            echo "test_runner_type=${{ steps.determine-runners.outputs.default-runner-large }}"
            echo "test_runner_type_small=${{ steps.determine-runners.outputs.small-runner }}"
            echo "use_depot_cache=true"
          } >> "$GITHUB_OUTPUT"
          if [[ -z "${{ vars.DEPOT_PROJECT_ID }}" ]]; then
            echo "use_depot_cache=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ env.IS_FORK }}" == "true" ]]; then
            echo "use_depot_cache=false" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${{ env.HAS_DEPOT_LABEL }}" == "true" ]]; then
            {
              echo "test_runner_type=${{ steps.determine-runners.outputs.depot-runner-large }}"
              echo "use_depot_cache=false"
            } >> " $GITHUB_OUTPUT"
          fi

      - name: Compute UV Cache Key
        id: uv-cache-key
        run: |
          echo "uv_cache_key=docker-smoke-tests-${{ runner.os }}-uv-${{ hashFiles(
            './datahub-actions/pyproject.toml',
            './datahub-actions/setup.py',
            './smoke-test/requirements.txt',
            './smoke-test/pyproject.toml',
            './metadata-ingestion/pyproject.toml',
            './metadata-ingestion/setup.py') }}" >> "$GITHUB_OUTPUT"
          echo "uv_cache_key_prefix=docker-smoke-tests-${{ runner.os }}-uv-" >> "$GITHUB_OUTPUT"

      - name: Compute Yarn Cache Key
        id: yarn-cache-key
        run: |
          echo "yarn_cache_key=docker-smoke-tests-${{ runner.os }}-yarn-${{ hashFiles('./smoke-test/tests/cypress/yarn.lock', './datahub-web-react/yarn.lock') }}" >> "$GITHUB_OUTPUT"
          echo "yarn_cache_key_prefix=docker-smoke-tests-${{ runner.os }}-yarn-" >> "$GITHUB_OUTPUT"
      - id: set-test-batch-count
        run: |
          if [[ "${{ env.IS_FORK }}" == "true" ]]; then
            echo "cypress_batch_count=5" >> "$GITHUB_OUTPUT"
            echo "python_batch_count=3" >> "$GITHUB_OUTPUT"
          else
            echo "cypress_batch_count=8" >> "$GITHUB_OUTPUT"
            echo "python_batch_count=7" >> "$GITHUB_OUTPUT"
          fi

      - id: set-matrix
        run: |
          python_batch_count=${{ steps.set-test-batch-count.outputs.python_batch_count }}
          python_matrix='{"test_strategy":"pytests","batch":"0","batch_count":"'"$python_batch_count"'"}'
          for ((i=1;i<python_batch_count;i++)); do
            python_matrix="$python_matrix"',{"test_strategy":"pytests","batch_count":"'"$python_batch_count"'","batch":"'"$i"'"}'
          done

          cypress_batch_count=${{ steps.set-test-batch-count.outputs.cypress_batch_count }}
          cypress_matrix='{"test_strategy":"cypress","batch":"0","batch_count":"'"$cypress_batch_count"'"}'
          for ((i=1;i<cypress_batch_count;i++)); do
            cypress_matrix="$cypress_matrix"',{"test_strategy":"cypress","batch_count":"'"$cypress_batch_count"'","batch":"'"$i"'"}'
          done

          includes=''
          if [[ "${{ steps.ci-optimize.outputs.backend-change }}" == 'true' || "${{  steps.ci-optimize.outputs.smoke-test-change }}" == 'true' ]]; then
            includes="$python_matrix,$cypress_matrix"
          elif [[ "${{  steps.ci-optimize.outputs.frontend-only }}" == 'true' ]]; then
            includes="$cypress_matrix"
          elif [[ "${{  steps.ci-optimize.outputs.connector-source-only }}" == 'true' ]]; then
            includes=""
          elif [[ "${{  steps.ci-optimize.outputs.ingestion-only }}" == 'true' ]]; then
            includes="$python_matrix"
          fi
          echo "matrix={\"include\":[$includes]}" >> "$GITHUB_OUTPUT"
          {
            echo "## Smoke Test Matrix"
            echo ""
            echo "| Strategy | Total Batches |"
            echo "|----------|---------------|"
            echo "{\"include\":[$includes]}" | jq -r '[.include[] | {test_strategy, batch_count}] | unique[] | "| \(.test_strategy) | \(.batch_count) |"'
          } >> "$GITHUB_STEP_SUMMARY"

  build_quickstart_images:
    name: Build Quickstart images for smoke test
    runs-on: ${{ needs.setup-smoke-test.outputs.build_runner_type }}
    needs: setup-smoke-test
    if: ${{ needs.setup-smoke-test.outputs.use_depot_cache == 'true' }}
    outputs:
      built_images: ${{ steps.collect-images.outputs.built_images }}
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "zulu"
          java-version: 17

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/uv
          key: ${{ needs.setup-smoke-test.outputs.uv_cache_key }}
          restore-keys: ${{ needs.setup-smoke-test.outputs.uv_cache_key_prefix }}

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup-smoke-test.outputs.yarn_cache_key }}
          restore-keys: ${{ needs.setup-smoke-test.outputs.yarn_cache_key_prefix }}

      - uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
          key: gradle-plugins-cache
          restore-keys: gradle-plugins-cache

      - name: Set up Depot CLI
        if: ${{ env.DOCKER_CACHE == 'DEPOT' }}
        uses: depot/setup-action@15c09a5f77a0840ad4bce955686522a257853461 # v1

      - name: Check out the repo
        uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Login to Github Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Quickstart Images For Smoke tests
        env:
          DOCKER_CACHE: ${{ needs.setup-smoke-test.outputs.use_depot_cache == 'true' && 'DEPOT' || 'GITHUB' }}
        run: |
          BUILD_TASK=":docker:buildImagesquickstart"
          ./gradlew $BUILD_TASK -Ptag=${{ needs.setup-smoke-test.outputs.tag }} -PpythonDockerVersion=${{ needs.setup-smoke-test.outputs.python_release_version }} -PdockerRegistry=${{ env.DOCKER_REGISTRY }} -PdockerPush=true

      - name: Save build Metadata
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-metadata-${{ needs.setup-smoke-test.outputs.tag }}
          path: |
            ${{ github.workspace }}/build/build-metadata.json
            ${{ github.workspace }}/build/bake-spec-quickstart.json

      - name: Collect image references from bake spec
        id: collect-images
        shell: bash
        env:
          BAKE_SPEC: ${{ github.workspace }}/build/bake-spec-quickstart.json
        run: |
          # Extract all image:tag references from the bake spec.
          images="$(docker buildx bake -f "$BAKE_SPEC" --print | jq -r '.target | to_entries[].value.tags[]')"
          {
            echo "## Built Images"
            echo ""
            echo "$images" | while IFS= read -r image; do
              echo "- \`$image\`"
            done
          } >> "$GITHUB_STEP_SUMMARY"

          echo "built_images=$(echo "$images" | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          path: ~/.cache/uv
          key: ${{ needs.setup-smoke-test.outputs.uv_cache_key }}

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          path: ~/.cache/yarn
          key: ${{ needs.setup-smoke-test.outputs.yarn_cache_key }}

      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        if: ${{ github.ref == 'refs/heads/master' }}
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
          key: gradle-plugins-cache

  # scan_images:
  #   permissions:
  #     contents: read
  #     security-events: write
  #     actions: read
  #   name: Scan images for vulnerabilities
  #   runs-on: depot-ubuntu-24.04
