name: "Pull Request Labeler"
on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: ".github/pr-labeler-config.yml"
      - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        # PRs from forks are community contributions. Internal contributors push branches
        # to the upstream repo, so head.repo.full_name == github.repository for them.
        if: github.event.pull_request.head.repo.full_name != github.repository
        with:
          github_token: ${{ github.token }}
          labels: |
            community-contribution
      - uses: actions-ecosystem/action-add-labels@18f1af5e3544586314bbe15c0273249c770b2daf # v1.1.3
        # only add names of champions here. Confirm with DevRel Team
        if: ${{
          contains(
          fromJson('[
          "siladitya2",
          "bossenti",
          "PatrickfBraz",
          "cuong-pham",
          "sudhakarast",
          "tkdrahn",
          "rtekal",
          "mikeburke24",
          "DSchmidtDev"
          ]'),
          github.actor
          )
          }}
        with:
          github_token: ${{ github.token }}
          labels: |
            datahub-community-champion
