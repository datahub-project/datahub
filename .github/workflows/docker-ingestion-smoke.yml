name: ingestion smoke
on:
  release:
    types: [published]
  push:
    branches:
      - acryl-main
    paths:
      - "docker/datahub-ingestion-base/**"
      - "smoke-test/**"
      - ".github/workflows/docker-ingestion-smoke.yml"
  pull_request:
    branches:
      - "**"
    types:
      - labeled
      - opened
      - synchronize
      - reopened
    paths:
      - "docker/datahub-ingestion-base/**"
      - "smoke-test/**"
      - ".github/workflows/docker-ingestion-smoke.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  IMAGE: "795586375822.dkr.ecr.us-west-2.amazonaws.com/acryl-private-smoke-tests"
  IMAGE_INGESTION_BASE: "795586375822.dkr.ecr.us-west-2.amazonaws.com/datahub-ingestion-base"

jobs:
  setup:
    runs-on: depot-ubuntu-22.04-small
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      publish: ${{ steps.publish.outputs.publish }}
      pr-publish: ${{ steps.pr-publish.outputs.publish }}
    steps:
      - name: Checkout
        uses: acryldata/sane-checkout-action@v4
      - name: Compute Tag
        id: tag
        env:
          GITHUB_REF_FALLBACK: ${{ github.ref }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          source .github/scripts/docker_helpers.sh
          echo "tag=$(get_tag)" >> "$GITHUB_OUTPUT"
          echo_tags
      - name: Check whether publishing enabled
        id: publish
        env:
          ENABLE_PUBLISH: >-
            ${{
               github.event_name != 'pull_request'
               && (( secrets.DOCKER_PASSWORD != '' && secrets.ACRYL_DOCKER_PASSWORD != '' ) || secrets.AWS_ECR_SECRET_ACCESS_KEY != '')
            }}
        run: |
          echo "Enable publish: ${{ env.ENABLE_PUBLISH }}"
          echo "publish=${{ env.ENABLE_PUBLISH }}" >> "$GITHUB_OUTPUT"
      - name: Check whether PR publishing enabled
        id: pr-publish
        env:
          ENABLE_PUBLISH: >-
            ${{
               (github.event_name == 'pull_request' && (contains(github.event.pull_request.labels.*.name, 'publish') || contains(github.event.pull_request.labels.*.name, 'publish-docker')))
               && (( secrets.DOCKER_PASSWORD != '' && secrets.ACRYL_DOCKER_PASSWORD != '' ) || secrets.AWS_ECR_SECRET_ACCESS_KEY != '')
            }}
        run: |
          echo "Enable PR publish: ${{ env.ENABLE_PUBLISH }}"
          echo "publish=${{ env.ENABLE_PUBLISH }}" >> "$GITHUB_OUTPUT"
  build-smoke:
    name: Build and Push Docker Image to Docker Hub
    runs-on: depot-ubuntu-22.04
    needs: setup
    if: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
    steps:
      - name: Check out the repo
        uses: acryldata/sane-checkout-action@v4
      - name: Update versions
        run: |
          python .github/scripts/docker_helper/version_updater.py --version "9999"  --init "./metadata-ingestion/src/datahub/_version.py"
          python .github/scripts/docker_helper/version_updater.py --version "9999"  --init "./metadata-ingestion-modules/airflow-plugin/src/datahub_airflow_plugin/_version.py"
      - name: Build and push
        uses: ./.github/actions/docker-custom-build-and-push
        with:
          images: |
            ${{ env.IMAGE }}
          image_tag: ${{ needs.setup.outputs.tag }}
          username: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          publish: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
          context: .
          file: ./docker/datahub-ingestion-base/smoke.Dockerfile
          platforms: linux/amd64,linux/arm64/v8

  build-ingestion-base:
    name: Build and ${{ (needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true') && 'Push' || 'test-build' }} datahub-ingestion-base (${{ matrix.app_env == 'full' && 'default' || 'slim' }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        app_env: [full, slim]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and push datahub-ingestion-base (${{ matrix.app_env }})
        uses: ./.github/actions/docker-custom-build-and-push
        with:
          images: |
            ${{ env.IMAGE_INGESTION_BASE }}
          image_tag: ${{ matrix.app_env == 'full' && needs.setup.outputs.tag || format('{0}-slim', needs.setup.outputs.tag) }}
          username: ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          dockerhub-username: ${{ secrets.DOCKER_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKER_PASSWORD }}
          publish: ${{ needs.setup.outputs.publish == 'true' || needs.setup.outputs.pr-publish == 'true' }}
          context: .
          file: docker/datahub-ingestion-base/Dockerfile
          platforms: linux/amd64
          build-args: |
            APP_ENV=${{ matrix.app_env }}
