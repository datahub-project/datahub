name: Python Build
on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/python-build-pages.yml"
      - "metadata-ingestion/**"
      - "datahub-actions/**"
      - "metadata-ingestion-modules/**"
      - "metadata-models/**"
      - "python-build/**"
  pull_request:
    branches:
      - "**"
    paths:
      - ".github/workflows/python-build-pages.yml"
      - "metadata-ingestion/**"
      - "datahub-actions/**"
      - "metadata-ingestion-modules/**"
      - "metadata-models/**"
      - "python-build/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    if: ${{ vars.CLOUDFLARE_WHEELS_PROJECT_NAME != '' }}

    name: Python Wheels
    permissions:
      contents: read
      pull-requests: read
      deployments: write
    outputs:
      pypi_index_url: ${{ steps.cloudflare.outputs.deployment-url }}
      pypi_index_simple_url: ${{ steps.set-pypi-url.outputs.pypi_index_simple_url }}
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "zulu"
          java-version: 21
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
      - uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
          cache: "pip"
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/requirements.txt') }}
      - name: Build Python wheel site
        run: |
          ./gradlew :python-build:buildSite
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DATAHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Publish
        id: cloudflare
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: python-build
          gitHubToken: ${{ github.token }}
          command: pages deploy site --project-name=${{ vars.CLOUDFLARE_WHEELS_PROJECT_NAME }}

      - name: Set PyPI index URL output
        id: set-pypi-url
        run: |
          PYPI_URL="${{ steps.cloudflare.outputs.deployment-url }}/simple"
          echo "pypi_index_simple_url=$PYPI_URL" >> "$GITHUB_OUTPUT"
          echo "PyPI index URL: $PYPI_URL"

          # Save to artifact for consumption by docker-unified.yml
          mkdir -p /tmp/pypi-config
          echo "$PYPI_URL" > /tmp/pypi-config/pypi-index-url.txt
          echo "Base URL: ${{ steps.cloudflare.outputs.deployment-url }}" > /tmp/pypi-config/deployment-info.txt
          echo "Simple URL: $PYPI_URL" >> /tmp/pypi-config/deployment-info.txt

      - name: Upload PyPI config artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pypi-config
          path: /tmp/pypi-config/
          retention-days: 1
