name: Check Datahub Jars

on:
  push:
    branches:
      - master
      - releases/**
    paths:
      - "metadata-integration/**"
  pull_request:
    branches:
      - "**"
    paths:
      - "metadata-integration/**"
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check_jars:
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        command: ["datahub-client", "datahub-protobuf", "spark-lineage"]
    runs-on: ubuntu-latest
    steps:
      - uses: acryldata/sane-checkout-action@186e92cc5948a9c3e1cc7a96eaff9f776f3fc8e3 # v7
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.10"
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/requirements.txt') }}
      - name: Install dependencies
        run: ./metadata-ingestion/scripts/install_deps.sh
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "zulu"
          java-version: 17
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: check ${{ matrix.command }} jar
        run: |
          ./gradlew :metadata-integration:java:${{ matrix.command }}:build --info
          ./gradlew :metadata-integration:java:${{ matrix.command }}:checkShadowJar
          ./gradlew :metadata-integration:java:${{ matrix.command }}:javadoc
