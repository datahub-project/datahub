name: Workflow Monitor

on:
  workflow_run:
    workflows: ["Docker Build, Scan, Test"]
    types: [completed]

permissions:
  actions: write # Required to retrigger workflows
  contents: read

jobs:
  monitor:
    name: Monitor and Retrigger Failed Workflows
    runs-on: ubuntu-latest
    # Only run on failure, first attempt, relevant events, and non-fork PRs
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt == 1 &&
      (github.event.workflow_run.event == 'pull_request' ||
       github.event.workflow_run.event == 'push') &&
      github.event.workflow_run.head_repository.full_name == github.repository

    steps:
      - name: Log workflow run details
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## Workflow Monitor - Retrigger Decision

          **Monitored Workflow:** ${{ github.event.workflow_run.name }}
          **Run ID:** ${{ github.event.workflow_run.id }}
          **Conclusion:** ${{ github.event.workflow_run.conclusion }}
          **Run Attempt:** ${{ github.event.workflow_run.run_attempt }}
          **Triggering Event:** ${{ github.event.workflow_run.event }}
          **Branch:** ${{ github.event.workflow_run.head_branch }}
          **Commit:** ${{ github.event.workflow_run.head_sha }}
          **Actor:** ${{ github.event.workflow_run.actor.login }}

          **Decision:** ✅ Retriggering workflow (first failure)
          EOF

          echo "Workflow '${{ github.event.workflow_run.name }}' failed on first attempt"
          echo "Retriggering run ID: ${{ github.event.workflow_run.id }}"

      - name: Retrigger failed workflow
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Calling GitHub API to retrigger workflow..."

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/rerun

          EXIT_CODE=$?

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ Successfully triggered workflow retry" | tee -a $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The workflow will now run as attempt 2, which will activate intelligent test retry logic." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed to retrigger workflow (exit code: $EXIT_CODE)" | tee -a $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note:** This is a monitoring failure and does not affect the original workflow result." >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          fi
