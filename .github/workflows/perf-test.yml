name: Run Performance Tests

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Remote DataHub instance URL"
        required: true
        type: choice
        options:
          - "https://deploy-perf-01.acryl.io"
        default: "https://deploy-perf-01.acryl.io"
      locustfile:
        description: "Locustfile to run"
        required: true
        type: choice
        options:
          - "ingest.py"
          - "ingest_small.py"
          - "ingest_graph.py"
          - "search.py"
          - "search_graphql.py"
          - "browse.py"
          - "graph.py"
          - "get_entities.py"
          - "graphql_performance.py"
        default: "search.py"
      users:
        description: "Number of concurrent users"
        required: false
        type: number
        default: 10
      spawn_rate:
        description: "Spawn rate (users per second)"
        required: false
        type: number
        default: 1
      run_time:
        description: "Test duration (e.g., 5m, 1h)"
        required: false
        type: string
        default: "5m"
      branch:
        description: "Branch to test"
        required: false
        type: string
        default: "acryl-main"

jobs:
  run-perf-test:
    name: Run Locust Performance Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7.1.3
        with:
          version: "0.9.9"

      - name: Install dependencies
        run: |
          cd perf-test
          uv venv venv --python 3.11
          source venv/bin/activate
          uv pip install -r requirements.txt

      - name: Load secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ADMIN_USERNAME: op://Engineering/Shared Accounts for dev0x/admin email
          ADMIN_PASSWORD: op://Engineering/Shared Accounts for dev0x/admin pass

      - name: Run Locust performance test
        env:
          DATAHUB_GMS_URL: ${{ github.event.inputs.target_url }}
        run: |
          cd perf-test
          source venv/bin/activate
          locust \
            --headless \
            --host="${{ github.event.inputs.target_url }}" \
            --locustfile="locustfiles/${{ github.event.inputs.locustfile }}" \
            --users="${{ github.event.inputs.users }}" \
            --spawn-rate="${{ github.event.inputs.spawn_rate }}" \
            --run-time="${{ github.event.inputs.run_time }}" \
            --html=results.html \
            --csv=results
      - name: Upload results to s3
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_PERF_TEST_BUCKET_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_PERF_TEST_BUCKET_KEY_SECRET }}"
          AWS_REGION: "us-west-2"
          AWS_BUCKET_NAME: "acryl-perf-test-metrics"
        run: |
          cd perf-test

          # Compute S3 directory structure
          TEST_NAME=$(basename "${{ github.event.inputs.locustfile }}" .py)
          DATE=$(date -u +%Y-%m-%d)
          TIME=$(date -u +%H-%M-%S)
          RUNNER="github-actions"
          S3_PREFIX="s3://${AWS_BUCKET_NAME}/${TEST_NAME}/${DATE}/${TIME}/${RUNNER}"

          echo "Uploading results to: ${S3_PREFIX}"

          # Create metadata.json
          cat > metadata.json <<EOF
          {
            "test_name": "${TEST_NAME}",
            "locustfile": "${{ github.event.inputs.locustfile }}",
            "target_url": "${{ github.event.inputs.target_url }}",
            "users": ${{ github.event.inputs.users }},
            "spawn_rate": ${{ github.event.inputs.spawn_rate }},
            "run_time": "${{ github.event.inputs.run_time }}",
            "branch": "${{ github.event.inputs.branch }}",
            "github_run_id": "${{ github.run_id }}",
            "github_run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "runner": "${RUNNER}"
          }
          EOF

          # Upload all results
          aws s3 cp results.html "${S3_PREFIX}/results.html"
          aws s3 cp metadata.json "${S3_PREFIX}/metadata.json"

          # Upload CSV files (some may not exist depending on test type)
          for csv_file in results_*.csv; do
            if [ -f "$csv_file" ]; then
              aws s3 cp "$csv_file" "${S3_PREFIX}/${csv_file}"
            fi
          done

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-test-results-${{ github.event.inputs.locustfile }}-${{ github.run_id }}
          path: |
            perf-test/results.html
            perf-test/results_*.csv
          retention-days: 30
