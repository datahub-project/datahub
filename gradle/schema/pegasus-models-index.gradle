/**
 * Shared Gradle script for generating Pegasus model index from .pdsc files.
 *
 * This avoids runtime classpath scanning by providing a pre-computed META-INF/pegasus-models.idx
 * with one fully-qualified class name per line.
 *
 * Apply this script in any Pegasus module:
 *   apply from: '../gradle/schema/pegasus-models-index.gradle'
 *
 * The script will:
 * 1. Define translatedPdscDir, generatedPegasusResourcesDir, modelIndexFile providers
 * 2. Register generatePegasusIndexesFromPdsc task
 * 3. Add generated resources to sourceSets.main.resources
 * 4. Make processResources depend on index generation
 */

import groovy.json.JsonSlurper
import java.nio.charset.StandardCharsets

def translatedPdscDir = layout.buildDirectory.dir("mainLegacySchemas")
def generatedPegasusResourcesDir = layout.buildDirectory.dir("generated/resources/pegasus/main")

def modelIndexFile = generatedPegasusResourcesDir.map {
    it.file("META-INF/pegasus-models.idx")
}

// Add generated resources to sourceSets
sourceSets {
  main {
    resources {
      srcDir(generatedPegasusResourcesDir)
    }
  }
}

/**
 * Generate META-INF/pegasus-models.idx from Pegasus-translated .pdsc files.
 * This index avoids runtime classpath scanning by providing a pre-computed list of model FQCNs.
 *
 * Task Inputs:
 *   - $buildDir/mainLegacySchemas/*.pdsc (generated by mainTranslateSchemas)
 *
 * Task Outputs:
 *   - $buildDir/generated/resources/pegasus/main/META-INF/pegasus-models.idx
 *
 * Index Format:
 *   One fully-qualified class name per line, alphabetically sorted, no duplicates.
 *   Only includes record, enum, typeref, and fixed types.
 */
tasks.register("generatePegasusIndexesFromPdsc") {
    description = "Generate META-INF/pegasus-models.idx from Pegasus-translated .pdsc files"
    group = "build"

    dependsOn(tasks.named("mainTranslateSchemas"))

    inputs.dir(translatedPdscDir)
    outputs.file(modelIndexFile)

    doLast {
        File pdscRoot = translatedPdscDir.get().asFile
        File modelsOut = modelIndexFile.get().asFile

        modelsOut.parentFile.mkdirs()

        if (!pdscRoot.exists()) {
            throw new GradleException("PDSC directory does not exist: ${pdscRoot}")
        }

        def jsonSlurper = new JsonSlurper()
        Set<String> fqcnSet = new TreeSet<>()
        List<String> errors = []

        fileTree(pdscRoot).matching {
            include '**/*.pdsc'
        }.files.sort { a, b -> a.path <=> b.path }.each { File pdscFile ->
            try {
                // Read file content first to ensure proper resource cleanup
                String fileContent = pdscFile.getText(StandardCharsets.UTF_8.name())
                if (!fileContent?.trim()) {
                    errors << "Empty or whitespace-only .pdsc file: ${pdscFile}"
                    return
                }

                def json = jsonSlurper.parseText(fileContent)

                String namespace = json?.namespace?.toString()?.trim()
                String name = json?.name?.toString()?.trim()
                String type = json?.type?.toString()?.trim()

                if (!namespace) {
                    errors << "Missing or empty namespace in ${pdscFile}"
                    return
                }
                if (!name) {
                    errors << "Missing or empty name in ${pdscFile}"
                    return
                }
                if (!type) {
                    errors << "Missing or empty type in ${pdscFile}"
                    return
                }

                // Keep only top-level Pegasus types that generate Java types
                if (!(type in ['record', 'enum', 'typeref', 'fixed'])) {
                    logger.debug("Skipped ${pdscFile.name}: type '${type}' not in [record, enum, typeref, fixed]")
                    return
                }

                fqcnSet.add("${namespace}.${name}")
            } catch (Exception e) {
                errors << "Failed to parse ${pdscFile}: ${e.class.simpleName}: ${e.message}"
            }
        }

        if (!errors.isEmpty()) {
            throw new GradleException(
                "Failed generating Pegasus model index:\n" +
                errors.collect { " - ${it}" }.join('\n')
            )
        }

        modelsOut.text = fqcnSet.join('\n')
        if (!fqcnSet.isEmpty()) {
            modelsOut.append('\n')
        }

        logger.lifecycle("Generated ${fqcnSet.size()} Pegasus model entries at ${modelsOut}")
    }
}

tasks.named("processResources") {
    dependsOn(tasks.named("generatePegasusIndexesFromPdsc"))
}