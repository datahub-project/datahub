plugins {
  id("com.palantir.git-version") apply false
}
apply plugin: 'java'
apply plugin: 'com.github.johnrengelman.shadow'
apply plugin: 'jacoco'
apply plugin: 'signing'
apply plugin: 'maven-publish'
apply plugin: 'org.hidetake.swagger.generator'
apply from: "../versioning.gradle"
import org.apache.tools.ant.filters.ReplaceTokens


jar.enabled = false // Since we only want to build shadow jars, disabling the regular jar creation

tasks.withType(JavaCompile).configureEach {
  javaCompiler = javaToolchains.compilerFor {
    languageVersion = JavaLanguageVersion.of(8)
  }
}
tasks.withType(Test).configureEach {
  javaLauncher = javaToolchains.launcherFor {
    languageVersion = JavaLanguageVersion.of(8)
  }
}

dependencies {
  // DO NOT DELETE. Required for SaaS version
  implementation project(':entity-registry')
  implementation project(':metadata-events:mxe-utils-avro-1.7')

  implementation project(':metadata-models')
  implementation(externalDependency.kafkaAvroSerializer) {
    exclude group: "org.apache.avro"
  }
  implementation externalDependency.avro_1_7
  constraints {
    implementation('commons-collections:commons-collections:3.2.2') {
      because 'Vulnerability Issue'
    }
  }

  compileOnly externalDependency.httpAsyncClient
  implementation externalDependency.jacksonDataBind
  implementation externalDependency.javaxValidation
  runtimeOnly externalDependency.jna
  implementation externalDependency.springContext
  implementation externalDependency.swaggerAnnotations

  implementation externalDependency.slf4jApi
  compileOnly externalDependency.lombok
  annotationProcessor externalDependency.lombok
  // VisibleForTesting
  compileOnly externalDependency.guava
  testImplementation externalDependency.testngJava8
  testImplementation externalDependency.mockito
  testImplementation externalDependency.mockServer
  testImplementation externalDependency.mockServerClient
  testImplementation externalDependency.testContainers
  testImplementation externalDependency.httpAsyncClient
  testRuntimeOnly externalDependency.logbackClassic

  swaggerCodegen externalDependency.swaggerCli
}

//jacocoTestReport {
//    dependsOn test // tests are required to run before generating the report
//}

task copyAvroSchemas {
  dependsOn(':metadata-events:mxe-schemas:renameNamespace')
  copy {
    from file('../../../metadata-events/mxe-schemas/src/renamed/avro/com/linkedin/mxe/MetadataChangeProposal.avsc')
    into file('./src/main/resources')
  }
}

compileJava.dependsOn copyAvroSchemas

jacocoTestReport {
  dependsOn test // tests are required to run before generating the report
}

test {
  // to avoid simultaneous executions of tests when complete build is run
  mustRunAfter(":metadata-io:test")
  useJUnit()
  finalizedBy jacocoTestReport
}

task checkShadowJar(type: Exec) {
  commandLine 'sh', '-c', 'scripts/check_jar.sh'
}

shadowJar {
  zip64 = true
  archiveClassifier = ''
  // preventing java multi-release JAR leakage
  // https://github.com/johnrengelman/shadow/issues/729
  exclude('module-info.class', 'META-INF/versions/**',
      '**/LICENSE', '**/LICENSE.txt', '**/NOTICE', '**/NOTICE.txt')
  mergeServiceFiles()
  // we relocate namespaces manually, because we want to know exactly which libs we are exposing and why
  // we can move to automatic relocation using ConfigureShadowRelocation after we get to a good place on these first
  // acryl-main doesn't perform any re-locations. I don't exactly know why, but keeping this comment here for future readers
  // jteoh: 9/26/23: Added the OSS relocates here to support Apple Metadata Lake use case, not sure why datahub-fork did not have them to start with.
  relocate 'org.springframework', 'io.acryl.shaded.org.springframework'
  relocate 'com.fasterxml.jackson', 'io.acryl.shaded.jackson'
  relocate 'org.yaml', 'io.acryl.shaded.org.yaml' // Required for shading snakeyaml
  relocate 'net.jcip.annotations', 'io.acryl.shaded.annotations'
  relocate 'javassist', 'io.acryl.shaded.javassist'
  relocate 'edu.umd.cs.findbugs', 'io.acryl.shaded.findbugs'
  relocate 'org.antlr', 'io.acryl.shaded.org.antlr'
  relocate 'antlr', 'io.acryl.shaded.antlr'
  relocate 'com.google.common', 'io.acryl.shaded.com.google.common'
  relocate 'org.apache.commons', 'io.acryl.shaded.org.apache.commons'
  relocate 'org.reflections', 'io.acryl.shaded.org.reflections'
  relocate 'st4hidden', 'io.acryl.shaded.st4hidden'
  relocate 'org.stringtemplate', 'io.acryl.shaded.org.stringtemplate'
  relocate 'org.abego.treelayout', 'io.acryl.shaded.treelayout'
  relocate 'org.slf4j', 'io.acryl.shaded.slf4j'
  relocate 'javax.annotation', 'io.acryl.shaded.javax.annotation'
  relocate 'com.github.benmanes.caffeine', 'io.acryl.shaded.com.github.benmanes.caffeine'
  relocate 'org.checkerframework', 'io.acryl.shaded.org.checkerframework'
  relocate 'com.google.errorprone', 'io.acryl.shaded.com.google.errorprone'
  relocate 'com.sun.jna', 'io.acryl.shaded.com.sun.jna'
  // Below jars added for kafka emitter only
  relocate 'org.apache.avro', 'io.acryl.shaded.org.apache.avro'
  relocate 'com.thoughtworks.paranamer', 'io.acryl.shaded.com.thoughtworks.paranamer'
  relocate 'org.xerial.snappy', 'io.acryl.shaded.org.xerial.snappy'
  relocate 'org.apache.kafka', 'io.acryl.shaded.org.apache.kafka'
  relocate 'io.confluent', 'io.acryl.shaded.io.confluent'
  relocate 'org.apache.zookeeper', 'io.acryl.shaded.org.apache.zookeeper'
  relocate 'org.apache.yetus', 'io.acryl.shaded.org.apache.yetus'
  relocate 'jline', 'io.acryl.shaded.jline'
  relocate 'org.apache.jute', 'io.acryl.shaded.org.apache.jute'
  relocate 'org.I0Itec.zkclient', 'io.acryl.shaded.org.I0Itec.zkclient'
  relocate 'net.jpountz', 'io.acryl.shaded.net.jpountz'
  relocate 'com.github.luben', 'io.acryl.shaded.com.github.luben'
  relocate 'common.message', 'io.acryl.shaded.common.message'
  relocate 'org.glassfish', 'io.acryl.shaded.org.glassfish'
  relocate 'ch.randelshofer', 'io.acryl.shaded.ch.randelshofer'
}

assemble {
  dependsOn shadowJar
}
compileTestJava.dependsOn shadowJar

task sourcesJar(type: Jar) {
  archiveClassifier = 'sources'
  from sourceSets.main.allSource
}

task javadocJar(type: Jar) {
  archiveClassifier = 'javadoc'
  from javadoc
}

publishing {
  publications {
    shadow(MavenPublication) { publication ->
      project.shadow.component(publication)
      pom {
        name = 'Datahub Client'
        group = 'io.acryl'
        artifactId = 'datahub-client'
        description = 'DataHub Java client for metadata integration'
        url = 'https://datahubproject.io'
        artifacts = [shadowJar, javadocJar, sourcesJar]

        scm {
          connection = 'scm:git:git://github.com/datahub-project/datahub.git'
          developerConnection = 'scm:git:ssh://github.com:datahub-project/datahub.git'
          url = 'https://github.com/datahub-project/datahub.git'
        }

          licenses {
            license {
              name = 'The Apache License, Version 2.0'
              url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
            }
          }

          developers {
            developer {
              id = 'datahub'
              name = 'Datahub'
              email = 'datahub@acryl.io'
            }
          }
        }
    }
  }

  repositories {
    maven {
      def releasesRepoUrl = "https://acryl-795586375822.d.codeartifact.us-west-2.amazonaws.com/maven/acryl-datahub-client/"
      def snapshotsRepoUrl = "https://acryl-795586375822.d.codeartifact.us-west-2.amazonaws.com/maven/acryl-datahub-client/"
      credentials {
        username "aws"
        password System.getenv('CODEARTIFACT_AUTH_TOKEN')
      }
      url = version.endsWith('SNAPSHOT') ? snapshotsRepoUrl : releasesRepoUrl
    }
  }
}

signing {
  def signingKey = findProperty("signingKey")
  def signingPassword = System.getenv("SIGNING_PASSWORD")
  useInMemoryPgpKeys(signingKey, signingPassword)
  sign publishing.publications.shadow
}

