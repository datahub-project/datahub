plugins {
  id("com.palantir.git-version") apply false
  id 'java-library'
  id 'com.gradleup.shadow'
  id 'signing'
  id 'io.codearte.nexus-staging'
  id 'maven-publish'
}

apply from: "../../../gradle/coverage/java-coverage.gradle"
apply from: "../versioning.gradle"
import org.apache.tools.ant.filters.ReplaceTokens


jar {
  if (project.hasProperty('archiveAppendix')) {
    archiveAppendix.set(project.archiveAppendix)
  }
  archiveClassifier = "lib"
}

dependencies {
  api project(':entity-registry')
  api project(':metadata-integration:java:datahub-event')
  implementation project(':metadata-integration:java:datahub-schematron:lib')

  // DO NOT DELETE. Required for SaaS version
  implementation project(':metadata-events:mxe-utils-avro')

  implementation project(':entity-registry')
  implementation project(':metadata-integration:java:datahub-event')
  implementation(externalDependency.kafkaAvroSerializer) {
    exclude group: "org.apache.avro"
  }
  implementation externalDependency.avro
  implementation externalDependency.httpClient

  constraints {
    implementation('commons-collections:commons-collections:3.2.2') {
      because 'Vulnerability Issue'
    }
  }

  implementation externalDependency.awsS3
  implementation platform(externalDependency.jacksonBom)
  implementation externalDependency.jacksonDataBind
  runtimeOnly externalDependency.jna

  api externalDependency.slf4jApi
  compileOnly externalDependency.lombok
  annotationProcessor externalDependency.lombok
  // VisibleForTesting
  compileOnly externalDependency.guava
  testImplementation externalDependency.testng
  testImplementation externalDependency.mockito
  testImplementation externalDependency.mockServer
  testImplementation externalDependency.mockServerClient
  testImplementation externalDependency.testContainers
  testRuntimeOnly externalDependency.logbackClassic
  testRuntimeOnly externalDependency.logbackJackson
  testRuntimeOnly externalDependency.logbackJsonClassic
}

task copyAvroSchemas {
  dependsOn(':metadata-events:mxe-schemas:renameNamespace')
  copy {
    from file('../../../metadata-events/mxe-schemas/src/renamed/avro/com/linkedin/mxe/MetadataChangeProposal.avsc')
    into file('./src/main/resources')
  }
}

compileJava.dependsOn copyAvroSchemas

// Add Python environment validation task
task validatePythonEnv(dependsOn: [":metadata-ingestion:installDev"]) {
    doFirst {
        def venvPath = System.getProperty('python.venv.path', '../../../metadata-ingestion/venv')
        def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
        def pythonExe = isWindows ? "${venvPath}/Scripts/python.exe" : "${venvPath}/bin/python"

        def result = exec {
            commandLine pythonExe, "-c", "import sys; print(sys.executable)"
            ignoreExitValue = true
            standardOutput = new ByteArrayOutputStream()
            errorOutput = new ByteArrayOutputStream()
        }

        if (result.exitValue != 0) {
            throw new GradleException("Python virtual environment not properly set up at ${venvPath}")
        }
    }
}

test {
  // to avoid simultaneous executions of tests when complete build is run
  mustRunAfter(":metadata-io:test")
  useJUnit()
  // Add Python environment configuration
  dependsOn validatePythonEnv
  dependsOn tasks.getByPath(":metadata-ingestion:installDev")
  systemProperty 'python.venv.path', System.getProperty('python.venv.path', '../../../metadata-ingestion/venv')
}

// no submodule depends on datahub-schematron:cli
// and tests there are the ones checking python-java compatibility
test.dependsOn tasks.getByPath(":metadata-integration:java:datahub-schematron:cli:test")
test.dependsOn tasks.getByPath(":metadata-integration:java:datahub-schematron:lib:test")

task checkShadowJar(type: Exec) {
  commandLine 'sh', '-c', 'scripts/check_jar.sh'
}

shadowJar {
  zip64 = true
  if (project.hasProperty('archiveAppendix')) {
    archiveAppendix.set(project.archiveAppendix)
  }
  archiveClassifier = ''
  // preventing java multi-release JAR leakage
  // https://github.com/johnrengelman/shadow/issues/729
  exclude('module-info.class', 'META-INF/versions/**',
          '**/LICENSE', '**/LICENSE*.txt', '**/NOTICE', '**/NOTICE.txt', 'licenses/**', 'log4j2.*', 'log4j.*')
  dependencies {
    exclude(dependency("org.slf4j::"))
    exclude(dependency("antlr::"))
    exclude(dependency("org.scala-lang::"))
    exclude("org/apache/commons/logging/**")
  }
  mergeServiceFiles()
  // we relocate namespaces manually, because we want to know exactly which libs we are exposing and why
  // we can move to automatic relocation using ConfigureShadowRelocation after we get to a good place on these first
  // acryl-main doesn't perform any re-locations. I don't exactly know why, but keeping this comment here for future readers
  // jteoh: 9/26/23: Added the OSS relocates here to support Apple Metadata Lake use case, not sure why datahub-fork did not have them to start with.
  relocate 'org.springframework', 'io.acryl.shaded.org.springframework'
  relocate 'com.fasterxml.jackson', 'io.acryl.shaded.jackson'
  relocate 'org.yaml', 'io.acryl.shaded.org.yaml' // Required for shading snakeyaml
  relocate 'net.jcip.annotations', 'io.acryl.shaded.annotations'
  relocate 'javassist', 'io.acryl.shaded.javassist'
  relocate 'edu.umd.cs.findbugs', 'io.acryl.shaded.findbugs'
  relocate 'org.antlr', 'io.acryl.shaded.org.antlr'
  // relocate 'antlr', 'io.acryl.shaded.antlr'
    relocate 'com.google.common', 'io.acryl.shaded.com.google.common'
    relocate 'org.apache.commons.codec', 'io.acryl.shaded.org.apache.commons.codec'
    relocate 'org.apache.commons.compress', 'io.acryl.shaded.org.apache.commons.compress'
    relocate 'org.apache.commons.lang3', 'io.acryl.shaded.org.apache.commons.lang3'
    relocate 'org.apache.commons.lang', 'io.acryl.shaded.org.apache.commons.lang'
    relocate 'org.apache.commons.cli', 'io.acryl.shaded.org.apache.commons.cli'
    relocate 'org.apache.commons.text', 'io.acryl.shaded.org.apache.commons.text'
    relocate 'org.apache.commons.io', 'io.acryl.shaded.org.apache.commons.io'
  relocate 'org.apache.maven', 'io.acryl.shaded.org.apache.maven'
  relocate 'org.reflections', 'io.acryl.shaded.org.reflections'
  relocate 'st4hidden', 'io.acryl.shaded.st4hidden'
  relocate 'org.stringtemplate', 'io.acryl.shaded.org.stringtemplate'
  relocate 'org.abego.treelayout', 'io.acryl.shaded.treelayout'
  relocate 'org.slf4j', 'io.acryl.shaded.slf4j'
  relocate 'javax.annotation', 'io.acryl.shaded.javax.annotation'
  relocate 'com.github.benmanes.caffeine', 'io.acryl.shaded.com.github.benmanes.caffeine'
  relocate 'org.checkerframework', 'io.acryl.shaded.org.checkerframework'
  relocate 'com.google.errorprone', 'io.acryl.shaded.com.google.errorprone'
  relocate 'com.sun.jna', 'io.acryl.shaded.com.sun.jna'
  relocate 'io.github.classgraph', 'io.acryl.shaded.io.github.classgraph'
  relocate 'nonapi.io.github.classgraph', 'io.acryl.shaded.nonapi.io.github.classgraph'
  relocate 'com.github.fge', 'io.acryl.shaded.com.github.fge'
  // Below jars added for kafka emitter only
  relocate 'org.apache.avro', 'io.acryl.shaded.org.apache.avro'
