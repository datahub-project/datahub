services:
  spark-master:
    image: spark-master
    container_name: spark-master
    ports:
      - 8090:8080
      - 7077:7077
  spark-worker-1:
    image: spark-slave
    container_name: spark-worker-1
    ports:
      - 8091:8081
    depends_on:
      - spark-master
  spark-worker-2:
    image: spark-slave
    container_name: spark-worker-2
    ports:
      - 8092:8081
    depends_on:
      - spark-master
  # Mock AWS Glue + S3 for the Iceberg-on-Glue connection-instance scenario. The Glue job points
  # Iceberg's GlueCatalog/S3FileIO at this endpoint, so OpenLineage emits an arn:aws:glue namespace.
  # moto's fixed default account is 123456789012, which the connection mapping keys on.
  moto:
    image: motoserver/moto:5.1.0
    container_name: moto
    ports:
      - 5051:5000

networks:
  default:
    external: true
    name: datahub_network

