[loggers]
keys=root,datahub_actions,kafka,urllib3

[handlers]
keys=consoleHandler

[formatters]
keys=jsonFormatter

[logger_root]
level=WARNING
handlers=consoleHandler

[logger_datahub_actions]
level=INFO
handlers=consoleHandler
qualname=datahub_actions
propagate=0

[logger_kafka]
level=WARNING
handlers=
qualname=kafka
propagate=1

[logger_urllib3]
level=WARNING
handlers=
qualname=urllib3
propagate=1

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=jsonFormatter
args=(sys.stdout,)

[formatter_jsonFormatter]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(levelname)s %(name)s %(lineno)d %(message)s
datefmt=%Y-%m-%d %H:%M:%S
