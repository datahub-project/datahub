ext {
  venv_name = '.venv'
  venv_python = "${projectDir}/${venv_name}/bin/python"
  venv_ruff = "${projectDir}/${venv_name}/bin/ruff"
}

task installRuff(type: Exec) {
  description = 'Create .venv and install ruff'
  outputs.file(venv_ruff)
  commandLine 'bash', '-c',
    "python3 -m venv ${projectDir}/${venv_name} && ${venv_python} -m pip install --quiet ruff"
}

task lint(type: Exec, dependsOn: installRuff) {
  description = 'Check formatting of datahub_dev.py'
  inputs.file('datahub_dev.py')
  commandLine 'bash', '-c',
    "${venv_ruff} check datahub_dev.py && ${venv_ruff} format --check datahub_dev.py"
}

task lintFix(type: Exec, dependsOn: installRuff) {
  description = 'Auto-fix formatting of datahub_dev.py'
  inputs.file('datahub_dev.py')
  commandLine 'bash', '-c',
    "${venv_ruff} check --fix datahub_dev.py && ${venv_ruff} format datahub_dev.py"
}
